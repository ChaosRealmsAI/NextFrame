<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame Scene Preview Editor</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;--panel:#1a1a1a;--border:#2a2a2a;--accent:#da7756;
    --ink:#e8e0d8;--muted:#8a8078;--dim:#555;--radius:8px;
  }
  body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

  /* Top bar */
  .topbar{height:40px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
  .topbar-title{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:.3px}
  .topbar-sep{width:1px;height:16px;background:var(--border)}
  .topbar-info{font-size:11px;color:var(--muted)}

  /* Main layout */
  .main{display:flex;flex:1;overflow:hidden}

  /* Left panel */
  .left{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .search-box{padding:8px;border-bottom:1px solid var(--border)}
  .search-box input{width:100%;background:#141414;border:1px solid var(--border);border-radius:6px;padding:6px 8px 6px 28px;color:var(--ink);font-size:12px;outline:none}
  .search-box input:focus{border-color:var(--accent)}
  .search-box{position:relative}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}

  .scene-list{flex:1;overflow-y:auto;padding:4px 0}
  .scene-list::-webkit-scrollbar{width:4px}
  .scene-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .group-header{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 12px 4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
  .group-count{font-size:10px;color:var(--dim);background:#222;border-radius:8px;padding:1px 6px}
  .scene-item{font-size:12px;padding:5px 12px 5px 20px;cursor:pointer;color:var(--muted);transition:background .1s,color .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scene-item:hover{background:rgba(218,119,86,.08);color:var(--ink)}
  .scene-item.active{background:rgba(218,119,86,.15);color:var(--accent);font-weight:500}

  /* Center panel */
  .center{flex:1;display:flex;flex-direction:column;min-width:0}
  .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
  .canvas-wrapper{position:relative;width:100%;max-width:800px;aspect-ratio:16/9;background:#000;border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5)}
  .canvas-content{width:100%;height:100%;transition:background .3s}
  .canvas-meta{position:absolute;bottom:8px;right:12px;font-size:10px;color:rgba(255,255,255,.3);font-family:monospace}

  /* Playback controls */
  .controls{height:48px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
  .btn-play{width:32px;height:32px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
  .btn-play:hover{opacity:.85}
  .btn-play svg{fill:#fff;width:14px;height:14px}
  .scrubber-wrap{flex:1;display:flex;align-items:center;gap:10px}
  .scrubber{flex:1;height:4px;background:#333;border-radius:2px;position:relative;cursor:pointer}
  .scrubber-fill{height:100%;background:var(--accent);border-radius:2px;width:20%;transition:width .05s linear}
  .scrubber-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);position:absolute;top:50%;transform:translate(-50%,-50%);left:20%;cursor:grab;box-shadow:0 0 4px rgba(0,0,0,.4)}
  .time-display{font-size:11px;color:var(--muted);font-family:monospace;white-space:nowrap;min-width:110px;text-align:right}

  /* Right panel */
  .right{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .param-header{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
  .param-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
  .badge{font-size:9px;text-transform:uppercase;letter-spacing:.8px;background:rgba(218,119,86,.15);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:500}
  .param-desc{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}

  .param-list{flex:1;overflow-y:auto;padding:8px 0}
  .param-list::-webkit-scrollbar{width:4px}
  .param-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .param-group{padding:0 16px;margin-bottom:12px}
  .param-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .param-value-display{font-family:monospace;font-size:10px;color:var(--accent)}
  .param-row{display:flex;align-items:center;gap:8px}
  .param-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:#333;border-radius:2px;outline:none}
  .param-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,.3)}
  .param-num{width:52px;background:#141414;border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--ink);font-size:11px;font-family:monospace;text-align:right;outline:none}
  .param-num:focus{border-color:var(--accent)}
  .param-range-hint{font-size:9px;color:var(--dim);margin-top:2px;font-family:monospace}

  /* Toggle */
  .toggle{width:36px;height:20px;background:#333;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
  .toggle.on{background:var(--accent)}
  .toggle::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s}
  .toggle.on::after{transform:translateX(16px)}

  /* Select */
  .param-select{width:100%;background:#141414;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--ink);font-size:11px;outline:none;cursor:pointer}
  .param-select:focus{border-color:var(--accent)}

  /* Text input */
  .param-text{width:100%;background:#141414;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--ink);font-size:11px;outline:none}
  .param-text:focus{border-color:var(--accent)}

  /* Footer */
  .param-footer{padding:12px 16px;border-top:1px solid var(--border)}
  .btn-reset{width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">NextFrame</span>
  <span class="topbar-sep"></span>
  <span class="topbar-info">Scene Preview Editor</span>
  <span style="flex:1"></span>
  <span class="topbar-info" id="sceneCount">33 scenes loaded</span>
</div>

<div class="main">
  <!-- Left: Scene List -->
  <div class="left">
    <div class="search-box">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" placeholder="Search scenes..." id="searchInput">
    </div>
    <div class="scene-list" id="sceneList"></div>
  </div>

  <!-- Center: Canvas -->
  <div class="center">
    <div class="canvas-area">
      <div class="canvas-wrapper">
        <div class="canvas-content" id="canvasContent"></div>
        <div class="canvas-meta">960x540 &middot; 30fps</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn-play" id="btnPlay" title="Play / Pause">
        <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
      </button>
      <div class="scrubber-wrap">
        <div class="scrubber" id="scrubber">
          <div class="scrubber-fill" id="scrubberFill"></div>
          <div class="scrubber-thumb" id="scrubberThumb"></div>
        </div>
        <span class="time-display" id="timeDisplay">0:02.4 / 0:12.0</span>
      </div>
    </div>
  </div>

  <!-- Right: Params -->
  <div class="right">
    <div class="param-header">
      <div class="param-title"><span id="paramName">auroraGradient</span><span class="badge" id="paramBadge">Canvas</span></div>
      <div class="param-desc" id="paramDesc">Multi-hue aurora gradient with animated noise grain overlay.</div>
    </div>
    <div class="param-list" id="paramList"></div>
    <div class="param-footer">
      <button class="btn-reset" id="btnReset">Reset Defaults</button>
    </div>
  </div>
</div>

<script>
const SCENES = {
  Canvas: [
    {name:'auroraGradient',desc:'Multi-hue aurora gradient with animated noise grain overlay.',params:[
      {key:'hueA',type:'number',val:270,min:0,max:360,label:'Hue A'},
      {key:'hueB',type:'number',val:200,min:0,max:360,label:'Hue B'},
      {key:'hueC',type:'number',val:320,min:0,max:360,label:'Hue C'},
      {key:'intensity',type:'number',val:1,min:0,max:1.5,step:.01,label:'Intensity'},
      {key:'grain',type:'number',val:.04,min:0,max:.15,step:.001,label:'Grain'},
    ]},
    {name:'particleField',desc:'Random particle system with configurable density.',params:[
      {key:'count',type:'number',val:500,min:10,max:5000,label:'Particle Count'},
      {key:'speed',type:'number',val:1,min:0,max:5,step:.1,label:'Speed'},
      {key:'color',type:'string',val:'#ffffff',label:'Color'},
    ]},
    {name:'noiseWarp',desc:'Perlin noise displacement warp.',params:[
      {key:'scale',type:'number',val:2,min:.5,max:10,step:.1,label:'Scale'},
      {key:'speed',type:'number',val:.5,min:0,max:3,step:.05,label:'Speed'},
    ]},
    {name:'radialPulse',desc:'Pulsating radial gradient rings.',params:[]},
    {name:'gridDistort',desc:'CSS grid with perspective distortion.',params:[]},
    {name:'waveMesh',desc:'Animated wave mesh surface.',params:[]},
    {name:'glitchBlock',desc:'Random glitch block displacement.',params:[]},
    {name:'dotMatrix',desc:'Halftone dot matrix pattern.',params:[]},
    {name:'voronoiCell',desc:'Animated voronoi tessellation.',params:[]},
    {name:'plasmaFlow',desc:'Retro plasma color cycling.',params:[]},
    {name:'spiralZoom',desc:'Infinite spiral zoom tunnel.',params:[]},
    {name:'rainDrop',desc:'Raindrop ripple simulation.',params:[]},
    {name:'fireEmber',desc:'Procedural fire embers rising.',params:[]},
    {name:'starField',desc:'3D parallax star field.',params:[]},
    {name:'gradientMorph',desc:'Smooth gradient color morphing.',params:[]},
    {name:'circuitBoard',desc:'Animated circuit board traces.',params:[]},
    {name:'fractalTree',desc:'Recursive fractal tree growth.',params:[]},
    {name:'cloudDrift',desc:'Soft cloud layer drifting.',params:[]},
    {name:'hexGrid',desc:'Hexagonal grid with hover glow.',params:[]},
    {name:'liquidMetal',desc:'Metallic liquid surface simulation.',params:[]},
    {name:'neonGlow',desc:'Neon text glow pulsation.',params:[]},
    {name:'retroWave',desc:'Synthwave retro grid horizon.',params:[]},
    {name:'smokeWisp',desc:'Wispy smoke particle trails.',params:[]},
    {name:'geometricSpin',desc:'Spinning geometric primitives.',params:[]},
    {name:'inkBleed',desc:'Ink bleed watercolor spread.',params:[]},
    {name:'dataStream',desc:'Matrix-style data rain stream.',params:[]},
  ],
  Image:[{name:'kenBurnsPan',desc:'Slow Ken Burns pan & zoom on still image.',params:[
    {key:'zoom',type:'number',val:1.2,min:1,max:3,step:.1,label:'Zoom Level'},
    {key:'panDir',type:'enum',val:'left-right',options:['left-right','right-left','top-bottom','bottom-top'],label:'Pan Direction'},
  ]}],
  HTML:[{name:'htmlOverlay',desc:'Render arbitrary HTML/CSS as scene layer.',params:[
    {key:'url',type:'string',val:'https://example.com',label:'Source URL'},
    {key:'scale',type:'number',val:1,min:.5,max:2,step:.1,label:'Scale'},
  ]}],
  SVG:[{name:'svgAnimate',desc:'Animated SVG with SMIL or CSS transitions.',params:[
    {key:'loop',type:'boolean',val:true,label:'Loop Animation'},
  ]}],
  Markdown:[{name:'mdSlide',desc:'Render markdown as styled slide.',params:[
    {key:'theme',type:'enum',val:'dark',options:['dark','light','sepia'],label:'Theme'},
    {key:'fontSize',type:'number',val:24,min:12,max:72,label:'Font Size'},
  ]}],
  Video:[
    {name:'videoClip',desc:'Video file playback with trim controls.',params:[
      {key:'trimStart',type:'number',val:0,min:0,max:60,step:.1,label:'Trim Start (s)'},
      {key:'trimEnd',type:'number',val:10,min:0,max:60,step:.1,label:'Trim End (s)'},
      {key:'mute',type:'boolean',val:false,label:'Mute Audio'},
    ]},
    {name:'chromaKey',desc:'Green screen chroma key compositing.',params:[
      {key:'keyColor',type:'string',val:'#00ff00',label:'Key Color'},
      {key:'threshold',type:'number',val:.4,min:0,max:1,step:.01,label:'Threshold'},
    ]},
  ],
  Lottie:[{name:'lottiePlayer',desc:'Lottie JSON animation playback.',params:[
    {key:'speed',type:'number',val:1,min:.1,max:5,step:.1,label:'Playback Speed'},
    {key:'loop',type:'boolean',val:true,label:'Loop'},
  ]}],
};

let activeScene = null;
let playing = false;
let scrubPos = .2;
let animFrame = null;

function renderSceneList(filter=''){
  const el = document.getElementById('sceneList');
  el.innerHTML = '';
  const f = filter.toLowerCase();
  for(const [cat,scenes] of Object.entries(SCENES)){
    const filtered = scenes.filter(s=>s.name.toLowerCase().includes(f));
    if(!filtered.length) continue;
    const h = document.createElement('div');
    h.className='group-header';
    h.innerHTML=`<span>${cat}</span><span class="group-count">${filtered.length}</span>`;
    el.appendChild(h);
    for(const s of filtered){
      const d = document.createElement('div');
      d.className='scene-item'+(activeScene&&activeScene.name===s.name?' active':'');
      d.textContent = s.name;
      d.onclick=()=>selectScene(s,cat);
      el.appendChild(d);
    }
  }
}

function selectScene(scene, cat){
  activeScene = {...scene, category: cat};
  // Reset params to defaults
  if(scene.params) activeScene.params = scene.params.map(p=>({...p}));
  renderSceneList(document.getElementById('searchInput').value);
  renderParams();
  updateCanvas();
}

function renderParams(){
  const s = activeScene;
  if(!s) return;
  document.getElementById('paramName').textContent = s.name;
  document.getElementById('paramBadge').textContent = s.category;
  document.getElementById('paramDesc').textContent = s.desc;
  const el = document.getElementById('paramList');
  el.innerHTML='';
  if(!s.params||!s.params.length){
    el.innerHTML='<div style="padding:16px;color:var(--dim);font-size:12px;text-align:center">No configurable parameters</div>';
    return;
  }
  for(const p of s.params){
    const g = document.createElement('div');
    g.className='param-group';
    if(p.type==='number'){
      const step = p.step||1;
      g.innerHTML=`
        <div class="param-label"><span>${p.label}</span><span class="param-value-display" id="pv_${p.key}">${p.val}</span></div>
        <div class="param-row">
          <input type="range" class="param-slider" min="${p.min}" max="${p.max}" step="${step}" value="${p.val}" data-key="${p.key}">
          <input type="number" class="param-num" min="${p.min}" max="${p.max}" step="${step}" value="${p.val}" data-key="${p.key}">
        </div>
        <div class="param-range-hint">${p.min} — ${p.max}</div>`;
      el.appendChild(g);
      const slider = g.querySelector('.param-slider');
      const num = g.querySelector('.param-num');
      slider.oninput=()=>{num.value=slider.value;p.val=+slider.value;document.getElementById('pv_'+p.key).textContent=slider.value;updateCanvas()};
      num.oninput=()=>{slider.value=num.value;p.val=+num.value;document.getElementById('pv_'+p.key).textContent=num.value;updateCanvas()};
    } else if(p.type==='enum'){
      let opts = p.options.map(o=>`<option value="${o}"${o===p.val?' selected':''}>${o}</option>`).join('');
      g.innerHTML=`<div class="param-label"><span>${p.label}</span></div><select class="param-select" data-key="${p.key}">${opts}</select>`;
      el.appendChild(g);
      g.querySelector('select').onchange=function(){p.val=this.value;updateCanvas()};
    } else if(p.type==='boolean'){
      g.innerHTML=`<div class="param-label"><span>${p.label}</span></div><div class="toggle${p.val?' on':''}" data-key="${p.key}"></div>`;
      el.appendChild(g);
      g.querySelector('.toggle').onclick=function(){p.val=!p.val;this.classList.toggle('on');updateCanvas()};
    } else if(p.type==='string'){
      g.innerHTML=`<div class="param-label"><span>${p.label}</span></div><input type="text" class="param-text" value="${p.val}" data-key="${p.key}">`;
      el.appendChild(g);
      g.querySelector('.param-text').oninput=function(){p.val=this.value;updateCanvas()};
    }
  }
}

function getParamVal(key){
  if(!activeScene||!activeScene.params) return null;
  const p = activeScene.params.find(x=>x.key===key);
  return p?p.val:null;
}

function updateCanvas(){
  const cv = document.getElementById('canvasContent');
  if(!activeScene){cv.style.background='#000';return}
  const n = activeScene.name;
  if(n==='auroraGradient'){
    const hA=getParamVal('hueA')||270, hB=getParamVal('hueB')||200, hC=getParamVal('hueC')||320;
    const intensity = getParamVal('intensity')||1;
    const a=`hsla(${hA},70%,${30*intensity}%,1)`;
    const b=`hsla(${hB},60%,${25*intensity}%,1)`;
    const c=`hsla(${hC},65%,${35*intensity}%,1)`;
    cv.style.background=`linear-gradient(135deg, ${a} 0%, ${b} 50%, ${c} 100%)`;
  } else if(n==='particleField'){
    cv.style.background='radial-gradient(circle at 30% 40%, #1a1a3a, #0a0a1a)';
  } else if(n==='noiseWarp'){
    cv.style.background='linear-gradient(45deg, #1a0a2e, #0a1628, #1a2a1a)';
  } else if(n==='radialPulse'){
    cv.style.background='radial-gradient(circle, #2a1a3a 0%, #0a0a1a 70%)';
  } else if(n==='retroWave'){
    cv.style.background='linear-gradient(180deg, #0a0015 0%, #1a0030 40%, #ff6b9d22 100%)';
  } else if(n==='neonGlow'){
    cv.style.background='radial-gradient(ellipse at center, #0a0a2a, #000)';
  } else if(n==='videoClip'||n==='chromaKey'){
    cv.style.background='linear-gradient(135deg, #1a1a2e, #2a1a1a)';
  } else if(n==='lottiePlayer'){
    cv.style.background='radial-gradient(circle at 50% 50%, #1e1e3a, #0e0e1e)';
  } else if(n==='htmlOverlay'){
    cv.style.background='linear-gradient(135deg, #1a2a1a, #1a1a2a)';
  } else {
    // Generate a deterministic color from name
    let hash=0;for(let i=0;i<n.length;i++)hash=n.charCodeAt(i)+((hash<<5)-hash);
    const h1=(hash&0xFF)*1.4, h2=((hash>>8)&0xFF)*1.4;
    cv.style.background=`linear-gradient(${hash%360}deg, hsl(${h1},40%,15%), hsl(${h2},35%,12%))`;
  }
}

// Play/Pause
document.getElementById('btnPlay').onclick=()=>{
  playing=!playing;
  document.getElementById('iconPlay').style.display=playing?'none':'block';
  document.getElementById('iconPause').style.display=playing?'block':'none';
  if(playing) animateScrub();
  else cancelAnimationFrame(animFrame);
};

function animateScrub(){
  if(!playing) return;
  scrubPos+=.001;
  if(scrubPos>1) scrubPos=0;
  setScrubPos(scrubPos);
  animFrame=requestAnimationFrame(animateScrub);
}

function setScrubPos(pos){
  scrubPos=Math.max(0,Math.min(1,pos));
  const pct=scrubPos*100;
  document.getElementById('scrubberFill').style.width=pct+'%';
  document.getElementById('scrubberThumb').style.left=pct+'%';
  const total=12;
  const cur=scrubPos*total;
  const mm=Math.floor(cur/60);
  const ss=cur%60;
  document.getElementById('timeDisplay').textContent=`${mm}:${ss.toFixed(1).padStart(4,'0')} / 0:12.0`;
}

// Scrubber drag
const scrubberEl=document.getElementById('scrubber');
let dragging=false;
scrubberEl.onmousedown=(e)=>{dragging=true;scrubTo(e)};
document.onmousemove=(e)=>{if(dragging)scrubTo(e)};
document.onmouseup=()=>{dragging=false};
function scrubTo(e){
  const rect=scrubberEl.getBoundingClientRect();
  const pos=(e.clientX-rect.left)/rect.width;
  setScrubPos(pos);
}

// Search
document.getElementById('searchInput').oninput=function(){renderSceneList(this.value)};

// Reset
document.getElementById('btnReset').onclick=()=>{
  if(!activeScene) return;
  // Find original
  for(const scenes of Object.values(SCENES)){
    const orig=scenes.find(s=>s.name===activeScene.name);
    if(orig){selectScene(orig,activeScene.category);break}
  }
};

// Init
selectScene(SCENES.Canvas[0],'Canvas');
setScrubPos(.2);
</script>
</body>
</html>
