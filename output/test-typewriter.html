<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame — Typewriter Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#viewport { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
.layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
#controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
#progress { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; }
#time { font-size: 12px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; width: 80px; }
#play-btn { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 12px; }
#title { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div id="viewport"></div>
<div id="controls">
  <button id="play-btn">⏸</button>
  <div id="progress"><div id="progress-fill"></div></div>
  <span id="time">0.00 / 12.00</span>
</div>
<div id="title">NEXTFRAME · TYPEWRITER TEST · 9:16 · 3 SCENES · 12s</div>
<script>
// ─── Config ───
const DURATION = 12;
const ratio = window.innerWidth / window.innerHeight;
const isRecording = Math.abs(ratio - 9/16) < 0.01 && window.innerWidth >= 500;
let W, H;
if (isRecording) {
  W = window.innerWidth;
  H = window.innerHeight;
} else {
  const maxH = Math.min(window.innerHeight - 80, 750);
  H = maxH;
  W = Math.round(H * 9 / 16);
}
const vp = document.getElementById('viewport');
vp.style.width = W + 'px';
vp.style.height = H + 'px';
if (isRecording) {
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.overflow = 'hidden';
  document.body.style.display = 'block';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('title').style.display = 'none';
  vp.style.borderRadius = '0';
  vp.style.border = 'none';
  vp.style.position = 'fixed';
  vp.style.top = '0';
  vp.style.left = '0';
}

// ─── Timeline ───
const timeline = [
  { id: 'bg',     scene: 'auroraGradient', start: 0, dur: 12, z: 0, opacity: 1,
    params: { hueA: 270, hueB: 200, hueC: 320, intensity: 1, grain: 0.04, speed: 0.3 } },
  { id: 'ripple', scene: 'circleRipple',   start: 0, dur: 12, z: 1, opacity: 0.3,
    params: { hueStart: 180, hueSpan: 120, ringCount: 8, interval: 0.3, lifespan: 2.5, thickness: 0.01 } },
  { id: 'poem',   scene: 'typewriterText', start: 0, dur: 12, z: 2, opacity: 1,
    params: { lines: ['In the beginning','there was nothing.','Then came light.','And then, video.'],
      hue: 180, saturation: 70, lightness: 85, fontSize: 0.055,
      charDelay: 0.07, lineGap: 0.6, cursorChar: '|', cursorBlink: 1.8, align: 'center', bgOpacity: 0 } },
];

// ─── Scene Renderers (inlined from nf-core/scenes) ───
function renderAuroraGradient(t, p, W, H) {
  const T = t * p.speed;
  const hA = p.hueA, hB = p.hueB, hC = p.hueC, I = p.intensity, G = p.grain;
  return `<canvas width="${W}" height="${H}" style="width:100%;height:100%;display:block" id="sc_bg_${Math.round(t*1000)}"></canvas>
<script>(function(){
  var c=document.getElementById("sc_bg_${Math.round(t*1000)}"),x=c.getContext("2d"),W=${W},H=${H};
  function blob(cx,cy,r,h,a){var g=x.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,"hsla("+h+","+Math.round(70*${I})+"%,55%,"+a+")");g.addColorStop(1,"hsla("+h+","+Math.round(70*${I})+"%,55%,0)");x.fillStyle=g;x.fillRect(0,0,W,H)}
  x.fillStyle="#0a0a12";x.fillRect(0,0,W,H);x.globalCompositeOperation="lighter";
  blob(W*(0.3+0.2*Math.sin(${T}*0.7)),H*(0.2+0.12*Math.cos(${T}*0.5)),W*0.8,${hA},0.6);
  blob(W*(0.7+0.15*Math.cos(${T}*0.6)),H*(0.45+0.15*Math.sin(${T}*0.4)),W*0.7,${hB},0.5);
  blob(W*(0.5+0.2*Math.sin(${T}*0.8)),H*(0.7+0.1*Math.cos(${T}*0.9)),W*0.75,${hC},0.45);
  blob(W*(0.4+0.1*Math.cos(${T}*1.1)),H*(0.9+0.05*Math.sin(${T}*0.6)),W*0.5,${hA+40},0.3);
  x.globalCompositeOperation="source-over";
  if(${G}>0.001){var d=x.getImageData(0,0,W,H),px=d.data,g2=255*${G};for(var i=0;i<px.length;i+=16){var n=(Math.random()-0.5)*g2;px[i]+=n;px[i+1]+=n;px[i+2]+=n}x.putImageData(d,0,0)}
})()<\/script>`;
}

function renderCircleRipple(t, p, W, H) {
  const minD = Math.min(W, H), maxR = minD * 0.45, lw = minD * p.thickness;
  return `<canvas width="${W}" height="${H}" style="width:100%;height:100%;display:block" id="sc_rip_${Math.round(t*1000)}"></canvas>
<script>(function(){
  var c=document.getElementById("sc_rip_${Math.round(t*1000)}"),x=c.getContext("2d"),W=${W},H=${H};
  x.clearRect(0,0,W,H);var cx=W/2,cy=H/2;
  for(var i=0;i<${p.ringCount};i++){
    var age=(${t}-i*${p.interval})%(${p.ringCount}*${p.interval});
    if(age<0)age+=${p.ringCount}*${p.interval};
    var pr=age/${p.lifespan};if(pr>1||pr<0)continue;
    var ease=pr*(2-pr),r=ease*${maxR},a=1-pr,h=${p.hueStart}+(${p.hueSpan}*i/${p.ringCount})%360;
    x.beginPath();x.arc(cx,cy,Math.max(1,r),0,Math.PI*2);
    x.strokeStyle="hsla("+h+",70%,60%,"+a+")";
    x.lineWidth=${lw}*(1-pr*0.5);x.stroke();
  }
})()<\/script>`;
}

function renderTypewriterText(t, p, W, H) {
  const lines = p.lines || [];
  const fs = Math.round(W * (p.fontSize || 0.055));
  const lineHeight = fs * 1.7;
  const paddingX = W * 0.08;
  const color = `hsl(${p.hue},${p.saturation}%,${p.lightness}%)`;
  const cursorColor = `hsl(${p.hue},${p.saturation}%,${Math.min(100, p.lightness + 10)}%)`;
  const charDelay = p.charDelay || 0.06;
  const lineGap = p.lineGap || 0.5;
  const cursorChar = p.cursorChar || '|';
  const cursorBlink = p.cursorBlink || 1.8;
  const align = p.align || 'left';
  const bgOpacity = p.bgOpacity || 0;

  const lineStartTimes = [];
  let cursor = 0;
  for (let i = 0; i < lines.length; i++) {
    lineStartTimes.push(cursor);
    cursor += lines[i].length * charDelay + lineGap;
  }

  const visibleCharsPerLine = lines.map((line, i) => {
    const elapsed = t - lineStartTimes[i];
    if (elapsed < 0) return 0;
    return Math.min(line.length, Math.floor(elapsed / charDelay));
  });

  let activeLineIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (t - lineStartTimes[i] >= 0 && visibleCharsPerLine[i] < lines[i].length) {
      activeLineIdx = i;
      break;
    }
  }
  if (activeLineIdx === -1 && lines.length > 0) activeLineIdx = lines.length - 1;

  const blinkPeriod = 1 / cursorBlink;
  const showCursor = (t % blinkPeriod) < blinkPeriod * 0.5;
  const blockH = lines.length * lineHeight;
  const startY = (H - blockH) / 2;
  const justifyContent = align === 'center' ? 'center' : 'flex-start';

  let linesHtml = '';
  for (let i = 0; i < lines.length; i++) {
    const visible = visibleCharsPerLine[i];
    const text = lines[i].substring(0, visible);
    const isActive = i === activeLineIdx;
    const cursorSpan = isActive && showCursor
      ? `<span style="opacity:1;color:${cursorColor}">${cursorChar}</span>`
      : `<span style="opacity:0">${cursorChar}</span>`;
    const lineOpacity = visible > 0 || isActive ? 1 : 0;
    linesHtml += `<div style="height:${lineHeight}px;display:flex;align-items:center;justify-content:${justifyContent};opacity:${lineOpacity};white-space:pre">${text}${cursorSpan}</div>`;
  }

  const bgStyle = bgOpacity > 0
    ? `background:rgba(0,0,0,${bgOpacity});border-radius:${W * 0.02}px;padding:${H * 0.02}px ${paddingX}px;`
    : `padding:0 ${paddingX}px;`;

  return `<div style="width:${W}px;height:${H}px;position:relative;overflow:hidden;font-family:ui-monospace,'JetBrains Mono','Fira Code',monospace">
  <div style="position:absolute;top:${startY}px;left:0;right:0;display:flex;flex-direction:column;align-items:${align === 'center' ? 'center' : 'flex-start'};${bgStyle}font-size:${fs}px;font-weight:400;color:${color};letter-spacing:0.02em;line-height:${lineHeight}px">
    ${linesHtml}
  </div>
</div>`;
}

const RENDERERS = {
  auroraGradient: renderAuroraGradient,
  circleRipple:   renderCircleRipple,
  typewriterText: renderTypewriterText,
};

// ─── Create layer containers ───
const layers = {};
timeline.sort((a, b) => a.z - b.z).forEach(layer => {
  const div = document.createElement('div');
  div.className = 'layer';
  div.id = 'layer_' + layer.id;
  div.style.zIndex = layer.z;
  div.style.left = '0%';
  div.style.top = '0%';
  div.style.width = '100%';
  div.style.height = '100%';
  if (layer.opacity !== undefined && layer.opacity !== 1) div.style.opacity = layer.opacity;
  vp.appendChild(div);
  layers[layer.id] = div;
});

// ─── Recorder protocol ───
window.__duration = DURATION;
window.__onFrame = function(data) {
  currentT = data.time;
  renderFrame();
};

// ─── Playback ───
let playing = true, startTime = performance.now(), currentT = 0;
const progressFill = document.getElementById('progress-fill');
const timeEl = document.getElementById('time');
const playBtn = document.getElementById('play-btn');

playBtn.onclick = () => {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT*1000; playBtn.textContent = '⏸'; }
  else playBtn.textContent = '▶';
};
document.getElementById('progress').onclick = (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  currentT = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width)) * DURATION;
  startTime = performance.now() - currentT*1000;
};

function renderFrame() {
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  timeEl.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2);

  timeline.forEach(layer => {
    const div = layers[layer.id];
    const localT = currentT - layer.start;
    if (localT < 0 || localT > layer.dur) { div.style.display = 'none'; return; }
    div.style.display = 'block';

    const renderer = RENDERERS[layer.scene];
    if (renderer) {
      const html = renderer(localT, layer.params, W, H);
      if (div._lastHtml !== html) {
        div.innerHTML = html;
        div._lastHtml = html;
        div.querySelectorAll('script').forEach(s => {
          try { new Function(s.textContent)(); } catch(e) {}
        });
      }
    }
  });
}

function loop() {
  if (playing) currentT = ((performance.now() - startTime) / 1000) % DURATION;
  renderFrame();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
