<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NextFrame — Generated Video</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #111; min-height: 100vh; }
  .nf-layer { will-change: opacity, transform; }
</style>
</head>
<body>
<div id="stage"></div>
<script>
// ===== Shared Utilities =====
const SANS_FONT_STACK = '-apple-system, "SF Pro Display", "PingFang SC", sans-serif';
const MONO_FONT_STACK = '"SF Mono", "Fira Code", Menlo, monospace';
const SERIF_FONT_STACK = '"Iowan Old Style", "Times New Roman", "Songti SC", serif';

function clamp(value, min = 0, max = 1) {
  return Math.min(max, Math.max(min, value));
}

function lerp(start, end, progress) {
  return start + ((end - start) * progress);
}

function smoothstep(edge0, edge1, value) {
  if (edge0 === edge1) {
    return value >= edge1 ? 1 : 0;
  }

  const progress = clamp((value - edge0) / (edge1 - edge0));
  return progress * progress * (3 - (2 * progress));
}

function easeOutCubic(value) {
  return 1 - ((1 - value) ** 3);
}

function easeInCubic(value) {
  return value ** 3;
}

function easeOutBack(value) {
  const overshoot = 1.70158;
  const shifted = value - 1;
  return 1 + ((overshoot + 1) * (shifted ** 3)) + (overshoot * (shifted ** 2));
}

function toNumber(value, fallback) {
  const numeric = Number(value);
  return Number.isFinite(numeric) ? numeric : fallback;
}

function toBoolean(value, fallback = false) {
  if (value === true || value === false) {
    return value;
  }

  if (value === "true") {
    return true;
  }

  if (value === "false") {
    return false;
  }

  return fallback;
}

function normalizeLines(value) {
  return String(value ?? "").replace(/\r\n/g, "\n").split("\n");
}

function normalizeArray(value, fallback = []) {
  return Array.isArray(value) ? value : fallback;
}

function createRoot(container, extraStyles = "") {
  const root = document.createElement("div");
  root.style.cssText = [
    "position:absolute",
    "inset:0",
    "overflow:hidden",
    "pointer-events:none",
    extraStyles,
  ].filter(Boolean).join(";");
  container.appendChild(root);
  return root;
}

function setStyle(element, styles) {
  element.style.cssText = styles;
  return element;
}

function createNode(tagName, styles = "", text = "") {
  const element = document.createElement(tagName);
  if (styles) {
    element.style.cssText = styles;
  }
  if (text) {
    element.textContent = text;
  }
  return element;
}

function setVisible(element, visible) {
  element.style.display = visible ? "" : "none";
}

function hashString(value) {
  let result = 2166136261;
  const text = String(value ?? "");

  for (let index = 0; index < text.length; index += 1) {
    result ^= text.charCodeAt(index);
    result = Math.imul(result, 16777619);
  }

  return result >>> 0;
}

function hashFloat(seed, salt = "") {
  let value = (Math.imul((seed | 0) ^ 0x9e3779b9, 1597334677) ^ hashString(salt)) >>> 0;
  value ^= value >>> 15;
  value = Math.imul(value, 2246822519) >>> 0;
  value ^= value >>> 13;
  value = Math.imul(value, 3266489917) >>> 0;
  value ^= value >>> 16;
  return value / 4294967295;
}

function makeLinearGradient(colors, fallback = ["#ffffff"]) {
  const palette = normalizeArray(colors, fallback).filter(Boolean);
  return `linear-gradient(135deg, ${(palette.length > 0 ? palette : fallback).join(", ")})`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function sanitizeUrl(url) {
  const value = String(url ?? "").trim();
  if (!value) {
    return "";
  }

  if (/^(https?:|mailto:|#|\/)/i.test(value)) {
    return value;
  }

  return "";
}

function sanitizeHtml(value) {
  const template = document.createElement("template");
  template.innerHTML = String(value ?? "");

  const blockedTags = new Set(["SCRIPT", "STYLE", "IFRAME", "OBJECT", "EMBED", "LINK", "META"]);
  const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT);
  const blocked = [];

  while (walker.nextNode()) {
    const element = walker.currentNode;
    if (!(element instanceof HTMLElement)) {
      continue;
    }

    if (blockedTags.has(element.tagName)) {
      blocked.push(element);
      continue;
    }

    [...element.attributes].forEach((attribute) => {
      const name = attribute.name.toLowerCase();
      if (name.startsWith("on")) {
        element.removeAttribute(attribute.name);
        return;
      }

      if ((name === "href" || name === "src") && sanitizeUrl(attribute.value) !== attribute.value) {
        element.removeAttribute(attribute.name);
      }
    });
  }

  blocked.forEach((element) => element.remove());
  return template.innerHTML;
}

function formatInlineMarkdown(value) {
  const codeTokens = [];
  let text = escapeHtml(value);

  text = text.replace(/`([^`]+)`/g, (_, code) => {
    const token = `__CODE_${codeTokens.length}__`;
    codeTokens.push(`<code>${escapeHtml(code)}</code>`);
    return token;
  });

  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
    const safeUrl = sanitizeUrl(url);
    if (!safeUrl) {
      return escapeHtml(label);
    }

    return `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
  });

  text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");

  codeTokens.forEach((token, index) => {
    text = text.replace(`__CODE_${index}__`, token);
  });

  return text;
}

function markdownToHtml(markdown) {
  const lines = String(markdown ?? "").replace(/\r\n/g, "\n").split("\n");
  const html = [];
  const paragraph = [];
  let listItems = [];
  let inCode = false;
  let codeFence = "";
  let codeLines = [];

  const flushParagraph = () => {
    if (paragraph.length === 0) {
      return;
    }

    html.push(`<p>${formatInlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph.length = 0;
  };

  const flushList = () => {
    if (listItems.length === 0) {
      return;
    }

    html.push(`<ul>${listItems.join("")}</ul>`);
    listItems = [];
  };

  const flushCode = () => {
    if (!inCode) {
      return;
    }

    const languageClass = codeFence ? ` class="language-${escapeHtml(codeFence)}"` : "";
    html.push(`<pre><code${languageClass}>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
    inCode = false;
    codeFence = "";
    codeLines = [];
  };

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();
    const fenceMatch = line.match(/^```([\w-]+)?$/);
    if (fenceMatch) {
      if (inCode) {
        flushCode();
      } else {
        flushParagraph();
        flushList();
        inCode = true;
        codeFence = fenceMatch[1] || "";
        codeLines = [];
      }
      continue;
    }

    if (inCode) {
      codeLines.push(rawLine);
      continue;
    }

    if (!line.trim()) {
      flushParagraph();
      flushList();
      continue;
    }

    const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${formatInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^---+$/.test(line)) {
      flushParagraph();
      flushList();
      html.push("<hr />");
      continue;
    }

    const quoteMatch = line.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      html.push(`<blockquote><p>${formatInlineMarkdown(quoteMatch[1])}</p></blockquote>`);
      continue;
    }

    const listMatch = line.match(/^[-*]\s+(.*)$/);
    if (listMatch) {
      flushParagraph();
      listItems.push(`<li>${formatInlineMarkdown(listMatch[1])}</li>`);
      continue;
    }

    paragraph.push(line.trim());
  }

  flushParagraph();
  flushList();
  flushCode();

  return html.join("");
}


// ===== Scene Components =====
const SCENE_REGISTRY = {};

function __nfResizeCanvas(state) {
  const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  const rect = state.container.getBoundingClientRect();
  const width = Math.max(1, Math.round((rect.width || state.container.clientWidth || 1920) * dpr));
  const height = Math.max(1, Math.round((rect.height || state.container.clientHeight || 1080) * dpr));
  if (state.canvas.width !== width || state.canvas.height !== height) {
    state.canvas.width = width;
    state.canvas.height = height;
    state.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
}

function __nfCreateCanvasScene(renderer) {
  return {
    type: 'canvas',
    create(container) {
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block';
      container.appendChild(canvas);
      return { container, canvas, ctx: canvas.getContext('2d') };
    },
    update(state, t, params) {
      if (!state || !state.ctx) return;
      __nfResizeCanvas(state);
      const rect = state.container.getBoundingClientRect();
      state.ctx.clearRect(0, 0, rect.width || 1920, rect.height || 1080);
      renderer(t, params || {}, state.ctx, t);
    },
    destroy(state) {
      if (state && state.canvas) state.canvas.remove();
    },
  };
}

function __nfTimelineSize() {
  const project = TIMELINE && TIMELINE.project ? TIMELINE.project : {};
  return {
    width: project.width || TIMELINE.width || 1920,
    height: project.height || TIMELINE.height || 1080,
  };
}

function __nfScaleStaticRoot(state) {
  const size = __nfTimelineSize();
  const rect = state.container.getBoundingClientRect();
  const scale = Math.min(
    rect.width > 0 ? rect.width / size.width : 1,
    rect.height > 0 ? rect.height / size.height : 1
  ) || 1;
  state.root.style.transform = 'scale(' + scale + ')';
}

function __nfCreateStaticScene(renderContent, extraStyle) {
  return {
    type: 'dom',
    create(container, params) {
      const size = __nfTimelineSize();
      const root = document.createElement('div');
      root.style.cssText = 'position:absolute;left:0;top:0;transform-origin:0 0;' + 'width:' + size.width + 'px;height:' + size.height + 'px;' + (extraStyle || '');
      root.innerHTML = renderContent(params || {});
      container.appendChild(root);
      const state = { container, root };
      __nfScaleStaticRoot(state);
      return state;
    },
    update(state) {
      __nfScaleStaticRoot(state);
    },
    destroy(state) {
      if (state && state.root) state.root.remove();
    },
  };
}

function __nfEscapeHtml(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  })[char]);
}

function __nfMarkdownToHtml(markdown) {
  const blocks = String(markdown == null ? '' : markdown).split(/\n\n+/);
  const codeFence = String.fromCharCode(96).repeat(3);
  const inlineCode = String.fromCharCode(96);
  return blocks.map((block) => {
    if (/^###\s+/.test(block)) return '<h3>' + __nfEscapeHtml(block.replace(/^###\s+/, '')) + '</h3>';
    if (/^##\s+/.test(block)) return '<h2>' + __nfEscapeHtml(block.replace(/^##\s+/, '')) + '</h2>';
    if (/^#\s+/.test(block)) return '<h1>' + __nfEscapeHtml(block.replace(/^#\s+/, '')) + '</h1>';
    if (block.indexOf(codeFence) === 0) return '<pre><code>' + __nfEscapeHtml(
      block
        .replace(new RegExp('^' + codeFence + '\\w*\\n?'), '')
        .replace(new RegExp(codeFence + '$'), '')
    ) + '</code></pre>';
    if (/^(?:-\s+.+\n?)+$/.test(block)) {
      const items = block.split(/\n/).filter(Boolean).map((line) => '<li>' + __nfEscapeHtml(line.replace(/^-\s+/, '')) + '</li>').join('');
      return '<ul>' + items + '</ul>';
    }
    return '<p>' + __nfEscapeHtml(block)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(new RegExp(inlineCode + '([^' + inlineCode + ']+)' + inlineCode, 'g'), '<code>$1</code>')
      .replace(/\n/g, '<br>') + '</p>';
  }).join('');
}


// --- audioTrack ---
if (!SCENE_REGISTRY["audioTrack"]) SCENE_REGISTRY["audioTrack"] = (function() {
  /**
 * audioTrack — plays audio synced to engine timeline.
 *
 * Engine calls update(state, localT) every frame.
 * - Time advancing → play + sync
 * - Time stopped → pause
 * - Time jumped → seek
 *
 * In recording mode, audio is muxed by ffmpeg separately.
 */
return {
  id: "audioTrack",
  type: "media",
  name: "Audio Track",
  category: "Media",
  defaultParams: {
    src: "",
    volume: 1,
    offset: 0,
  },

  create(container, params) {
    const audio = document.createElement("audio");
    audio.preload = "auto";
    audio.style.display = "none";
    if (params.src) audio.src = params.src;
    audio.volume = Math.max(0, Math.min(1, params.volume ?? 1));
    container.appendChild(audio);
    if (params.src && !window.__audioSrc) {
      window.__audioSrc = params.src;
    }
    return { audio, prevT: -999, prevWall: 0, wasPlaying: false };
  },

  update(state, localT, params) {
    const { audio } = state;
    if (!audio.src) return;

    // Recording mode — don't play, recorder handles audio
    if (window.__recordingMode) return;

    const offset = params.offset || 0;
    const target = offset + localT;
    const now = performance.now();
    const dt = now - state.prevWall;
    const timeDelta = localT - state.prevT;

    // Detect: is time advancing? (player is playing)
    const isAdvancing = timeDelta > 0.001 && timeDelta < 0.2 && dt < 200;
    // Detect: big jump (slider drag, seek)
    const isJump = Math.abs(timeDelta) > 0.5;

    if (isJump || (!state.wasPlaying && isAdvancing)) {
      // Seek to correct position
      audio.currentTime = target;
    }

    if (isAdvancing) {
      // Playing — keep audio playing, correct drift
      if (audio.paused) {
        audio.currentTime = target;
        audio.play().catch(() => {});
      } else if (Math.abs(audio.currentTime - target) > 0.3) {
        // Drifted too far, re-sync
        audio.currentTime = target;
      }
      state.wasPlaying = true;
    } else if (dt > 100) {
      // Time stopped advancing for >100ms — pause
      if (!audio.paused) {
        audio.pause();
      }
      state.wasPlaying = false;
    }

    audio.volume = Math.max(0, Math.min(1, params.volume ?? 1));
    state.prevT = localT;
    state.prevWall = now;
  },

  destroy(state) {
    state.audio.pause();
    state.audio.removeAttribute("src");
    state.audio.remove();
  },
};

})();


// --- bulletList ---
if (!SCENE_REGISTRY["bulletList"]) SCENE_REGISTRY["bulletList"] = (function() {
  
return {
  id: "bulletList",
  type: "dom",
  name: "Bullet List",
  category: "Typography",
  defaultParams: {
    items: ["First point", "Second point", "Third point"],
    fontSize: 28,
    bulletColor: "#a78bfa",
    stagger: 0.08,
  },

  create(container, params) {
    const root = createRoot(container, "display:flex;flex-direction:column;justify-content:center;padding:8% 12%");
    const items = normalizeArray(params.items, ["Item"]);
    const fontSize = toNumber(params.fontSize, 28);
    const bulletColor = params.bulletColor || "#a78bfa";
    const rows = items.map((text) => {
      const row = createNode("div", [
        "display:flex",
        "align-items:flex-start",
        "gap:0.6em",
        "margin-bottom:0.7em",
        "will-change:transform,opacity",
        "opacity:0",
        "transform:translateX(-30px)",
      ].join(";"));
      const dot = createNode("span", [
        `width:10px`,
        `height:10px`,
        `min-width:10px`,
        `border-radius:50%`,
        `background:${bulletColor}`,
        `margin-top:${fontSize * 0.35}px`,
        `box-shadow:0 0 12px ${bulletColor}66`,
      ].join(";"));
      const label = createNode("span", [
        `font-family:${SANS_FONT_STACK}`,
        `font-size:${fontSize}px`,
        "font-weight:500",
        "color:rgba(255,255,255,0.92)",
        "line-height:1.5",
        "letter-spacing:0.01em",
      ].join(";"), text);
      row.appendChild(dot);
      row.appendChild(label);
      root.appendChild(row);
      return row;
    });
    return { root, rows };
  },

  update(els, localT, params) {
    const stagger = toNumber(params.stagger, 0.08);
    const exitAlpha = 1 - smoothstep(0.85, 1, localT);
    els.rows.forEach((row, i) => {
      const enterT = smoothstep(0.02 + i * stagger, 0.12 + i * stagger, localT);
      const progress = easeOutCubic(enterT);
      const x = (1 - progress) * -30;
      const alpha = progress * exitAlpha;
      row.style.opacity = alpha;
      row.style.transform = `translateX(${x}px)`;
    });
  },

  destroy(els) { els.root.remove(); },
};

})();


// --- headline ---
if (!SCENE_REGISTRY["headline"]) SCENE_REGISTRY["headline"] = (function() {
  
const DEFAULT_GRADIENT = ["#6ee7ff", "#a78bfa", "#f472b6"];

return {
  id: "headline",
  type: "dom",
  name: "Kinetic Headline",
  category: "Typography",
  defaultParams: {
    text: "NEXTFRAME",
    subtitle: "AI Video Editor",
    fontSize: 72,
    gradient: DEFAULT_GRADIENT,
    stagger: 0.06,
  },

  create(container, params) {
    const root = createRoot(container, "display:flex;flex-direction:column;align-items:center;justify-content:center");
    const wordsWrap = createNode("div", "display:flex;flex-wrap:wrap;justify-content:center;gap:0 0.3em");
    const words = String(params.text || "NEXTFRAME").trim().split(/\s+/).filter(Boolean);
    const fontSize = toNumber(params.fontSize, 72);
    const grad = makeLinearGradient(normalizeArray(params.gradient, DEFAULT_GRADIENT));
    const spans = words.map((w) => {
      const span = createNode("span", [
        `font-family:${SANS_FONT_STACK}`,
        `font-size:${fontSize}px`,
        "font-weight:900",
        "letter-spacing:-0.02em",
        `background:${grad}`,
        "-webkit-background-clip:text",
        "-webkit-text-fill-color:transparent",
        "background-clip:text",
        "will-change:transform,opacity",
        "display:inline-block",
        "opacity:0",
        "transform:translateY(30px)",
        `text-shadow:0 0 40px rgba(110,231,255,0.3)`,
      ].join(";"), w);
      wordsWrap.appendChild(span);
      return span;
    });
    root.appendChild(wordsWrap);
    const sub = createNode("div", [
      `font-family:${SANS_FONT_STACK}`,
      `font-size:${Math.max(14, fontSize * 0.22)}px`,
      "font-weight:400",
      "color:rgba(255,255,255,0.55)",
      "letter-spacing:0.08em",
      "margin-top:0.6em",
      "will-change:opacity",
      "opacity:0",
    ].join(";"), params.subtitle || "");
    root.appendChild(sub);
    return { root, spans, sub };
  },

  update(els, localT, params) {
    const stagger = toNumber(params.stagger, 0.06);
    const exitStart = 0.85;
    const exitAlpha = 1 - smoothstep(exitStart, 1, localT);
    els.spans.forEach((span, i) => {
      const enterT = smoothstep(0.0 + i * stagger, 0.12 + i * stagger, localT);
      const progress = easeOutCubic(enterT);
      const y = (1 - progress) * 30;
      const alpha = progress * exitAlpha;
      span.style.opacity = alpha;
      span.style.transform = `translateY(${y}px)`;
    });
    const subEnter = smoothstep(0.1 + els.spans.length * stagger, 0.2 + els.spans.length * stagger, localT);
    els.sub.style.opacity = subEnter * exitAlpha;
  },

  destroy(els) { els.root.remove(); },
};

})();


// --- lineChart ---
if (!SCENE_REGISTRY["lineChart"]) SCENE_REGISTRY["lineChart"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const FONT = '-apple-system, "SF Pro Display", sans-serif';

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

return {
  id: "lineChart",
  type: "svg",
  name: "Line Chart",
  category: "Data Viz",
  defaultParams: {
    data: [20, 55, 35, 80, 50, 90, 65],
    labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"],
    color: "#6ee7ff",
    strokeWidth: 3,
    showDots: true,
    showArea: true,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const data = normalizeArray(params.data, [20, 55, 35, 80, 50, 90, 65]);
    const labels = normalizeArray(params.labels, []);
    const color = params.color || "#6ee7ff";
    const sw = toNumber(params.strokeWidth, 3);
    const showDots = params.showDots !== false;
    const showArea = params.showArea !== false;

    const padL = 160, padR = 160, padT = 100, padB = 140;
    const chartW = 1920 - padL - padR;
    const chartH = 1080 - padT - padB;
    const maxVal = Math.max(...data, 1);
    const n = data.length;

    // grid
    for (let i = 0; i <= 4; i++) {
      const y = padT + (chartH / 4) * i;
      svg.appendChild(svgEl("line", {
        x1: String(padL), y1: String(y), x2: String(1920 - padR), y2: String(y),
        stroke: "rgba(255,255,255,0.08)", "stroke-width": "1",
      }));
    }

    // compute points
    const points = data.map((v, i) => ({
      x: padL + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2),
      y: padT + chartH - (v / maxVal) * chartH,
    }));
    const pointsStr = points.map((p) => `${p.x},${p.y}`).join(" ");

    // gradient for area
    const defs = svgEl("defs");
    const grad = svgEl("linearGradient", { id: "lineAreaGrad", x1: "0", y1: "0", x2: "0", y2: "1" });
    const stop1 = svgEl("stop", { offset: "0%", "stop-color": color, "stop-opacity": "0.3" });
    const stop2 = svgEl("stop", { offset: "100%", "stop-color": color, "stop-opacity": "0" });
    grad.appendChild(stop1);
    grad.appendChild(stop2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    // area fill
    let area = null;
    if (showArea) {
      const baseY = padT + chartH;
      const areaD = `M${points[0].x},${baseY} ` +
        points.map((p) => `L${p.x},${p.y}`).join(" ") +
        ` L${points[n - 1].x},${baseY} Z`;
      area = svgEl("path", {
        d: areaD, fill: "url(#lineAreaGrad)", opacity: "0",
      });
      svg.appendChild(area);
    }

    // line
    const line = svgEl("polyline", {
      points: pointsStr, fill: "none", stroke: color,
      "stroke-width": String(sw), "stroke-linecap": "round", "stroke-linejoin": "round",
    });
    svg.appendChild(line);

    // measure total length
    const totalLen = (() => {
      let len = 0;
      for (let i = 1; i < points.length; i++) {
        const dx = points[i].x - points[i - 1].x;
        const dy = points[i].y - points[i - 1].y;
        len += Math.sqrt(dx * dx + dy * dy);
      }
      return len;
    })();
    line.setAttribute("stroke-dasharray", String(totalLen));
    line.setAttribute("stroke-dashoffset", String(totalLen));

    // dots
    const dots = [];
    if (showDots) {
      points.forEach((p) => {
        const c = svgEl("circle", {
          cx: String(p.x), cy: String(p.y), r: "6",
          fill: color, stroke: "#1a1a2e", "stroke-width": "2", opacity: "0",
        });
        svg.appendChild(c);
        dots.push(c);
      });
    }

    // labels
    labels.forEach((lbl, i) => {
      if (!points[i]) return;
      const txt = svgEl("text", {
        x: String(points[i].x), y: String(padT + chartH + 40),
        fill: "rgba(255,255,255,0.6)", "font-size": "20",
        "font-family": FONT, "text-anchor": "middle",
      });
      txt.textContent = lbl;
      svg.appendChild(txt);
    });

    return { svg, line, area, dots, totalLen };
  },

  update(els, localT) {
    const drawT = smoothstep(0, 1.5, localT);
    els.line.setAttribute("stroke-dashoffset", String(els.totalLen * (1 - drawT)));

    if (els.area) {
      els.area.setAttribute("opacity", String(clamp(drawT * 1.5, 0, 1)));
    }

    els.dots.forEach((dot, i) => {
      const threshold = (i / Math.max(els.dots.length - 1, 1)) * 1.5;
      const a = smoothstep(threshold, threshold + 0.2, localT);
      dot.setAttribute("opacity", String(a));
      const scale = 0.5 + a * 0.5;
      dot.setAttribute("r", String(6 * scale));
    });
  },

  destroy(els) { els.svg.remove(); },
};

})();

// --- shaderGradient ---
if (!SCENE_REGISTRY["shaderGradient"]) SCENE_REGISTRY["shaderGradient"] = (function() {
  
function compileShader(gl, type, source) {
  const s = gl.createShader(type);
  gl.shaderSource(s, source);
  gl.compileShader(s);
  return s;
}

function createProgram(gl, vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(gl, gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compileShader(gl, gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  return p;
}

const VS = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main() {
    v_uv = a_pos * 0.5 + 0.5;
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }
`;

const FS = `
  precision mediump float;
  varying vec2 v_uv;
  uniform float u_time;
  uniform vec3 u_c1, u_c2, u_c3;
  uniform float u_speed;

  void main() {
    float t = u_time * u_speed;
    vec2 p1 = vec2(0.3 + 0.2 * sin(t * 0.7), 0.4 + 0.15 * cos(t * 0.5));
    vec2 p2 = vec2(0.7 + 0.15 * cos(t * 0.6), 0.3 + 0.2 * sin(t * 0.8));
    vec2 p3 = vec2(0.5 + 0.25 * sin(t * 0.4), 0.7 + 0.1 * cos(t * 0.9));
    vec2 p4 = vec2(0.4 + 0.1 * cos(t * 1.1), 0.55 + 0.15 * sin(t * 0.3));

    float d1 = 1.0 - smoothstep(0.0, 0.5, length(v_uv - p1));
    float d2 = 1.0 - smoothstep(0.0, 0.55, length(v_uv - p2));
    float d3 = 1.0 - smoothstep(0.0, 0.45, length(v_uv - p3));
    float d4 = 1.0 - smoothstep(0.0, 0.4, length(v_uv - p4));

    vec3 col = vec3(0.04, 0.03, 0.06);
    col += u_c1 * d1 * 0.6;
    col += u_c2 * d2 * 0.6;
    col += u_c3 * d3 * 0.5;
    col += mix(u_c1, u_c2, 0.5) * d4 * 0.4;
    gl_FragColor = vec4(col, 1.0);
  }
`;

function hexToVec3(hex) {
  const h = hex.replace("#", "");
  return [parseInt(h.slice(0, 2), 16) / 255, parseInt(h.slice(2, 4), 16) / 255, parseInt(h.slice(4, 6), 16) / 255];
}

return {
  id: "shaderGradient",
  type: "webgl",
  name: "GPU Gradient",
  category: "Shader",
  defaultParams: { color1: "#1a0a3e", color2: "#0a2a4e", color3: "#2a0a2e", speed: 0.3 },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
    const program = createProgram(gl, VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(program, "a_pos");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    return { canvas, gl, program, buf, loc };
  },

  update(state, localT, params) {
    const { canvas, gl, program } = state;
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) { canvas.width = cw; canvas.height = ch; }
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.useProgram(program);
    gl.uniform1f(gl.getUniformLocation(program, "u_time"), localT);
    gl.uniform1f(gl.getUniformLocation(program, "u_speed"), toNumber(params.speed, 0.3));
    const c1 = hexToVec3(params.color1 || "#1a0a3e");
    const c2 = hexToVec3(params.color2 || "#0a2a4e");
    const c3 = hexToVec3(params.color3 || "#2a0a2e");
    gl.uniform3f(gl.getUniformLocation(program, "u_c1"), c1[0], c1[1], c1[2]);
    gl.uniform3f(gl.getUniformLocation(program, "u_c2"), c2[0], c2[1], c2[2]);
    gl.uniform3f(gl.getUniformLocation(program, "u_c3"), c3[0], c3[1], c3[2]);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  },

  destroy(state) { state.canvas.remove(); }
};

})();

if (!SCENE_REGISTRY["syncSubs"]) SCENE_REGISTRY["syncSubs"] = (function() {
  /**
 * syncSubs — synchronized subtitles driven by TTS timeline
 *
 * params:
 *   segments: [{ text, start_ms, end_ms }]  — from vox .timeline.json
 *   fontSize: 24
 *   color: "#ffffff"
 *   bgColor: "rgba(0,0,0,0.6)"
 *   position: "bottom" | "top" | "center"
 *   highlightColor: "#6ee7ff"
 */

return {
  id: "syncSubs",
  type: "dom",
  name: "Synced Subtitles",
  category: "Overlay",
  defaultParams: {
    segments: [],
    fontSize: 24,
    color: "#ffffff",
    bgColor: "rgba(0,0,0,0.6)",
    position: "bottom",
    highlightColor: "#6ee7ff",
  },

  create(container, params) {
    const pos = params.position || "bottom";
    const alignCSS = pos === "top" ? "top:5%;bottom:auto"
      : pos === "center" ? "top:50%;transform:translateY(-50%)"
      : "bottom:8%";
    const root = createRoot(container, `display:flex;justify-content:center;align-items:flex-end;${alignCSS}`);
    const box = createNode("div", [
      `font-family:${SANS_FONT_STACK}`,
      `font-size:${toNumber(params.fontSize, 24)}px`,
      "font-weight:500",
      "line-height:1.6",
      `color:${params.color || "#ffffff"}`,
      `background:${params.bgColor || "rgba(0,0,0,0.6)"}`,
      "padding:10px 24px",
      "border-radius:8px",
      "max-width:80%",
      "text-align:center",
      "will-change:opacity",
      "opacity:0",
    ].join(";"));
    root.appendChild(box);
    return { root, box, currentIdx: -1 };
  },

  // localT is normalized 0~1 (DOM type)
  update(els, localT, params) {
    const segments = params.segments || [];
    if (!segments.length) { els.box.style.opacity = "0"; return; }

    // Convert normalT back to approximate seconds using total duration
    // We need actual seconds — estimate from last segment end
    const totalMs = segments[segments.length - 1].end_ms || 10000;
    const tMs = localT * totalMs; // localT is 0~1, map to ms range

    // Find active segment
    let activeIdx = -1;
    for (let i = 0; i < segments.length; i++) {
      if (tMs >= segments[i].start_ms && tMs <= segments[i].end_ms) {
        activeIdx = i;
        break;
      }
    }

    if (activeIdx < 0) {
      els.box.style.opacity = "0";
      els.currentIdx = -1;
      return;
    }

    if (activeIdx !== els.currentIdx) {
      els.box.textContent = segments[activeIdx].text;
      els.currentIdx = activeIdx;
    }

    // Fade in/out
    const seg = segments[activeIdx];
    const segDur = seg.end_ms - seg.start_ms;
    const segProgress = (tMs - seg.start_ms) / segDur;
    const fadeIn = smoothstep(0, 0.15, segProgress);
    const fadeOut = smoothstep(1, 0.85, segProgress);
    els.box.style.opacity = String(fadeIn * fadeOut);
  },

  destroy(els) { els.root.remove(); },
};

})();


// --- videoClip ---
if (!SCENE_REGISTRY["videoClip"]) SCENE_REGISTRY["videoClip"] = (function() {
  
/**
 * videoClip — embeds a video, frame-synced to timeline time.
 *
 * Video is ALWAYS muted in this component — audio comes from a separate
 * audioTrack layer pointing to the same file. This avoids play/seek conflicts.
 *
 * In browser preview: seeks each frame via currentTime.
 * In recording mode: same, recorder captures via screenshot.
 */
return {
  id: "videoClip",
  type: "media",
  name: "Video Clip",
  category: "Media",
  defaultParams: {
    src: "",
    poster: "",
    objectFit: "cover",
  },

  create(container, params) {
    const video = document.createElement("video");
    video.style.cssText = [
      "position:absolute;inset:0;width:100%;height:100%",
      `object-fit:${params.objectFit || "cover"}`,
      "display:block;background:#000",
    ].join(";");
    video.playsInline = true;
    video.muted = true; // always muted — audio via audioTrack
    video.preload = "auto";
    if (params.poster) video.poster = params.poster;
    if (params.src) video.src = params.src;
    container.appendChild(video);
    return video;
  },

  update(video, localT) {

    if (!video.duration || !Number.isFinite(video.duration)) return;
    const target = clamp(t, 0, video.duration - 0.05);

    if (Math.abs(video.currentTime - target) > 0.04) {
      video.currentTime = target;
    }
  },

  destroy(video) {
    video.pause();
    video.removeAttribute("src");
    video.load();
    video.remove();
  },

})();


// --- vignette ---
if (!SCENE_REGISTRY["vignette"]) SCENE_REGISTRY["vignette"] = (function() {
  
return {
  id: "vignette",
  type: "canvas",
  name: "Vignette",
  category: "Effects",
  defaultParams: {
    intensity: 0.7,
    color: "#000000",
    radius: 0.5,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    const intensity = clamp(toNumber(params.intensity, 0.7), 0, 1);
    const color = params.color || "#000000";
    const radiusFrac = clamp(toNumber(params.radius, 0.5), 0.1, 1);

    ctx.clearRect(0, 0, W, H);

    // Elliptical vignette: use the diagonal as the outer radius
    const diag = Math.hypot(cx, cy);
    const innerRadius = diag * radiusFrac;
    const outerRadius = diag * 1.1;

    const grad = ctx.createRadialGradient(cx, cy, innerRadius, cx, cy, outerRadius);
    grad.addColorStop(0, "transparent");
    grad.addColorStop(0.5, color + alphaHex(intensity * 0.4));
    grad.addColorStop(1, color + alphaHex(intensity));

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  },

  destroy(canvas) {
    canvas.remove();
  },
};

/** Convert 0..1 alpha to 2-char hex suffix */
function alphaHex(alpha) {
  const val = Math.round(clamp(alpha, 0, 1) * 255);
  return val.toString(16).padStart(2, "0");
}

})();



// --- lineChart (canvas wrapper) ---
if (!SCENE_REGISTRY["lineChart"]) SCENE_REGISTRY["lineChart"] = (function() {
  function smoothstep(edge0, edge1, x) {
  const clamped = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
  return clamped * clamped * (3 - 2 * clamped);
}

function easeOutCubic(x) {
  return 1 - (1 - x) ** 3;
}

function resolveSize(ctx) {
  const rect = typeof ctx?.canvas?.getBoundingClientRect === "function"
    ? ctx.canvas.getBoundingClientRect()
    : null;
  const fallbackWidth = rect?.width || ctx?.canvas?.clientWidth || ctx?.canvas?.width || 1;
  const fallbackHeight = rect?.height || ctx?.canvas?.clientHeight || ctx?.canvas?.height || 1;
  return {
    width: fallbackWidth,
    height: fallbackHeight,
  };
}

/**
 * Render a progressively drawn line chart with gradient stroke and pop-in points.
 * @param {number} t - Local clip time in seconds.
 * @param {object} [params={}] - Chart data and palette parameters.
 * @param {CanvasRenderingContext2D} ctx - Target 2D rendering context.
 * @param {number} [_globalT=0] - Global timeline time in seconds.
 * @returns {void}
 */
function lineChart(t, params = {}, ctx, _globalT = 0) {
  const {
    data = [18, 24, 31, 38, 43, 55, 66, 78],
    title = "ACTIVE USERS",
    unit = "%",
    hueStart = 182,
    hueEnd = 310,
    drawStart = 0.2,
    drawEnd = 2.6,
  } = params;

  const series = Array.isArray(data) && data.length >= 2 ? data.map((value) => Number(value) || 0) : [18, 24, 31, 38, 43, 55, 66, 78];
  const { width, height } = resolveSize(ctx);
  const fadeIn = smoothstep(0, 0.45, t);

  const background = ctx.createLinearGradient(0, 0, 0, height);
  background.addColorStop(0, "#081018");
  background.addColorStop(1, "#04070d");
  ctx.fillStyle = background;
  ctx.fillRect(0, 0, width, height);

  const padL = width * 0.11;
  const padR = width * 0.08;
  const padT = height * 0.2;
  const padB = height * 0.18;
  const chartWidth = width - padL - padR;
  const chartHeight = height - padT - padB;
  const bottomY = padT + chartHeight;
  const minValue = Math.min(...series);
  const maxValue = Math.max(...series);
  const range = Math.max(1, maxValue - minValue);
  const reveal = smoothstep(drawStart, drawEnd, t);
  const segments = series.length - 1;

  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.font = `800 ${Math.max(18, height * 0.038)}px -apple-system, sans-serif`;
  ctx.fillStyle = `rgba(234, 243, 255, ${0.92 * fadeIn})`;
  ctx.fillText(title, padL, padT * 0.28);

  ctx.font = `500 ${Math.max(10, height * 0.014)}px "SF Mono", Menlo, monospace`;
  ctx.fillStyle = `rgba(147, 165, 186, ${0.85 * fadeIn})`;
  ctx.fillText(`TRENDLINE  ·  ${series.length} POINTS`, padL, padT * 0.28 + height * 0.05);

  ctx.lineWidth = 1;
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.07 * fadeIn})`;
  ctx.fillStyle = `rgba(145, 156, 176, ${0.8 * fadeIn})`;
  ctx.font = `500 ${Math.max(9, height * 0.013)}px "SF Mono", Menlo, monospace`;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for (let i = 0; i <= 4; i += 1) {
    const y = padT + (chartHeight * i) / 4;
    const value = Math.round(maxValue - (range * i) / 4);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + chartWidth, y);
    ctx.stroke();
    ctx.fillText(`${value}${unit}`, padL - 8, y);
  }

  const points = series.map((value, index) => {
    const x = padL + (chartWidth * index) / segments;
    const y = bottomY - ((value - minValue) / range) * chartHeight;
    return { x, y, value };
  });

  const areaGradient = ctx.createLinearGradient(0, padT, 0, bottomY);
  areaGradient.addColorStop(0, `hsla(${hueStart}, 90%, 60%, ${0.18 * fadeIn})`);
  areaGradient.addColorStop(1, `hsla(${hueEnd}, 95%, 45%, 0)`);

  const maxSegment = reveal * segments;
  const fullSegments = Math.floor(maxSegment);
  const partial = maxSegment - fullSegments;
  const visiblePoints = [points[0]];
  for (let i = 0; i < segments; i += 1) {
    const start = points[i];
    const end = points[i + 1];
    if (i < fullSegments) {
      visiblePoints.push(end);
      continue;
    }

    if (i === fullSegments && partial > 0) {
      visiblePoints.push({
        x: start.x + (end.x - start.x) * partial,
        y: start.y + (end.y - start.y) * partial,
      });
    }
    break;
  }

  if (visiblePoints.length >= 2) {
    ctx.beginPath();
    ctx.moveTo(points[0].x, bottomY);
    ctx.lineTo(points[0].x, points[0].y);
    for (const point of visiblePoints.slice(1)) {
      ctx.lineTo(point.x, point.y);
    }
    const lastPoint = visiblePoints[visiblePoints.length - 1];
    ctx.lineTo(lastPoint.x, bottomY);
    ctx.closePath();
    ctx.fillStyle = areaGradient;
    ctx.fill();

    const lineGradient = ctx.createLinearGradient(padL, 0, padL + chartWidth, 0);
    lineGradient.addColorStop(0, `hsla(${hueStart}, 100%, 70%, ${0.95 * fadeIn})`);
    lineGradient.addColorStop(1, `hsla(${hueEnd}, 100%, 66%, ${0.95 * fadeIn})`);
    ctx.strokeStyle = lineGradient;
    ctx.lineWidth = Math.max(2, width * 0.005);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.shadowColor = `hsla(${(hueStart + hueEnd) / 2}, 100%, 68%, ${0.55 * fadeIn})`;
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.moveTo(visiblePoints[0].x, visiblePoints[0].y);
    for (const point of visiblePoints.slice(1)) {
      ctx.lineTo(point.x, point.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.font = `600 ${Math.max(9, height * 0.014)}px "SF Mono", Menlo, monospace`;
  for (let i = 0; i < points.length; i += 1) {
    const point = points[i];
    const pointProgress = easeOutCubic(smoothstep(i / segments, i / segments + 0.08, reveal));
    if (pointProgress > 0.001) {
      const hue = hueStart + ((hueEnd - hueStart) * i) / segments;
      const radius = Math.max(3, Math.min(width, height) * 0.012 * pointProgress);
      ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${pointProgress})`;
      ctx.shadowColor = `hsla(${hue}, 100%, 70%, ${0.9 * pointProgress})`;
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = `rgba(236, 242, 255, ${0.9 * pointProgress})`;

/**

 * Manages layer lifecycle, renderFrame(t), enter/exit effects,
 * filter/blend CSS mapping. Supports DOM/Canvas/SVG scene types.
 *
 * Usage:

// ─── Easing (uses shared utils when available, standalone fallbacks) ───

function clamp01(v) { return clamp(v, 0, 1); }

// ─── Enter/Exit Effect Calculator ──────────────────────────────
// Format: "fadeIn 0.8s" or "slideUp 0.6s" or "scaleIn 0.5s" or "none"
function parseEffect(str) {
  if (!str || str === 'none') return null;
  const parts = str.trim().split(/\s+/);
  const type = parts[0];
  const dur = parseFloat(parts[1]) || 0.5;
  return { type, dur };
}

function calcEnterEffect(effect, localT) {
  if (!effect) return { opacity: 1, transform: '' };
  if (localT >= effect.dur) return { opacity: 1, transform: '' };
  const p = easeOutCubic(clamp01(localT / effect.dur));

    case 'fadeIn':
      return { opacity: p, transform: '' };
    case 'slideUp':
      return { opacity: p, transform: `translateY(${(1 - p) * 40}px)` };
    case 'slideDown':
      return { opacity: p, transform: `translateY(${(p - 1) * 40}px)` };
    case 'slideLeft':
      return { opacity: p, transform: `translateX(${(1 - p) * 60}px)` };
    case 'slideRight':
      return { opacity: p, transform: `translateX(${(p - 1) * 60}px)` };
    case 'scaleIn':
      return { opacity: p, transform: `scale(${0.85 + 0.15 * p})` };

      return { opacity: p, transform: '' };

}

function calcExitEffect(effect, localT, dur) {
  if (!effect) return { opacity: 1, transform: '' };
  const exitStart = dur - effect.dur;
  if (localT < exitStart) return { opacity: 1, transform: '' };

    case 'slideDown':

    case 'scaleOut':
      return { opacity: 1 - p, transform: `scale(${1 - 0.15 * p})` };

// ─── Transition Calculator ─────────────────────────────────────
// Format: "dissolve 0.5s" or "wipeLeft 0.8s" or "wipeUp 0.6s" or "none"
function parseTransition(str) {

    case 'wipeDown':

      return { transform: `translateX(${(1 - p) * 100}%)` };
    case 'slideRight':
      return { transform: `translateX(${(p - 1) * 100}%)` };
    case 'slideUp':
      return { transform: `translateY(${(1 - p) * 100}%)` };
    case 'slideDown':

// Format: { "keys": [[0, 0], [2, 100], [5, 50]], "ease": "linear" }

// ─── Player Controls (browser preview) ────────────────────────
function createPlayer(engine, stageEl) {
  const { duration, fps, width, height } = engine;
  let playing = false;
  let currentTime = 0;
  let playbackRate = 1;
  let tickRaf = 0;
  let lastTickWall = 0;
  let scaleMode = 'fit';

  document.documentElement.style.background = '#111';
  document.body.style.margin = '0';
  document.body.style.minHeight = '100vh';
  document.body.style.overflow = 'hidden';
  document.body.style.background = '#111';

  const viewport = document.createElement('div');
  viewport.style.cssText = 'position:fixed;inset:0 0 64px 0;padding:24px;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center';

  const stageShell = document.createElement('div');
  stageShell.style.cssText = 'position:relative;display:flex;align-items:center;justify-content:center;min-width:100%;min-height:100%;box-sizing:border-box';

  const originalParent = stageEl.parentNode;
  if (originalParent) {
    originalParent.insertBefore(viewport, stageEl);
  } else {
    document.body.appendChild(viewport);
  }
  viewport.appendChild(stageShell);
  stageShell.appendChild(stageEl);
  stageEl.style.boxShadow = '0 0 80px rgba(100,80,200,0.15)';

  const bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:10px 20px;background:rgba(0,0,0,0.92);display:flex;align-items:center;gap:12px;font:13px -apple-system,sans-serif;color:#aaa;z-index:9999';

  const playBtn = document.createElement('button');
  playBtn.textContent = '\u25B6';
  playBtn.style.cssText = 'background:#222;border:1px solid #444;color:#fff;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:13px';

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = '0';
  slider.max = String(duration * 1000);
  slider.value = '0';
  slider.style.cssText = 'flex:1;accent-color:#a78bfa';

  const timeLabel = document.createElement('span');
  timeLabel.style.cssText = 'min-width:120px;text-align:right;font-family:"SF Mono",monospace;font-size:12px;color:#ddd';

  const info = document.createElement('span');
  info.style.cssText = 'font-size:11px;color:#666';
  info.textContent = `| ${duration}s @ ${fps}fps | ${width}\u00d7${height} | layers:${engine.layerCount}`;

  const speedWrap = document.createElement('div');
  speedWrap.style.cssText = 'display:flex;align-items:center;gap:6px';
  const speedButtons = [0.5, 1, 2].map((rate) => {
    const button = document.createElement('button');
    button.textContent = `${rate}x`;
    button.style.cssText = 'background:#141414;border:1px solid #333;color:#bbb;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px';
    button.addEventListener('click', () => {
      playbackRate = rate;
      if (playing) {
        lastTickWall = performance.now();
      }
      syncButtons();
    });
    speedWrap.appendChild(button);
    return button;
  });

  const scaleBtn = document.createElement('button');
  scaleBtn.style.cssText = 'background:#141414;border:1px solid #333;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:12px';
  scaleBtn.addEventListener('click', () => {
    scaleMode = scaleMode === 'fit' ? 'native' : 'fit';
    applyScaleMode();
    syncButtons();
  });

  const fullscreenBtn = document.createElement('button');
  fullscreenBtn.style.cssText = 'background:#141414;border:1px solid #333;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:12px';
  fullscreenBtn.addEventListener('click', async () => {
    if (document.fullscreenElement) {
      await document.exitFullscreen();
      return;
    }
    if (document.documentElement.requestFullscreen) {
      await document.documentElement.requestFullscreen();
    }

    const safe = Math.max(0, Number(seconds) || 0);
    const minutes = Math.floor(safe / 60);
    const remainder = safe - minutes * 60;
    return `${String(minutes).padStart(2, '0')}:${remainder.toFixed(2).padStart(5, '0')}`;

    pauseAllMedia();
    syncButtons();

  function syncButtons() {
    playBtn.textContent = playing ? '\u23F8' : '\u25B6';
    scaleBtn.textContent = scaleMode === 'fit' ? 'Fit' : '1:1';
    fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
    for (const button of speedButtons) {
      const active = button.textContent === `${playbackRate}x`;
      button.style.borderColor = active ? '#7c5cff' : '#333';
      button.style.color = active ? '#fff' : '#bbb';
      button.style.background = active ? '#2b1f5f' : '#141414';
    }
  }

  function applyScaleMode() {
    if (scaleMode === 'fit') {
      const availableWidth = Math.max(1, viewport.clientWidth - 48);
      const availableHeight = Math.max(1, viewport.clientHeight - 48);
      const scale = Math.min(availableWidth / width, availableHeight / height);
      const safeScale = Number.isFinite(scale) && scale > 0 ? scale : 1;
      stageEl.style.width = `${Math.round(width * safeScale)}px`;
      stageEl.style.height = `${Math.round(height * safeScale)}px`;
      viewport.style.overflow = 'hidden';
      stageShell.style.padding = '0';
      stageShell.style.minWidth = '100%';
      stageShell.style.minHeight = '100%';
    } else {
      stageEl.style.width = `${width}px`;
      stageEl.style.height = `${height}px`;
      viewport.style.overflow = 'auto';
      stageShell.style.padding = '24px';
      stageShell.style.minWidth = 'max-content';
      stageShell.style.minHeight = 'max-content';
    }
  }

  function seek(t) {
    t = Math.max(0, Math.min(duration, t));
    currentTime = t;
    slider.value = String(t * 1000);
    timeLabel.textContent = `${formatTime(t)} / ${formatTime(duration)}`;
    engine.renderFrame(t);
  }

  slider.addEventListener('input', () => {
    stopPlayback();
    seek(Number(slider.value) / 1000);
  });

  playBtn.addEventListener('click', togglePlay);

  function togglePlay() {
    if (playing) {
      stopPlayback();
      return;
    }
    if (currentTime >= duration) {
      currentTime = 0;
    }
    playing = true;
    lastTickWall = 0;
    syncButtons();
    tickRaf = requestAnimationFrame(tick);
  }

  function tick(now) {
    if (!playing) return;
    if (!lastTickWall) {
      lastTickWall = now;

      stopPlayback();
      return;

  }

  function handleFullscreenChange() {
    applyScaleMode();
    syncButtons();
  }

  // Keyboard shortcuts
  const handleKeydown = (e) => {
    const tagName = e.target && e.target.tagName ? e.target.tagName.toLowerCase() : '';

    if (e.code === 'ArrowLeft') { e.preventDefault(); seek(currentTime - 1); }
    if (e.code === 'ArrowRight') { e.preventDefault(); seek(currentTime + 1); }
    if (e.code === 'Home') { e.preventDefault(); seek(0); }
    if (e.code === 'End') { e.preventDefault(); seek(duration); }

  window.addEventListener('resize', handleResize);
  document.addEventListener('fullscreenchange', handleFullscreenChange);

  applyScaleMode();
  syncButtons();
  seek(0);

  return {
    seek,
    play: togglePlay,
    get currentTime() { return currentTime; },
    destroy() {
      stopPlayback();
      document.removeEventListener('keydown', handleKeydown);
      window.removeEventListener('resize', handleResize);
      document.removeEventListener('fullscreenchange', handleFullscreenChange);
      bar.remove();
      viewport.remove();
    },
  };
}
