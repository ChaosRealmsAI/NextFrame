<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Like · Heart Rate</title>
<style>
  :root {
    --bg: #fafafa;
    --ink: #1c1c1e;
    --ink-2: #3a3a3c;
    --ink-3: #8e8e93;
    --line: rgba(28,28,30,0.08);
    --accent: #ff3b30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    font-feature-settings: "tnum" 1, "ss01" 1;
    overflow: hidden;
    letter-spacing: -0.02em;
  }
  body { position: relative; }

  /* Stage */
  .stage {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
  }

  canvas#main {
    width: 1920px;
    height: 1080px;
    display: block;
  }

  /* BPM readout */
  .bpm {
    position: absolute;
    left: 50%;
    top: 210px;
    transform: translateX(-50%);
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    will-change: opacity;
  }
  .bpm .num {
    font-size: 72px;
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .bpm .unit {
    font-size: 22px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: 0.02em;
    text-transform: lowercase;
  }

  /* Bottom timeline UI */
  .cue-row {
    position: absolute;
    left: 48px;
    right: 48px;
    bottom: 78px;
    height: 22px;
    pointer-events: none;
  }
  .cue-mark {
    position: absolute;
    top: 0;
    width: 1px;
    height: 10px;
    background: var(--ink-3);
    opacity: 0.5;
    transform: translateX(-0.5px);
  }
  .cue-mark .lbl {
    position: absolute;
    top: 12px;
    left: 0;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .tl-ui {
    position: absolute;
    left: 48px;
    right: 48px;
    bottom: 32px;
    height: 36px;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 18px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .tl-ui button {
    background: transparent;
    border: none;
    color: var(--ink);
    font-size: 16px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .tl-ui button:hover { background: rgba(28,28,30,0.06); }
  .tl-ui .time {
    font-size: 13px;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    letter-spacing: 0;
    min-width: 132px;
  }
  .tl-ui input[type=range] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    background: var(--line);
    border-radius: 2px;
    outline: none;
  }
  .tl-ui input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--ink);
    border-radius: 50%;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="stage">
  <canvas id="main" width="1920" height="1080"></canvas>
</div>

<div class="bpm" id="bpm">
  <span class="num" id="bpmNum">72</span>
  <span class="unit">bpm</span>
</div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 10.00s</span>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <span class="time" id="frameLabel" style="min-width:110px;text-align:right">frame 0 / 300</span>
</div>

<script>
'use strict';

const DURATION = 10.0;
const FPS = 30;

// ---------- math ----------
const clamp01 = t => Math.max(0, Math.min(1, t));
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = x => 1 - Math.pow(1 - x, 3);
const easeIn  = x => x * x * x;
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const springOut = x => {
  const c = clamp01(x);
  return c===0||c===1 ? c : 1 - Math.exp(-6*c)*Math.cos(9*c);
};
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));

// ---------- scene cues ----------
// resting heartbeat → tap → excited burst → settle
const TAP_T = 3.0;

const CUES = [
  { t: 0.0, label: 'resting' },
  { t: 3.0, label: 'double-tap' },
  { t: 3.6, label: 'pulse' },
  { t: 5.5, label: 'peak 128' },
  { t: 8.4, label: 'settle' }
];

// ---------- canvas helpers ----------
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');

// Apple heart shape path (single closed path — symmetric, rounded, pointed bottom)
// Starts at bottom tip, sweeps up the right side through the right lobe,
// dips at top center, sweeps down the left side back to bottom tip.
function heartPath(cx, cy, size) {
  const s = size;
  const p = new Path2D();
  // Bottom tip
  const tipY = cy + s * 1.00;
  const topDipY = cy - s * 0.25;
  p.moveTo(cx, tipY);
  // Right side up to top center dip
  p.bezierCurveTo(
    cx + s * 0.55, cy + s * 0.65,   // c1: just above bottom tip, right
    cx + s * 1.08, cy - s * 0.10,   // c2: bulge right side outward
    cx + s * 0.52, cy - s * 0.78    // end: top of right lobe
  );
  p.bezierCurveTo(
    cx + s * 0.22, cy - s * 1.02,   // c1: pull toward top
    cx + s * 0.05, cy - s * 0.60,   // c2: come inward to center dip
    cx,            topDipY          // end: top center dip
  );
  // Left side mirror
  p.bezierCurveTo(
    cx - s * 0.05, cy - s * 0.60,
    cx - s * 0.22, cy - s * 1.02,
    cx - s * 0.52, cy - s * 0.78
  );
  p.bezierCurveTo(
    cx - s * 1.08, cy - s * 0.10,
    cx - s * 0.55, cy + s * 0.65,
    cx,            tipY
  );
  p.closePath();
  return p;
}

// Procedural PQRST waveform at phase u ∈ [0,1]
// amp = vertical amplitude, returns yOffset
function ecgAt(u, amp) {
  // u is cyclic 0..1 within one beat
  // segments: baseline → P → PR → QRS → ST → T → baseline
  // P wave small bump 0.10-0.18
  // Q dip 0.24
  // R spike 0.26-0.30 (the big one)
  // S dip 0.32
  // T wave 0.42-0.58
  const gauss = (x, c, w, a) => a * Math.exp(-Math.pow((x - c) / w, 2));
  let y = 0;
  y += gauss(u, 0.14, 0.025, 0.12);    // P
  y -= gauss(u, 0.24, 0.010, 0.15);    // Q
  y += gauss(u, 0.27, 0.008, 1.00);    // R (tall spike)
  y -= gauss(u, 0.30, 0.012, 0.35);    // S
  y += gauss(u, 0.50, 0.050, 0.28);    // T
  return y * amp;
}

// ---------- heart beat envelope ----------
// returns scale modulation for heart based on time t and current bpm
// We run our own beat clock so the heart pulses WITH the ECG trace on screen.
function beatPhase(t, bpm) {
  // integrate variable bpm is complex; we'll just use a piecewise constant bpm timeline
  // but also support slight accel via pre-computed cumulative phase (see bpmCurve).
  return (t * bpm / 60) % 1;
}

// bpm curve across DURATION (smooth)
function bpmAt(t) {
  // 0..3 resting 72
  // 3..3.4 spike up to 128 (double tap lands at 3.0, physiological jump takes ~0.4s)
  // 3.4..5.5 climb and hold near 128
  // 5.5..8.4 decay back toward 76 (sweet afterglow — slightly above 72)
  // 8.4..10 calm 74 → 72
  if (t < 3.0) return 72;
  if (t < 3.4) return lerp(72, 128, easeOut(kern(t, 3.0, 0.4)));
  if (t < 5.5) return lerp(128, 128, 1); // hold
  if (t < 8.4) return lerp(128, 76, easeInOut(kern(t, 5.5, 2.9)));
  return lerp(76, 72, easeInOut(kern(t, 8.4, 1.6)));
}

// cumulative beat phase — integrate bpm so screen phase is continuous
const PHASE_SAMPLES = 2000;
const phaseTable = new Float32Array(PHASE_SAMPLES + 1);
(function buildPhaseTable(){
  let acc = 0;
  phaseTable[0] = 0;
  const dt = DURATION / PHASE_SAMPLES;
  for (let i = 1; i <= PHASE_SAMPLES; i++) {
    const t = i * dt;
    const bpm = bpmAt(t - dt * 0.5);
    acc += (bpm / 60) * dt;  // beats per second * dt
    phaseTable[i] = acc;
  }
})();
function cumulativePhase(t) {
  const i = clamp(Math.floor(t / DURATION * PHASE_SAMPLES), 0, PHASE_SAMPLES - 1);
  const frac = (t / DURATION * PHASE_SAMPLES) - i;
  return lerp(phaseTable[i], phaseTable[i + 1], frac);
}

// ---------- particle ripples (born at each R-peak) ----------
// we pre-compute R-peak times from cumulativePhase (peak at phase fraction 0.27 within each beat)
const R_TIMES = [];
(function collectRTimes(){
  const total = phaseTable[PHASE_SAMPLES];
  const beats = Math.floor(total);
  for (let k = 0; k <= beats; k++) {
    // find t where cumulativePhase(t) == k + 0.27
    const target = k + 0.27;
    if (target > total) break;
    // binary search
    let lo = 0, hi = PHASE_SAMPLES;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (phaseTable[mid] < target) lo = mid + 1; else hi = mid;
    }
    const i = Math.max(1, lo);
    const a = phaseTable[i - 1], b = phaseTable[i];
    const frac = b === a ? 0 : (target - a) / (b - a);
    const tR = ((i - 1) + frac) / PHASE_SAMPLES * DURATION;
    if (tR >= 0 && tR <= DURATION) R_TIMES.push(tR);
  }
})();

// ---------- render ----------
function render(t) {
  const W = 1920, H = 1080;
  ctx.clearRect(0, 0, W, H);

  // -- background: very subtle vertical tint + faint grid
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(0, 0, W, H);

  // subtle radial vignette behind heart (warmer when excited)
  const bpm = bpmAt(t);
  const heat = clamp01((bpm - 72) / (128 - 72));
  const cx = W / 2, cy = H / 2 - 20;
  const vg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 620);
  vg.addColorStop(0, `rgba(255, 59, 48, ${0.04 + heat * 0.10})`);
  vg.addColorStop(1, 'rgba(255, 59, 48, 0)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // -- ECG trace (horizontal axis across the heart)
  // Rolling window: last 2.6 seconds of ECG, drawn left→right
  const traceY = H / 2 + 200;
  const traceW = 1440;
  const traceH = 170;
  const traceX0 = (W - traceW) / 2;

  // baseline
  ctx.strokeStyle = 'rgba(28,28,30,0.10)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(traceX0, traceY);
  ctx.lineTo(traceX0 + traceW, traceY);
  ctx.stroke();

  // ECG line — sample current phase window
  const windowBeats = lerp(2.0, 3.2, heat); // more beats visible at high bpm
  const samples = 640;
  const nowPhase = cumulativePhase(t);
  // amplitude dims slightly during slow / boosts during fast (Apple Health feel)
  const amp = lerp(traceH * 0.42, traceH * 0.62, heat);

  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#ff3b30';
  ctx.lineWidth = 2.6 + heat * 0.8;
  ctx.shadowBlur = 12 + heat * 10;
  ctx.shadowColor = 'rgba(255, 59, 48, 0.35)';
  ctx.beginPath();
  for (let i = 0; i <= samples; i++) {
    const frac = i / samples;  // 0 = oldest, 1 = newest
    const phaseHere = nowPhase - windowBeats + frac * windowBeats;
    const u = phaseHere - Math.floor(phaseHere); // local [0,1] beat phase
    // fade in from left edge
    const leftFade = clamp01(frac * 4);
    const y = traceY - ecgAt(u, amp) * leftFade;
    const x = traceX0 + frac * traceW;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // leading "dot" where new waveform writes in
  const tipX = traceX0 + traceW;
  const tipU = nowPhase - Math.floor(nowPhase);
  const tipY = traceY - ecgAt(tipU, amp);
  ctx.fillStyle = '#ff3b30';
  ctx.beginPath();
  ctx.arc(tipX, tipY, 4.5, 0, Math.PI * 2);
  ctx.fill();

  // -- ripples from each R-peak (subtle circles expanding from heart)
  for (let i = 0; i < R_TIMES.length; i++) {
    const tR = R_TIMES[i];
    const age = t - tR;
    if (age < 0 || age > 1.2) continue;
    const rp = clamp01(age / 1.2);
    const r = lerp(180, 520, easeOut(rp));
    const alpha = (1 - rp) * 0.18 * (0.4 + heat * 0.8);
    ctx.strokeStyle = `rgba(255, 59, 48, ${alpha})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // -- heart: squash-stretch synced with R-peak of current beat
  // pulseEnv: peak at R phase 0.27, settles by 0.55
  const u = nowPhase - Math.floor(nowPhase);
  let pulse = 0;
  {
    // systole (R spike) — sharp rise, spring settle
    const rise = clamp01((u - 0.22) / 0.06);
    const fall = clamp01((u - 0.28) / 0.35);
    pulse = easeOut(rise) * (1 - easeInOut(fall));
  }

  // double-tap cue at TAP_T — big squash impact (Apple-like tap feedback)
  let tapPulse = 0, tapSquash = 0;
  // Two taps: at TAP_T and TAP_T + 0.18
  for (const tt of [TAP_T, TAP_T + 0.18]) {
    const age = t - tt;
    if (age >= 0 && age < 0.9) {
      const env = (1 - easeOut(clamp01(age / 0.9))) * Math.exp(-age * 3);
      tapPulse = Math.max(tapPulse, env * 0.35);
      // squash: immediately compress then spring
      if (age < 0.4) {
        tapSquash = Math.max(tapSquash, Math.sin(clamp01(age / 0.4) * Math.PI) * 0.22);
      }
    }
  }

  // entry fade (first 0.6s)
  const entry = kern(t, 0.0, 0.6, easeOut);

  const baseSize = 150;
  const scaleY = 1 + pulse * 0.10 + tapPulse - tapSquash; // squash = shorter Y
  const scaleX = 1 + pulse * 0.06 + tapPulse * 0.7 + tapSquash * 0.9; // stretch X
  const sizeY = baseSize * scaleY;
  const sizeX = baseSize * scaleX;

  // heart glow (during tap and during peak bpm)
  const glowAmt = Math.max(tapPulse * 2.2, heat * 0.6);
  if (glowAmt > 0.02) {
    ctx.save();
    ctx.shadowBlur = 40 + glowAmt * 60;
    ctx.shadowColor = `rgba(255, 59, 48, ${0.35 + glowAmt * 0.3})`;
    const hp = heartPath(cx, cy, Math.max(sizeX, sizeY));
    ctx.fillStyle = `rgba(255, 59, 48, 0.001)`;
    ctx.fill(hp);
    ctx.restore();
  }

  // outlined heart before tap (empty like), filled after
  const filled = t >= TAP_T;

  // non-uniform scale by drawing into transformed space
  ctx.save();
  ctx.translate(cx, cy);
  // subtle breathing drift
  const drift = Math.sin(nowPhase * Math.PI * 2) * 2;
  ctx.translate(0, drift);
  ctx.scale(scaleX, scaleY);
  ctx.globalAlpha = entry;

  const hp = heartPath(0, 0, baseSize);

  if (!filled) {
    // empty, slate outline
    ctx.lineWidth = 4 / Math.max(scaleX, scaleY);
    ctx.strokeStyle = 'rgba(28,28,30,0.28)';
    ctx.stroke(hp);
    // subtle red fill hinting life
    ctx.fillStyle = 'rgba(255,59,48,0.05)';
    ctx.fill(hp);
  } else {
    // filled red gradient
    const fillFade = clamp01((t - TAP_T) / 0.25);
    const g = ctx.createLinearGradient(0, -baseSize, 0, baseSize);
    g.addColorStop(0, '#ff5a4f');
    g.addColorStop(1, '#ff3b30');
    ctx.fillStyle = g;
    ctx.globalAlpha = entry * fillFade;
    ctx.fill(hp);
    // rim light
    ctx.globalAlpha = entry * fillFade * 0.6;
    ctx.lineWidth = 2 / Math.max(scaleX, scaleY);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.stroke(hp);
    // specular highlight
    ctx.globalAlpha = entry * fillFade * 0.35;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.ellipse(-baseSize * 0.38, -baseSize * 0.45, baseSize * 0.22, baseSize * 0.10, -0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // -- micro particles on tap (hearts float up briefly)
  if (t >= TAP_T && t < TAP_T + 2.0) {
    const N = 14;
    for (let i = 0; i < N; i++) {
      const seed = i * 12.9898;
      const rx = Math.sin(seed) * 0.5 + 0.5;
      const ry = Math.sin(seed * 7.31) * 0.5 + 0.5;
      const delay = rx * 0.25;
      const age = t - TAP_T - delay;
      if (age < 0 || age > 1.6) continue;
      const p = clamp01(age / 1.6);
      const rise = easeOut(p);
      const px = cx + (rx - 0.5) * 420 + Math.sin(seed * 3.7 + p * 4) * 30;
      const py = cy - baseSize * 0.6 - rise * 220 - ry * 60;
      const alpha = (1 - p) * 0.8;
      const s = lerp(6, 10, ry);
      ctx.save();
      ctx.globalAlpha = alpha * entry;
      ctx.fillStyle = '#ff3b30';
      const ph = heartPath(px, py, s);
      ctx.fill(ph);
      ctx.restore();
    }
  }

  // -- BPM numeric readout (updates every few frames, Apple Health style)
  const bpmDisplay = Math.round(bpm);
  const bpmEl = document.getElementById('bpmNum');
  if (bpmEl && bpmEl._last !== bpmDisplay) {
    bpmEl.textContent = bpmDisplay;
    bpmEl._last = bpmDisplay;
  }
  // color shifts smoothly toward Apple red at high bpm
  {
    const mix = easeInOut(clamp01((heat - 0.15) / 0.35));
    const r = Math.round(lerp(28, 255, mix));
    const g = Math.round(lerp(28, 59, mix));
    const b = Math.round(lerp(30, 48, mix));
    bpmEl.style.color = `rgb(${r},${g},${b})`;
  }
  // entry fade
  document.getElementById('bpm').style.opacity = entry.toFixed(3);
}

// ---------- controller (template) ----------
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');

let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}

function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) {
    let next = currentT + dt;
    if (next >= DURATION) next = 0;
    setTime(next);
  }
  requestAnimationFrame(loop);
}

scrubber.addEventListener('input', () => {
  playing = false;
  playBtn.textContent = '▶';
  setTime(scrubber.value / 1000 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸' : '▶';
  lastFrame = performance.now();
});
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl';
  lbl.textContent = cue.label;
  m.appendChild(lbl);
  cueRow.appendChild(m);
});

setTime(0);
requestAnimationFrame(loop);
</script>

</body>
</html>
