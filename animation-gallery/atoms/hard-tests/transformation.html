<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Transformation · Caterpillar → Cocoon → Butterfly</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#faf7f3;color:#1a1a1a;min-height:100vh;overflow:hidden;
    font-family:-apple-system,"SF Pro Display","Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  .stage{position:fixed;inset:0;display:grid;place-items:center}
  /* 背景暖米纸渐变 */
  .bg{position:absolute;inset:0;background:
    radial-gradient(ellipse 140% 90% at 50% 100%, #f0e8dc 0%, #faf7f3 45%, #fdfbf7 100%)}
  /* 主 SVG 画布 */
  svg.scene{position:relative;width:100vw;height:100vh;display:block;overflow:visible}

  /* Timeline */
  .tl-ui{position:fixed;left:0;right:0;bottom:0;z-index:100;
    padding:14px 24px;background:linear-gradient(180deg,transparent,rgba(26,22,19,.92));
    display:flex;align-items:center;gap:16px;
    font-family:"SF Mono",Menlo,monospace;font-size:11px;color:rgba(255,255,255,.85)}
  .tl-ui button{background:transparent;border:1px solid rgba(255,255,255,.3);
    color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;
    font-size:14px;display:grid;place-items:center;transition:all .2s}
  .tl-ui button:hover{background:rgba(255,255,255,.1)}
  .tl-ui .time{font-variant-numeric:tabular-nums;min-width:140px;letter-spacing:.05em}
  .tl-ui input[type=range]{flex:1;accent-color:#ff6b88;height:3px}

  .cue-row{position:fixed;left:24px;right:24px;bottom:60px;height:26px;
    pointer-events:none;z-index:99}
  .cue-mark{position:absolute;top:0;width:2px;height:10px;background:rgba(255,107,136,.6);
    transform:translateX(-1px)}
  .cue-mark .lbl{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    font-family:"SF Mono",Menlo,monospace;font-size:9px;color:rgba(40,30,25,.55);
    letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="bg"></div>
  <svg class="scene" viewBox="-960 -540 1920 1080" preserveAspectRatio="xMidYMid meet">
    <!-- ========= DEFS ========= -->
    <defs>
      <!-- Caterpillar: radial green -->
      <radialGradient id="catFill" cx="0.35" cy="0.3" r="0.8">
        <stop offset="0%"  stop-color="#b6e28a"/>
        <stop offset="45%" stop-color="#7cc96a"/>
        <stop offset="100%" stop-color="#3f7e30"/>
      </radialGradient>
      <radialGradient id="catHead" cx="0.35" cy="0.3" r="0.8">
        <stop offset="0%"  stop-color="#c8eaa0"/>
        <stop offset="50%" stop-color="#8dd07a"/>
        <stop offset="100%" stop-color="#4a8a3a"/>
      </radialGradient>

      <!-- Cocoon: radial beige -->
      <radialGradient id="cocoonFill" cx="0.35" cy="0.25" r="0.85">
        <stop offset="0%"  stop-color="#f2e5c5"/>
        <stop offset="40%" stop-color="#d9c49a"/>
        <stop offset="100%" stop-color="#8a7045"/>
      </radialGradient>

      <!-- Butterfly wings: gradient pink → orange tip + gold dots pattern -->
      <radialGradient id="wingL" cx="0.7" cy="0.35" r="0.95">
        <stop offset="0%"  stop-color="#fff2e8"/>
        <stop offset="25%" stop-color="#ffb4c2"/>
        <stop offset="55%" stop-color="#ff6b88"/>
        <stop offset="85%" stop-color="#ff9f5a"/>
        <stop offset="100%" stop-color="#c04a60"/>
      </radialGradient>
      <radialGradient id="wingR" cx="0.3" cy="0.35" r="0.95">
        <stop offset="0%"  stop-color="#fff2e8"/>
        <stop offset="25%" stop-color="#ffb4c2"/>
        <stop offset="55%" stop-color="#ff6b88"/>
        <stop offset="85%" stop-color="#ff9f5a"/>
        <stop offset="100%" stop-color="#c04a60"/>
      </radialGradient>

      <!-- Branch gradient -->
      <linearGradient id="branch" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7a5a3a"/>
        <stop offset="100%" stop-color="#4a3220"/>
      </linearGradient>
      <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9fd68a"/>
        <stop offset="100%" stop-color="#4a8a3a"/>
      </linearGradient>

      <!-- Shadows -->
      <filter id="catShadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4a8a3a" flood-opacity="0.28"/>
        <feDropShadow dx="0" dy="4"  stdDeviation="4"  flood-color="#000" flood-opacity="0.08"/>
      </filter>
      <filter id="cocoonShadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#8a7045" flood-opacity="0.28"/>
        <feDropShadow dx="0" dy="5"  stdDeviation="5"  flood-color="#000" flood-opacity="0.08"/>
      </filter>
      <filter id="butterShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#ff6b88" flood-opacity="0.32"/>
        <feDropShadow dx="0" dy="6"  stdDeviation="6"  flood-color="#000" flood-opacity="0.06"/>
      </filter>
      <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>

    <!-- ========= BACKGROUND stage: branch + leaves (subtle) ========= -->
    <g id="stageBg" opacity="0.85">
      <!-- A soft horizontal branch lower third -->
      <path id="branchPath"
        d="M -900 180 Q -450 150 0 170 T 900 190"
        stroke="url(#branch)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- 3 distant leaves -->
      <g id="leafA" transform="translate(-520 120)">
        <path d="M 0 0 Q 30 -40 70 -30 Q 60 10 20 20 Q 5 15 0 0 Z" fill="url(#leafGrad)" opacity="0.85"/>
        <path d="M 8 5 Q 35 -15 55 -15" stroke="#3f7e30" stroke-width="1.5" fill="none" opacity="0.5"/>
      </g>
      <g id="leafB" transform="translate(320 140) rotate(-25)">
        <path d="M 0 0 Q 30 -40 70 -30 Q 60 10 20 20 Q 5 15 0 0 Z" fill="url(#leafGrad)" opacity="0.75"/>
        <path d="M 8 5 Q 35 -15 55 -15" stroke="#3f7e30" stroke-width="1.5" fill="none" opacity="0.5"/>
      </g>
      <g id="leafC" transform="translate(620 155) rotate(15)">
        <path d="M 0 0 Q 24 -32 56 -24 Q 48 8 16 16 Q 4 12 0 0 Z" fill="url(#leafGrad)" opacity="0.7"/>
      </g>
    </g>

    <!-- ========= ACT 1-3: Caterpillar group ========= -->
    <g id="caterpillar" filter="url(#catShadow)">
      <!-- 8 body segments + head, placeholders; drawn by JS via d attr -->
      <g id="catLegs"></g>
      <g id="catBody"></g>
      <!-- antennae & head features drawn inside catBody update -->
    </g>

    <!-- ========= ACT 3-4: Cocoon group ========= -->
    <g id="cocoon" filter="url(#cocoonShadow)" style="display:none">
      <path id="cocoonShape" d="" fill="url(#cocoonFill)"/>
      <g id="cocoonSilk"></g>
      <!-- inner glow hint -->
      <circle id="cocoonGlow" cx="0" cy="0" r="0" fill="#fff4c9" opacity="0" filter="url(#glowSoft)"/>
    </g>

    <!-- ========= ACT 4-5: Butterfly group ========= -->
    <g id="butterfly" filter="url(#butterShadow)" style="display:none">
      <!-- wings (two pair: hind + fore) -->
      <path id="wingHindL" d="" fill="url(#wingL)"/>
      <path id="wingHindR" d="" fill="url(#wingR)"/>
      <path id="wingForeL" d="" fill="url(#wingL)"/>
      <path id="wingForeR" d="" fill="url(#wingR)"/>
      <!-- gold dots on wings -->
      <g id="wingDots"></g>
      <!-- body (thorax+abdomen) -->
      <ellipse id="bflyBody" cx="0" cy="0" rx="6" ry="44" fill="#3a2a20"/>
      <circle id="bflyHead" cx="0" cy="-46" r="8" fill="#2a1a12"/>
      <!-- antennae -->
      <path id="antL" d="" stroke="#2a1a12" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path id="antR" d="" stroke="#2a1a12" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <circle id="antLdot" cx="0" cy="0" r="2.5" fill="#2a1a12"/>
      <circle id="antRdot" cx="0" cy="0" r="2.5" fill="#2a1a12"/>
    </g>

    <!-- ========= break particles ========= -->
    <g id="particles"></g>
  </svg>
</div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 10.00s</span>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <span class="time" id="frameLabel" style="min-width:100px;text-align:right">frame 0 / 300</span>
</div>

<script>
/* ================= CONSTANTS & HELPERS ================= */
const DURATION = 10.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = x => 1 - Math.pow(1 - x, 3);
const easeIn  = x => x * x * x;
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
function spring(t, k = 220, d = 14, mass = 1) {
  if (t <= 0) return 0;
  const wn = Math.sqrt(k / mass);
  const zeta = d / (2 * Math.sqrt(k * mass));
  if (zeta < 1) {
    const wd = wn * Math.sqrt(1 - zeta * zeta);
    return 1 - Math.exp(-zeta * wn * t) * (Math.cos(wd * t) + (zeta * wn / wd) * Math.sin(wd * t));
  }
  return 1 - (1 + wn * t) * Math.exp(-wn * t);
}
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));

/* seeded PRNG (deterministic) */
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const CUES = [
  { t: 0.0,  label: 'arrive' },
  { t: 1.5,  label: 'crawl' },
  { t: 3.5,  label: 'wrap' },
  { t: 5.5,  label: 'break' },
  { t: 7.2,  label: 'emerge' },
  { t: 7.5,  label: 'fly' },
];

/* ================= ELEMENT REFS ================= */
const catG = document.getElementById('caterpillar');
const catBody = document.getElementById('catBody');
const catLegs = document.getElementById('catLegs');
const cocoonG = document.getElementById('cocoon');
const cocoonShape = document.getElementById('cocoonShape');
const cocoonSilk = document.getElementById('cocoonSilk');
const cocoonGlow = document.getElementById('cocoonGlow');
const bflyG = document.getElementById('butterfly');
const wingHindL = document.getElementById('wingHindL');
const wingHindR = document.getElementById('wingHindR');
const wingForeL = document.getElementById('wingForeL');
const wingForeR = document.getElementById('wingForeR');
const wingDots = document.getElementById('wingDots');
const bflyBody = document.getElementById('bflyBody');
const bflyHead = document.getElementById('bflyHead');
const antL = document.getElementById('antL');
const antR = document.getElementById('antR');
const antLdot = document.getElementById('antLdot');
const antRdot = document.getElementById('antRdot');
const partsG = document.getElementById('particles');

/* ================= PRE-BUILD STATIC BITS ================= */
/* Caterpillar body: 9 segments (head + 8 body).
   We'll build them as <circle> placeholders updated per frame. */
const SEG_COUNT = 9; // idx 0 = head (rightmost)
const segEls = [];
for (let i = 0; i < SEG_COUNT; i++) {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
  c.setAttribute('cx', 0); c.setAttribute('cy', 0);
  c.setAttribute('rx', 22); c.setAttribute('ry', 22);
  c.setAttribute('fill', i === 0 ? 'url(#catHead)' : 'url(#catFill)');
  catBody.appendChild(c);
  segEls.push(c);
}
/* eyes on head */
const eyeL = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
eyeL.setAttribute('r', 3.2); eyeL.setAttribute('fill', '#1a1a1a');
catBody.appendChild(eyeL);
const eyeR = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
eyeR.setAttribute('r', 3.2); eyeR.setAttribute('fill', '#1a1a1a');
catBody.appendChild(eyeR);
/* tiny antennae on head */
const catAntL = document.createElementNS('http://www.w3.org/2000/svg', 'path');
catAntL.setAttribute('stroke', '#3f7e30'); catAntL.setAttribute('stroke-width', 2.4);
catAntL.setAttribute('fill', 'none'); catAntL.setAttribute('stroke-linecap', 'round');
catBody.appendChild(catAntL);
const catAntR = document.createElementNS('http://www.w3.org/2000/svg', 'path');
catAntR.setAttribute('stroke', '#3f7e30'); catAntR.setAttribute('stroke-width', 2.4);
catAntR.setAttribute('fill', 'none'); catAntR.setAttribute('stroke-linecap', 'round');
catBody.appendChild(catAntR);

/* Caterpillar legs — small lines per body segment (6 legs: seg 2,4,6 pairs) */
const legSegIdx = [2, 4, 6];
const legEls = [];
legSegIdx.forEach(()=>{
  const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  l.setAttribute('stroke', '#3f7e30'); l.setAttribute('stroke-width', 3);
  l.setAttribute('stroke-linecap', 'round');
  catLegs.appendChild(l);
  legEls.push(l);
  const r = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  r.setAttribute('stroke', '#3f7e30'); r.setAttribute('stroke-width', 3);
  r.setAttribute('stroke-linecap', 'round');
  catLegs.appendChild(r);
  legEls.push(r);
});

/* Silk threads for cocoon */
const SILK_COUNT = 16;
const silkEls = [];
for (let i = 0; i < SILK_COUNT; i++) {
  const s = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  s.setAttribute('stroke', 'rgba(255,248,220,0.55)');
  s.setAttribute('stroke-width', 1.6);
  s.setAttribute('fill', 'none');
  s.setAttribute('stroke-linecap', 'round');
  cocoonSilk.appendChild(s);
  silkEls.push(s);
}

/* Butterfly wing gold dots: 4 dots per wing × 4 wings */
const DOT_GROUPS = [
  { host: 'wingForeL', positions: [[-120,-50],[-170,-20],[-90,-80],[-150,10]] },
  { host: 'wingForeR', positions: [[ 120,-50],[ 170,-20],[ 90,-80],[ 150,10]] },
  { host: 'wingHindL', positions: [[-110, 40],[-150, 70],[-80, 80]] },
  { host: 'wingHindR', positions: [[ 110, 40],[ 150, 70],[ 80, 80]] },
];
const dotEls = [];
DOT_GROUPS.forEach(g => {
  g.positions.forEach(([x,y]) => {
    const d = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    d.setAttribute('r', 4.5);
    d.setAttribute('fill', '#ffe08a');
    d.setAttribute('opacity', 0.92);
    wingDots.appendChild(d);
    dotEls.push({ el: d, host: g.host, x, y });
  });
});

/* Particles — 60 golden bits for break moment */
const PART_COUNT = 60;
const partEls = [];
const rand = mulberry32(0xC0C0011);
for (let i = 0; i < PART_COUNT; i++) {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  const r = 3 + rand() * 4;
  c.setAttribute('r', r);
  c.setAttribute('fill', rand() > 0.4 ? '#fff4c9' : '#ffd56b');
  c.setAttribute('opacity', 0);
  partsG.appendChild(c);
  const ang = rand() * Math.PI * 2;
  const dist = 120 + rand() * 360;
  const spd = 0.6 + rand() * 0.7;
  partEls.push({ el: c, ang, dist, spd, r, delay: rand() * 0.18 });
}

/* ================= RENDER FN ================= */
/* Scene coordinate origin is center (0,0). Baseline branch at y=+180. */
const BASE_Y = 180;

function render(t) {
  /* Clamp */
  t = Math.max(0, Math.min(DURATION, t));

  /* ====== Phase bookkeeping ====== */
  // ACT boundaries
  const T_ARRIVE_END = 1.5;
  const T_CRAWL_END  = 3.5;
  const T_WRAP_END   = 5.5;
  const T_BREAK_END  = 7.5;

  /* ====== STAGE bg leaves subtle sway ====== */
  const sway = Math.sin(t * 0.6) * 3;
  document.getElementById('leafA').setAttribute('transform', `translate(-520 ${120 + sway}) rotate(${-3 + sway*0.2})`);
  document.getElementById('leafB').setAttribute('transform', `translate(320 ${140 - sway}) rotate(${-25 + sway*0.3})`);
  document.getElementById('leafC').setAttribute('transform', `translate(620 ${155 + sway*0.6}) rotate(${15 - sway*0.2})`);

  /* ====== Determine visibility of groups ====== */
  const catVisible = t < T_WRAP_END + 0.1;         // caterpillar active ACT1-3
  const cocoonVisible = t >= T_WRAP_END - 0.4 && t <= T_BREAK_END + 0.25;
  const bflyVisible = t >= T_BREAK_END - 1.4;      // starts emerging at act4 end

  catG.style.display = catVisible ? '' : 'none';
  cocoonG.style.display = cocoonVisible ? '' : 'none';
  bflyG.style.display = bflyVisible ? '' : 'none';

  /* ====== ACT 1-3: Caterpillar ====== */
  if (catVisible) {
    /* Position & progress along stage:
       ACT1 Arrive (0-1.5): crawl in from x=-900 → x=-200 (arc path, falls slightly)
       ACT2 Crawl (1.5-3.5): continue x=-200 → x=50 (slow forward with wave)
       ACT3 Wrap (3.5-5.5): stop, curl up, transform into cocoon (fade + shrink)
    */
    let baseX, baseY;
    let crawlPhase = 0; // 0..1 for crawl wave animation
    let overallScale = 1;
    let overallOpacity = 1;
    let curlAmt = 0;

    if (t < T_ARRIVE_END) {
      const p = clamp01(t / T_ARRIVE_END);
      const e = easeOut(p);
      baseX = lerp(-820, -380, e);
      // Arc dip: parabola from top-ish
      const arc = 4 * e * (1 - e); // 0 → 1 → 0
      baseY = BASE_Y - arc * 160 + (1 - e) * -40;
      crawlPhase = t * 3.0;
      overallScale = 0.6 + easeOut(p) * 0.4; // grow to full
      overallOpacity = p < 0.3 ? p / 0.3 : 1;
    } else if (t < T_CRAWL_END) {
      const p = clamp01((t - T_ARRIVE_END) / (T_CRAWL_END - T_ARRIVE_END));
      // continue forward: -380 → 60, clearly visible crawl
      baseX = lerp(-380, 60, easeInOut(p));
      baseY = BASE_Y;
      crawlPhase = t * 3.6;
    } else if (t < T_WRAP_END) {
      const p = clamp01((t - T_CRAWL_END) / (T_WRAP_END - T_CRAWL_END));
      baseX = 60 + Math.sin(p * Math.PI) * 4; // small settle tremor
      baseY = BASE_Y;
      crawlPhase = t * 2 * (1 - p);
      // Curl up: bend segments toward center, shrink to fit cocoon shape
      curlAmt = easeInOut(p);
      overallScale = lerp(1, 0.82, curlAmt);
      // Fade out near end (transition to cocoon)
      const fadeStart = 0.72;
      overallOpacity = p < fadeStart ? 1 : 1 - (p - fadeStart) / (1 - fadeStart);
    } else {
      baseX = 60; baseY = BASE_Y;
      overallOpacity = 0;
    }

    /* Segment positions: head at right, body tailing left.
       Spine wave: each segment y offset by sin(phase - i * k) */
    const spacing = 34;
    const waveAmp = 10 * Math.max(0, 1 - curlAmt); // no wave when curling
    /* When curling: bring segments to circular cluster. */
    for (let i = 0; i < SEG_COUNT; i++) {
      const straightX = -i * spacing;
      const straightY = Math.sin(crawlPhase - i * 0.7) * waveAmp;
      // Curl target: circular cluster around (−spacing*(SEG_COUNT-1)/2, -8)
      const curlAng = (i / (SEG_COUNT - 1)) * Math.PI * 1.6 - Math.PI * 0.3;
      const curlR = 44;
      const curlX = -spacing * (SEG_COUNT - 1) / 2 + Math.cos(curlAng) * curlR;
      const curlY = -10 + Math.sin(curlAng) * curlR;
      const sx = lerp(straightX, curlX, curlAmt);
      const sy = lerp(straightY, curlY, curlAmt);
      // Squash effect while moving (each segment pulses slightly out-of-phase)
      const pulse = Math.sin(crawlPhase - i * 0.5) * 0.5 + 0.5;
      const segScale = 1 + (1 - curlAmt) * (pulse * 0.1 - 0.03); // slight bob
      // Segments taper: head biggest, tail smallest
      const sizeLerp = i === 0 ? 26 : 23 - i * 1.4;
      const rx = sizeLerp * segScale * (1 - curlAmt * 0.15);
      const ry = sizeLerp * segScale * (0.95 + (1-curlAmt) * 0.05);
      segEls[i].setAttribute('cx', baseX + sx * overallScale);
      segEls[i].setAttribute('cy', baseY + sy * overallScale - (i === 0 ? 2 : 0));
      segEls[i].setAttribute('rx', rx * overallScale);
      segEls[i].setAttribute('ry', ry * overallScale);
    }

    /* Eyes & antennae on head segment (index 0 = head, rightmost) */
    const headCx = parseFloat(segEls[0].getAttribute('cx'));
    const headCy = parseFloat(segEls[0].getAttribute('cy'));
    eyeL.setAttribute('cx', headCx + 8);   eyeL.setAttribute('cy', headCy - 8);
    eyeR.setAttribute('cx', headCx + 14);  eyeR.setAttribute('cy', headCy - 6);
    // little antennae waving (only when not curled)
    const antAmp = (1 - curlAmt) * 6;
    const antWave = Math.sin(crawlPhase * 1.2) * antAmp;
    catAntL.setAttribute('d', `M ${headCx + 6} ${headCy - 18} Q ${headCx + 8} ${headCy - 28 + antWave} ${headCx + 4} ${headCy - 38 + antWave}`);
    catAntR.setAttribute('d', `M ${headCx + 14} ${headCy - 18} Q ${headCx + 18} ${headCy - 28 - antWave} ${headCx + 22} ${headCy - 38 - antWave}`);

    /* Legs: tiny angled lines hanging below legSegIdx */
    const legVisible = 1 - curlAmt;
    legSegIdx.forEach((segI, k) => {
      const cx = parseFloat(segEls[segI].getAttribute('cx'));
      const cy = parseFloat(segEls[segI].getAttribute('cy'));
      const phase = crawlPhase - k * 0.8;
      const lift = Math.max(0, Math.sin(phase)) * 7;
      const rLift = Math.max(0, Math.sin(phase + Math.PI)) * 7;
      const rx = 10, ry = 18;
      const leftLeg = legEls[k*2];
      const rightLeg = legEls[k*2+1];
      leftLeg.setAttribute('x1', cx - 4); leftLeg.setAttribute('y1', cy + 8);
      leftLeg.setAttribute('x2', cx - rx); leftLeg.setAttribute('y2', cy + ry - lift);
      leftLeg.setAttribute('opacity', legVisible * 0.9);
      rightLeg.setAttribute('x1', cx + 4); rightLeg.setAttribute('y1', cy + 8);
      rightLeg.setAttribute('x2', cx + rx); rightLeg.setAttribute('y2', cy + ry - rLift);
      rightLeg.setAttribute('opacity', legVisible * 0.9);
    });

    catG.setAttribute('opacity', overallOpacity);
  }

  /* ====== ACT 3-4: Cocoon ====== */
  if (cocoonVisible) {
    // t ranges: emerge 5.1→fully 5.5, breathe 5.5→6.8, anticipation 6.8→7.2, break 7.2→7.5
    const cocoonCx = 60;
    const cocoonCy = BASE_Y - 30;

    // Phase within cocoon life
    let fadeIn = clamp01((t - (T_WRAP_END - 0.4)) / 0.4); // 0 at 5.1, 1 at 5.5
    let breatheT = Math.max(0, t - T_WRAP_END); // breathing from 5.5
    let breakT = Math.max(0, t - 6.8); // anticipation+break starts at 6.8

    // Base cocoon size
    const baseW = 110;
    const baseH = 160;
    let anticipation = 0; // shrink amount 0..1 at t=6.8..7.15
    let breakOpen = 0;    // split amount 0..1 from 7.2..7.5
    if (t >= 6.8 && t < 7.15) {
      anticipation = easeOut((t - 6.8) / 0.35);
    } else if (t >= 7.15 && t < 7.2) {
      anticipation = 1 - (t - 7.15) / 0.05;
    } else if (t >= 7.2) {
      anticipation = 0;
      breakOpen = clamp01((t - 7.2) / 0.3);
    }
    const breathe = Math.sin(breatheT * 2.2) * 0.03;
    const scaleX = (1 + breathe - anticipation * 0.12) * fadeIn;
    const scaleY = (1 - breathe + anticipation * 0.06) * fadeIn;

    // Build cocoon path (spindle / teardrop — symmetric)
    const W = baseW * scaleX;
    const H = baseH * scaleY;
    const openAmt = breakOpen * 40; // shift halves outward
    // If breakOpen > 0, render two half-paths split; else single path
    if (breakOpen <= 0.01) {
      const path = `M 0 ${-H}
        C ${W*0.9} ${-H*0.8} ${W*1.05} ${-H*0.25} ${W*0.55} ${H*0.15}
        C ${W*0.35} ${H*0.75} ${W*0.1} ${H*1.0} 0 ${H}
        C ${-W*0.1} ${H*1.0} ${-W*0.35} ${H*0.75} ${-W*0.55} ${H*0.15}
        C ${-W*1.05} ${-H*0.25} ${-W*0.9} ${-H*0.8} 0 ${-H} Z`;
      cocoonShape.setAttribute('d', path);
      cocoonShape.setAttribute('transform', `translate(${cocoonCx} ${cocoonCy})`);
      cocoonShape.setAttribute('opacity', 1);
    } else {
      // crack open: left half shifts left, right half shifts right
      const shift = openAmt;
      const leftPath = `M 0 ${-H}
        C 0 ${-H*0.8} 0 ${-H*0.25} 0 ${H*0.15}
        C 0 ${H*0.75} 0 ${H*1.0} 0 ${H}
        C ${-W*0.1} ${H*1.0} ${-W*0.35} ${H*0.75} ${-W*0.55} ${H*0.15}
        C ${-W*1.05} ${-H*0.25} ${-W*0.9} ${-H*0.8} 0 ${-H} Z`;
      const rightPath = `M 0 ${-H}
        C ${W*0.9} ${-H*0.8} ${W*1.05} ${-H*0.25} ${W*0.55} ${H*0.15}
        C ${W*0.35} ${H*0.75} ${W*0.1} ${H*1.0} 0 ${H}
        C 0 ${H*1.0} 0 ${H*0.75} 0 ${H*0.15}
        C 0 ${-H*0.25} 0 ${-H*0.8} 0 ${-H} Z`;
      // combine: use two subpaths with translate transforms encoded into path
      const d = `M ${-shift} ${-H}
        C ${-shift} ${-H*0.8} ${-shift} ${-H*0.25} ${-shift} ${H*0.15}
        C ${-shift} ${H*0.75} ${-shift} ${H*1.0} ${-shift} ${H}
        C ${-W*0.1 - shift} ${H*1.0} ${-W*0.35 - shift} ${H*0.75} ${-W*0.55 - shift} ${H*0.15}
        C ${-W*1.05 - shift} ${-H*0.25} ${-W*0.9 - shift} ${-H*0.8} ${-shift} ${-H} Z
        M ${shift} ${-H}
        C ${W*0.9 + shift} ${-H*0.8} ${W*1.05 + shift} ${-H*0.25} ${W*0.55 + shift} ${H*0.15}
        C ${W*0.35 + shift} ${H*0.75} ${W*0.1 + shift} ${H*1.0} ${shift} ${H}
        C ${shift} ${H*1.0} ${shift} ${H*0.75} ${shift} ${H*0.15}
        C ${shift} ${-H*0.25} ${shift} ${-H*0.8} ${shift} ${-H} Z`;
      cocoonShape.setAttribute('d', d);
      cocoonShape.setAttribute('transform', `translate(${cocoonCx} ${cocoonCy})`);
      cocoonShape.setAttribute('opacity', 1 - breakOpen * 0.6);
    }

    // Silk threads — diagonal wraps around cocoon
    const silkAppear = clamp01((t - (T_WRAP_END - 0.4)) / 0.6);
    silkEls.forEach((s, i) => {
      const frac = i / (SILK_COUNT - 1);
      const y0 = lerp(-H, H, frac);
      const bow = Math.sin(frac * Math.PI) * W * 0.95;
      // thread is a curved stroke
      const appearT = clamp01((silkAppear - frac * 0.5) * 2);
      const strokeLen = appearT;
      const dPath = `M ${-bow} ${y0} Q 0 ${y0 + (i%2?6:-6)} ${bow} ${y0}`;
      s.setAttribute('d', dPath);
      s.setAttribute('transform', `translate(${cocoonCx} ${cocoonCy})`);
      s.setAttribute('opacity', strokeLen * 0.7 * (1 - breakOpen));
    });

    // Inner glow grows before break
    if (t >= 6.8) {
      const g = clamp01((t - 6.8) / 0.5);
      cocoonGlow.setAttribute('cx', cocoonCx);
      cocoonGlow.setAttribute('cy', cocoonCy);
      cocoonGlow.setAttribute('r', 30 + g * 90);
      cocoonGlow.setAttribute('opacity', g * 0.8 * (1 - breakOpen * 0.8));
    } else {
      cocoonGlow.setAttribute('opacity', 0);
    }
  }

  /* ====== ACT 4-5: Butterfly ====== */
  if (bflyVisible) {
    // Emerge at 7.2; fully open by 8.0; fly from 8.0-10.0
    const emergeT = clamp01((t - 7.2) / 0.8); // 0→1 over 0.8s
    const flyT = clamp01((t - 7.5) / 2.5);    // 0→1 over 2.5s

    // Position: rise from cocoon center and drift up-right
    const startX = 60, startY = BASE_Y - 30;
    const endX = 360, endY = -260;
    // arc path
    const px = lerp(startX, endX, easeOut(flyT));
    // parabola up-and-drift
    const arcLift = 4 * flyT * (1 - flyT);
    const py = lerp(startY, endY, easeInOut(flyT)) - arcLift * 80;

    // Scale entrance using spring (faster ramp to full size)
    const sIn = spring(Math.max(0, t - 7.2), 240, 14);
    const baseScale = 0.15 + sIn * 0.95; // 0.15 → ~1.1 (overshoot) → 1.0

    // Flapping: frequency 2.6Hz, wing angle (flap)
    // During emerge, flap starts soft, ramping up
    const flapRamp = clamp01((t - 7.3) / 0.5);
    const flapFreq = 2.6;
    const flapPhase = (t - 7.3) * flapFreq * Math.PI * 2;
    // Wing dihedral angle: -0.3 (down) to +0.55 (up) rad
    const flapAng = Math.sin(flapPhase) * 0.42 * flapRamp;
    // Fore wings lead; hind wings lag by ~0.08s (follow-through)
    const hindAng = Math.sin(flapPhase - 0.5) * 0.36 * flapRamp;

    // Build wing shapes as smooth cubic bezier — more organic butterfly wings
    function foreWing(side, angle) {
      // side: -1 (L) or +1 (R); wing extends outward, curves up and back
      // path in un-rotated frame (side positive for R):
      // start at body (s*4, -30), arc up-out to tip (s*210, -130), curl back inward along bottom edge
      const s = side;
      const d0 = `M ${s*4} -30
        C ${s*60} -90 ${s*160} -150 ${s*210} -120
        C ${s*240} -90 ${s*230} -30 ${s*190} 0
        C ${s*150} 20 ${s*90} 15 ${s*30} -5
        Z`;
      return perspTransform(d0, angle);
    }
    function hindWing(side, angle) {
      const s = side;
      const d0 = `M ${s*4} 0
        C ${s*50} 20 ${s*130} 40 ${s*160} 80
        C ${s*170} 105 ${s*130} 120 ${s*80} 105
        C ${s*40} 95 ${s*15} 60 ${s*18} 30
        Z`;
      return perspTransform(d0, angle);
    }

    // Apply perspective: scale x by cos(angle), skew y by sin(angle)
    function perspTransform(d, ang) {
      const sx = Math.cos(ang);
      const skewY = Math.sin(ang) * 0.12;
      // regex replace pairs of numbers in the path
      return d.replace(/(-?[\d.]+)\s+(-?[\d.]+)/g, (m, xs, ys) => {
        const x = parseFloat(xs), y = parseFloat(ys);
        return `${(x * sx).toFixed(2)} ${(y + x * skewY).toFixed(2)}`;
      });
    }

    // Wing scale during emerge (unfold): wings start tiny/folded, grow FASTER
    const unfold = clamp01((t - 7.2) / 0.5);
    const unfoldEase = easeOut(unfold);
    const wingOpenScale = 0.2 + unfoldEase * 0.8;

    wingForeL.setAttribute('d', foreWing(-1, flapAng));
    wingForeR.setAttribute('d', foreWing( 1, flapAng));
    wingHindL.setAttribute('d', hindWing(-1, hindAng));
    wingHindR.setAttribute('d', hindWing( 1, hindAng));

    // Update gold dots: scale dot coords with wing perspective
    dotEls.forEach(dObj => {
      const host = dObj.host;
      let ang = 0;
      if (host === 'wingForeL') ang = flapAng;
      else if (host === 'wingForeR') ang = -flapAng;
      else if (host === 'wingHindL') ang = hindAng * 0.8;
      else ang = -hindAng * 0.8;
      const sx = Math.cos(ang);
      const skewY = Math.sin(ang) * 0.12;
      // scale dot positions toward wing body a bit (since wing curves)
      dObj.el.setAttribute('cx', dObj.x * sx * 0.85);
      dObj.el.setAttribute('cy', dObj.y + dObj.x * skewY);
      dObj.el.setAttribute('opacity', 0.88 * unfoldEase);
    });

    // Antennae
    const antSway = Math.sin(flapPhase - 0.8) * 6 * flapRamp;
    antL.setAttribute('d', `M -4 -50 Q -14 ${-72 + antSway} ${-26 + antSway} ${-92 + antSway*0.6}`);
    antR.setAttribute('d', `M  4 -50 Q  14 ${-72 - antSway} ${ 26 - antSway} ${-92 - antSway*0.6}`);
    antLdot.setAttribute('cx', -26 + antSway); antLdot.setAttribute('cy', -92 + antSway*0.6);
    antRdot.setAttribute('cx',  26 - antSway); antRdot.setAttribute('cy', -92 - antSway*0.6);

    // Position + overall transform
    const finalScale = baseScale * wingOpenScale;
    bflyG.setAttribute('transform', `translate(${px} ${py}) scale(${finalScale})`);
    bflyG.setAttribute('opacity', clamp01(emergeT * 1.4));
  }

  /* ====== Break particles ====== */
  // Burst from cocoon at t=7.2, live ~2.0s
  partEls.forEach((p, i) => {
    const localT = t - 7.2 - p.delay;
    if (localT < 0 || localT > 2.5) {
      p.el.setAttribute('opacity', 0);
      return;
    }
    const pt = localT / 2.0;
    const radius = easeOut(Math.min(1, pt * 1.2)) * p.dist * p.spd;
    // gravity fall after peak
    const gravity = Math.pow(Math.max(0, pt - 0.3), 2) * 140;
    const px = 60 + Math.cos(p.ang) * radius;
    const py = (BASE_Y - 30) + Math.sin(p.ang) * radius + gravity;
    p.el.setAttribute('cx', px);
    p.el.setAttribute('cy', py);
    const fade = pt < 0.15 ? pt / 0.15 : 1 - clamp01((pt - 0.7) / 0.3);
    p.el.setAttribute('opacity', Math.max(0, fade) * 0.95);
    const sc = 1 - pt * 0.4;
    p.el.setAttribute('r', p.r * Math.max(0.2, sc));
  });
}

/* ================= TIMELINE CONTROL ================= */
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) {
    let next = currentT + dt;
    if (next >= DURATION) next = 0;
    setTime(next);
  }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => {
  playing = false;
  playBtn.textContent = '▶';
  setTime(scrubber.value / 1000 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸' : '▶';
  lastFrame = performance.now();
});
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl';
  lbl.textContent = cue.label;
  m.appendChild(lbl);
  cueRow.appendChild(m);
});

/* URL seek: ?t=7.5 or #t=7.5 → jump & pause (for screenshot verification) */
(function initFromUrl() {
  const src = (location.search || '') + (location.hash || '');
  const m = src.match(/t=([\d.]+)/);
  if (m) {
    const tv = Math.max(0, Math.min(DURATION, parseFloat(m[1])));
    playing = false;
    playBtn.textContent = '▶';
    setTime(tv);
    return true;
  }
  return false;
})();

/* Expose for screenshot automation */
window.setTime = setTime;
window.__render = render;
Object.defineProperty(window, 'playing', {
  get() { return playing; },
  set(v) { playing = v; playBtn.textContent = v ? '⏸' : '▶'; }
});

setTime(currentT);
requestAnimationFrame(loop);
</script>
</body>
