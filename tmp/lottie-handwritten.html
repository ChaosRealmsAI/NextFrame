<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>手写 Lottie 动画</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
  body { margin: 0; background: #0a0a0a; color: #eee; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
  h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 8px; }
  p { color: #888; margin-top: 0; }
  #stage { width: 600px; height: 600px; background: #111; border: 1px solid #222; border-radius: 8px; }
  pre { max-width: 600px; max-height: 300px; overflow: auto; background: #111; padding: 16px; border-radius: 8px; font-size: 11px; color: #6af; margin-top: 20px; }
</style>
</head>
<body>
<h1>Lottie · 纯手写 JSON</h1>
<p>没用 AE 导出，整个动画就是下面这段 JSON</p>
<div id="stage"></div>
<pre id="src"></pre>

<script>
// Lottie schema: 矩形绕中心旋转 + 缩放脉冲 + 颜色渐变
// 版本 5.x，60 帧，30fps = 2 秒循环
const anim = {
  v: "5.7.0",      // 格式版本
  fr: 30,          // 帧率
  ip: 0,           // in-point
  op: 60,          // out-point
  w: 600, h: 600,  // 画布
  nm: "handwritten",
  ddd: 0,
  assets: [],
  layers: [
    {
      ddd: 0, ind: 1, ty: 4, nm: "square", sr: 1,
      ks: {
        // 位置：画布中心
        p: { a: 0, k: [300, 300, 0] },
        // 锚点
        a: { a: 0, k: [0, 0, 0] },
        // 缩放：1.0 → 1.3 → 1.0（脉冲）
        s: {
          a: 1,
          k: [
            { t: 0,  s: [100, 100, 100], i: { x: [.4], y: [1] }, o: { x: [.6], y: [0] } },
            { t: 30, s: [130, 130, 100], i: { x: [.4], y: [1] }, o: { x: [.6], y: [0] } },
            { t: 60, s: [100, 100, 100] }
          ]
        },
        // 旋转：0 → 360
        r: {
          a: 1,
          k: [
            { t: 0,  s: [0],   i: { x: [.5], y: [1] }, o: { x: [.5], y: [0] } },
            { t: 60, s: [360] }
          ]
        },
        o: { a: 0, k: 100 }
      },
      ao: 0,
      shapes: [
        {
          ty: "gr", nm: "group",
          it: [
            // 矩形
            { ty: "rc", d: 1, s: { a: 0, k: [200, 200] }, p: { a: 0, k: [0, 0] }, r: { a: 0, k: 24 } },
            // 填充：蓝 → 紫
            {
              ty: "fl",
              c: {
                a: 1,
                k: [
                  { t: 0,  s: [0.30, 0.60, 1.00, 1], i: { x: [.5], y: [1] }, o: { x: [.5], y: [0] } },
                  { t: 30, s: [0.80, 0.30, 1.00, 1], i: { x: [.5], y: [1] }, o: { x: [.5], y: [0] } },
                  { t: 60, s: [0.30, 0.60, 1.00, 1] }
                ]
              },
              o: { a: 0, k: 100 }
            },
            // transform（组内）
            { ty: "tr", p: { a: 0, k: [0, 0] }, a: { a: 0, k: [0, 0] }, s: { a: 0, k: [100, 100] }, r: { a: 0, k: 0 }, o: { a: 0, k: 100 } }
          ]
        }
      ],
      ip: 0, op: 60, st: 0
    },
    // 第二层：小圆点绕大矩形轨道旋转
    {
      ddd: 0, ind: 2, ty: 4, nm: "dot", sr: 1,
      ks: {
        p: {
          a: 1,
          k: [
            { t: 0,  s: [450, 300, 0], ti: [0, -80], to: [0, 80] },
            { t: 15, s: [300, 450, 0], ti: [80, 0],  to: [-80, 0] },
            { t: 30, s: [150, 300, 0], ti: [0, 80],  to: [0, -80] },
            { t: 45, s: [300, 150, 0], ti: [-80, 0], to: [80, 0] },
            { t: 60, s: [450, 300, 0] }
          ]
        },
        a: { a: 0, k: [0, 0, 0] },
        s: { a: 0, k: [100, 100, 100] },
        r: { a: 0, k: 0 },
        o: { a: 0, k: 100 }
      },
      ao: 0,
      shapes: [
        {
          ty: "gr",
          it: [
            { ty: "el", d: 1, s: { a: 0, k: [30, 30] }, p: { a: 0, k: [0, 0] } },
            { ty: "fl", c: { a: 0, k: [1, 1, 1, 1] }, o: { a: 0, k: 100 } },
            { ty: "tr", p: { a: 0, k: [0, 0] }, a: { a: 0, k: [0, 0] }, s: { a: 0, k: [100, 100] }, r: { a: 0, k: 0 }, o: { a: 0, k: 100 } }
          ]
        }
      ],
      ip: 0, op: 60, st: 0
    }
  ]
};

lottie.loadAnimation({
  container: document.getElementById('stage'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  animationData: anim
});

document.getElementById('src').textContent = JSON.stringify(anim, null, 2);
</script>
</body>
</html>
