<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
  html,body{margin:0;background:#fff;height:100%}
  #s{width:400px;height:400px;margin:50px auto;background:#f5f5f7;border-radius:12px;display:flex;align-items:center;justify-content:center}
  #err{position:fixed;top:4px;left:4px;color:red;font:12px monospace;white-space:pre}
  #ok{position:fixed;top:4px;right:4px;color:green;font:12px monospace}
</style></head>
<body>
<div id="s"></div>
<div id="err"></div><div id="ok"></div>
<script>
window.onerror=(m)=>document.getElementById('err').textContent=m;
(async()=>{
  const p=new URLSearchParams(location.search);
  const file=p.get('f')||'anim-v1.json';
  const frame=parseInt(p.get('t')||'0');
  const data=await fetch(file).then(r=>r.json());
  const a=lottie.loadAnimation({container:document.getElementById('s'),renderer:'svg',loop:false,autoplay:false,animationData:data});
  a.addEventListener('DOMLoaded',()=>{
    a.goToAndStop(frame,true);
    document.getElementById('ok').textContent='READY t='+frame;
    document.title='READY';
  });
  a.addEventListener('data_failed',()=>document.getElementById('err').textContent='DATA_FAILED');
})();
</script></body></html>
