<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apple TV Mnemonic — Clone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #000;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    display: grid;
    place-items: center;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 50% 50%, #101218 0%, #000 60%);
    overflow: hidden;
  }

  /* Ambient bloom that breathes */
  .stage::before {
    content: "";
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(110, 140, 180, 0.18), transparent 70%),
      radial-gradient(ellipse 50% 30% at 50% 50%, rgba(255, 255, 255, 0.05), transparent 80%);
    animation: bloomBreath 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes bloomBreath {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.04); }
  }

  /* Mark container */
  .mark {
    display: flex;
    align-items: center;
    gap: 32px;
    position: relative;
    padding: 40px 60px;
    /* subtle depth drop */
    filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.6));
  }

  /* Apple logo */
  .logo {
    width: 190px;
    height: 230px;
    color: #fff;
    opacity: 0;
    transform: scale(0.3) translateY(20px);
    animation: logoIn 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards,
               logoBreath 5s ease-in-out 2.3s infinite;
  }
  @keyframes logoIn {
    0%   { opacity: 0; transform: scale(0.3) translateY(28px); filter: blur(14px); }
    60%  { opacity: 1; transform: scale(1.05) translateY(-4px); filter: blur(0); }
    80%  { transform: scale(0.98) translateY(2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }
  @keyframes logoBreath {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
    50%      { transform: scale(1.015); filter: drop-shadow(0 0 18px rgba(255,255,255,0.35)); }
  }

  /* tv text */
  .tv {
    display: flex;
    gap: 8px;
    font-size: 180px;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-top: 18px; /* visual optical alignment with apple */
  }
  .tv span {
    display: inline-block;
    opacity: 0;
    transform: translateY(40px) scale(0.85);
    filter: blur(8px);
  }
  .tv .t { animation: letterIn 1.6s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards; }
  .tv .v { animation: letterIn 1.6s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards; }
  @keyframes letterIn {
    0%   { opacity: 0; transform: translateY(40px) scale(0.85); filter: blur(8px); }
    70%  { opacity: 1; transform: translateY(-4px) scale(1.02); filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  /* Lens shimmer sweep */
  .shimmer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 16px;
  }
  .shimmer::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; width: 60%;
    left: -60%;
    background: linear-gradient(
      110deg,
      transparent 0%,
      transparent 35%,
      rgba(255, 255, 255, 0.18) 48%,
      rgba(255, 255, 255, 0.42) 50%,
      rgba(255, 255, 255, 0.18) 52%,
      transparent 65%,
      transparent 100%
    );
    filter: blur(1px);
    transform: skewX(-18deg);
    animation: sweep 3.5s cubic-bezier(0.4, 0.0, 0.2, 1) 2.4s forwards;
  }
  @keyframes sweep {
    0%   { left: -60%; opacity: 0; }
    8%   { opacity: 1; }
    100% { left: 120%; opacity: 0; }
  }

  /* Subtle caption */
  .caption {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    animation: captionIn 2s ease-out 3s forwards;
  }
  @keyframes captionIn { to { opacity: 1; } }

  /* Replay button */
  .replay {
    position: absolute;
    top: 24px;
    right: 24px;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.8);
    border-radius: 999px;
    font: 500 12px -apple-system, "SF Pro Display", system-ui, sans-serif;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .replay:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="stage" id="stage">
  <button class="replay" onclick="replay()">↻ Replay</button>

  <div class="mark" id="mark">
    <div class="shimmer"></div>

    <!-- Apple logo (official SVG path) -->
    <svg class="logo" viewBox="0 0 170 200" fill="currentColor" aria-hidden="true">
      <path d="M132.4 106.3c-.2-19.5 15.9-28.9 16.6-29.4-9.1-13.3-23.2-15.1-28.1-15.3-11.9-1.2-23.3 7-29.4 7-6.1 0-15.5-6.8-25.5-6.6-13.1.2-25.2 7.6-31.9 19.3-13.6 23.6-3.5 58.6 9.8 77.7 6.5 9.4 14.3 19.9 24.5 19.5 9.8-.4 13.5-6.3 25.4-6.3 11.9 0 15.2 6.3 25.6 6.1 10.6-.2 17.3-9.5 23.8-18.9 7.5-10.9 10.6-21.4 10.8-22-.2-.1-20.7-7.9-20.9-31.3-.2-19.5 15.9-28.9 16.6-29.4"/>
      <path d="M114.2 47.1c5.4-6.6 9.1-15.7 8.1-24.8-7.8.3-17.3 5.2-22.9 11.7-5 5.7-9.4 15-8.2 24 8.7.7 17.6-4.4 23-10.9"/>
    </svg>

    <div class="tv">
      <span class="t">t</span>
      <span class="v">v</span>
    </div>
  </div>

  <div class="caption">a nextframe motion study</div>
</div>

<script>
  function replay() {
    const stage = document.getElementById('stage');
    const clone = stage.cloneNode(true);
    stage.replaceWith(clone);
  }
</script>
</body>
</html>
