<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canvas Motion Probe</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #05060a; }
  #stage { position: fixed; inset: 0; width: 1920px; height: 1080px; transform-origin: 0 0; }
  canvas { display: block; width: 1920px; height: 1080px; }
  #hud {
    position: absolute;
    left: 64px;
    top: 48px;
    color: rgba(255,255,255,0.8);
    font: 700 42px/1.2 monospace;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="canvas" width="1920" height="1080"></canvas>
  <div id="hud"></div>
</div>
<script>
  window.__duration = 4;

  const stage = document.getElementById("stage");
  const canvas = document.getElementById("canvas");
  const hud = document.getElementById("hud");
  const ctx = canvas.getContext("2d");

  function applyScale() {
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080) || 1;
    stage.style.transform = "scale(" + scale + ")";
  }

  function draw(t) {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, "#08111f");
    bg.addColorStop(1, "#120814");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 14; i += 1) {
      const y = 110 + i * 62;
      const alpha = 0.05 + ((i % 3) * 0.015);
      ctx.strokeStyle = "rgba(255,255,255," + alpha.toFixed(3) + ")";
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    const x = 180 + ((W - 360) * (t / window.__duration));
    const y = H / 2 + Math.sin(t * Math.PI * 2) * 180;
    const glow = ctx.createRadialGradient(x, y, 0, x, y, 110);
    glow.addColorStop(0, "rgba(0,240,255,0.9)");
    glow.addColorStop(1, "rgba(0,240,255,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, 110, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#f4fbff";
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#00f0ff";
    ctx.fillRect(x - 280, y - 3, 560, 6);

    hud.textContent = "canvas t=" + t.toFixed(3);
  }

  window.__onFrame = function(state) {
    draw(Math.max(0, Math.min(window.__duration, Number(state && state.time) || 0)));
    return "ok";
  };

  applyScale();
  window.addEventListener("resize", applyScale);
  draw(0);
</script>
</body>
</html>
