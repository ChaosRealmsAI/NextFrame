<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Motion Test</title>
<style>body{background:#111;margin:40px}.stage{width:400px;height:400px;background:#000;border:1px solid #333}</style>
</head><body>
<h3 style="color:#fff">Motion Test — heartLike at t=0.5</h3>
<div id="host" class="stage"></div>
<pre id="log" style="color:#888;font-size:12px;max-width:800px;overflow:auto"></pre>
<script type="module">
import { renderMotion } from '/src/nf-core/engine/runtime/motion.js';
import scene from '/src/nf-core/scenes/16x9/anthropic-warm/fx-heartLike.js';
const params = scene.sample();
const config = scene.render(null, 0.5, params, {width:400, height:400});
const host = document.getElementById('host');
const svg = renderMotion(host, 0.5, config);
document.getElementById('log').textContent = 'SVG length: ' + svg.length + '\nconfig.layers: ' + config.layers.length + '\nhost.innerHTML length: ' + host.innerHTML.length + '\nFirst 300: ' + svg.slice(0, 300);
</script>
</body></html>
