<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>html,body{margin:0;background:#fff}#s{width:400px;height:400px;background:#f5f5f7;border-radius:12px;margin:50px auto}#ok{position:fixed;top:4px;right:4px;color:green;font:12px monospace}#err{position:fixed;top:4px;left:4px;color:red;font:12px monospace}</style>
</head><body><div id="s"></div><div id="ok"></div><div id="err"></div>
<script type="module">
import { render } from './engine.js';
try {
  const t = parseFloat(new URLSearchParams(location.search).get('t') || '0');
  const motion = await fetch('heart-like.json').then(r=>r.json());
  render(document.getElementById('s'), t, motion);
  document.getElementById('ok').textContent = 'READY t=' + t;
  document.title = 'READY';
} catch(e) {
  document.getElementById('err').textContent = e.message;
}
</script>
</body></html>
