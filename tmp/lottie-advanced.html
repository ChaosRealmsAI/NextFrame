<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Lottie Advanced · 手写</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: radial-gradient(ellipse at center, #0f0a1e 0%, #030108 70%); color: #eee; font-family: 'SF Mono', Monaco, monospace; overflow: hidden; }
  .wrap { height: 100%; display: flex; align-items: center; justify-content: center; }
  #stage { width: 720px; height: 720px; filter: drop-shadow(0 0 40px rgba(120, 80, 255, 0.4)); }
  .title { position: fixed; top: 32px; left: 40px; font-size: 11px; letter-spacing: 4px; color: #7a7099; }
  .hint { position: fixed; bottom: 32px; left: 40px; font-size: 10px; letter-spacing: 2px; color: #453c66; line-height: 1.8; }
  .hint b { color: #a090ff; font-weight: 400; }
  #err { position: fixed; top: 60px; left: 40px; color: #f66; font-size: 11px; white-space: pre; }
</style>
</head>
<body>
<div class="title">LOTTIE · HANDWRITTEN JSON</div>
<div class="wrap"><div id="stage"></div></div>
<div class="hint">
  <b>sh</b> bezier · <b>tm</b> trim path · <b>gf</b> gradient · 程序生成 12 份环形复制 · 5 层叠加<br>
  90 帧 · 30 fps · 循环
</div>
<div id="err"></div>

<script>
window.onerror = (m) => document.getElementById('err').textContent = m;

const FR = 30, DUR = 90, W = 720, H = 720, CX = 360, CY = 360;

// helpers
const kf = (frames) => ({
  a: 1,
  k: frames.map((f, i) => i < frames.length - 1
    ? { t: f.t, s: f.s, i: { x: [.42], y: [1] }, o: { x: [.58], y: [0] } }
    : { t: f.t, s: f.s })
});
const v = (k) => ({ a: 0, k });
const tr = (p = [0,0], s = [100,100], r = 0, o = 100) => ({
  ty: "tr", p: v(p), a: v([0,0]), s: v(s), r: v(r), o: v(o),
  sk: v(0), sa: v(0), nm: "Transform"
});

// ── Path: N-point star ────────────────────────────────────────
const starShape = (points, outerR, innerR) => {
  const verts = [], tans = [];
  for (let i = 0; i < points * 2; i++) {
    const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    verts.push([Math.cos(a) * r, Math.sin(a) * r]);
    tans.push([0, 0]);
  }
  return { ty: "sh", ks: v({ c: true, v: verts, i: tans, o: tans }) };
};

// ── Layer 1: big rotating star with gradient + trim ───────────
const L1 = {
  ddd: 0, ind: 1, ty: 4, nm: "star", sr: 1,
  ks: {
    p: v([CX, CY, 0]), a: v([0,0,0]),
    s: kf([
      { t: 0,  s: [80, 80, 100] },
      { t: 45, s: [110, 110, 100] },
      { t: 90, s: [80, 80, 100] }
    ]),
    r: kf([{ t: 0, s: [0] }, { t: 90, s: [180] }]),
    o: v(100)
  },
  ao: 0,
  shapes: [{
    ty: "gr", nm: "g", it: [
      starShape(6, 140, 65),
      {
        ty: "gf", nm: "gf", o: v(100), r: 1, bm: 0,
        g: { p: 3, k: v([
          0.0, 0.45, 0.30, 1.00,
          0.5, 0.80, 0.40, 1.00,
          1.0, 0.30, 0.75, 1.00
        ])},
        s: v([-140, -140]), e: v([140, 140]), t: 1, h: v(0), a: v(0)
      },
      tr()
    ]
  }],
  ip: 0, op: DUR, st: 0, bm: 0
};

// ── Layer 2: stroked star outline with trim path ──────────────
const L2 = {
  ddd: 0, ind: 2, ty: 4, nm: "outline", sr: 1,
  ks: {
    p: v([CX, CY, 0]), a: v([0,0,0]),
    s: v([100,100,100]),
    r: kf([{ t: 0, s: [0] }, { t: 90, s: [-180] }]),
    o: v(90)
  },
  ao: 0,
  shapes: [{
    ty: "gr", nm: "g2", it: [
      starShape(6, 200, 200),  // hexagon
      {
        ty: "st", nm: "st", c: v([0.70, 0.85, 1.00, 1]),
        o: v(100), w: v(2), lc: 2, lj: 2, ml: 4
      },
      {
        ty: "tm", nm: "tm", m: 1,
        s: kf([{ t: 0, s: [0] }, { t: 45, s: [100] }, { t: 90, s: [100] }]),
        e: kf([{ t: 0, s: [0] }, { t: 30, s: [100] }, { t: 90, s: [100] }]),
        o: v(0)
      },
      tr()
    ]
  }],
  ip: 0, op: DUR, st: 0, bm: 0
};

// ── Layer 3-14: 12 orbiting dots (each its own layer, no repeater) ──
const orbitDots = [];
for (let i = 0; i < 12; i++) {
  const ang = (i / 12) * 360;
  const rad = 270;
  orbitDots.push({
    ddd: 0, ind: 10 + i, ty: 4, nm: "dot" + i, sr: 1,
    ks: {
      p: v([CX, CY, 0]), a: v([0,0,0]), s: v([100,100,100]),
      r: kf([{ t: 0, s: [ang] }, { t: 90, s: [ang + 360] }]),
      o: kf([
        { t: 0,  s: [30 + (i % 4) * 20] },
        { t: 45, s: [90] },
        { t: 90, s: [30 + (i % 4) * 20] }
      ])
    },
    ao: 0,
    shapes: [{
      ty: "gr", nm: "g", it: [
        { ty: "el", d: 1, s: v([10, 10]), p: v([0, -rad]) },
        { ty: "fl", nm: "fl", c: v([0.85, 0.70, 1.00, 1]), o: v(100), r: 1, bm: 0 },
        tr()
      ]
    }],
    ip: 0, op: DUR, st: 0, bm: 0
  });
}

// ── Layer 15: center pulse ──────────────────────────────────
const LPulse = {
  ddd: 0, ind: 100, ty: 4, nm: "pulse", sr: 1,
  ks: {
    p: v([CX, CY, 0]), a: v([0,0,0]),
    s: kf([
      { t: 0,  s: [0, 0, 100] },
      { t: 45, s: [220, 220, 100] },
      { t: 90, s: [0, 0, 100] }
    ]),
    r: v(0),
    o: kf([
      { t: 0,  s: [70] },
      { t: 45, s: [0] },
      { t: 90, s: [70] }
    ])
  },
  ao: 0,
  shapes: [{
    ty: "gr", nm: "g", it: [
      { ty: "el", d: 1, s: v([30, 30]), p: v([0, 0]) },
      { ty: "fl", nm: "fl", c: v([1, 1, 1, 1]), o: v(100), r: 1, bm: 0 },
      tr()
    ]
  }],
  ip: 0, op: DUR, st: 0, bm: 0
};

const anim = {
  v: "5.7.0", fr: FR, ip: 0, op: DUR, w: W, h: H,
  nm: "advanced", ddd: 0, assets: [],
  layers: [LPulse, L2, L1, ...orbitDots]
};

const a = lottie.loadAnimation({
  container: document.getElementById('stage'),
  renderer: 'svg', loop: true, autoplay: true, animationData: anim
});
a.addEventListener('data_failed', () => document.getElementById('err').textContent = 'data_failed');
</script>
</body>
</html>
