<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>H4 · persona — double-tap</title>
<style>
  :root{
    --ink:#f5f1e8;
    --ink-dim:#8a8578;
    --accent:#ff2d55;   /* Apple system red, shifted a touch warmer */
    --accent-2:#ff9f43;
    --accent-3:#ffd43b;
    --bg-0:#0a0a0d;
    --bg-1:#131319;
    --grid:#1b1b24;
  }
  html,body{margin:0;background:var(--bg-0);color:var(--ink);font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  body{overflow:hidden;}
  .stage{
    position:relative;width:1920px;height:1080px;
    background:
      radial-gradient(1200px 800px at 62% 42%, #17131d 0%, var(--bg-0) 60%),
      linear-gradient(180deg, var(--bg-0), #07070a 100%);
    overflow:hidden;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  /* Timeline UI */
  .cue-row{
    position:absolute;left:40px;right:40px;bottom:74px;height:18px;
    pointer-events:none;
  }
  .cue-mark{
    position:absolute;top:0;width:1px;height:18px;background:rgba(245,241,232,0.35);
  }
  .cue-mark .lbl{
    position:absolute;top:-18px;left:4px;
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--ink-dim);white-space:nowrap;font-weight:500;
  }
  .tl-ui{
    position:absolute;left:40px;right:40px;bottom:24px;height:40px;
    display:flex;align-items:center;gap:14px;
    background:rgba(12,12,16,0.78);
    border:1px solid rgba(245,241,232,0.08);
    border-radius:10px;padding:0 16px;
    backdrop-filter:blur(8px);
  }
  .tl-ui button{
    background:rgba(245,241,232,0.06);
    border:1px solid rgba(245,241,232,0.10);
    color:var(--ink);
    width:30px;height:26px;border-radius:6px;
    font-size:13px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
  }
  .tl-ui button:hover{background:rgba(245,241,232,0.12);}
  .tl-ui .time{
    font-variant-numeric:tabular-nums;
    font-size:12px;color:var(--ink-dim);letter-spacing:0.04em;min-width:132px;
  }
  .tl-ui input[type=range]{
    flex:1;height:4px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(90deg, rgba(255,45,85,0.55), rgba(255,159,67,0.55));
    border-radius:2px;outline:none;
  }
  .tl-ui input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
    background:var(--ink);border:2px solid var(--accent);cursor:pointer;
    box-shadow:0 0 0 3px rgba(255,45,85,0.2);
  }
  /* Top-left slate */
  .slate{
    position:absolute;top:28px;left:40px;
    font-size:11px;letter-spacing:0.28em;text-transform:uppercase;
    color:var(--ink-dim);
    display:flex;gap:14px;align-items:center;
  }
  .slate .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .slate b{color:var(--ink);font-weight:600;letter-spacing:0.22em;}
  .slate .sep{opacity:0.4;}
  .kai{
    position:absolute;top:28px;right:40px;
    font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-dim);
  }
  .kai b{color:var(--ink);letter-spacing:0.18em;}
</style>
</head>
<body>
<div class="stage">
  <canvas id="bg"></canvas>
  <canvas id="main"></canvas>
  <canvas id="fg"></canvas>

  <div class="slate">
    <span class="dot"></span>
    <b>H4 · PERSONA</b>
    <span class="sep">//</span>
    <span>double-tap · take 04</span>
  </div>
  <div class="kai"><b>Kai Chen</b> &nbsp; motion · 1920×1080 · 30fps</div>

  <div class="cue-row" id="cueRow"></div>
  <div class="tl-ui">
    <button id="playBtn">⏸</button>
    <button id="resetBtn">↺</button>
    <span class="time" id="timeLabel">0.00 / 10.00s</span>
    <input type="range" id="scrubber" min="0" max="1000" value="0">
    <span class="time" id="frameLabel" style="min-width:120px;text-align:right">frame 0 / 300</span>
  </div>
</div>

<script>
/* =========================================================================
   H4 · PERSONA — Kai Chen
   A double-tap like, 10s loop. Every beat earned.

   Structure (music-video phrasing):
     0.00-1.60  IDLE         — cursor drifts in; the world breathes.
     1.60-1.95  PRESS1       — first tap ring (faint; primer).
     1.95-2.35  PRESS2       — second tap. Impact. Heart seeded.
     2.35-3.10  BURST        — heart redrawn via displaced tile-flip + shock.
     3.10-4.60  SPARKS       — ember-like particles, arc physics, not confetti.
     4.60-6.40  COMBO        — counter rolls from 0 → 9 281, digit-by-digit.
     6.40-8.20  SETTLE       — glow hangs, sparks cool to dust.
     8.20-10.0  BREATH       — number ticks up, heart pulses once; loop seam.

   No cliché center-bursts. Particles are welder sparks, not confetti.
   Heart built from tiles (flipboard snap), not a stroke.
   =========================================================================*/

const DURATION = 10.0;
const FPS = 30;

const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a,b,t) => a + (b-a) * t;
const easeOut = x => 1 - Math.pow(1-x, 3);
const easeOutQuint = x => 1 - Math.pow(1-x, 5);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3)/2;
const easeInQuad = x => x*x;
const springOut = x => { const c = clamp01(x); return c===0||c===1 ? c : 1 - Math.exp(-6*c)*Math.cos(9*c); };
const kern = (t,s,d,ease=easeOut) => ease(clamp01((t-s)/d));
const osc = (t, period) => Math.sin(t/period * Math.PI * 2);

/* Deterministic RNG — seed once, never per frame */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

const CUES = [
  { t: 0.00, label: 'Idle' },
  { t: 1.95, label: 'Tap' },
  { t: 2.35, label: 'Burst' },
  { t: 3.10, label: 'Sparks' },
  { t: 4.60, label: 'Combo' },
  { t: 6.40, label: 'Settle' },
  { t: 8.20, label: 'Breath' },
];

/* ---------- canvases ---------- */
const W = 1920, H = 1080;
const bgCanvas = document.getElementById('bg');
const mainCanvas = document.getElementById('main');
const fgCanvas = document.getElementById('fg');
[bgCanvas, mainCanvas, fgCanvas].forEach(c => { c.width = W; c.height = H; });
const bg = bgCanvas.getContext('2d');
const mx = mainCanvas.getContext('2d');
const fg = fgCanvas.getContext('2d');

/* ---------- heart shape sampler ---------- */
/* Classic parametric heart, centered at (cx,cy), scaled by s. */
function heartPoint(u, cx, cy, s){
  // u in [0,1] along the closed curve
  const a = u * Math.PI * 2;
  const x = 16 * Math.pow(Math.sin(a), 3);
  const y = 13 * Math.cos(a) - 5*Math.cos(2*a) - 2*Math.cos(3*a) - Math.cos(4*a);
  return { x: cx + x * s, y: cy - y * s };
}
/* Signed-ish "is inside heart" check via implicit curve */
function heartInside(px, py, cx, cy, s){
  const x = (px - cx) / (s*16);
  const y = -(py - cy) / (s*16);
  // (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
  const v = Math.pow(x*x + y*y - 1, 3) - x*x * y*y*y;
  return v <= 0;
}

/* ---------- pre-compute tiles for flipboard heart ---------- */
const CX = 960, CY = 500, S = 16; // heart center + scale
const TILE = 13;
const HEART_BOUNDS = { x0: CX - 320, y0: CY - 320, x1: CX + 320, y1: CY + 300 };

const tiles = [];
for (let y = HEART_BOUNDS.y0; y < HEART_BOUNDS.y1; y += TILE){
  for (let x = HEART_BOUNDS.x0; x < HEART_BOUNDS.x1; x += TILE){
    if (heartInside(x + TILE/2, y + TILE/2, CX, CY, S)){
      // distance from heart center, normalized
      const dx = (x + TILE/2 - CX) / 320;
      const dy = (y + TILE/2 - CY) / 280;
      const d = Math.sqrt(dx*dx + dy*dy);
      tiles.push({ x, y, d, // 0 at center, ~1 at edge
        // per-tile deterministic jitter
        j: mulberry32(Math.floor((x*73856093) ^ (y*19349663)))()
      });
    }
  }
}

/* ---------- spark particles (pre-seeded, deterministic) ---------- */
const SPARKS = [];
{
  const rng = mulberry32(20260417);
  for (let i = 0; i < 140; i++){
    const ang = rng() * Math.PI * 2;
    const speed = lerp(420, 1050, rng());        // px/s initial
    const life = lerp(0.9, 1.9, rng());
    const mass = lerp(0.7, 1.3, rng());
    const hueMix = rng();                          // pick among warm palette
    const side = rng() < 0.5 ? -1 : 1;
    SPARKS.push({
      ang, speed, life, mass, hueMix, side,
      // slight upward bias (arc like welder sparks)
      vy0: -Math.abs(Math.sin(ang)) * speed * 0.6,
      // size
      w: lerp(1.4, 2.6, rng()),
      len: lerp(18, 46, rng()),
      // phase jitter for shimmer
      ph: rng() * Math.PI * 2,
    });
  }
}

/* ---------- secondary ring-tiles (shockwave) pre-seed ---------- */
const SHOCK_TILES = [];
{
  const rng = mulberry32(7);
  for (let i = 0; i < 36; i++){
    SHOCK_TILES.push({
      a: i / 36 * Math.PI * 2 + rng()*0.05,
      j: rng(),
    });
  }
}

/* ---------- combo digit helpers ---------- */
function rollDigit(target, t, delay, speed){
  // rolls from random to `target` digit.
  // returns { digit (float), settled (0..1) }
  const p = clamp01((t - delay) / speed);
  const eased = easeOutQuint(p);
  // start at a random but stable digit
  const from = Math.floor(mulberry32(target*7919 + 31)() * 10);
  const cycles = 2 + (target % 4);
  const val = from + (target - from + cycles*10) * eased;
  return { digit: val % 10, settled: p };
}

/* ========================================================================= */
function drawBackground(t){
  bg.clearRect(0, 0, W, H);

  // warm vignette that breathes with beat
  const beat = 0.5 + 0.5*Math.sin((t - 1.95) * Math.PI * 2 / 0.9);
  const glowPulse = kern(t, 2.30, 0.30, easeOut) * (1 - kern(t, 3.10, 1.80, easeInOut));
  const ambient = 0.14 + 0.06*beat + 0.35*glowPulse;

  // Grid — very subtle, shifts with beat
  bg.save();
  bg.globalAlpha = 0.5;
  bg.strokeStyle = '#1b1b24';
  bg.lineWidth = 1;
  const gridStep = 60;
  const ox = (t * 8) % gridStep;
  bg.beginPath();
  for (let x = -gridStep + ox; x < W + gridStep; x += gridStep){
    bg.moveTo(x, 0); bg.lineTo(x, H);
  }
  for (let y = -gridStep; y < H + gridStep; y += gridStep){
    bg.moveTo(0, y); bg.lineTo(W, y);
  }
  bg.stroke();
  bg.restore();

  // Pulsing radial accent behind heart
  const g = bg.createRadialGradient(CX, CY, 0, CX, CY, 820);
  g.addColorStop(0, `rgba(255,45,85,${0.28 * ambient})`);
  g.addColorStop(0.35, `rgba(255,90,60,${0.14 * ambient})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  bg.fillStyle = g;
  bg.fillRect(0, 0, W, H);

  // Faint scanline-like horizontal noise bar (single, subtle)
  const scan = (Math.sin(t * 0.6) * 0.5 + 0.5);
  bg.globalAlpha = 0.05;
  bg.fillStyle = '#ff9f43';
  bg.fillRect(0, 120 + scan * (H - 240), W, 1);
  bg.globalAlpha = 1;

  // "User" avatar strip (left) — simulates short-video UI without being literal
  drawAvatarColumn(t);
}

function drawAvatarColumn(t){
  const x = 112, y = 540;
  // avatar
  bg.save();
  bg.beginPath(); bg.arc(x, y, 44, 0, Math.PI*2); bg.closePath();
  bg.fillStyle = '#1c1c24'; bg.fill();
  bg.strokeStyle = 'rgba(245,241,232,0.18)'; bg.lineWidth = 1.5; bg.stroke();
  // inner mono gradient
  const ag = bg.createLinearGradient(x, y-44, x, y+44);
  ag.addColorStop(0, '#2a2a35'); ag.addColorStop(1, '#15151a');
  bg.fillStyle = ag; bg.fill();
  // tiny initial
  bg.fillStyle = '#8a8578';
  bg.font = '600 28px "SF Pro Display", sans-serif';
  bg.textAlign = 'center'; bg.textBaseline = 'middle';
  bg.fillText('K', x, y+1);
  bg.restore();

  // stack of action icons (heart, comment, share) — minimal glyphs
  const icons = [
    { y: y + 110, kind: 'heart'   },
    { y: y + 200, kind: 'comment' },
    { y: y + 280, kind: 'share'   },
  ];
  icons.forEach(ic => {
    bg.save();
    bg.translate(x, ic.y);
    if (ic.kind === 'heart'){
      // heart fills as t passes 1.95
      const fill = clamp01(kern(t, 1.95, 0.30, easeOut));
      drawMiniHeart(bg, 0, 0, 18, fill);
    } else if (ic.kind === 'comment'){
      bg.strokeStyle = '#8a8578'; bg.lineWidth = 2;
      bg.beginPath();
      bg.moveTo(-14, -8); bg.lineTo(14, -8);
      bg.quadraticCurveTo(20, -8, 20, -2);
      bg.lineTo(20, 6); bg.quadraticCurveTo(20, 12, 14, 12);
      bg.lineTo(-2, 12); bg.lineTo(-8, 18); bg.lineTo(-8, 12);
      bg.lineTo(-14, 12); bg.quadraticCurveTo(-20, 12, -20, 6);
      bg.lineTo(-20, -2); bg.quadraticCurveTo(-20, -8, -14, -8);
      bg.closePath(); bg.stroke();
    } else {
      bg.strokeStyle = '#8a8578'; bg.lineWidth = 2;
      bg.beginPath();
      bg.moveTo(-14, 8); bg.lineTo(14, -8); bg.lineTo(14, -2);
      bg.moveTo(14, -8); bg.lineTo(8, -8);
      bg.stroke();
    }
    bg.restore();
  });

  // tiny "47.3K" count under heart, becomes active after settle
  bg.save();
  bg.fillStyle = '#8a8578';
  bg.font = '600 14px "SF Mono", monospace';
  bg.textAlign = 'center';
  const settled = kern(t, 6.40, 0.6, easeOut);
  bg.globalAlpha = 0.4 + 0.6*settled;
  bg.fillText(t < 1.95 ? '47.2K' : '47.3K', x, y + 148);
  bg.restore();
}

function drawMiniHeart(ctx, cx, cy, r, fill){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(r/16, r/16);
  ctx.beginPath();
  // heart path via bezier (clean for small size)
  ctx.moveTo(0, 4);
  ctx.bezierCurveTo(-2, -6, -14, -6, -14, 2);
  ctx.bezierCurveTo(-14, 10, -2, 14, 0, 18);
  ctx.bezierCurveTo(2, 14, 14, 10, 14, 2);
  ctx.bezierCurveTo(14, -6, 2, -6, 0, 4);
  ctx.closePath();
  if (fill > 0){
    // fill from bottom up, clipped via a rect
    ctx.save();
    ctx.clip();
    const grad = ctx.createLinearGradient(0, 18, 0, -18);
    grad.addColorStop(0, '#ff2d55');
    grad.addColorStop(1, '#ff9f43');
    ctx.fillStyle = grad;
    ctx.fillRect(-20, 18 - 38*fill, 40, 38);
    ctx.restore();
  }
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = fill > 0 ? 'rgba(255,45,85,0.9)' : 'rgba(245,241,232,0.55)';
  ctx.stroke();
  ctx.restore();
}

/* ---------- cursor that drives the tap ---------- */
function drawCursor(t){
  // drift in, then tap at 1.6 (primer) and 1.95 (second tap)
  const approach = kern(t, 0.20, 1.30, easeInOut);
  const x = lerp(1420, CX + 40, approach);
  const y = lerp(880, CY + 200, approach);
  // press scale
  const press1 = Math.max(0, 1 - Math.abs(t - 1.60)/0.10);
  const press2 = Math.max(0, 1 - Math.abs(t - 1.95)/0.10);
  const press = Math.max(press1, press2);
  const scale = 1 - press * 0.35;
  // after burst, cursor lifts away
  const leave = kern(t, 2.60, 1.20, easeInOut);
  const yFinal = y - leave * 90;
  const aFinal = 1 - leave;

  fg.save();
  fg.globalAlpha = 0.85 * aFinal;
  fg.translate(x, yFinal);
  fg.scale(scale, scale);
  // soft ring
  fg.beginPath(); fg.arc(0, 0, 38, 0, Math.PI*2);
  fg.strokeStyle = 'rgba(245,241,232,0.6)'; fg.lineWidth = 1.5; fg.stroke();
  fg.beginPath(); fg.arc(0, 0, 10, 0, Math.PI*2);
  fg.fillStyle = 'rgba(245,241,232,0.9)'; fg.fill();
  fg.restore();

  // tap rings: every press emits an expanding ring
  [1.60, 1.95].forEach((tp, i) => {
    const age = t - tp;
    if (age > 0 && age < 0.55){
      const p = clamp01(age / 0.55);
      const r = 40 + p * 180;
      fg.save();
      fg.globalAlpha = (1 - p) * (i === 0 ? 0.3 : 0.7);
      fg.strokeStyle = i === 0 ? 'rgba(245,241,232,0.9)' : 'rgba(255,45,85,1)';
      fg.lineWidth = 2 - 1.5*p;
      fg.beginPath(); fg.arc(x, yFinal, r, 0, Math.PI*2); fg.stroke();
      fg.restore();
    }
  });
}

/* ---------- flipboard heart ---------- */
function drawHeart(t){
  /*
    Each tile flips into place on a delay proportional to distance from center.
    Before burst (t < 2.35): invisible.
    During burst (2.35–3.10): tiles flip in, displaced timing (rings).
    After burst: tiles form a solid heart, with internal gradient + subtle pulse.
  */
  const burstStart = 2.35;
  const burstEnd   = 3.10;
  if (t < burstStart - 0.02) return;

  const globalP = clamp01((t - burstStart) / (burstEnd - burstStart));
  // pulse after formation
  const pulseT = Math.max(0, t - 3.10);
  const pulseA = Math.sin(pulseT * Math.PI * 2 * 0.55) * Math.exp(-pulseT * 0.55);
  const breathe = 1 + 0.015 * Math.sin((t - 3.10) * 2.1) * Math.exp(-Math.max(0, t-3.10)*0.4);
  const scale = (1 + 0.06 * pulseA) * breathe;

  mx.save();
  mx.translate(CX, CY);
  mx.scale(scale, scale);
  mx.translate(-CX, -CY);

  // 1) Soft red bloom behind heart, grows with burst
  {
    const bloomA = clamp01((t - 2.30) / 0.25) * (1 - clamp01((t - 7.0) / 2.5));
    const gr = mx.createRadialGradient(CX, CY-20, 0, CX, CY-20, 460);
    gr.addColorStop(0, `rgba(255,90,100,${0.55 * bloomA})`);
    gr.addColorStop(0.5, `rgba(255,45,85,${0.18 * bloomA})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    mx.fillStyle = gr;
    mx.fillRect(0, 0, W, H);
  }

  // 2) Tile flipboard
  tiles.forEach(tile => {
    // delay: ring-wave from center outward + jitter
    const baseDelay = tile.d * 0.55 + tile.j * 0.12;
    const localT = (t - burstStart - baseDelay * 0.40);
    const p = clamp01(localT / 0.28);
    if (p <= 0) return;
    const e = easeOutQuint(p);

    // tile "flip" — rotateX style via scaleY
    const sY = e; // 0 to 1
    // color along a warm gradient based on distance
    const col = sampleHeartColor(tile.d, t);
    // slight offset during flip (lift)
    const lift = (1 - e) * 6;

    mx.save();
    mx.translate(tile.x + TILE/2, tile.y + TILE/2 - lift);
    mx.scale(1, sY);
    // subtle per-tile rotation for snap energy
    const rot = (1 - e) * (tile.j - 0.5) * 0.6;
    mx.rotate(rot);
    mx.fillStyle = col;
    // tile with slight inner padding for "printed" feel
    mx.fillRect(-TILE/2 + 0.5, -TILE/2 + 0.5, TILE - 1, TILE - 1);
    // highlight streak on top edge
    mx.fillStyle = 'rgba(255,255,255,0.08)';
    mx.fillRect(-TILE/2 + 1, -TILE/2 + 1, TILE - 2, 2);
    mx.restore();
  });

  // 3) Outline stroke — appears as tiles finish
  if (globalP > 0.6){
    const outA = clamp01((globalP - 0.6) / 0.3);
    mx.save();
    mx.strokeStyle = `rgba(255,230,200,${0.6 * outA})`;
    mx.lineWidth = 2;
    drawHeartPath(mx, CX, CY, S);
    mx.stroke();
    mx.restore();
  }

  // 4) Inner specular — small white crescent, catches light
  if (t > 2.8){
    const specA = clamp01((t - 2.8) / 0.4) * (1 - clamp01((t - 8.0) / 2.0));
    mx.save();
    mx.globalCompositeOperation = 'screen';
    mx.globalAlpha = 0.45 * specA;
    mx.fillStyle = '#ffe0b0';
    mx.beginPath();
    mx.ellipse(CX - 110, CY - 120, 70, 24, -0.5, 0, Math.PI*2);
    mx.fill();
    mx.restore();
  }

  mx.restore();
}

function sampleHeartColor(d, t){
  // d in [0, ~1.05]. center = hot, edge = warm orange.
  const edge = clamp01(d / 1.05);
  // slight shimmer over time
  const sh = 0.5 + 0.5 * Math.sin(t * 4 + d * 8);
  const r = Math.round(lerp(255, 255, edge));
  const g = Math.round(lerp(45 + sh*10, 140, edge));
  const b = Math.round(lerp(85, 50, edge));
  return `rgb(${r},${g},${b})`;
}

function drawHeartPath(ctx, cx, cy, s){
  ctx.beginPath();
  const N = 180;
  for (let i = 0; i <= N; i++){
    const u = i / N;
    const p = heartPoint(u, cx, cy, s);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
}

/* ---------- shockwave rings from tap ---------- */
function drawShock(t){
  const emit = 2.35;
  const age = t - emit;
  if (age < 0 || age > 1.4) return;

  // three rings at different phases
  [0.00, 0.10, 0.22].forEach((delay, i) => {
    const a = age - delay;
    if (a < 0 || a > 1.1) return;
    const p = clamp01(a / 1.1);
    const r = easeOut(p) * (420 + i * 90);
    const alpha = Math.pow(1 - p, 1.8) * (i === 0 ? 1 : 0.6);
    mx.save();
    mx.globalCompositeOperation = 'screen';
    mx.globalAlpha = alpha * 0.55;
    mx.strokeStyle = i === 0 ? '#ff2d55' : (i === 1 ? '#ff9f43' : '#ffd43b');
    mx.lineWidth = 4 - 3*p;
    mx.beginPath(); mx.arc(CX, CY - 20, r, 0, Math.PI*2); mx.stroke();
    mx.restore();
  });

  // shock tiles — small tiles flung radially
  SHOCK_TILES.forEach(st => {
    const p = clamp01(age / 0.7);
    if (p <= 0 || p >= 1) return;
    const e = easeOut(p);
    const r = 80 + e * (360 + st.j * 140);
    const x = CX + Math.cos(st.a) * r;
    const y = CY - 20 + Math.sin(st.a) * r * 0.9;
    const alpha = (1 - p) * 0.9;
    mx.save();
    mx.globalAlpha = alpha;
    mx.fillStyle = st.j > 0.5 ? '#ff2d55' : '#ff9f43';
    mx.translate(x, y);
    mx.rotate(st.a + e * 1.8);
    const s = 10 - p * 8;
    mx.fillRect(-s/2, -s/2, s, s);
    mx.restore();
  });
}

/* ---------- spark particles ---------- */
function drawSparks(t){
  const emit = 2.45;
  const tSince = t - emit;
  if (tSince < -0.1) return;

  SPARKS.forEach((s, i) => {
    // each spark has its own small start offset
    const offset = (i / SPARKS.length) * 0.15 + s.hueMix * 0.05;
    const age = tSince - offset;
    if (age < 0 || age > s.life + 0.3) return;

    // physics: arc with gravity + air drag
    const gravity = 780;          // px/s^2
    const drag = 1.2;
    const vx0 = Math.cos(s.ang) * s.speed;
    const vy0 = -Math.abs(Math.sin(s.ang)) * s.speed * 0.85 - 120; // upward-biased
    // integrate with exponential drag
    const k = 1 - Math.exp(-drag * age);
    const x = CX + (vx0 / drag) * k;
    const y = (CY - 20) + (vy0 / drag) * k + 0.5 * gravity * age * age / s.mass;

    // life fade
    const lifeP = clamp01(age / s.life);
    const alpha = Math.pow(1 - lifeP, 1.5) * (1 - Math.exp(-age*6));
    if (alpha <= 0.01) return;

    // color cools over life: yellow → orange → red → dim
    const cool = lifeP;
    const r = Math.round(lerp(255, 180, cool));
    const g = Math.round(lerp(220 - s.hueMix*40, 40, cool));
    const b = Math.round(lerp(120, 30, cool));

    // trail length opposes velocity
    const vx = vx0 * Math.exp(-drag * age);
    const vy = vy0 * Math.exp(-drag * age) + gravity * age;
    const vmag = Math.sqrt(vx*vx + vy*vy);
    const tx = x - (vx / Math.max(vmag,1)) * s.len;
    const ty = y - (vy / Math.max(vmag,1)) * s.len;

    fg.save();
    fg.globalCompositeOperation = 'screen';
    fg.globalAlpha = alpha;
    fg.strokeStyle = `rgb(${r},${g},${b})`;
    fg.lineWidth = s.w;
    fg.lineCap = 'round';
    fg.beginPath(); fg.moveTo(tx, ty); fg.lineTo(x, y); fg.stroke();
    // hot head
    fg.globalAlpha = alpha * 0.9;
    fg.fillStyle = `rgba(255,240,${Math.round(lerp(200,120,cool))},${alpha})`;
    fg.beginPath(); fg.arc(x, y, s.w*0.9, 0, Math.PI*2); fg.fill();
    fg.restore();
  });

  // lingering embers drifting up (from 4.6 to 8.5)
  if (t > 4.6 && t < 9.5){
    const rng = mulberry32(31);
    for (let i = 0; i < 22; i++){
      const bx = lerp(CX - 280, CX + 280, rng());
      const bphase = rng() * 2;
      const by = lerp(CY + 200, CY + 340, rng()) - ((t - 4.6 + bphase) * 44) % 420;
      const a = 0.45 * Math.max(0, 1 - Math.abs(by - (CY - 100)) / 480);
      fg.save();
      fg.globalCompositeOperation = 'screen';
      fg.globalAlpha = a;
      fg.fillStyle = rng() < 0.5 ? '#ff9f43' : '#ffd43b';
      fg.beginPath(); fg.arc(bx + Math.sin((t+i)*0.8)*10, by, 1.4, 0, Math.PI*2); fg.fill();
      fg.restore();
    }
  }
}

/* ---------- combo counter ---------- */
function drawCombo(t){
  const start = 4.60;
  const settleAt = 6.30;
  if (t < start - 0.2) return;

  const globalA = clamp01((t - (start - 0.2)) / 0.3) * (1 - clamp01((t - 9.4) / 0.6));
  const xBase = CX + 340;
  const yBase = CY - 30;

  fg.save();
  fg.globalAlpha = globalA;

  // Small label "+1" that pops in first
  const plusP = kern(t, start - 0.1, 0.30, springOut);
  const plusA = plusP * (1 - kern(t, 6.0, 0.4, easeOut));
  fg.save();
  fg.translate(xBase - 40, yBase - 70);
  fg.scale(1 + 0.2*Math.sin((t-start)*8)*Math.exp(-(t-start)*3), 1);
  fg.globalAlpha = globalA * plusA;
  fg.fillStyle = '#ffd43b';
  fg.font = '700 58px "SF Pro Display", sans-serif';
  fg.textAlign = 'left';
  fg.fillText('+1', 0, 0);
  fg.restore();

  // Main number: rolls from random to 9281
  const target = '9281';
  const chars = target.split('');
  fg.font = '800 180px "SF Pro Display", sans-serif';
  fg.textAlign = 'left';
  fg.textBaseline = 'alphabetic';
  let cursorX = xBase;
  const digitW = 108;

  chars.forEach((c, i) => {
    const delay = start + 0.10 + i * 0.12;
    const { digit, settled } = rollDigit(parseInt(c, 10), t, delay, 1.15);
    const shown = Math.floor(digit);
    const off = (digit - shown) * 120;

    // clip window
    fg.save();
    fg.beginPath();
    fg.rect(cursorX, yBase - 160, digitW, 200);
    fg.clip();

    // gradient fill
    const grad = fg.createLinearGradient(0, yBase - 150, 0, yBase + 40);
    grad.addColorStop(0, '#fff2e6');
    grad.addColorStop(0.55, '#ffb070');
    grad.addColorStop(1, '#ff2d55');
    fg.fillStyle = grad;

    // draw this digit + next (above), offset by `off`
    const s1 = String(shown);
    const s2 = String((shown + 1) % 10);
    fg.fillText(s1, cursorX, yBase + off);
    fg.fillText(s2, cursorX, yBase + off - 170);

    fg.restore();

    // settled pop: slight scale bounce when digit locks
    if (settled >= 0.99 && settled - 0.01 < (1/FPS) * 2){
      // nothing per-frame; pop handled by springOut below
    }

    // thin baseline bar under each digit, fades in as settled
    fg.save();
    fg.globalAlpha = globalA * clamp01(settled - 0.6) / 0.4 * 0.5;
    fg.fillStyle = '#ff2d55';
    fg.fillRect(cursorX, yBase + 16, digitW - 10, 3);
    fg.restore();

    cursorX += digitW;
  });

  // "likes" label beneath
  const labelA = clamp01((t - 5.6) / 0.5) * globalA;
  fg.globalAlpha = labelA * 0.7;
  fg.fillStyle = '#8a8578';
  fg.font = '600 18px "SF Pro Display", sans-serif';
  fg.letterSpacing = '0.3em';
  fg.fillText('L I K E S   —   + 9 2 8 1   I N   2 . 4 s', xBase, yBase + 54);

  fg.restore();
}

/* ---------- floating "+1"s along the top of heart during combo ---------- */
function drawFloatingPlusOnes(t){
  if (t < 4.3 || t > 9.5) return;
  const rng = mulberry32(99);
  const count = 8;
  for (let i = 0; i < count; i++){
    const phase = i / count;
    const startT = 4.3 + phase * 3.6;
    const age = t - startT;
    if (age < 0 || age > 2.0) return;
    const p = clamp01(age / 2.0);
    const ex = CX + lerp(-220, 220, rng());
    const ey = CY - 180 - easeOut(p) * 220;
    const alpha = Math.sin(p * Math.PI) * 0.85;
    fg.save();
    fg.globalAlpha = alpha;
    fg.fillStyle = i % 3 === 0 ? '#ffd43b' : '#ff9f43';
    fg.font = '700 34px "SF Pro Display", sans-serif';
    fg.textAlign = 'center';
    fg.fillText('+1', ex + Math.sin((t+i)*3)*6, ey);
    fg.restore();
  }
}

/* ---------- top-center tagline that types out at settle ---------- */
function drawTagline(t){
  const start = 6.8;
  if (t < start) return;
  const a = clamp01((t - start) / 0.5) * (1 - clamp01((t - 9.6) / 0.4));
  fg.save();
  fg.globalAlpha = a * 0.85;
  fg.fillStyle = '#f5f1e8';
  fg.font = '500 26px "SF Pro Display", sans-serif';
  fg.textAlign = 'center';
  fg.letterSpacing = '0.2em';
  const phrase = 'felt, not clicked';
  const nChars = Math.floor(easeOut(clamp01((t - start) / 1.2)) * phrase.length);
  fg.fillText(phrase.slice(0, nChars).toUpperCase(), CX, 200);
  // underline
  fg.globalAlpha = a * 0.3;
  fg.fillStyle = '#ff2d55';
  fg.fillRect(CX - 120, 216, 240, 1);
  fg.restore();
}

/* ---------- idle breath: subtle heart outline breathing before anything happens ---------- */
function drawIdle(t){
  if (t > 2.0) return;
  const a = (1 - kern(t, 1.4, 0.6, easeOut)) * 0.22;
  const breath = 1 + 0.02 * Math.sin(t * 1.6);
  mx.save();
  mx.globalAlpha = a;
  mx.strokeStyle = 'rgba(255,200,180,0.5)';
  mx.lineWidth = 1.2;
  mx.translate(CX, CY); mx.scale(breath, breath); mx.translate(-CX, -CY);
  drawHeartPath(mx, CX, CY, S * 0.95);
  mx.stroke();
  mx.restore();
}

/* ---------- end-of-loop wipe: heart softly dims, sparks drift off ---------- */
function drawLoopSeam(t){
  // nothing drastic; just ensure nothing snaps at t→10
}

/* =========================================================================
   render(t)
========================================================================= */
function render(t){
  // clear layers
  mx.clearRect(0, 0, W, H);
  fg.clearRect(0, 0, W, H);
  drawBackground(t);

  drawIdle(t);
  drawHeart(t);
  drawShock(t);
  drawSparks(t);
  drawCursor(t);
  drawCombo(t);
  drawFloatingPlusOnes(t);
  drawTagline(t);
}

/* =========================================================================
   Time controller (as provided)
========================================================================= */
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t){
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop(){
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing){ let next = currentT + dt; if (next >= DURATION) next = 0; setTime(next); }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => { playing = false; playBtn.textContent = '▶'; setTime(scrubber.value / 1000 * DURATION); });
playBtn.addEventListener('click', () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; lastFrame = performance.now(); });
resetBtn.addEventListener('click', () => setTime(0));
CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});
setTime(0); requestAnimationFrame(loop);

// expose for external verification (playwright)
window.setTime = setTime;
Object.defineProperty(window, 'playing', { get(){ return playing; }, set(v){ playing = v; playBtn.textContent = playing ? '⏸' : '▶'; lastFrame = performance.now(); } });

// URL hash override: #t=2.55 → pause and jump to that time (for AI verification)
(function(){
  const m = location.hash.match(/t=([\d.]+)/);
  if (m){
    playing = false;
    playBtn.textContent = '▶';
    setTime(parseFloat(m[1]));
  }
})();
</script>
