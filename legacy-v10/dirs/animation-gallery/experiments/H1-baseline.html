<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H1-baseline · Like Burst</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0a0710; color: #fff; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .stage {
    position: relative;
    width: 1920px; height: 1080px;
    transform-origin: top left;
    background: radial-gradient(ellipse at 50% 55%, #1a0d2e 0%, #0a0710 55%, #05030a 100%);
    overflow: hidden;
    flex: none;
  }
  canvas#particles, canvas#aura {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .heart-wrap {
    position: absolute;
    left: 50%; top: 50%;
    width: 520px; height: 520px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .heart-wrap svg { width: 100%; height: 100%; overflow: visible; }
  .counter {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 88px;
    font-weight: 900;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,64,129,0.8), 0 0 60px rgba(255,64,129,0.4);
    pointer-events: none;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .combo {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #ffd84a;
    text-shadow: 0 0 24px rgba(255,216,74,0.9), 0 0 48px rgba(255,216,74,0.5);
    pointer-events: none;
    font-style: italic;
  }
  .floating {
    position: absolute;
    left: 50%; top: 50%;
    font-weight: 800;
    font-size: 36px;
    pointer-events: none;
    white-space: nowrap;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .badge-awesome {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    padding: 12px 36px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff4081 0%, #ff8a3d 100%);
    color: #fff;
    font-weight: 900;
    font-size: 40px;
    letter-spacing: 4px;
    box-shadow: 0 0 40px rgba(255,64,129,0.7), 0 0 80px rgba(255,64,129,0.3);
    pointer-events: none;
  }
  .watermark {
    position: absolute;
    top: 36px; left: 36px;
    font-size: 20px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    font-weight: 600;
  }
  .hint-tap {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .hint-tap .ring {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    border: 3px solid rgba(255,255,255,0.6);
    border-radius: 50%;
  }
  .hint-tap .dot {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
  }

  /* Timeline UI */
  .cue-row {
    position: fixed;
    left: 0; right: 0;
    bottom: 64px;
    height: 22px;
    pointer-events: none;
    z-index: 10;
  }
  .cue-mark {
    position: absolute;
    top: 0; width: 2px; height: 10px;
    background: rgba(255,255,255,0.5);
  }
  .cue-mark .lbl {
    position: absolute;
    top: 12px; left: 4px;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .tl-ui {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 56px;
    background: rgba(10,7,16,0.92);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    z-index: 11;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .tl-ui button {
    width: 36px; height: 36px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  .tl-ui button:hover { background: rgba(255,255,255,0.1); }
  .tl-ui .time {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.8);
    min-width: 110px;
  }
  .tl-ui input[type=range] {
    flex: 1;
    accent-color: #ff4081;
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="watermark">NF · LIKE-BURST · H1</div>

    <canvas id="aura" width="1920" height="1080"></canvas>

    <div class="hint-tap" id="hintTap">
      <div class="ring" id="hintRing"></div>
      <div class="dot" id="hintDot"></div>
    </div>

    <div class="heart-wrap" id="heartWrap">
      <svg viewBox="-260 -260 520 520" id="heartSvg">
        <defs>
          <radialGradient id="heartGrad" cx="0" cy="-40" r="240" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffb3c8"/>
            <stop offset="45%" stop-color="#ff4081"/>
            <stop offset="100%" stop-color="#c2185b"/>
          </radialGradient>
          <radialGradient id="heartGlow" cx="0" cy="0" r="260" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="rgba(255,64,129,0.9)"/>
            <stop offset="60%" stop-color="rgba(255,64,129,0.15)"/>
            <stop offset="100%" stop-color="rgba(255,64,129,0)"/>
          </radialGradient>
          <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4"/>
          </filter>
        </defs>
        <!-- glow halo -->
        <circle id="haloBig" cx="0" cy="0" r="260" fill="url(#heartGlow)"/>
        <!-- shockwave rings -->
        <circle id="ring1" cx="0" cy="0" r="10" fill="none" stroke="#ff4081" stroke-width="6"/>
        <circle id="ring2" cx="0" cy="0" r="10" fill="none" stroke="#ffd84a" stroke-width="4"/>
        <circle id="ring3" cx="0" cy="0" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
        <!-- main heart -->
        <g id="heartMain">
          <path id="heartPath"
                d="M 0 160
                   C -90 110, -200 40, -200 -50
                   C -200 -130, -140 -180, -80 -180
                   C -30 -180, 0 -140, 0 -100
                   C 0 -140, 30 -180, 80 -180
                   C 140 -180, 200 -130, 200 -50
                   C 200 40, 90 110, 0 160 Z"
                fill="url(#heartGrad)"
                stroke="#fff"
                stroke-width="3"/>
          <!-- shine highlight -->
          <ellipse id="heartShine" cx="-60" cy="-90" rx="40" ry="24" fill="rgba(255,255,255,0.55)" transform="rotate(-30 -60 -90)"/>
        </g>
      </svg>
    </div>

    <canvas id="particles" width="1920" height="1080"></canvas>

    <div class="counter" id="counter">0</div>
    <div class="combo" id="combo">COMBO x1</div>
    <div class="badge-awesome" id="badge">AWESOME!</div>

    <div class="cue-row" id="cueRow"></div>
    <div class="tl-ui">
      <button id="playBtn">⏸</button>
      <button id="resetBtn">↺</button>
      <span class="time" id="timeLabel">0.00 / 10.00s</span>
      <input type="range" id="scrubber" min="0" max="1000" value="0">
      <span class="time" id="frameLabel" style="min-width:110px;text-align:right">frame 0 / 300</span>
    </div>
  </div>

<script>
'use strict';

// ============ fit stage to viewport ============
const stageEl = document.getElementById('stage');
function fitStage() {
  const vw = window.innerWidth;
  const vh = window.innerHeight - 56 - 22;
  const scale = Math.min(vw / 1920, vh / 1080);
  stageEl.style.transform = `scale(${scale})`;
  // center
  const sw = 1920 * scale, sh = 1080 * scale;
  stageEl.style.position = 'absolute';
  stageEl.style.left = ((vw - sw) / 2) + 'px';
  stageEl.style.top = Math.max(0, (vh - sh) / 2) + 'px';
}
window.addEventListener('resize', fitStage);

// ============ constants & helpers ============
const DURATION = 10.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = x => 1 - Math.pow(1 - x, 3);
const easeOutQuint = x => 1 - Math.pow(1 - x, 5);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const springOut = x => { const c = clamp01(x); return c===0||c===1 ? c : 1 - Math.exp(-6*c)*Math.cos(9*c); };
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));
const osc = (t, period) => Math.sin(t / period * Math.PI * 2);

// seeded RNG
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let r = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

// ============ cues ============
const CUES = [
  { t: 0.0,  label: 'Idle · finger hover' },
  { t: 1.1,  label: 'Tap 1 · heart pop' },
  { t: 2.6,  label: 'Tap 2 · particles' },
  { t: 4.0,  label: 'Tap 3 · combo build' },
  { t: 5.6,  label: 'COMBO x5 · AWESOME' },
  { t: 7.2,  label: 'Final burst' },
  { t: 8.6,  label: 'Settle · afterglow' },
];

// Tap events: each tap triggers a burst at time t
const TAPS = [
  { t: 1.10, strength: 1.00 },
  { t: 2.60, strength: 1.05 },
  { t: 4.00, strength: 1.10 },
  { t: 4.60, strength: 1.15 },
  { t: 5.10, strength: 1.20 },
  { t: 5.60, strength: 1.35 },
  { t: 7.20, strength: 1.50 },
];
// rapid taps 4.0 - 5.6 for combo effect
const QUICK_TAPS_BETWEEN = 5.1;

// ============ particles (deterministic) ============
// pre-generate per-tap particle sets, each seeded by tap index
const PARTICLES_PER_TAP = 38;
const TAP_PARTICLES = TAPS.map((tap, i) => {
  const rng = mulberry32(1000 + i * 17);
  const arr = [];
  for (let k = 0; k < PARTICLES_PER_TAP; k++) {
    const angle = rng() * Math.PI * 2;
    const speed = 380 + rng() * 520;   // px/sec
    const life = 0.9 + rng() * 0.7;    // seconds
    const size = 6 + rng() * 14;
    const gravity = 160 + rng() * 120;
    // color palette: pink/yellow/white
    const pick = rng();
    let hue, sat;
    if (pick < 0.45) { hue = 330 + rng() * 20; sat = 90; }       // pink
    else if (pick < 0.75) { hue = 45 + rng() * 12; sat = 95; }   // yellow
    else { hue = 0; sat = 0; }                                    // white
    const isHeart = rng() < 0.28;  // some particles are mini hearts
    arr.push({ angle, speed, life, size, gravity, hue, sat, isHeart, spin: (rng()-0.5) * 8 });
  }
  return arr;
});

// sparkle orbs that linger
const SPARKLES = (() => {
  const rng = mulberry32(31337);
  const arr = [];
  for (let i = 0; i < 26; i++) {
    arr.push({
      baseAngle: rng() * Math.PI * 2,
      radius: 120 + rng() * 220,
      speed: 0.2 + rng() * 0.6,
      phase: rng() * Math.PI * 2,
      size: 2 + rng() * 4,
      hue: rng() < 0.5 ? 335 : 50,
    });
  }
  return arr;
})();

// floating text emojis rising
const FLOATING_TEXTS = [
  { t: 1.25, text: '❤', color: '#ff4081', dx: -140, dy: -40 },
  { t: 1.30, text: '+1', color: '#fff',    dx:  120, dy: -20 },
  { t: 2.70, text: '❤', color: '#ff79a8', dx:  150, dy: -60 },
  { t: 2.78, text: '+1', color: '#ffd84a', dx: -170, dy: -10 },
  { t: 4.05, text: '💖', color: '#fff',    dx:  -80, dy: -30 },
  { t: 4.12, text: '+1', color: '#ff4081', dx:  180, dy: -50 },
  { t: 4.65, text: '✨', color: '#ffd84a', dx:  -30, dy:   0 },
  { t: 4.72, text: '+1', color: '#fff',    dx: -200, dy: -30 },
  { t: 5.15, text: '❤', color: '#ff4081', dx:  200, dy: -40 },
  { t: 5.22, text: '🔥', color: '#ffa030', dx: -100, dy: -20 },
  { t: 5.65, text: 'x5!', color: '#ffd84a', dx:   60, dy: -80 },
  { t: 5.70, text: '❤❤❤', color: '#ff4081', dx: -180, dy: -30 },
  { t: 7.25, text: '💥', color: '#ffa030', dx:    0, dy: -40 },
  { t: 7.30, text: '+9', color: '#fff',    dx:  160, dy:   0 },
  { t: 7.35, text: '+9', color: '#fff',    dx: -160, dy:  10 },
];

// ensure floating layer (we use absolutely positioned spans created dynamically per render)
const stage = document.getElementById('stage');
const floatLayer = document.createElement('div');
floatLayer.style.position = 'absolute';
floatLayer.style.inset = '0';
floatLayer.style.pointerEvents = 'none';
stage.insertBefore(floatLayer, document.getElementById('particles'));

const floatSpans = FLOATING_TEXTS.map(ft => {
  const s = document.createElement('div');
  s.className = 'floating';
  s.textContent = ft.text;
  s.style.color = ft.color;
  s.style.textShadow = `0 0 18px ${ft.color}, 0 0 36px ${ft.color}`;
  floatLayer.appendChild(s);
  return s;
});

// ============ canvases ============
const pcv = document.getElementById('particles');
const pctx = pcv.getContext('2d');
const acv = document.getElementById('aura');
const actx = acv.getContext('2d');

// ============ state lookups ============
// tap index at time t — returns last tap that occurred and time since
function currentTapInfo(t) {
  let lastIdx = -1;
  for (let i = 0; i < TAPS.length; i++) {
    if (t >= TAPS[i].t) lastIdx = i; else break;
  }
  return lastIdx;
}

// like count at time t
function likeCountAt(t) {
  let n = 0;
  for (let i = 0; i < TAPS.length; i++) {
    if (t >= TAPS[i].t) {
      // tap 5.1 contributes +1 but also triggers combo x5 visual boost later
      n += 1;
    }
  }
  return n;
}

// combo multiplier: builds during rapid taps, decays
function comboAt(t) {
  // count taps in the last 1.8s window
  let c = 0;
  for (let i = 0; i < TAPS.length; i++) {
    const dt = t - TAPS[i].t;
    if (dt >= 0 && dt < 1.8) c++;
  }
  return c;
}

// ============ DOM element refs ============
const heartWrap = document.getElementById('heartWrap');
const heartMain = document.getElementById('heartMain');
const heartShine = document.getElementById('heartShine');
const ring1 = document.getElementById('ring1');
const ring2 = document.getElementById('ring2');
const ring3 = document.getElementById('ring3');
const haloBig = document.getElementById('haloBig');
const counterEl = document.getElementById('counter');
const comboEl = document.getElementById('combo');
const badgeEl = document.getElementById('badge');
const hintTap = document.getElementById('hintTap');
const hintRing = document.getElementById('hintRing');
const hintDot = document.getElementById('hintDot');

// ============ render(t) ============
function render(t) {
  // ---- background aura pulse ----
  actx.clearRect(0, 0, 1920, 1080);
  // ambient subtle pulse
  const ambientPulse = 0.15 + 0.05 * Math.sin(t * 1.2);
  // tap-triggered aura wash
  let auraBoost = 0;
  for (let i = 0; i < TAPS.length; i++) {
    const dt = t - TAPS[i].t;
    if (dt >= 0 && dt < 1.2) {
      auraBoost = Math.max(auraBoost, (1 - dt / 1.2) * TAPS[i].strength);
    }
  }
  const g = actx.createRadialGradient(960, 540, 80, 960, 540, 1100);
  g.addColorStop(0, `rgba(255, 64, 129, ${ambientPulse + auraBoost * 0.55})`);
  g.addColorStop(0.35, `rgba(200, 40, 140, ${ambientPulse * 0.5 + auraBoost * 0.25})`);
  g.addColorStop(1, 'rgba(10,7,16,0)');
  actx.fillStyle = g;
  actx.fillRect(0, 0, 1920, 1080);

  // vignette corners dim
  actx.fillStyle = `rgba(0,0,0,${0.25 + auraBoost * 0.1})`;
  actx.fillRect(0, 0, 1920, 1080);

  // ---- hint finger tap (only in idle section 0..1.1) ----
  const idleEnd = 1.10;
  if (t < idleEnd + 0.3) {
    const vis = t < idleEnd - 0.05 ? 1 : Math.max(0, 1 - (t - (idleEnd - 0.05)) / 0.35);
    hintTap.style.opacity = vis;
    // pulsing ring every 0.6s
    const phase = (t % 0.6) / 0.6;
    const ringSize = lerp(40, 180, phase);
    const ringAlpha = (1 - phase) * 0.85 * vis;
    hintRing.style.width = hintRing.style.height = ringSize + 'px';
    hintRing.style.opacity = ringAlpha;
    // dot pulse
    const dotScale = 1 - phase * 0.25;
    hintDot.style.transform = `translate(-50%, -50%) scale(${dotScale})`;
  } else {
    hintTap.style.opacity = 0;
  }

  // ---- heart main transform ----
  // each tap causes a squash-stretch spring bounce
  let heartScale = 1.0;
  let heartRot = 0;
  let heartGlowIntensity = 0;
  for (let i = 0; i < TAPS.length; i++) {
    const dt = t - TAPS[i].t;
    if (dt >= -0.08 && dt < 1.2) {
      // pre-tap tiny anticipation shrink
      if (dt < 0) {
        heartScale = lerp(heartScale, 0.88, clamp01((dt + 0.08) / 0.08));
      } else {
        // spring bounce: 0..0.08 scale up, then oscillate decay
        const s = dt / 0.8;
        const env = Math.exp(-dt * 4);
        const amp = 0.55 * TAPS[i].strength;
        const wave = Math.sin(dt * 22) * env;
        const up = springOut(Math.min(1, dt / 0.18));
        heartScale = Math.max(heartScale, 1 + up * amp * 0.5 + wave * amp * 0.4);
        heartRot += Math.sin(dt * 28) * env * 6 * (i % 2 ? 1 : -1);
        heartGlowIntensity = Math.max(heartGlowIntensity, (1 - clamp01(dt / 1.0)) * TAPS[i].strength);
      }
    }
  }
  // heartbeat subtle always-on
  const beatPeriod = 0.8;
  const beatPhase = (t % beatPeriod) / beatPeriod;
  const beatEnv = Math.exp(-beatPhase * 4) * 0.05;
  heartScale += beatEnv;

  // combo scale amp
  const combo = comboAt(t);
  const comboScale = 1 + Math.min(combo, 6) * 0.015;
  heartScale *= comboScale;

  heartMain.setAttribute('transform', `scale(${heartScale}) rotate(${heartRot})`);

  // shine highlight drift
  const shineX = -60 + Math.sin(t * 1.5) * 20;
  const shineY = -90 + Math.cos(t * 1.2) * 14;
  heartShine.setAttribute('cx', shineX);
  heartShine.setAttribute('cy', shineY);

  // halo glow
  const haloR = 180 + heartGlowIntensity * 180 + beatEnv * 40;
  haloBig.setAttribute('r', haloR);
  haloBig.setAttribute('opacity', 0.35 + heartGlowIntensity * 0.55);

  // shockwave rings — each tap spawns 3 rings
  const rings = [ring1, ring2, ring3];
  const ringDelays = [0, 0.08, 0.16];
  for (let r = 0; r < 3; r++) {
    let bestR = 10;
    let bestOp = 0;
    let bestWidth = 6 - r * 2;
    for (let i = 0; i < TAPS.length; i++) {
      const dt = t - TAPS[i].t - ringDelays[r];
      if (dt > 0 && dt < 0.9) {
        const p = dt / 0.9;
        const er = easeOutQuint(p);
        const rr = lerp(30, 360 + TAPS[i].strength * 80, er);
        const op = (1 - p) * 0.85;
        if (rr > bestR && op > 0) {
          bestR = rr;
          bestOp = op;
          bestWidth = (6 - r * 2) * (1 - p * 0.6);
        }
      }
    }
    rings[r].setAttribute('r', bestR);
    rings[r].setAttribute('opacity', bestOp);
    rings[r].setAttribute('stroke-width', Math.max(0.5, bestWidth));
  }

  // ---- particles ----
  pctx.clearRect(0, 0, 1920, 1080);
  pctx.globalCompositeOperation = 'lighter';
  const cx = 960, cy = 540;

  for (let i = 0; i < TAPS.length; i++) {
    const dt = t - TAPS[i].t;
    const set = TAP_PARTICLES[i];
    for (let k = 0; k < set.length; k++) {
      const p = set[k];
      if (dt < 0 || dt > p.life) continue;
      const lt = dt;
      const x = cx + Math.cos(p.angle) * p.speed * lt * (1 - lt / (p.life * 2));
      const y = cy + Math.sin(p.angle) * p.speed * lt * (1 - lt / (p.life * 2)) + 0.5 * p.gravity * lt * lt;
      const lifeN = lt / p.life;
      const alpha = (1 - lifeN) * 0.95;
      const size = p.size * (1 - lifeN * 0.5) * TAPS[i].strength;
      const color = `hsla(${p.hue}, ${p.sat}%, ${60 + (1 - lifeN) * 20}%, ${alpha})`;

      if (p.isHeart) {
        // draw mini heart shape
        pctx.save();
        pctx.translate(x, y);
        pctx.rotate(p.spin * lt);
        pctx.scale(size / 14, size / 14);
        pctx.fillStyle = color;
        pctx.beginPath();
        pctx.moveTo(0, 6);
        pctx.bezierCurveTo(-10, 0, -14, -10, -7, -14);
        pctx.bezierCurveTo(-3, -16, 0, -12, 0, -8);
        pctx.bezierCurveTo(0, -12, 3, -16, 7, -14);
        pctx.bezierCurveTo(14, -10, 10, 0, 0, 6);
        pctx.closePath();
        pctx.fill();
        pctx.restore();
      } else {
        // glowing dot
        const grd = pctx.createRadialGradient(x, y, 0, x, y, size * 2.2);
        grd.addColorStop(0, color);
        grd.addColorStop(0.5, `hsla(${p.hue}, ${p.sat}%, 60%, ${alpha * 0.35})`);
        grd.addColorStop(1, `hsla(${p.hue}, ${p.sat}%, 60%, 0)`);
        pctx.fillStyle = grd;
        pctx.beginPath();
        pctx.arc(x, y, size * 2.2, 0, Math.PI * 2);
        pctx.fill();
        // solid core
        pctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, 85%, ${alpha})`;
        pctx.beginPath();
        pctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
        pctx.fill();
      }
    }
  }

  // lingering orbit sparkles (visible after first tap)
  if (t > TAPS[0].t) {
    const sparkleFade = clamp01((t - TAPS[0].t) / 0.5) * (t > 8.6 ? Math.max(0, 1 - (t - 8.6) / 1.4) : 1);
    for (let i = 0; i < SPARKLES.length; i++) {
      const s = SPARKLES[i];
      const a = s.baseAngle + t * s.speed;
      const rr = s.radius + Math.sin(t * 1.2 + s.phase) * 30;
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr * 0.75;
      const tw = 0.5 + 0.5 * Math.sin(t * 4 + s.phase * 3);
      const size = s.size * (0.6 + tw * 0.8);
      const alpha = 0.7 * tw * sparkleFade;
      pctx.fillStyle = `hsla(${s.hue}, 90%, 75%, ${alpha})`;
      pctx.beginPath();
      pctx.arc(x, y, size, 0, Math.PI * 2);
      pctx.fill();
      // cross sparkle
      pctx.strokeStyle = `hsla(${s.hue}, 90%, 85%, ${alpha * 0.8})`;
      pctx.lineWidth = 1;
      pctx.beginPath();
      pctx.moveTo(x - size * 3, y); pctx.lineTo(x + size * 3, y);
      pctx.moveTo(x, y - size * 3); pctx.lineTo(x, y + size * 3);
      pctx.stroke();
    }
  }
  pctx.globalCompositeOperation = 'source-over';

  // ---- counter number ----
  const likes = likeCountAt(t);
  // visible from first tap onward; position upper-right-ish of heart
  if (likes > 0) {
    // punch scale each tap
    let punch = 1.0;
    for (let i = 0; i < TAPS.length; i++) {
      const dt = t - TAPS[i].t;
      if (dt >= 0 && dt < 0.6) {
        const p = dt / 0.6;
        punch = Math.max(punch, 1 + (1 - p) * 0.5 * TAPS[i].strength);
      }
    }
    counterEl.textContent = String(likes);
    counterEl.style.opacity = Math.min(1, (t - TAPS[0].t) / 0.2);
    // position to right of heart
    const tx = 240;  // px right from center
    const ty = -260; // px above center
    counterEl.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${punch})`;
    // color shifts with combo
    if (combo >= 3) {
      counterEl.style.color = '#ffd84a';
      counterEl.style.textShadow = '0 0 30px rgba(255,216,74,0.9), 0 0 60px rgba(255,216,74,0.5)';
    } else {
      counterEl.style.color = '#fff';
      counterEl.style.textShadow = '0 0 30px rgba(255,64,129,0.8), 0 0 60px rgba(255,64,129,0.4)';
    }
  } else {
    counterEl.style.opacity = 0;
  }

  // ---- combo text ----
  if (combo >= 2) {
    comboEl.textContent = 'COMBO x' + combo;
    const shownFor = 0.9;
    // find last tap to time appearance
    const lastIdx = currentTapInfo(t);
    const lastDt = lastIdx >= 0 ? t - TAPS[lastIdx].t : 99;
    const op = Math.max(0, Math.min(1, 1 - lastDt / shownFor));
    comboEl.style.opacity = op;
    const scl = 1 + (1 - op) * 0.3 + lerp(0, 0.2, clamp01(lastDt / 0.15));
    const shake = Math.sin(lastDt * 40) * Math.exp(-lastDt * 6) * 6;
    comboEl.style.transform = `translate(calc(-50% + ${shake}px), calc(-50% + 150px)) scale(${scl})`;
    comboEl.style.color = combo >= 5 ? '#ff4081' : '#ffd84a';
  } else {
    comboEl.style.opacity = 0;
  }

  // ---- AWESOME badge (combo x5+) ----
  let badgeVis = 0;
  let badgeScale = 0.5;
  // triggered at the x5 moment (when combo first hits 5, which is around TAPS[5].t = 5.6)
  const trig = 5.60;
  const dtB = t - trig;
  if (dtB > -0.05 && dtB < 1.8) {
    if (dtB < 0) {
      badgeVis = 0;
    } else if (dtB < 0.3) {
      badgeVis = 1;
      badgeScale = springOut(dtB / 0.3) * 1.2;
    } else if (dtB < 1.4) {
      badgeVis = 1;
      const holdP = (dtB - 0.3) / 1.1;
      badgeScale = 1.0 + Math.sin(holdP * Math.PI * 4) * 0.04;
    } else {
      const fadeP = (dtB - 1.4) / 0.4;
      badgeVis = 1 - fadeP;
      badgeScale = 1.0 + fadeP * 0.3;
    }
  }
  // also tiny re-show at final burst 7.2
  const dtB2 = t - 7.2;
  if (dtB2 > 0 && dtB2 < 1.2) {
    const p = dtB2 / 1.2;
    badgeVis = Math.max(badgeVis, 1 - p);
    badgeScale = Math.max(badgeScale, springOut(Math.min(1, dtB2 / 0.25)) * 1.3);
    badgeEl.textContent = 'LEGEND!';
  } else if (dtB >= 0 && dtB < 1.8) {
    badgeEl.textContent = 'AWESOME!';
  }
  badgeEl.style.opacity = badgeVis;
  const badgeTy = -180 + (1 - Math.min(1, dtB < 0 ? 0 : dtB * 2)) * 30;
  const rotBadge = Math.sin(t * 3) * 2;
  badgeEl.style.transform = `translate(-50%, calc(-50% + ${badgeTy}px)) scale(${badgeScale}) rotate(${rotBadge}deg)`;

  // ---- floating texts ----
  for (let i = 0; i < FLOATING_TEXTS.length; i++) {
    const ft = FLOATING_TEXTS[i];
    const dt = t - ft.t;
    const dur = 1.4;
    if (dt < 0 || dt > dur) {
      floatSpans[i].style.opacity = 0;
      continue;
    }
    const p = dt / dur;
    const y = ft.dy - easeOut(p) * 220;
    const x = ft.dx + Math.sin(dt * 4 + i) * 20;
    const op = p < 0.15 ? p / 0.15 : (p > 0.75 ? 1 - (p - 0.75) / 0.25 : 1);
    const sc = lerp(0.6, 1.2, Math.min(1, p * 3)) * (1 - p * 0.15);
    const rot = Math.sin(dt * 3 + i) * 8;
    floatSpans[i].style.opacity = op;
    floatSpans[i].style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${sc}) rotate(${rot}deg)`;
  }

  // ---- final settle (8.6+): heart gently pulses, counter stays ----
  // (already handled by continuing beat pulse and decaying tap states)
}

// ============ timeline controller ============
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) { let next = currentT + dt; if (next >= DURATION) next = 0; setTime(next); }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => { playing = false; playBtn.textContent = '▶'; setTime(scrubber.value / 1000 * DURATION); });
playBtn.addEventListener('click', () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; lastFrame = performance.now(); });
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});

fitStage();
setTime(0);
requestAnimationFrame(loop);
</script>
</body>
