<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H2 · Being Seen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0a0710; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    background:
      radial-gradient(ellipse 1200px 800px at 50% 60%, #1a0a20 0%, #0a0710 60%, #050308 100%);
    transform-origin: 0 0;
  }
  canvas.layer {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  /* photo surface — the "post" being liked */
  .photo {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 540px; height: 720px;
    border-radius: 36px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
      radial-gradient(ellipse 400px 600px at 30% 30%, #3a1a4a 0%, #1a0a25 55%, #0c0612 100%);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .photo::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 35%, rgba(255, 200, 220, 0.18) 0%, transparent 40%),
      radial-gradient(circle at 70% 75%, rgba(180, 140, 255, 0.12) 0%, transparent 45%);
  }
  .photo-label {
    position: absolute;
    left: 0; right: 0; bottom: 40px;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 14px;
    letter-spacing: 6px;
    font-weight: 300;
    text-transform: uppercase;
  }

  /* timeline UI */
  .cue-row {
    position: fixed;
    left: 0; right: 0; top: 0;
    height: 22px;
    background: rgba(0,0,0,0.55);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 50;
  }
  .cue-mark {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,100,160,0.6);
  }
  .cue-mark .lbl {
    position: absolute;
    top: 2px; left: 4px;
    font-size: 10px;
    color: rgba(255,200,220,0.75);
    white-space: nowrap;
    font-family: ui-monospace, Menlo, monospace;
    letter-spacing: 0.5px;
  }
  .tl-ui {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 54px;
    background: rgba(10,7,16,0.92);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    z-index: 50;
    backdrop-filter: blur(8px);
  }
  .tl-ui button {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
  }
  .tl-ui button:hover { background: rgba(255,100,160,0.15); border-color: rgba(255,100,160,0.4); }
  .tl-ui .time {
    color: rgba(255,255,255,0.8);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    min-width: 120px;
  }
  .tl-ui input[type="range"] {
    flex: 1;
    accent-color: #ff5580;
    height: 4px;
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="photo">
    <div class="photo-label">a moment · shared</div>
  </div>
  <canvas class="layer" id="cv" width="1920" height="1080"></canvas>
</div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 10.00s</span>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <span class="time" id="frameLabel" style="min-width:120px;text-align:right">frame 0 / 300</span>
</div>

<script>
// ---------- stage scaling ----------
function fitStage() {
  const stage = document.getElementById('stage');
  const sx = window.innerWidth / 1920;
  const sy = (window.innerHeight - 54 - 22) / 1080;
  const s = Math.min(sx, sy);
  stage.style.transform = `translate(${(window.innerWidth - 1920*s)/2}px, ${22 + (window.innerHeight - 22 - 54 - 1080*s)/2}px) scale(${s})`;
}
window.addEventListener('resize', fitStage);
fitStage();

// ---------- timeline constants ----------
const DURATION = 10.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = x => 1 - Math.pow(1 - x, 3);
const easeOutQuint = x => 1 - Math.pow(1 - x, 5);
const easeOutBack = x => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); };
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const springOut = x => { const c = clamp01(x); return c===0||c===1 ? c : 1 - Math.exp(-5.5*c)*Math.cos(8.5*c); };
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));

const CUES = [
  { t: 0.0, label: 'breath' },
  { t: 1.4, label: 'approach' },
  { t: 2.0, label: 'touch' },
  { t: 2.15, label: 'heart' },
  { t: 2.6, label: 'bloom' },
  { t: 4.2, label: '+1' },
  { t: 6.0, label: 'combo' },
  { t: 8.2, label: 'linger' },
];

// ---------- seeded rng ----------
function rng(seed) {
  let s = seed | 0;
  return () => { s = (s * 1664525 + 1013904223) | 0; return ((s >>> 0) / 4294967296); };
}

// ---------- particle seeds (generated ONCE, not per frame) ----------
const PARTICLE_COUNT = 52;
const SEED_BURST = (() => {
  const r = rng(73);
  const arr = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const angle = (i / PARTICLE_COUNT) * Math.PI * 2 + r() * 0.6;
    const speed = 180 + r() * 340;
    const life = 1.1 + r() * 1.3;
    const size = 3 + r() * 7;
    const hue = 330 + r() * 40 - 20; // pink→magenta
    const drag = 0.85 + r() * 0.1;
    const wobbleFreq = 3 + r() * 4;
    const wobbleAmp = 10 + r() * 30;
    const delay = r() * 0.12;
    const kind = r() < 0.25 ? 'heart' : (r() < 0.5 ? 'spark' : 'dot');
    arr.push({ angle, speed, life, size, hue, drag, wobbleFreq, wobbleAmp, delay, kind });
  }
  return arr;
})();

const COMBO_HEARTS = (() => {
  const r = rng(211);
  const arr = [];
  for (let i = 0; i < 14; i++) {
    arr.push({
      birth: 5.5 + i * 0.22 + r() * 0.08,
      x: (r() - 0.5) * 520,      // offset from photo center
      ySeed: r(),
      life: 2.4 + r() * 1.0,
      size: 22 + r() * 28,
      hue: 340 + r() * 25,
      sway: (r() - 0.5) * 60,
      wobbleFreq: 1.8 + r() * 1.6,
    });
  }
  return arr;
})();

const AMBIENT_DOTS = (() => {
  const r = rng(919);
  const arr = [];
  for (let i = 0; i < 70; i++) {
    arr.push({
      x: r(),
      y: r(),
      size: 0.5 + r() * 1.8,
      phase: r() * Math.PI * 2,
      speed: 0.3 + r() * 0.8,
      hue: 300 + r() * 60,
    });
  }
  return arr;
})();

// ---------- canvas ----------
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 1920, H = 1080;
const CX = W / 2, CY = H / 2;

// ---------- heart path ----------
function heartPath(x, y, size, rot = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(size, size);
  ctx.beginPath();
  // parametric heart — smooth, no "kid's drawing"
  const STEPS = 64;
  for (let i = 0; i <= STEPS; i++) {
    const t = (i / STEPS) * Math.PI * 2;
    const hx = 16 * Math.pow(Math.sin(t), 3);
    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  ctx.restore();
}

// ---------- rendering ----------
function render(t) {
  ctx.clearRect(0, 0, W, H);

  // === layer 0: ambient breathing dots (always present) ===
  for (const d of AMBIENT_DOTS) {
    const phase = d.phase + t * d.speed;
    const tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(phase));
    const x = d.x * W, y = d.y * H;
    ctx.globalAlpha = 0.18 * tw;
    ctx.fillStyle = `hsl(${d.hue}, 70%, 75%)`;
    ctx.beginPath();
    ctx.arc(x, y, d.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === layer 1: approach — the finger/intent approaches from below ===
  // a soft vertical light rises from below the photo before impact
  const approachK = kern(t, 1.2, 0.85, easeOutQuint);
  const approachFade = 1 - kern(t, 2.05, 0.25, easeOut);
  const approachAlpha = approachK * approachFade;
  if (approachAlpha > 0.001) {
    const gy = CY + 420 - approachK * 180;
    const grad = ctx.createRadialGradient(CX, gy, 10, CX, gy, 300);
    grad.addColorStop(0, `rgba(255, 130, 180, ${0.55 * approachAlpha})`);
    grad.addColorStop(1, 'rgba(255, 130, 180, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(CX - 320, gy - 320, 640, 640);
  }

  // === layer 2: touch ring — the moment of contact ===
  // a compressing/expanding ring at t=2.0, the "tap"
  const touchBase = 2.0;
  for (let i = 0; i < 2; i++) {
    const s = touchBase + i * 0.08;
    const k = kern(t, s, 0.9, easeOutQuint);
    if (k > 0 && k < 1) {
      const r = lerp(20, 260 + i * 40, k);
      const alpha = (1 - k) * 0.55;
      ctx.strokeStyle = `hsla(${345 + i*10}, 90%, 70%, ${alpha})`;
      ctx.lineWidth = lerp(6, 1, k);
      ctx.beginPath();
      ctx.arc(CX, CY, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // === layer 3: the heart itself — the emotional core ===
  // anticipation (tiny squash) → pop → settle → beat → linger
  const heartBirth = 2.05;
  const heartAppear = kern(t, heartBirth, 0.45, easeOutBack);
  if (heartAppear > 0.001) {
    // heartbeat after settle
    const beatT = Math.max(0, t - 2.7);
    const beat1 = Math.exp(-3.5 * (beatT)) * Math.sin(beatT * 18);
    const beat2 = Math.exp(-2.2 * Math.max(0, beatT - 0.9)) * Math.sin((beatT - 0.9) * 14) * (beatT > 0.9 ? 1 : 0);
    const pulse = 1 + (beat1 + beat2 * 0.6) * 0.08;

    // lingering gentle breath at the end
    const linger = kern(t, 7.5, 2.3, easeInOut);
    const breath = 1 + Math.sin(t * 2.2) * 0.025 * linger;

    const baseSize = 8.5;
    const size = baseSize * heartAppear * pulse * breath;

    // slight upward drift during linger
    const drift = linger * -40;

    // outer glow
    ctx.save();
    const glowAlpha = heartAppear * (0.55 + 0.15 * Math.sin(t * 3));
    ctx.shadowColor = `rgba(255, 80, 140, ${glowAlpha})`;
    ctx.shadowBlur = 50 + 30 * Math.sin(t * 4) * heartAppear;

    // gradient fill
    const grad = ctx.createLinearGradient(CX - 100, CY - 120 + drift, CX + 100, CY + 120 + drift);
    grad.addColorStop(0, '#ff4a80');
    grad.addColorStop(0.55, '#ff5e9a');
    grad.addColorStop(1, '#ff87b8');
    ctx.fillStyle = grad;
    heartPath(CX, CY + drift, size, 0);
    ctx.fill();

    // highlight shine — moves with the beat
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.45 * heartAppear;
    const shineGrad = ctx.createRadialGradient(
      CX - size * 4, CY - size * 6 + drift, 2,
      CX - size * 4, CY - size * 6 + drift, size * 7
    );
    shineGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
    shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shineGrad;
    heartPath(CX, CY + drift, size, 0);
    ctx.fill();
    ctx.restore();
  }

  // === layer 4: burst particles ===
  const burstStart = 2.2;
  for (const p of SEED_BURST) {
    const localT = t - burstStart - p.delay;
    if (localT <= 0 || localT > p.life) continue;

    const lifeK = localT / p.life;
    // velocity with drag
    const travel = p.speed * localT * (1 - Math.pow(p.drag, localT * 30));
    const wobble = Math.sin(localT * p.wobbleFreq) * p.wobbleAmp * lifeK;

    const x = CX + Math.cos(p.angle) * travel + Math.sin(p.angle * 2) * wobble * 0.5;
    // gravity — slight downward pull in late life (or up for hearts — they float)
    const gy = p.kind === 'heart' ? -40 * lifeK * lifeK : 80 * lifeK * lifeK;
    const y = CY + Math.sin(p.angle) * travel + Math.cos(p.angle * 2) * wobble * 0.5 + gy;

    const alpha = (1 - Math.pow(lifeK, 2.2)) * (lifeK < 0.1 ? lifeK * 10 : 1);
    if (alpha < 0.01) continue;

    if (p.kind === 'heart') {
      const sz = p.size * 0.08 * (1 - lifeK * 0.4);
      ctx.save();
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = `hsl(${p.hue}, 90%, 65%)`;
      ctx.shadowColor = `hsla(${p.hue}, 90%, 70%, 0.7)`;
      ctx.shadowBlur = 12;
      heartPath(x, y, sz, Math.sin(localT * 2 + p.angle) * 0.3);
      ctx.fill();
      ctx.restore();
    } else if (p.kind === 'spark') {
      // streak — tangent to direction
      const dirX = Math.cos(p.angle), dirY = Math.sin(p.angle);
      const len = p.size * 2.4 * (1 - lifeK * 0.5);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = `hsl(${p.hue}, 95%, 75%)`;
      ctx.lineWidth = 1.6;
      ctx.shadowColor = `hsla(${p.hue}, 95%, 75%, 0.9)`;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(x - dirX * len, y - dirY * len);
      ctx.lineTo(x + dirX * 2, y + dirY * 2);
      ctx.stroke();
      ctx.restore();
    } else {
      const sz = p.size * (1 - lifeK * 0.4);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${p.hue}, 90%, 72%)`;
      ctx.shadowColor = `hsla(${p.hue}, 90%, 72%, 0.8)`;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // === layer 5: count up "+1" ===
  // one number rises then lingers — understated, not blinking
  const plusBirth = 4.2;
  const plusK = kern(t, plusBirth, 0.6, easeOutBack);
  if (plusK > 0.001 && t < 9.5) {
    const plusFade = 1 - kern(t, 8.4, 1.1, easeOut);
    const rise = kern(t, plusBirth, 2.5, easeOutQuint);
    const px = CX + 290;
    const py = CY - 120 - rise * 70;
    const scale = plusK;

    ctx.save();
    ctx.globalAlpha = plusK * plusFade;
    ctx.translate(px, py);
    ctx.scale(scale, scale);

    // "+1"
    ctx.fillStyle = '#ff6aa0';
    ctx.shadowColor = 'rgba(255, 90, 140, 0.6)';
    ctx.shadowBlur = 20;
    ctx.font = '700 72px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+1', 0, 0);

    // the count "1.2k" appears softer to the left of +1
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 220, 230, 0.9)';
    ctx.font = '500 34px ui-monospace, Menlo, monospace';
    ctx.fillText('1,248', 0, 58);

    ctx.restore();
  }

  // === layer 6: combo floating hearts ===
  const comboFade = kern(t, 5.5, 0.5, easeOut) * (1 - kern(t, 9.0, 0.9, easeOut));
  if (comboFade > 0) {
    for (const h of COMBO_HEARTS) {
      const localT = t - h.birth;
      if (localT <= 0 || localT > h.life) continue;
      const k = localT / h.life;
      const appear = k < 0.15 ? k / 0.15 : (k > 0.7 ? (1 - (k - 0.7) / 0.3) : 1);
      const rise = easeOutQuint(k) * 340;
      const sway = Math.sin(localT * h.wobbleFreq + h.ySeed * 6) * h.sway;
      const x = CX + h.x + sway;
      const y = CY - 80 - rise;
      const sz = h.size * 0.06 * (0.7 + 0.3 * (1 - k));

      ctx.save();
      ctx.globalAlpha = appear * comboFade * 0.85;
      ctx.fillStyle = `hsl(${h.hue}, 90%, 70%)`;
      ctx.shadowColor = `hsla(${h.hue}, 90%, 70%, 0.75)`;
      ctx.shadowBlur = 18;
      heartPath(x, y, sz, Math.sin(localT * 0.8) * 0.15);
      ctx.fill();
      ctx.restore();
    }
  }

  // === layer 7: the whispered word ===
  // appears late — the emotional payoff
  const wordBirth = 6.5;
  const wordK = kern(t, wordBirth, 1.2, easeOutQuint);
  const wordFade = 1 - kern(t, 9.0, 0.9, easeOut);
  if (wordK > 0.001) {
    ctx.save();
    ctx.globalAlpha = wordK * wordFade;
    const wx = CX;
    const wy = CY + 300 + (1 - wordK) * 20;

    // whisper-style — thin weight, wide spacing
    ctx.fillStyle = 'rgba(255, 230, 240, 0.92)';
    ctx.font = '300 22px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '8px';
    // manual letter spacing (canvas doesn't support letter-spacing)
    const word = 'S E E N';
    ctx.fillText(word, wx, wy);

    // tiny accent line above
    ctx.strokeStyle = `rgba(255, 120, 170, ${0.6 * wordK * wordFade})`;
    ctx.lineWidth = 1;
    const lineW = wordK * 60;
    ctx.beginPath();
    ctx.moveTo(wx - lineW, wy - 22);
    ctx.lineTo(wx + lineW, wy - 22);
    ctx.stroke();

    ctx.restore();
  }

  // === layer 8: subtle vignette pulse at the moment of touch ===
  const vignetteK = Math.exp(-6 * Math.max(0, t - 2.0)) * (t >= 2.0 ? 1 : 0);
  if (vignetteK > 0.01) {
    const g = ctx.createRadialGradient(CX, CY, 200, CX, CY, 1100);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, `rgba(40, 10, 30, ${vignetteK * 0.7})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
}

// ---------- timeline controller ----------
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) { let next = currentT + dt; if (next >= DURATION) next = 0; setTime(next); }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => { playing = false; playBtn.textContent = '▶'; setTime(scrubber.value / 1000 * DURATION); });
playBtn.addEventListener('click', () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; lastFrame = performance.now(); });
resetBtn.addEventListener('click', () => setTime(0));
CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});
setTime(0); requestAnimationFrame(loop);
</script>
</body>
</html>
