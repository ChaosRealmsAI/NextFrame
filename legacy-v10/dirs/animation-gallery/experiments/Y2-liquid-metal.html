<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Y2 · Liquid Metal — Kai Chen</title>
<style>
  :root {
    --bg0: #050608;
    --ink: #e6e9f2;
    --dim: #6b7284;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:var(--bg0); color:var(--ink); font-family:'SF Mono','JetBrains Mono',ui-monospace,monospace; overflow:hidden; }
  .stage {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse 70% 80% at 50% 46%, #12111a 0%, #07070c 55%, #020205 100%);
  }
  .stage canvas, .stage svg {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }
  #gl { z-index:1; }
  #fx { z-index:2; mix-blend-mode:screen; opacity:.95; }
  #svg { z-index:3; }

  /* HUD corner marks */
  .hud {
    position:absolute; z-index:4; font-size:10px; letter-spacing:0.14em;
    color:var(--dim); text-transform:uppercase; user-select:none;
  }
  .hud.tl { top:24px; left:28px; }
  .hud.tr { top:24px; right:28px; text-align:right; }
  .hud.bl { bottom:96px; left:28px; }
  .hud.br { bottom:96px; right:28px; text-align:right; }
  .hud b { color:var(--ink); font-weight:500; letter-spacing:0.08em; }
  .hud .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#c8cbd3; margin-right:6px; vertical-align:2px; box-shadow:0 0 8px #c8cbd3aa; }

  /* counter */
  .counter {
    position:absolute; z-index:4;
    top:50%; left:50%;
    transform:translate(-50%, 220px);
    font-family:'SF Pro Display',-apple-system,Helvetica,Arial,sans-serif;
    font-weight:200; font-size:18px; letter-spacing:0.35em;
    color:#9aa2b4; opacity:.85;
    display:flex; align-items:center; gap:14px;
  }
  .counter .num { font-weight:300; font-size:30px; color:#e8ecf5; letter-spacing:0.12em; font-variant-numeric:tabular-nums; }
  .counter .bar { width:48px; height:1px; background:linear-gradient(90deg, transparent, #636a7c, transparent); }

  /* timeline UI */
  .cue-row {
    position:absolute; z-index:5;
    left:28px; right:28px; bottom:64px;
    height:14px; pointer-events:none;
  }
  .cue-mark {
    position:absolute; top:0; width:1px; height:8px;
    background:#4a4f5c;
  }
  .cue-mark .lbl {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    font-size:9px; color:#5a6070; white-space:nowrap;
    font-family:'SF Mono',ui-monospace,monospace;
    letter-spacing:0.1em; text-transform:uppercase;
  }
  .tl-ui {
    position:absolute; z-index:5;
    left:28px; right:28px; bottom:22px; height:30px;
    display:flex; align-items:center; gap:14px;
    color:var(--ink);
    font-family:'SF Mono',ui-monospace,monospace; font-size:11px;
  }
  .tl-ui button {
    width:28px; height:28px; border:1px solid #2a2e38; background:#0d0f15;
    color:var(--ink); font-size:12px; border-radius:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .15s, background .15s;
  }
  .tl-ui button:hover { border-color:#4a5068; background:#131620; }
  .tl-ui .time { color:var(--dim); letter-spacing:0.1em; min-width:118px; }
  #scrubber {
    -webkit-appearance:none; appearance:none;
    flex:1; height:2px; background:#1a1d26; border-radius:1px; outline:none;
  }
  #scrubber::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:11px; height:11px; border-radius:50%;
    background:#e8ecf5; border:0;
    box-shadow:0 0 0 2px #0a0c12, 0 0 8px rgba(220,230,250,0.25);
    cursor:pointer;
  }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="gl" width="1920" height="1080"></canvas>
    <canvas id="fx" width="1920" height="1080"></canvas>
    <svg id="svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"></svg>

    <div class="hud tl"><span class="dot"></span><b>Y2</b> · liquid-metal</div>
    <div class="hud tr" id="hudStatus">shader // sdf · fresnel · cab</div>
    <div class="hud bl">kai chen — motion study №027</div>
    <div class="hud br">9 : 6 : 0 · 1920×1080 · 30fps loop</div>

    <div class="counter">
      <span class="bar"></span>
      <span>♥</span>
      <span class="num" id="likeNum">12,847</span>
      <span class="bar"></span>
    </div>

    <div class="cue-row" id="cueRow"></div>
    <div class="tl-ui">
      <button id="playBtn">⏸</button>
      <button id="resetBtn">↺</button>
      <span class="time" id="timeLabel">0.00 / 10.00s</span>
      <input type="range" id="scrubber" min="0" max="1000" value="0">
      <span class="time" id="frameLabel" style="min-width:110px;text-align:right">frame 0 / 300</span>
    </div>
  </div>

<script>
// ============================================================
// Y2 · Liquid Metal — 10s loop
// Layer 1 WebGL: 2D SDF heart + droplets (smin blending), fbm surface
//                displacement, fake env map, fresnel, chromatic aberration
// Layer 2 Canvas 2D: specular highlights, ripples, shockwaves, tethers
// Layer 3 SVG + DOM: counter, reticle, orbit ring, HUD
// setTime(t) → render(t). Pure function.
// ============================================================

const DURATION = 10.0;
const FPS = 30;
const W = 1920, H = 1080;

// ---------- math helpers ----------
const clamp01 = t => Math.max(0, Math.min(1, t));
const clamp   = (x,a,b) => Math.max(a, Math.min(b, x));
const lerp    = (a,b,t) => a + (b-a)*t;
const easeOut = x => 1 - Math.pow(1 - x, 3);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const springOut = x => { const c=clamp01(x); return c===0||c===1?c:1 - Math.exp(-6*c)*Math.cos(9*c); };
const kern = (t,s,d,ease=easeOut) => ease(clamp01((t-s)/d));
const pulse = (t,s,d) => { const k = clamp01((t-s)/d); return Math.sin(k*Math.PI); };

// ============================================================
// CUES
// ============================================================
const CUES = [
  { t: 0.0, label: 'idle' },
  { t: 1.6, label: 'pull' },
  { t: 2.8, label: 'shatter' },
  { t: 4.6, label: 'scatter' },
  { t: 6.2, label: 'merge' },
  { t: 7.6, label: 'burst' },
  { t: 8.6, label: 'settle' },
  { t: 9.6, label: 'loop' }
];

// ============================================================
// WebGL setup
// ============================================================
const glCanvas = document.getElementById('gl');
const gl = glCanvas.getContext('webgl', { premultipliedAlpha:false, antialias:false });
const hud = document.getElementById('hudStatus');
if (!gl) {
  hud.textContent = 'WEBGL UNSUPPORTED';
  throw new Error('no webgl');
}

const VS = `
attribute vec2 p;
void main(){ gl_Position = vec4(p, 0.0, 1.0); }
`;

const FS = `
#extension GL_OES_standard_derivatives : enable
precision highp float;

#define PI 3.14159265
uniform vec2 uRes;
uniform float uTime;
uniform float uPull, uShatter, uScatter, uMerge, uBurst, uSettle, uLoopReset;
uniform float uChromeBoost;
uniform vec3 uHeart;     // xy, size
uniform vec3 uDrop0, uDrop1, uDrop2, uDrop3, uDrop4;

// hash / noise / fbm
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
float noise(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  float a = hash(i);
  float b = hash(i + vec2(1.0,0.0));
  float c = hash(i + vec2(0.0,1.0));
  float d = hash(i + vec2(1.0,1.0));
  vec2 u = f*f*(3.0-2.0*f);
  return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for (int i=0;i<5;i++){ v += a*noise(p); p *= 2.03; a *= 0.5; }
  return v;
}

float sdCircle(vec2 p, float r){ return length(p) - r; }

// heart SDF via lobes + triangle union (smooth)
float sdHeart(vec2 p, float s){
  // lobes at top-left/top-right
  float r = 0.34 * s;
  vec2 L = vec2(-0.36*s,  0.30*s);
  vec2 R = vec2( 0.36*s,  0.30*s);
  float dL = length(p - L) - r;
  float dR = length(p - R) - r;

  // triangle from outside lobe edges down to point
  // Build as SDF of a triangle: we use sdTriangle
  vec2 A = vec2(-0.72*s, 0.22*s);
  vec2 B = vec2( 0.72*s, 0.22*s);
  vec2 C = vec2( 0.0, -0.78*s);
  // triangle SDF
  vec2 e0 = B-A, e1 = C-B, e2 = A-C;
  vec2 v0 = p-A, v1 = p-B, v2 = p-C;
  vec2 pq0 = v0 - e0*clamp(dot(v0,e0)/dot(e0,e0), 0.0, 1.0);
  vec2 pq1 = v1 - e1*clamp(dot(v1,e1)/dot(e1,e1), 0.0, 1.0);
  vec2 pq2 = v2 - e2*clamp(dot(v2,e2)/dot(e2,e2), 0.0, 1.0);
  float sg = sign(e0.x*e2.y - e0.y*e2.x);
  vec2 d2 = min(min(vec2(dot(pq0,pq0), sg*(v0.x*e0.y-v0.y*e0.x)),
                    vec2(dot(pq1,pq1), sg*(v1.x*e1.y-v1.y*e1.x))),
                    vec2(dot(pq2,pq2), sg*(v2.x*e2.y-v2.y*e2.x)));
  float dT = -sqrt(d2.x)*sign(d2.y);

  // smooth union
  float k1 = 0.04*s;
  float h1 = clamp(0.5 + 0.5*(dR-dL)/k1, 0.0, 1.0);
  float dLR = mix(dR, dL, h1) - k1*h1*(1.0-h1);

  float k2 = 0.05*s;
  float h2 = clamp(0.5 + 0.5*(dT-dLR)/k2, 0.0, 1.0);
  return mix(dT, dLR, h2) - k2*h2*(1.0-h2);
}

float smin(float a, float b, float k){
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sceneSDF(vec2 p){
  // stretched / shrunk heart
  vec2 hp = p - uHeart.xy;
  float stretchY = 1.0 + uPull*1.4;
  hp.y /= stretchY;
  // slight x taper near top when pulling
  hp.x *= 1.0 + uPull*0.18*smoothstep(0.0, 0.6, hp.y);

  float heartSize = uHeart.z * (1.0 - uShatter*0.85 + uMerge*0.35);
  heartSize *= 1.0 - uSettle * 0.35;
  heartSize *= 1.0 - uLoopReset * 0.15;
  float dHeart = sdHeart(hp, heartSize);
  // as heart shatters, push SDF to infinity (heart disappears)
  float heartAlive = 1.0 - uShatter * 0.99;
  dHeart = mix(1e5, dHeart, heartAlive);

  float d = dHeart;
  d = smin(d, sdCircle(p - uDrop0.xy, uDrop0.z), 0.03 + 0.1*uMerge);
  d = smin(d, sdCircle(p - uDrop1.xy, uDrop1.z), 0.03 + 0.1*uMerge);
  d = smin(d, sdCircle(p - uDrop2.xy, uDrop2.z), 0.03 + 0.1*uMerge);
  d = smin(d, sdCircle(p - uDrop3.xy, uDrop3.z), 0.03 + 0.1*uMerge);
  d = smin(d, sdCircle(p - uDrop4.xy, uDrop4.z), 0.03 + 0.1*uMerge);
  return d;
}

// fbm surface displacement — subtle, so chrome stays smooth & mirror-like
float warpedSDF(vec2 p){
  vec2 w = p * 4.5;
  float n1 = fbm(w + vec2(uTime*0.22, -uTime*0.18));
  float n2 = fbm(w*2.3 + vec2(-uTime*0.30, uTime*0.15));
  // subtle in idle, more during pull/shatter/merge
  float turb = 0.3 + uPull*0.8 + uShatter*0.6 + uMerge*0.9 + uBurst*1.0;
  float disp = ((n1 - 0.5) * 0.010 + (n2 - 0.5) * 0.006) * turb;
  float rip = sin((length(p - uHeart.xy) * 90.0 - uTime*11.0)) * 0.004 * (uMerge + uBurst*0.5);
  return sceneSDF(p) + disp + rip;
}

// fake env map
vec3 envSample(vec3 n){
  float y = n.y;
  // sky gradient
  vec3 sky = mix(vec3(0.05,0.055,0.08), vec3(0.6,0.65,0.78), smoothstep(-0.3, 0.9, y));
  // warm top-right key light
  vec3 warm = vec3(1.1, 0.88, 0.62) * pow(max(0.0, dot(n, normalize(vec3(0.45,0.75,0.5)))), 6.0) * 2.2;
  // cool bottom-left rim
  vec3 cool = vec3(0.45, 0.62, 1.05) * pow(max(0.0, dot(n, normalize(vec3(-0.6,-0.3,0.5)))), 5.0) * 1.8;
  // studio hot spot
  float hot = pow(max(0.0, dot(n, normalize(vec3(0.15, 0.95, 0.25)))), 70.0);
  // second soft light from left
  float soft = pow(max(0.0, dot(n, normalize(vec3(-0.8, 0.4, 0.4)))), 4.0) * 0.8;
  return sky + warm + cool + vec3(1.0,0.97,0.92) * hot * 2.6 + vec3(0.7,0.85,1.1) * soft;
}

// normal from SDF gradient (2D + faked z)
vec3 normalFromSDF(vec2 p){
  float e = 0.002;
  float dx = warpedSDF(p + vec2(e,0.0)) - warpedSDF(p - vec2(e,0.0));
  float dy = warpedSDF(p + vec2(0.0,e)) - warpedSDF(p - vec2(0.0,e));
  vec2 g = vec2(dx, dy) / (2.0*e);
  // surface normal in 2D; fake z from 1-|d|/R
  float d = warpedSDF(p);
  float z = sqrt(max(0.0, 1.0 - clamp(length(g)*0.6, 0.0, 1.0)));
  vec3 n = vec3(-g.x, -g.y, z + 0.4);
  return normalize(n);
}

void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  // Map to centered coords, y+ up. Use short side as unit.
  float unit = min(uRes.x, uRes.y);
  vec2 p = (gl_FragCoord.xy - 0.5*uRes) / (unit * 0.5);

  float d = warpedSDF(p);

  // BG
  float rad = length(p);
  float vig = smoothstep(1.4, 0.1, rad);
  vec3 bg = mix(vec3(0.01,0.012,0.02), vec3(0.055,0.05,0.08), vig);
  bg += vec3(0.03,0.025,0.04) * pow(max(0.0, 1.0 - length(p*vec2(1.0,1.4))*0.5), 3.0);

  // burst radial glow
  float burstGlow = uBurst * exp(-length(p - uHeart.xy) * 2.2) * 1.4;
  bg += vec3(0.9, 0.95, 1.05) * burstGlow * 0.6;

  // AA from fwidth
  float aa = max(fwidth(d), 0.0015);
  float mask = 1.0 - smoothstep(-aa, aa, d);

  vec3 col = bg;

  if (mask > 0.001) {
    vec3 N = normalFromSDF(p);
    vec3 V = vec3(0.0, 0.0, 1.0);

    float fres = pow(1.0 - max(0.0, dot(N, V)), 3.0);

    // chromatic aberration
    float cab = 0.025 + 0.06*uPull + 0.09*uBurst + 0.03*uMerge;
    vec3 Nr = normalize(N + vec3( cab, 0.0, 0.0));
    vec3 Nb = normalize(N + vec3(-cab, 0.0, 0.0));
    vec3 Rr = reflect(-V, Nr);
    vec3 Rg = reflect(-V, N);
    vec3 Rb = reflect(-V, Nb);

    vec3 envR = envSample(Rr);
    vec3 envG = envSample(Rg);
    vec3 envB = envSample(Rb);
    vec3 env = vec3(envR.r, envG.g, envB.b);

    // chrome tint
    vec3 metalTint = mix(vec3(0.78, 0.80, 0.88), vec3(1.0,0.98,0.96), 0.55);

    vec3 metal = env * metalTint * (1.0 + 0.5*uChromeBoost);
    metal += vec3(1.0,1.0,1.05) * fres * (0.7 + 0.8*uChromeBoost);

    // micro sparkle
    float g = fbm(p*22.0 + vec2(uTime*0.5, -uTime*0.3));
    metal += vec3(1.0,0.98,1.0) * pow(g, 20.0) * 1.6;

    // burst → bright silver
    metal = mix(metal, vec3(1.08, 1.12, 1.18), uBurst*0.55);

    // inner contrast
    float inner = smoothstep(-0.02, -0.002, d);
    metal *= mix(1.0, 0.78, inner * 0.35);

    col = mix(col, metal, mask);
  }

  // bloom halo at burst
  float halo = uBurst * exp(-abs(d+0.02)*18.0) * 0.9;
  col += vec3(0.9,0.95,1.1) * halo;

  // grade + grain
  col = pow(col, vec3(0.94));
  col = clamp(col, 0.0, 1.6);
  float grain = (hash(gl_FragCoord.xy + uTime*37.0) - 0.5) * 0.025;
  col += grain;

  gl_FragColor = vec4(col, 1.0);
}
`;

// Enable derivatives before shader compile
const derivExt = gl.getExtension('OES_standard_derivatives');
if (!derivExt) { hud.textContent = 'NO DERIVATIVES EXT'; }

function compile(type, src){
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src); gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(sh) || '';
    hud.textContent = 'SHADER ERR: ' + log.substring(0, 80);
    console.error('shader compile error:', log, src);
  }
  return sh;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  const log = gl.getProgramInfoLog(prog) || '';
  hud.textContent = 'LINK ERR: ' + log.substring(0, 80);
  console.error('link error:', log);
}
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const U = {
  uRes: gl.getUniformLocation(prog, 'uRes'),
  uTime: gl.getUniformLocation(prog, 'uTime'),
  uPull: gl.getUniformLocation(prog, 'uPull'),
  uShatter: gl.getUniformLocation(prog, 'uShatter'),
  uScatter: gl.getUniformLocation(prog, 'uScatter'),
  uMerge: gl.getUniformLocation(prog, 'uMerge'),
  uBurst: gl.getUniformLocation(prog, 'uBurst'),
  uSettle: gl.getUniformLocation(prog, 'uSettle'),
  uLoopReset: gl.getUniformLocation(prog, 'uLoopReset'),
  uChromeBoost: gl.getUniformLocation(prog, 'uChromeBoost'),
  uHeart: gl.getUniformLocation(prog, 'uHeart'),
  uDrop0: gl.getUniformLocation(prog, 'uDrop0'),
  uDrop1: gl.getUniformLocation(prog, 'uDrop1'),
  uDrop2: gl.getUniformLocation(prog, 'uDrop2'),
  uDrop3: gl.getUniformLocation(prog, 'uDrop3'),
  uDrop4: gl.getUniformLocation(prog, 'uDrop4'),
};
gl.viewport(0, 0, W, H);

// ============================================================
// Choreography
// ============================================================
const HEART_BASE = { x: 0.0, y: 0.0, s: 0.38 };

const DROP_SEEDS = [
  { ang: Math.PI * 0.25, dist: 0.60, r: 0.11 },
  { ang: Math.PI * 0.90, dist: 0.48, r: 0.09 },
  { ang: Math.PI * 1.45, dist: 0.55, r: 0.095 },
  { ang: Math.PI * 1.82, dist: 0.42, r: 0.08 },
];

function computeState(t){
  const pull    = kern(t, 1.6, 1.2, easeInOut) * (1 - kern(t, 2.8, 0.25, easeInOut));
  const shatter = kern(t, 2.8, 0.5, easeOut) * (1 - kern(t, 6.2, 1.2, easeInOut));
  const scatter = kern(t, 3.0, 1.5, easeOut) * (1 - kern(t, 6.2, 1.3, easeInOut));
  const merge   = kern(t, 6.2, 1.4, easeInOut) * (1 - kern(t, 7.9, 0.6, easeInOut));
  const burst   = pulse(t, 7.6, 1.0);
  const settle  = kern(t, 8.6, 1.0, easeInOut);
  const loopReset = kern(t, 9.6, 0.4, easeInOut);

  const breathe = Math.sin(t * 0.9) * 0.012;
  let heartScale = HEART_BASE.s * (1.0 + breathe);
  heartScale *= 1.0 + burst * 0.20;

  const heartY = HEART_BASE.y + 0.025 * pull - 0.05 * settle * (1.0 - loopReset);

  const drops = DROP_SEEDS.map((seed, i) => {
    const dir = seed.ang + Math.sin(t*0.8 + i*1.3) * 0.3 * scatter;
    const dist = seed.dist * easeOut(scatter) * (1.0 - merge);
    const wx = Math.sin(t*1.7 + i*2.1) * 0.05 * scatter * (1.0 - merge);
    const wy = Math.cos(t*1.3 + i*1.7) * 0.05 * scatter * (1.0 - merge);

    const x = HEART_BASE.x + Math.cos(dir)*dist + wx;
    const y = heartY + Math.sin(dir)*dist*0.8 + wy;

    let r = seed.r * (0.45 + 0.55*shatter);
    r *= 1.0 - merge*0.8;
    r *= 1.0 - settle;
    r *= 1.0 - loopReset;
    r *= (1.0 - kern(t, 7.8, 0.5, easeInOut));
    return { x, y, r };
  });

  const d5 = (() => {
    const vis = scatter * (1.0 - merge) * 0.7;
    const ang = t*1.2 + 0.5;
    return {
      x: HEART_BASE.x + Math.cos(ang)*0.28*vis,
      y: heartY + Math.sin(ang)*0.20*vis + 0.04,
      r: 0.042 * vis,
    };
  })();

  const chromeBoost = burst * 0.95 + merge * 0.35 + pull * 0.25;

  return {
    pull, shatter, scatter, merge, burst, settle, loopReset,
    heart: { x: HEART_BASE.x, y: heartY, s: heartScale },
    drops: [...drops, d5],
    chromeBoost,
  };
}

// ============================================================
// Canvas 2D FX layer
// ============================================================
const fx = document.getElementById('fx');
const ctx = fx.getContext('2d');

function sh2px(x, y){
  const unit = Math.min(W, H);
  return { x: W*0.5 + x * unit * 0.5, y: H*0.5 - y * unit * 0.5 };
}

function drawFX(t, s){
  ctx.clearRect(0, 0, W, H);

  // main heart specular
  const hp = sh2px(s.heart.x - s.heart.s*0.18, s.heart.y + s.heart.s*0.30);
  const heartRadiusPx = s.heart.s * Math.min(W,H) * 0.5;
  if (heartRadiusPx > 4 && (1 - s.shatter) > 0.05) {
    const alpha = (1 - s.shatter*0.8) * (1 - s.loopReset);
    const hotR = heartRadiusPx * 0.22 * (1 + s.burst * 0.9);
    const g = ctx.createRadialGradient(hp.x, hp.y, 0, hp.x, hp.y, hotR);
    g.addColorStop(0, `rgba(255,255,255,${0.95*alpha})`);
    g.addColorStop(0.4, `rgba(240,245,255,${0.5*alpha})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(hp.x, hp.y, hotR, 0, Math.PI*2); ctx.fill();

    // lower bounce
    const bp = sh2px(s.heart.x + 0.06, s.heart.y - s.heart.s*0.40);
    const g2 = ctx.createRadialGradient(bp.x, bp.y, 0, bp.x, bp.y, hotR*0.7);
    g2.addColorStop(0, `rgba(200,215,255,${0.42*alpha})`);
    g2.addColorStop(1, 'rgba(200,215,255,0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(bp.x, bp.y, hotR*0.7, 0, Math.PI*2); ctx.fill();
  }

  // droplet highlights
  s.drops.forEach((d) => {
    const rpx = d.r * Math.min(W,H) * 0.5;
    if (rpx < 2) return;
    const p = sh2px(d.x - d.r*0.3, d.y + d.r*0.35);
    const hotR = rpx * 0.40;
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, hotR);
    g.addColorStop(0, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.5, 'rgba(220,230,255,0.4)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, hotR, 0, Math.PI*2); ctx.fill();
  });

  // shatter ring
  const shatterPhase = clamp01((t - 2.8) / 1.2);
  if (shatterPhase > 0 && shatterPhase < 1) {
    const cp = sh2px(s.heart.x, s.heart.y);
    const rr = shatterPhase * 420;
    ctx.strokeStyle = `rgba(220,228,248,${0.4*(1-shatterPhase)})`;
    ctx.lineWidth = 2 * (1 - shatterPhase) + 0.5;
    ctx.beginPath(); ctx.arc(cp.x, cp.y, rr, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(180,200,240,${0.22*(1-shatterPhase)})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cp.x, cp.y, rr*0.62, 0, Math.PI*2); ctx.stroke();
  }

  // merge rings (inward)
  const mergePhase = clamp01((t - 6.2) / 1.4);
  if (mergePhase > 0 && mergePhase < 1) {
    const cp = sh2px(s.heart.x, s.heart.y);
    for (let k=0;k<3;k++){
      const ph = (mergePhase + k*0.33) % 1;
      const rr = lerp(320, 32, easeInOut(ph));
      const a = 0.30 * (1 - ph) * easeInOut(mergePhase);
      ctx.strokeStyle = `rgba(235,240,255,${a})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(cp.x, cp.y, rr, 0, Math.PI*2); ctx.stroke();
    }
  }

  // burst shockwave + sparks
  const burstPhase = clamp01((t - 7.6) / 1.0);
  if (burstPhase > 0 && burstPhase < 1) {
    const cp = sh2px(s.heart.x, s.heart.y);
    const br = burstPhase * 720;
    const a = Math.sin(burstPhase * Math.PI) * 0.6;
    const grd = ctx.createRadialGradient(cp.x, cp.y, br*0.7, cp.x, cp.y, br);
    grd.addColorStop(0, 'rgba(255,255,255,0)');
    grd.addColorStop(0.8, `rgba(235,245,255,${a*0.55})`);
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(cp.x, cp.y, br, 0, Math.PI*2); ctx.fill();

    ctx.strokeStyle = `rgba(255,255,255,${a*0.85})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cp.x, cp.y, br*0.98, 0, Math.PI*2); ctx.stroke();

    const sparks = 22;
    for (let i=0;i<sparks;i++){
      const ang = i / sparks * Math.PI * 2 + burstPhase*0.25;
      const dist = lerp(50, 400, easeOut(burstPhase));
      const sx = cp.x + Math.cos(ang)*dist;
      const sy = cp.y + Math.sin(ang)*dist;
      const sa = (1 - burstPhase) * 0.9;
      ctx.fillStyle = `rgba(255,255,255,${sa})`;
      ctx.beginPath(); ctx.arc(sx, sy, 1.8*(1-burstPhase)+0.4, 0, Math.PI*2); ctx.fill();
    }
  }

  // pull: tether streaks upward
  if (s.pull > 0.05) {
    const cp = sh2px(s.heart.x, s.heart.y + s.heart.s*1.15);
    const streaks = 7;
    for (let i=0;i<streaks;i++){
      const x = cp.x + (i - streaks/2) * 5 + Math.sin(t*3 + i)*2;
      const y0 = cp.y;
      const y1 = cp.y - 140 * s.pull;
      const grd = ctx.createLinearGradient(x, y0, x, y1);
      grd.addColorStop(0, `rgba(220,230,255,${0.45*s.pull})`);
      grd.addColorStop(1, 'rgba(220,230,255,0)');
      ctx.strokeStyle = grd;
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    }
  }
}

// ============================================================
// SVG layer — reticle + orbit
// ============================================================
const svg = document.getElementById('svg');
(function buildReticle(){
  const mk = (tag, attrs) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  };
  const corner = (x,y,dx,dy) => {
    const g = mk('g', { stroke:'#2a2e38', 'stroke-width':'1', fill:'none' });
    g.appendChild(mk('line', { x1:x, y1:y, x2:x+dx, y2:y }));
    g.appendChild(mk('line', { x1:x, y1:y, x2:x,   y2:y+dy }));
    svg.appendChild(g);
  };
  const M = 40, L = 28;
  corner(M, M,  L,  L);
  corner(W-M, M, -L,  L);
  corner(M, H-M, L, -L);
  corner(W-M, H-M, -L, -L);

  const cx = W/2, cy = H/2;
  const ch = mk('g', { stroke:'#1a1d26', 'stroke-width':'1' });
  ch.appendChild(mk('line', { x1:cx-14, y1:cy, x2:cx+14, y2:cy }));
  ch.appendChild(mk('line', { x1:cx, y1:cy-14, x2:cx, y2:cy+14 }));
  ch.appendChild(mk('circle', { cx:cx, cy:cy, r:3, fill:'none' }));
  svg.appendChild(ch);
})();

const orbitRing = (function(){
  const mk = (tag, attrs) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  };
  const g = mk('g', { opacity:'0.0' });
  const ring = mk('circle', {
    cx:W/2, cy:H/2, r:260, fill:'none',
    stroke:'#2e3340', 'stroke-width':'1',
    'stroke-dasharray':'2 6'
  });
  g.appendChild(ring);
  svg.appendChild(g);
  return { g, ring };
})();

const likeNumEl = document.getElementById('likeNum');
const START_LIKES = 12847;

function updateSVGAndCounter(t, s){
  const vis = Math.max(s.scatter, s.merge*0.8, s.pull*0.4);
  orbitRing.g.setAttribute('opacity', (0.10 + vis*0.4).toFixed(3));
  const r = 240 + s.scatter * 60 - s.merge * 40;
  orbitRing.ring.setAttribute('r', r.toFixed(1));
  orbitRing.ring.setAttribute('stroke-dashoffset', (t * 20).toFixed(2));

  const addedByBurst = kern(t, 7.6, 0.6, easeOut);
  const n = START_LIKES + Math.floor(addedByBurst);
  likeNumEl.textContent = n.toLocaleString('en-US');
  const scale = 1 + pulse(t, 7.6, 0.8) * 0.15;
  likeNumEl.style.transform = `scale(${scale.toFixed(3)})`;
  likeNumEl.style.transformOrigin = 'center';
  likeNumEl.style.color = `rgba(232,236,245,${1 - s.loopReset*0.4})`;
}

// ============================================================
// Render
// ============================================================
function render(t){
  const s = computeState(t);

  gl.uniform2f(U.uRes, W, H);
  gl.uniform1f(U.uTime, t);
  gl.uniform1f(U.uPull, s.pull);
  gl.uniform1f(U.uShatter, s.shatter);
  gl.uniform1f(U.uScatter, s.scatter);
  gl.uniform1f(U.uMerge, s.merge);
  gl.uniform1f(U.uBurst, s.burst);
  gl.uniform1f(U.uSettle, s.settle);
  gl.uniform1f(U.uLoopReset, s.loopReset);
  gl.uniform1f(U.uChromeBoost, s.chromeBoost);
  gl.uniform3f(U.uHeart, s.heart.x, s.heart.y, s.heart.s);
  const d0 = s.drops[0] || { x:0, y:0, r:0 };
  const d1 = s.drops[1] || { x:0, y:0, r:0 };
  const d2 = s.drops[2] || { x:0, y:0, r:0 };
  const d3 = s.drops[3] || { x:0, y:0, r:0 };
  const d4 = s.drops[4] || { x:0, y:0, r:0 };
  gl.uniform3f(U.uDrop0, d0.x, d0.y, d0.r);
  gl.uniform3f(U.uDrop1, d1.x, d1.y, d1.r);
  gl.uniform3f(U.uDrop2, d2.x, d2.y, d2.r);
  gl.uniform3f(U.uDrop3, d3.x, d3.y, d3.r);
  gl.uniform3f(U.uDrop4, d4.x, d4.y, d4.r);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  drawFX(t, s);
  updateSVGAndCounter(t, s);
}

// ============================================================
// Controller
// ============================================================
const scrubber  = document.getElementById('scrubber');
const playBtn   = document.getElementById('playBtn');
const resetBtn  = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel= document.getElementById('frameLabel');
const cueRow    = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t){
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop(){
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) {
    let next = currentT + dt;
    if (next >= DURATION) next = 0;
    setTime(next);
  }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => {
  playing = false; playBtn.textContent = '▶';
  setTime(scrubber.value / 1000 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing; playBtn.textContent = playing ? '⏸' : '▶';
  lastFrame = performance.now();
});
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl);
  cueRow.appendChild(m);
});

// URL hash override: #t=2.5 → pause at time (for AI screenshotting)
{
  const m = (location.hash || '').match(/t=([\d.]+)/);
  if (m) {
    playing = false; playBtn.textContent = '▶';
    setTime(parseFloat(m[1]));
  } else {
    setTime(0);
  }
}
requestAnimationFrame(loop);
</script>
