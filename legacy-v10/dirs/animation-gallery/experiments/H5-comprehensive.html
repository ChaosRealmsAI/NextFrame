<style>

    --bg0:#07060b;

  html,body{margin:0;padding:0;background:#000;color:var(--ink);font-family:-apple-system,"SF Pro Display","Helvetica Neue",sans-serif;overflow:hidden}

  /* timeline */
  .tl-shell{position:fixed;left:24px;right:24px;bottom:22px;z-index:10;color:#cfc4e0;user-select:none}
  .cue-row{position:relative;height:22px;margin-bottom:6px}

  }

<body>
  <div class="hint">

  <div class="wrap"><div class="scaler" id="scaler">
    <div class="stage" id="stage">

        <div class="card" id="card">

          <div class="actions">
            <div class="pill like" id="pillLike">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-9.7-9.1C.8 8.1 3 4 7 4c2 0 3.5 1.1 5 3 1.5-1.9 3-3 5-3 4 0 6.2 4.1 4.7 7.9C19.5 16.4 12 21 12 21z"/></svg>

      <input type="range" id="scrubber" min="0" max="1000" value="0">
      <span class="time" id="frameLabel" style="min-width:120px;text-align:right">frame 0 / 300</span>
    </div>

<script>
/* =========================================================
   SEEN — "a like, re-felt"
   Kai Chen · motion study · 10s loop
   4 layers: WebGL (ambient), Canvas 2D (particles/field),
             SVG (heart + rings), DOM (card + numbers)
   All state = f(t). No random per frame. No CSS animation.
   ========================================================= */

/* ---------- fit to window ---------- */
(function fit(){
  const scaler = document.getElementById('scaler');
  function onResize(){
    const pad = 60;
    const s = Math.min((innerWidth-pad)/1920, (innerHeight-140)/1080);
    scaler.style.transform = `scale(${s})`;
    scaler.style.width = '1920px';
    scaler.style.height = '1080px';
  }
  addEventListener('resize', onResize); onResize();
})();

/* ---------- timeline constants ---------- */
const DURATION = 10.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut     = x => 1 - Math.pow(1 - x, 3);
const easeOutQuint= x => 1 - Math.pow(1 - x, 5);
const easeInOut   = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const easeInCubic = x => x*x*x;
const springOut   = x => { const c = clamp01(x); return c===0||c===1 ? c : 1 - Math.exp(-6*c)*Math.cos(9*c); };
const springBack  = x => { const c = clamp01(x); const s = 1.70158; return c*c*((s+1)*c - s); };
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));
const kernRaw = (t, s, d) => clamp01((t - s) / d);
// deterministic hash → pseudo-random in [0,1)
const hash = (n) => { let x = Math.sin(n*127.1 + 311.7) * 43758.5453; return x - Math.floor(x); };
const hash2 = (a,b) => hash(a*0.931 + b*1.613);

const CUES = [
  { t: 0.00, label: 'Idle' },
  { t: 1.10, label: 'Touch' },
  { t: 1.40, label: 'Burst' },
  { t: 2.60, label: 'Ripple' },
  { t: 4.20, label: 'Combo' },
  { t: 6.80, label: 'Bloom' },
  { t: 8.60, label: 'Settle' },
];

/* =========================================================
   LAYER 1 — WebGL ambient background (fbm flow + aurora)
   ========================================================= */
const bgCanvas = document.getElementById('bgShader');
let gl = bgCanvas.getContext('webgl', { premultipliedAlpha:false, antialias:false });
let bgReady = false;
const bgCtx2d = !gl ? bgCanvas.getContext('2d') : null;
let glState = null;

function initGL(){
  if(!gl) return false;
  const vs = `attribute vec2 p; varying vec2 uv; void main(){ uv = p*0.5+0.5; gl_Position = vec4(p,0.0,1.0); }`;
  const fs = `
    precision highp float;
    varying vec2 uv;
    uniform float t;
    uniform float heat;   // 0..1 — intensity envelope
    uniform vec2  center; // 0..1 — heart center
    // hash / noise
    float hash21(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
    float noise(vec2 p){
      vec2 i = floor(p), f = fract(p);
      float a = hash21(i);
      float b = hash21(i+vec2(1.0,0.0));
      float c = hash21(i+vec2(0.0,1.0));
      float d = hash21(i+vec2(1.0,1.0));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }
    float fbm(vec2 p){
      float v=0.0, a=0.5;
      for(int i=0;i<5;i++){ v += a*noise(p); p*=2.02; a*=0.5; }
      return v;
    }
    void main(){
      vec2 q = uv;
      vec2 p = q - center;
      p.x *= 1920.0/1080.0;
      float r = length(p);
      // slow drift
      vec2 flow = vec2(fbm(q*1.4 + t*0.05), fbm(q*1.4 - t*0.07));
      float n = fbm(q*2.2 + flow*1.1 + t*0.08);
      // radial "being seen" glow — grows with heat
      float glow = smoothstep(0.95, 0.0, r - heat*0.25);
      glow = pow(glow, 2.2);
      // aurora bands
      float band = smoothstep(0.2, 0.9, n) * (0.35 + 0.5*heat);
      // color palette
      vec3 cVoid  = vec3(0.028, 0.022, 0.054);
      vec3 cPlum  = vec3(0.20, 0.09, 0.30);
      vec3 cRose  = vec3(1.00, 0.30, 0.46);
      vec3 cAmber = vec3(1.00, 0.72, 0.42);
      vec3 cViolet= vec3(0.54, 0.36, 1.00);
      vec3 col = cVoid;
      col = mix(col, cPlum,  band*0.9);
      col = mix(col, cViolet, band*band*0.7);
      col = mix(col, cRose,  glow*0.85);
      col = mix(col, cAmber, glow*glow*0.55*heat);
      // subtle vignette
      float vg = smoothstep(1.2, 0.35, length(q-0.5));
      col *= 0.55 + 0.55*vg;
      // grain (deterministic)
      float g = (hash21(q*vec2(1920.0,1080.0) + floor(t*30.0))-0.5)*0.035;
      col += g;
      gl_FragColor = vec4(col, 1.0);
    }`;
  const compile = (src,type) => {
    const sh = gl.createShader(type); gl.shaderSource(sh,src); gl.compileShader(sh);
    if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){ console.warn(gl.getShaderInfoLog(sh)); return null; }
    return sh;
  };
  const V = compile(vs, gl.VERTEX_SHADER);
  const F = compile(fs, gl.FRAGMENT_SHADER);
  if(!V||!F) return false;
  const prog = gl.createProgram();
  gl.attachShader(prog,V); gl.attachShader(prog,F); gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){ console.warn(gl.getProgramInfoLog(prog)); return false; }
  gl.useProgram(prog);
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pLoc = gl.getAttribLocation(prog,'p');
  gl.enableVertexAttribArray(pLoc);
  gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);
  glState = {
    uT: gl.getUniformLocation(prog,'t'),
    uHeat: gl.getUniformLocation(prog,'heat'),
    uCenter: gl.getUniformLocation(prog,'center'),
  };
  gl.viewport(0,0,1920,1080);
  return true;
}
bgReady = initGL();

function drawBG(t, heat){
  if(bgReady){
    gl.uniform1f(glState.uT, t);
    gl.uniform1f(glState.uHeat, heat);
    gl.uniform2f(glState.uCenter, 0.5, 0.5);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else if (bgCtx2d){
    // fallback radial wash
    const ctx = bgCtx2d;
    ctx.clearRect(0,0,1920,1080);
    const g = ctx.createRadialGradient(960, 540, 40, 960, 540, 900);
    g.addColorStop(0, `rgba(255, ${110 + heat*60|0}, ${140 + heat*30|0}, ${0.20 + heat*0.35})`);
    g.addColorStop(0.6, 'rgba(40,20,70,0.45)');
    g.addColorStop(1, 'rgba(5,3,10,1)');
    ctx.fillStyle = g; ctx.fillRect(0,0,1920,1080);
  }
}

/* =========================================================
   LAYER 2 — Canvas 2D: floating ambient field + burst particles + rising hearts + trails
   ========================================================= */
const fieldCanvas = document.getElementById('fieldCanvas');
const fctx = fieldCanvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pctx = pCanvas.getContext('2d');

const HEART_CX = 960, HEART_CY = 540;

/* --- ambient dust (idle) --- */
const DUST = [];
for(let i=0;i<140;i++){
  DUST.push({
    id:i,
    r: 0.6 + hash(i*1.7)*1.8,
    baseX: hash(i*3.1)*1920,
    baseY: hash(i*5.3)*1080,
    driftR: 20 + hash(i*7.1)*80,
    driftS: 0.15 + hash(i*9.3)*0.35,
    phase: hash(i*11.7)*Math.PI*2,
    hue: hash(i*13.1),
  });
}
function drawDust(t, heat){
  for(const d of DUST){
    const a = d.phase + t * d.driftS;
    const x = d.baseX + Math.cos(a)*d.driftR;
    const y = d.baseY + Math.sin(a*0.7)*d.driftR*0.6;
    // twinkle
    const tw = 0.35 + 0.65*(0.5+0.5*Math.sin(t*1.8 + d.phase*3));
    const alpha = (0.12 + tw*0.18) * (0.6 + heat*0.7);
    const col = d.hue < 0.5
      ? `rgba(255, ${180 + d.hue*80|0}, ${200 - d.hue*60|0}, ${alpha})`
      : `rgba(${180 + (1-d.hue)*50|0}, 150, 255, ${alpha})`;
    fctx.fillStyle = col;
    fctx.beginPath();
    fctx.arc(x, y, d.r * (0.8 + heat*0.6), 0, Math.PI*2);
    fctx.fill();
  }
}

/* --- burst particles (fired at t=1.4) --- */
const BURST_N = 84;
const BURST = [];
for(let i=0;i<BURST_N;i++){
  const ang = (i / BURST_N) * Math.PI * 2 + hash(i*0.7)*0.6;
  const radial = Math.cos(ang);
  BURST.push({
    id:i, ang,
    speed: 520 + hash(i*1.3)*780,         // px/s
    gravity: -40 + hash(i*2.1)*120,
    size: 2 + hash(i*3.3)*4.5,
    life: 2.2 + hash(i*4.5)*1.6,
    hue: hash(i*5.7),                     // warm palette
    curl: (hash(i*6.9)-0.5)*1.2,
    delay: hash(i*8.1)*0.08,
  });
}
function drawBurst(t){
  const t0 = 1.40;
  pctx.globalCompositeOperation = 'lighter';
  for(const p of BURST){
    const localT = t - t0 - p.delay;
    if(localT < 0 || localT > p.life) continue;
    const n = localT / p.life;
    const ease = 1 - Math.pow(1 - n, 2.2);
    const dist = p.speed * ease * 0.9;
    const ang = p.ang + p.curl * n;
    const x = HEART_CX + Math.cos(ang) * dist;
    const y = HEART_CY + Math.sin(ang) * dist + p.gravity * n * n * 2;
    const alpha = Math.pow(1 - n, 1.6);
    const r = p.size * (1 - 0.3*n);
    // color
    const h = p.hue;
    let col;
    if(h < 0.55) col = `rgba(255, ${120 + h*160|0}, ${150 + h*60|0}, ${alpha})`;
    else if(h < 0.85) col = `rgba(255, ${180 + (h-0.55)*180|0}, ${110 - (h-0.55)*80|0}, ${alpha})`;
    else col = `rgba(${180 + (1-h)*80|0}, 150, 255, ${alpha})`;
    // glow
    pctx.fillStyle = col;
    pctx.beginPath();
    pctx.arc(x, y, r*3.2, 0, Math.PI*2);
    pctx.globalAlpha = 0.18 * alpha;
    pctx.fill();
    pctx.globalAlpha = 1;
    pctx.beginPath();
    pctx.arc(x, y, r, 0, Math.PI*2);
    pctx.fillStyle = col;
    pctx.fill();
  }
  pctx.globalCompositeOperation = 'source-over';
}

/* --- combo rising hearts (multi, t=4.2 → 7.0) --- */
const COMBO = [];
for(let i=0;i<14;i++){
  COMBO.push({
    id:i,
    startT: 4.20 + i*0.18 + hash(i*2.1)*0.05,
    life: 2.6 + hash(i*3.3)*0.8,
    x0: HEART_CX + (hash(i*4.7)-0.5)*180,
    y0: HEART_CY - 20 + (hash(i*5.9)-0.5)*60,
    drift: (hash(i*6.1)-0.5)*220,
    sway: 0.8 + hash(i*7.3)*1.4,
    size: 24 + hash(i*8.5)*30,
    hue: hash(i*9.7),
  });
}
function drawComboHearts(t){
  pctx.globalCompositeOperation = 'lighter';
  for(const h of COMBO){
    const local = t - h.startT;
    if(local < 0 || local > h.life) continue;
    const n = local / h.life;
    const yRise = 360 * easeOut(n);
    const swayX = Math.sin(n*Math.PI*2*h.sway) * 22;
    const x = h.x0 + swayX + h.drift * easeOut(n) * 0.6;
    const y = h.y0 - yRise;
    const pop = springOut(clamp01(local/0.28));
    const fade = n < 0.75 ? 1 : (1 - (n-0.75)/0.25);
    const s = h.size * pop * (0.9 + 0.2*Math.sin(local*6));
    drawMiniHeart(pctx, x, y, s, h.hue, 0.85*fade);
  }
  pctx.globalCompositeOperation = 'source-over';
}
function drawMiniHeart(ctx, x, y, s, hue, alpha){
  // simple heart with glow
  ctx.save();
  ctx.translate(x, y);
  const col = hue < 0.5
    ? `rgba(255, ${120 + hue*160|0}, ${160 - hue*40|0}, ${alpha})`
    : `rgba(${200 + (hue-0.5)*80|0}, ${120 + (hue-0.5)*80|0}, ${255 - (hue-0.5)*60|0}, ${alpha})`;
  // glow
  ctx.fillStyle = col;
  ctx.globalAlpha = alpha*0.35;
  ctx.beginPath(); ctx.arc(0, -s*0.2, s*0.9, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // shape
  ctx.fillStyle = col;
  ctx.beginPath();
  const k = s/30;
  ctx.moveTo(0, 10*k);
  ctx.bezierCurveTo(-18*k, -4*k, -20*k, -22*k, 0, -14*k);
  ctx.bezierCurveTo(20*k, -22*k, 18*k, -4*k, 0, 10*k);
  ctx.fill();
  ctx.restore();
}

/* --- trail arc on first burst --- */
function drawTrail(t){
  const t0 = 1.10, t1 = 1.40;
  if(t < t0 || t > t1+0.25) return;
  const n = clamp01((t - t0) / (t1 - t0));
  const e = easeOutQuint(n);
  pctx.strokeStyle = `rgba(255, 140, 180, ${0.55*(1-Math.max(0,(t-t1)/0.25))})`;
  pctx.lineWidth = 2;
  pctx.beginPath();
  const start = { x: HEART_CX + 420, y: HEART_CY + 280 };
  const cp    = { x: HEART_CX + 150, y: HEART_CY - 200 };
  const end   = { x: HEART_CX,       y: HEART_CY };
  // draw partial bezier up to e
  const steps = 32;
  for(let i=0;i<=steps*e;i++){
    const u = i/steps;
    const x = (1-u)*(1-u)*start.x + 2*(1-u)*u*cp.x + u*u*end.x;
    const y = (1-u)*(1-u)*start.y + 2*(1-u)*u*cp.y + u*u*end.y;
    if(i===0) pctx.moveTo(x,y); else pctx.lineTo(x,y);
  }
  pctx.stroke();
  // leading dot
  const u = e;
  const x = (1-u)*(1-u)*start.x + 2*(1-u)*u*cp.x + u*u*end.x;
  const y = (1-u)*(1-u)*start.y + 2*(1-u)*u*cp.y + u*u*end.y;
  pctx.fillStyle = 'rgba(255,200,220,0.95)';
  pctx.beginPath(); pctx.arc(x, y, 4, 0, Math.PI*2); pctx.fill();
  pctx.fillStyle = 'rgba(255,130,170,0.35)';
  pctx.beginPath(); pctx.arc(x, y, 14, 0, Math.PI*2); pctx.fill();
}

/* =========================================================
   LAYER 3 — SVG: heart path, concentric rings, connection lines
   ========================================================= */
const heartSvg = document.getElementById('heartSvg');
const ringSvg  = document.getElementById('ringSvg');

// heart path (centered at 0,0, scale 1 ≈ 120px)
const HEART_D = (() => {
  // classic cubic heart
  return "M 0 28 C -48 -4 -52 -60 0 -40 C 52 -60 48 -4 0 28 Z";
})();

// build once
const heartG = document.createElementNS('http://www.w3.org/2000/svg','g');
heartG.setAttribute('id','heartG');
heartG.setAttribute('transform', `translate(${HEART_CX},${HEART_CY})`);
heartSvg.appendChild(heartG);

// glow halo (filter-less, layered)
const halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
halo.setAttribute('cx', 0); halo.setAttribute('cy', 0);
halo.setAttribute('fill', 'url(#haloGrad)');
heartG.appendChild(halo);

// gradient defs
const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
defs.innerHTML = `
  <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff87b3" stop-opacity="0.95"/>
    <stop offset="35%" stop-color="#ff4d6d" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffc0d4"/>
    <stop offset="45%" stop-color="#ff6fa0"/>
    <stop offset="100%" stop-color="#ff2f63"/>
  </linearGradient>
  <linearGradient id="heartOutline" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#b7a9c9" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#7c6c94" stop-opacity="0.9"/>
  </linearGradient>`;
heartSvg.appendChild(defs);

// outline (idle) heart
const heartOutline = document.createElementNS('http://www.w3.org/2000/svg','path');
heartOutline.setAttribute('d', HEART_D);
heartOutline.setAttribute('fill', 'none');
heartOutline.setAttribute('stroke', 'url(#heartOutline)');
heartOutline.setAttribute('stroke-width', '2.5');
heartOutline.setAttribute('stroke-linejoin', 'round');
heartG.appendChild(heartOutline);

// filled heart
const heartFill = document.createElementNS('http://www.w3.org/2000/svg','path');
heartFill.setAttribute('d', HEART_D);
heartFill.setAttribute('fill', 'url(#heartGrad)');
heartFill.setAttribute('stroke', '#ffd1e0');
heartFill.setAttribute('stroke-width', '1');
heartG.appendChild(heartFill);

// highlight spark
const heartSpark = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
heartSpark.setAttribute('cx', '-14'); heartSpark.setAttribute('cy', '-26');
heartSpark.setAttribute('rx', '6'); heartSpark.setAttribute('ry', '3');
heartSpark.setAttribute('fill', '#ffffff');
heartSpark.setAttribute('opacity', '0.7');
heartG.appendChild(heartSpark);

// rings (3 concentric)
const ringG = document.createElementNS('http://www.w3.org/2000/svg','g');
ringG.setAttribute('transform', `translate(${HEART_CX},${HEART_CY})`);
ringSvg.appendChild(ringG);
const rings = [];
for(let i=0;i<3;i++){
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx','0'); c.setAttribute('cy','0');
  c.setAttribute('r', '30');
  c.setAttribute('fill','none');
  c.setAttribute('stroke', i===0 ? '#ff7aa6' : (i===1 ? '#ffb86b' : '#8a5cff'));
  c.setAttribute('stroke-width','2');
  ringG.appendChild(c);
  rings.push(c);
}

// connection lines that reach out to "other people" at bloom
const linesG = document.createElementNS('http://www.w3.org/2000/svg','g');
linesG.setAttribute('transform', `translate(${HEART_CX},${HEART_CY})`);
ringSvg.appendChild(linesG);
const LINE_TARGETS = [];
for(let i=0;i<7;i++){
  const ang = -Math.PI/2 + (i - 3) * 0.42 + hash(i*2.3)*0.08;
  const dist = 380 + hash(i*3.3)*120;
  LINE_TARGETS.push({
    id:i, ang, dist,
    tx: Math.cos(ang)*dist,
    ty: Math.sin(ang)*dist,
    delay: i*0.08,
  });
}
const lineEls = [];
const nodeEls = [];
for(const tgt of LINE_TARGETS){
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1','0'); l.setAttribute('y1','0');
  l.setAttribute('x2', tgt.tx); l.setAttribute('y2', tgt.ty);
  l.setAttribute('stroke', '#ff89b3');
  l.setAttribute('stroke-width','1.2');
  l.setAttribute('stroke-linecap','round');
  linesG.appendChild(l);
  lineEls.push(l);

  const n = document.createElementNS('http://www.w3.org/2000/svg','circle');
  n.setAttribute('cx', tgt.tx); n.setAttribute('cy', tgt.ty);
  n.setAttribute('r','0');
  n.setAttribute('fill','#ffd3e1');
  linesG.appendChild(n);
  nodeEls.push(n);
}

/* =========================================================
   LAYER 4 — DOM: +1 floaters, count morph, card breath
   ========================================================= */
const plusOnesRoot = document.createElement('div');
plusOnesRoot.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:7';
document.getElementById('stage').appendChild(plusOnesRoot);

const PLUSONES = [];
for(let i=0;i<8;i++){
  const el = document.createElement('div');
  el.className = 'plusone';
  el.style.willChange = 'transform, opacity';
  el.style.fontSize = (28 + hash(i*2.3)*14) + 'px';
  el.style.color = i%2===0 ? '#ffd1e0' : '#ffdcb0';
  el.style.textShadow = '0 2px 18px rgba(255,120,160,0.6)';
  el.textContent = '+1';
  plusOnesRoot.appendChild(el);
  PLUSONES.push({
    el,
    startT: 4.20 + i*0.18,
    life: 1.8,
    x0: HEART_CX + 80 + (hash(i*3.1)-0.5)*120,
    y0: HEART_CY - 30 + (hash(i*4.3)-0.5)*80,
    drift: (hash(i*5.5)-0.5)*180,
  });
}

const card = document.getElementById('card');
const likeCount = document.getElementById('likeCount');
const pillLike = document.getElementById('pillLike');

// big floating count over the card (starts after burst)
const bigCount = document.createElement('div');
bigCount.className = 'count-big';
bigCount.style.left = (HEART_CX - 60) + 'px';
bigCount.style.top  = (HEART_CY + 110) + 'px';
bigCount.style.opacity = '0';
bigCount.textContent = '1,285';
document.getElementById('stage').appendChild(bigCount);

/* =========================================================
   RENDER: assemble all layers as f(t)
   ========================================================= */
function heat(t){
  // overall emotional envelope (0..1)
  let h = 0.08; // ambient
  h += 0.22 * kern(t, 1.10, 0.30, easeOut);      // approach
  h += 0.40 * kern(t, 1.40, 0.35, easeOut);      // burst
  h -= 0.18 * kern(t, 2.80, 1.20, easeInOut);    // slight cool
  h += 0.28 * kern(t, 4.20, 2.00, easeInOut);    // combo rise
  h += 0.24 * kern(t, 6.80, 1.20, easeOut);      // bloom
  h -= 0.28 * kern(t, 8.60, 1.40, easeInOut);    // settle
  return clamp01(h);
}

function render(t){
  const H = heat(t);

  /* ---------- bg ---------- */
  drawBG(t, H);

  /* ---------- field clear ---------- */
  fctx.clearRect(0,0,1920,1080);
  drawDust(t, H);

  /* ---------- particle canvas clear ---------- */
  pctx.clearRect(0,0,1920,1080);
  drawTrail(t);
  drawBurst(t);
  drawComboHearts(t);

  /* ---------- card breathing ---------- */
  // idle heartbeat-like scale
  const breath = 1 + 0.004*Math.sin(t*1.4*Math.PI);
  // small pull toward center when heat high
  const pull = 1 + 0.012*H;
  card.style.transform = `translate(-50%,-50%) scale(${(breath*pull).toFixed(4)})`;
  card.style.boxShadow = `
    0 ${60 + H*40}px ${140 + H*60}px -40px rgba(255,77,109, ${0.22 + H*0.35}),
    0 ${30 + H*20}px ${80 + H*40}px -30px rgba(138,92,255, ${0.28 + H*0.25}),
    inset 0 1px 0 rgba(255,255,255, ${0.06 + H*0.08})
  `;

  /* ---------- heart (SVG) ---------- */
  // approach: outline pulses as finger nears (t 0..1.1)
  let outlineOp = 0.85 + 0.15*Math.sin(t*2.1);
  // fill visibility
  let fillScale = 0;
  let fillOp = 0;
  // spring burst at 1.40
  if(t >= 1.10){
    const preN = clamp01((t - 1.10) / 0.30);
    outlineOp = lerp(0.85, 0.0, easeOut(preN));
  }
  if(t >= 1.40){
    // spring: 0 → 1.35 → 1.0 → tiny idle throb
    const n = clamp01((t - 1.40)/0.55);
    const s = springOut(n);
    fillScale = lerp(0.0, 1.25, s);
    if(t >= 1.95){
      const settle = clamp01((t - 1.95)/0.55);
      fillScale = lerp(1.25, 1.00, easeInOut(settle));
    }
    fillOp = clamp01((t-1.40)/0.15);
  }
  // sustained heartbeat after 2.5s
  if(t >= 2.50){
    fillScale += 0.035*Math.sin((t-2.50)*2.1*Math.PI);
  }
  // bloom boost
  if(t >= 6.80){
    const bn = clamp01((t-6.80)/0.8);
    fillScale += 0.12 * springOut(bn);
  }
  // settle
  if(t >= 8.60){
    const sn = clamp01((t-8.60)/1.4);
    fillScale = lerp(fillScale, 1.00, easeInOut(sn));
  }

  // apply transforms (heartG kept at card center)
  // we need two transforms: group position + inner scale. Use nested transform.
  const rotWobble = Math.sin(t*1.9)*1.2 + (t>1.4 ? Math.sin((t-1.4)*9)*2.5*Math.exp(-(t-1.4)*2.8) : 0);
  heartG.setAttribute('transform',
    `translate(${HEART_CX},${HEART_CY}) rotate(${rotWobble.toFixed(2)}) scale(${(1*fillScale||1).toFixed(3)})`);

  heartOutline.setAttribute('opacity', (t<1.4 ? outlineOp : 0).toFixed(3));
  heartOutline.setAttribute('transform', `scale(${(1 + 0.02*Math.sin(t*1.4*Math.PI)).toFixed(3)})`);
  // fill visibility via opacity of heartFill element itself
  heartFill.setAttribute('opacity', fillOp.toFixed(3));
  // color morph — amber/gold during bloom
  const morph = kern(t, 6.80, 0.9, easeInOut) - kern(t, 8.20, 0.8, easeInOut);
  const grad = defs.querySelector('#heartGrad');
  if(grad){
    grad.children[0].setAttribute('stop-color',
      morph > 0 ? `rgb(${255}, ${192 + morph*63|0}, ${212 - morph*40|0})` : '#ffc0d4');
    grad.children[1].setAttribute('stop-color',
      morph > 0.2 ? '#ffb06f' : '#ff6fa0');
    grad.children[2].setAttribute('stop-color',
      morph > 0.2 ? '#ff6f9a' : '#ff2f63');
  }

  // halo
  const haloR = 40 + 120*H + (t>1.4 ? 80*Math.exp(-(t-1.4)*1.2) : 0);
  halo.setAttribute('r', haloR.toFixed(1));
  halo.setAttribute('opacity', (0.35 + 0.55*H).toFixed(3));

  // spark (reflection) visibility
  heartSpark.setAttribute('opacity', (fillOp * (0.55 + 0.3*Math.sin(t*3.2))).toFixed(3));

  /* ---------- rings ---------- */
  // 3 rings radiate at staggered times, each grows+fades
  const ringStart = [1.42, 1.60, 1.82];
  rings.forEach((r, i) => {
    const s = ringStart[i];
    const n = clamp01((t - s) / 1.6);
    if(n <= 0 || n >= 1){
      r.setAttribute('opacity', 0);
      return;
    }
    const radius = lerp(40, 560, easeOutQuint(n));
    const op = (1 - n) * 0.85;
    const w = lerp(3.5, 0.6, n);
    r.setAttribute('r', radius.toFixed(1));
    r.setAttribute('stroke-width', w.toFixed(2));
    r.setAttribute('opacity', op.toFixed(3));
  });

  /* ---------- connection lines (bloom) ---------- */
  const bloomStart = 6.80;
  LINE_TARGETS.forEach((tgt, i) => {
    const localT = t - bloomStart - tgt.delay;
    const line = lineEls[i];
    const node = nodeEls[i];
    if(localT < 0){
      line.setAttribute('opacity', 0);
      node.setAttribute('r', 0);
      return;
    }
    const draw = clamp01(localT / 0.55);
    const e = easeOutQuint(draw);
    const curTx = tgt.tx * e;
    const curTy = tgt.ty * e;
    line.setAttribute('x2', curTx.toFixed(1));
    line.setAttribute('y2', curTy.toFixed(1));
    // settle fade
    let op = 0.75;
    if(t >= 8.20){
      op = lerp(0.75, 0.0, easeInOut(clamp01((t-8.20)/1.2)));
    }
    line.setAttribute('opacity', op.toFixed(3));
    // node pop
    if(draw >= 1){
      const pop = springOut(clamp01((localT - 0.55)/0.3));
      let nr = pop * 6;
      if(t >= 8.20){
        nr *= (1 - easeInOut(clamp01((t-8.20)/1.2)));
      }
      node.setAttribute('r', nr.toFixed(2));
      node.setAttribute('opacity', op.toFixed(3));
    } else {
      node.setAttribute('r', 0);
    }
  });

  /* ---------- +1 floaters ---------- */
  for(const p of PLUSONES){
    const localT = t - p.startT;
    if(localT < 0 || localT > p.life){
      p.el.style.opacity = 0;
      continue;
    }
    const n = localT / p.life;
    const pop = springOut(clamp01(localT / 0.25));
    const rise = 260 * easeOut(n);
    const swayX = Math.sin(n*Math.PI*1.7) * 14;
    const x = p.x0 + p.drift * easeOut(n) * 0.5 + swayX;
    const y = p.y0 - rise;
    const scale = pop * (0.85 + 0.15*Math.sin(localT*7));
    let op = 1;
    if(n > 0.7) op = (1 - (n-0.7)/0.3);
    p.el.style.transform = `translate(${x}px, ${y}px) scale(${scale.toFixed(3)})`;
    p.el.style.opacity = op.toFixed(3);
  }

  /* ---------- counter ---------- */
  // ticks from 1,284 → 1,285 at burst; to 1,298 through combo; settle at 1,298
  let count = 1284;
  if(t >= 1.45) count = 1285;
  if(t >= 4.20){
    const comboN = clamp01((t-4.20)/2.40);
    count = 1285 + Math.floor(comboN * 13);
  }
  if(t >= 6.60) count = 1298;
  likeCount.textContent = count.toLocaleString('en-US');
  // pill color heat
  pillLike.style.color = `rgba(${255}, ${150 + H*60|0}, ${180 + H*30|0}, 1)`;

  // big count floater
  if(t >= 1.45 && t <= 3.2){
    const n = clamp01((t-1.45)/1.6);
    const pop = springOut(clamp01((t-1.45)/0.4));
    const op = n < 0.6 ? 1 : (1 - (n-0.6)/0.4);
    bigCount.style.opacity = op.toFixed(3);
    bigCount.style.transform =
      `translate(${(Math.sin(t*1.3)*4).toFixed(2)}px, ${(-40*easeOut(n)).toFixed(2)}px) scale(${pop.toFixed(3)})`;
    bigCount.textContent = '+1  ' + (1285).toLocaleString();
  } else {
    bigCount.style.opacity = 0;
  }
}

/* =========================================================
   Timeline controller (from template)
   ========================================================= */
const scrubber = document.getElementById('scrubber');
const playBtn  = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel= document.getElementById('timeLabel');
const frameLabel=document.getElementById('frameLabel');
const cueRow   = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t){
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop(){
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if(playing){
    let next = currentT + dt;
    if(next >= DURATION) next = 0;
    setTime(next);
  }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => {
  playing = false; playBtn.textContent = '▶';
  setTime(scrubber.value / 1000 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing; playBtn.textContent = playing ? '⏸' : '▶';
  lastFrame = performance.now();
});
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});

setTime(0);
requestAnimationFrame(loop);
</script>
