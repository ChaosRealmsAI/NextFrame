<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H3 — Like Explosion (Multi-Layer)</title>
<style>
  :root {
    --bg-0: #0a0612;
    --bg-1: #1a0a2a;
    --pink: #ff3e78;
    --rose: #ff87b5;
    --gold: #ffd36e;
    --white: #fff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    color: #fff;
  }
  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    margin: 0 auto;
    background: radial-gradient(circle at 50% 55%, #1a0a2a 0%, #0a0612 70%);
    transform-origin: top left;
    overflow: hidden;
  }
  /* Auto fit stage to viewport */
  .fit-wrap {
    position: fixed;
    inset: 0;
    display: flex; align-items: flex-start; justify-content: center;
    background: #000;
  }
  /* Layer stacking */
  .layer { position: absolute; inset: 0; pointer-events: none; }
  #bgCanvas, #glCanvas, #partCanvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; }

  /* SVG heart center */
  #svgLayer { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* DOM text bits */
  .dom-layer { position: absolute; inset: 0; pointer-events: none; }
  .plus-one {
    position: absolute;
    font-weight: 900;
    font-size: 72px;
    letter-spacing: -0.02em;
    color: var(--white);
    text-shadow: 0 4px 32px rgba(255, 62, 120, 0.7), 0 0 12px rgba(255,255,255,0.6);
    will-change: transform, opacity;
  }
  .count-label {
    position: absolute;
    left: 50%;
    top: 72%;
    transform: translate(-50%, 0);
    font-weight: 800;
    font-size: 96px;
    letter-spacing: -0.02em;
    color: var(--white);
    text-shadow: 0 6px 32px rgba(0,0,0,0.5);
  }
  .count-label .unit {
    font-size: 40px;
    opacity: 0.7;
    margin-left: 12px;
    vertical-align: super;
  }
  .hype-text {
    position: absolute;
    left: 50%;
    top: 22%;
    transform: translate(-50%, -50%);
    font-weight: 900;
    font-size: 128px;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #ffd36e 50%, #ff87b5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 8px 32px rgba(255, 62, 120, 0.6));
    white-space: nowrap;
  }
  .tag {
    position: absolute;
    left: 50%;
    top: 88%;
    transform: translate(-50%, 0);
    font-size: 22px;
    letter-spacing: 0.3em;
    font-weight: 600;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .combo-ring {
    position: absolute;
    left: 50%; top: 55%;
    transform: translate(-50%,-50%);
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 24px rgba(255, 211, 110, 0.8);
  }

  /* Timeline UI */
  .cue-row {
    position: fixed;
    bottom: 56px;
    left: 24px; right: 24px;
    height: 22px;
    pointer-events: none;
    z-index: 20;
  }
  .cue-mark {
    position: absolute;
    bottom: 0;
    width: 2px;
    height: 12px;
    background: rgba(255, 211, 110, 0.7);
  }
  .cue-mark .lbl {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(255, 211, 110, 0.8);
    white-space: nowrap;
    font-family: -apple-system, monospace;
    letter-spacing: 0.05em;
  }
  .tl-ui {
    position: fixed;
    bottom: 12px;
    left: 24px; right: 24px;
    height: 36px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    font-family: -apple-system, monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    z-index: 21;
    backdrop-filter: blur(8px);
  }
  .tl-ui button {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .tl-ui button:hover { background: rgba(255,62,120,0.25); }
  .tl-ui .time { min-width: 140px; color: rgba(255,255,255,0.65); }
  .tl-ui input[type=range] { flex: 1; accent-color: #ff3e78; }
</style>
</head>
<body>

<div class="fit-wrap">
  <div class="stage" id="stage">
    <!-- Layer 1: WebGL Shader background (ambient glow + noise) -->
    <canvas id="glCanvas" width="1920" height="1080" class="layer"></canvas>

    <!-- Layer 2: Canvas 2D background soft bokeh -->
    <canvas id="bgCanvas" width="1920" height="1080" class="layer"></canvas>

    <!-- Layer 3: SVG heart + rings -->
    <svg id="svgLayer" class="layer" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="heartGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#ffb3c9"/>
          <stop offset="60%" stop-color="#ff3e78"/>
          <stop offset="100%" stop-color="#b31858"/>
        </radialGradient>
        <radialGradient id="heartHighlight" cx="35%" cy="30%" r="40%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
        <filter id="blur20" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="20"/>
        </filter>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- big blurred bloom behind heart -->
      <circle id="heartBloom" cx="960" cy="540" r="260" fill="#ff3e78" opacity="0" filter="url(#blur20)"/>
      <!-- expanding rings -->
      <g id="ringGroup" transform="translate(960 540)"></g>
      <!-- twitter-style 12 burst dots -->
      <g id="burstDots" transform="translate(960 540)"></g>
      <!-- main heart (path group with transform) -->
      <g id="heartGroup" transform="translate(960 540)">
        <!-- Heart path centered, half-size ~ 120 -->
        <path id="heartShape"
          d="M 0,60
             C -30,30 -90,0 -90,-45
             C -90,-85 -55,-110 -30,-110
             C -10,-110 0,-95 0,-75
             C 0,-95 10,-110 30,-110
             C 55,-110 90,-85 90,-45
             C 90,0 30,30 0,60 Z"
          fill="url(#heartGrad)"
          stroke="#ff87b5"
          stroke-width="3"
          filter="url(#glow)"
        />
        <path
          d="M 0,60
             C -30,30 -90,0 -90,-45
             C -90,-85 -55,-110 -30,-110
             C -10,-110 0,-95 0,-75
             C 0,-95 10,-110 30,-110
             C 55,-110 90,-85 90,-45
             C 90,0 30,30 0,60 Z"
          fill="url(#heartHighlight)"
          opacity="0.8"
        />
      </g>
      <!-- floating small hearts group (combo) -->
      <g id="floatHearts"></g>
      <!-- connecting tracer lines -->
      <g id="tracers"></g>
    </svg>

    <!-- Layer 4: Canvas 2D particle system -->
    <canvas id="partCanvas" width="1920" height="1080" class="layer"></canvas>

    <!-- Layer 5: DOM text -->
    <div class="dom-layer">
      <div class="hype-text" id="hypeText" style="opacity:0">NICE!</div>
      <div class="plus-one" id="plusOne" style="opacity:0; left:50%; top:40%;">+1</div>
      <div class="combo-ring" id="comboRing" style="opacity:0">x0 COMBO</div>
      <div class="count-label" id="countLabel">
        <span id="countNum">0</span><span class="unit">likes</span>
      </div>
      <div class="tag">DOUBLE TAP · APPRECIATE</div>
    </div>
  </div>
</div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 10.00s</span>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <span class="time" id="frameLabel" style="min-width:120px;text-align:right">frame 0 / 300</span>
</div>

<script>
// ---------- utils ----------
const DURATION = 10.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = x => 1 - Math.pow(1 - x, 3);
const easeOutQuint = x => 1 - Math.pow(1 - x, 5);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const springOut = x => { const c = clamp01(x); return c===0||c===1 ? c : 1 - Math.exp(-6*c)*Math.cos(9*c); };
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));
const osc = (t, period) => Math.sin(t / period * Math.PI * 2);

// deterministic hash
function hash11(n) { let x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function hash12(a, b) { let x = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453; return x - Math.floor(x); }

const CUES = [
  { t: 0.0, label: 'Idle' },
  { t: 1.2, label: 'Burst' },
  { t: 2.4, label: 'Particles' },
  { t: 4.0, label: 'Combo' },
  { t: 6.0, label: 'Peak' },
  { t: 8.0, label: 'Fade' },
];

// ---------- fit to viewport ----------
function fitStage() {
  const stage = document.getElementById('stage');
  const vw = window.innerWidth;
  const vh = window.innerHeight - 100; // leave room for timeline UI
  const scale = Math.min(vw / 1920, vh / 1080);
  stage.style.transform = `scale(${scale})`;
  const scaledW = 1920 * scale;
  const scaledH = 1080 * scale;
  stage.style.marginLeft = (vw - scaledW) / 2 + 'px';
  stage.style.marginTop = Math.max(0, (vh - scaledH) / 2) + 'px';
}
window.addEventListener('resize', fitStage);

// ---------- Layer 1: WebGL shader (ambient + fbm glow) ----------
const gl = document.getElementById('glCanvas').getContext('webgl');
let glReady = false, glProg, glUniforms, glBuf;

function initGL() {
  if (!gl) return;
  const vs = `attribute vec2 a; void main(){ gl_Position = vec4(a, 0.0, 1.0); }`;
  const fs = `
    precision highp float;
    uniform vec2 uRes;
    uniform float uTime;
    uniform float uPulse;   // 0..1 burst pulse
    uniform float uCombo;   // 0..1 combo intensity
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p){
      vec2 i = floor(p), f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }
    float fbm(vec2 p){
      float v = 0.0; float amp = 0.5;
      for(int i=0;i<5;i++){ v += noise(p)*amp; p *= 2.02; amp *= 0.5; }
      return v;
    }
    void main(){
      vec2 uv = gl_FragCoord.xy / uRes.xy;
      vec2 p = uv - 0.5; p.x *= uRes.x / uRes.y;
      float r = length(p);
      // base dark gradient
      vec3 col = mix(vec3(0.04, 0.02, 0.08), vec3(0.10, 0.04, 0.18), 1.0 - smoothstep(0.0, 0.9, r));
      // fbm flow tinted rose
      vec2 fp = p * 2.5 + vec2(uTime * 0.08, -uTime * 0.05);
      float n = fbm(fp);
      n = pow(n, 1.8);
      col += vec3(0.35, 0.08, 0.18) * n * 0.25;
      // pulsing radial glow from heart on burst
      float glow = (1.0 - smoothstep(0.0, 0.55, r));
      col += vec3(1.0, 0.24, 0.47) * glow * (0.2 + uPulse * 0.85);
      // extra combo vignette
      col += vec3(1.0, 0.82, 0.43) * glow * glow * uCombo * 0.35;
      // subtle scanline
      col *= 0.95 + 0.05 * sin(uv.y * uRes.y * 0.35);
      gl_FragColor = vec4(col, 1.0);
    }
  `;
  function sh(type, src){ const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  glProg = prog;
  glBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, glBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const locA = gl.getAttribLocation(prog, 'a');
  gl.enableVertexAttribArray(locA);
  gl.vertexAttribPointer(locA, 2, gl.FLOAT, false, 0, 0);
  glUniforms = {
    uRes: gl.getUniformLocation(prog, 'uRes'),
    uTime: gl.getUniformLocation(prog, 'uTime'),
    uPulse: gl.getUniformLocation(prog, 'uPulse'),
    uCombo: gl.getUniformLocation(prog, 'uCombo'),
  };
  gl.uniform2f(glUniforms.uRes, 1920, 1080);
  glReady = true;
}
initGL();

function drawGL(t) {
  if (!glReady) return;
  // pulse: triggered at burst, decays
  const burst = clamp01((t - 1.2) / 0.4);
  const decay = Math.max(0, 1 - (t - 1.6) / 2.0);
  const pulse = burst * decay + 0.15 * Math.abs(osc(t, 1.6));
  // combo intensity ramps from 4s
  const combo = clamp01((t - 4.0) / 2.0) * (1 - clamp01((t - 8.0) / 2.0));
  gl.useProgram(glProg);
  gl.uniform1f(glUniforms.uTime, t);
  gl.uniform1f(glUniforms.uPulse, pulse);
  gl.uniform1f(glUniforms.uCombo, combo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ---------- Layer 2: Canvas 2D bokeh + trails ----------
const bgCtx = document.getElementById('bgCanvas').getContext('2d');
const N_BOKEH = 36;
function drawBokeh(t) {
  bgCtx.clearRect(0, 0, 1920, 1080);
  bgCtx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < N_BOKEH; i++) {
    const sx = hash11(i * 3.1 + 0.7);
    const sy = hash11(i * 1.9 + 11.3);
    const sz = hash11(i * 7.7 + 2.3);
    const speed = 0.08 + sz * 0.22;
    const y = ((sy * 1080 + t * speed * 200) % 1200) - 60;
    const x = sx * 1920 + 40 * Math.sin(t * 0.4 + i);
    const r = 8 + sz * 22;
    const pulse = 0.6 + 0.4 * Math.sin(t * 1.1 + i);
    const alpha = 0.08 + sz * 0.12 * pulse;
    const grd = bgCtx.createRadialGradient(x, y, 0, x, y, r * 3);
    const hue = 320 + sz * 40;
    grd.addColorStop(0, `hsla(${hue}, 90%, 70%, ${alpha})`);
    grd.addColorStop(1, 'hsla(320, 90%, 50%, 0)');
    bgCtx.fillStyle = grd;
    bgCtx.beginPath();
    bgCtx.arc(x, y, r * 3, 0, Math.PI * 2);
    bgCtx.fill();
  }
  bgCtx.globalCompositeOperation = 'source-over';
}

// ---------- Layer 4: Canvas 2D particle burst ----------
const pCtx = document.getElementById('partCanvas').getContext('2d');
const N_PART = 140;

// Each particle seeded: angle, speed, life offset, size, color hue, gravity
function particleState(i, localT) {
  // localT in 0..1 (life)
  if (localT < 0 || localT > 1) return null;
  const ang = hash11(i * 5.19) * Math.PI * 2;
  const speed = 240 + hash11(i * 2.71) * 620;
  const sz = 2 + hash11(i * 9.13) * 6;
  const hue = 330 + hash11(i * 4.41) * 40 - 15;
  const grav = 220 + hash11(i * 11.7) * 180;
  const drag = 2.6 + hash11(i * 3.83) * 1.4;
  // exponential slowdown
  const travel = (speed / drag) * (1 - Math.exp(-drag * localT));
  const x = 960 + Math.cos(ang) * travel;
  const y = 540 + Math.sin(ang) * travel + 0.5 * grav * localT * localT;
  const alpha = Math.pow(1 - localT, 1.6);
  const size = sz * (0.6 + 0.4 * (1 - localT));
  return { x, y, size, alpha, hue };
}

function drawParticles(t) {
  pCtx.clearRect(0, 0, 1920, 1080);
  pCtx.globalCompositeOperation = 'lighter';

  // Burst 1: main at 1.3s
  const bursts = [
    { start: 1.3, dur: 2.2, count: N_PART, powerScale: 1.0 },
    { start: 4.2, dur: 1.6, count: 80, powerScale: 0.7 },
    { start: 6.0, dur: 2.0, count: 100, powerScale: 0.9 },
  ];

  for (const b of bursts) {
    const localT = (t - b.start) / b.dur;
    if (localT < 0 || localT > 1) continue;
    for (let i = 0; i < b.count; i++) {
      const s = particleState(i + Math.round(b.start * 37), localT);
      if (!s) continue;
      const size = s.size * b.powerScale;
      const alpha = s.alpha;
      // trail: draw small streak behind
      const prevT = Math.max(0, localT - 0.04);
      const prev = particleState(i + Math.round(b.start * 37), prevT);
      if (prev) {
        pCtx.strokeStyle = `hsla(${s.hue}, 95%, 70%, ${alpha * 0.5})`;
        pCtx.lineWidth = size * 0.5;
        pCtx.beginPath();
        pCtx.moveTo(prev.x, prev.y);
        pCtx.lineTo(s.x, s.y);
        pCtx.stroke();
      }
      // glow dot
      const grd = pCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, size * 3);
      grd.addColorStop(0, `hsla(${s.hue}, 100%, 80%, ${alpha})`);
      grd.addColorStop(0.4, `hsla(${s.hue}, 100%, 62%, ${alpha * 0.6})`);
      grd.addColorStop(1, `hsla(${s.hue}, 100%, 50%, 0)`);
      pCtx.fillStyle = grd;
      pCtx.beginPath();
      pCtx.arc(s.x, s.y, size * 3, 0, Math.PI * 2);
      pCtx.fill();
    }
  }

  // Floating up-sparks during combo (4s..8s)
  const comboT = t - 4.0;
  if (comboT > 0 && comboT < 5) {
    const N = 40;
    for (let i = 0; i < N; i++) {
      const birth = hash11(i * 2.13) * 4.0;
      const life = comboT - birth;
      if (life < 0 || life > 2.0) continue;
      const lx = life / 2.0;
      const xSeed = hash11(i * 6.17);
      const x = 300 + xSeed * 1320 + 40 * Math.sin(life * 2 + i);
      const y = 900 - 760 * easeOut(lx);
      const alpha = (1 - lx) * 0.9;
      const hue = 330 + hash11(i * 8.81) * 50 - 15;
      const r = 3 + hash11(i * 1.27) * 3;
      const grd = pCtx.createRadialGradient(x, y, 0, x, y, r * 4);
      grd.addColorStop(0, `hsla(${hue}, 100%, 85%, ${alpha})`);
      grd.addColorStop(1, `hsla(${hue}, 100%, 55%, 0)`);
      pCtx.fillStyle = grd;
      pCtx.beginPath(); pCtx.arc(x, y, r * 4, 0, Math.PI * 2); pCtx.fill();
    }
  }

  pCtx.globalCompositeOperation = 'source-over';
}

// ---------- Layer 3: SVG heart + rings + twitter dots + floating hearts ----------
const svg = document.getElementById('svgLayer');
const heartGroup = document.getElementById('heartGroup');
const heartShape = document.getElementById('heartShape');
const heartBloom = document.getElementById('heartBloom');
const ringGroup = document.getElementById('ringGroup');
const burstDots = document.getElementById('burstDots');
const floatHearts = document.getElementById('floatHearts');
const tracers = document.getElementById('tracers');

// Pre-create 12 twitter-style burst dots
const N_DOTS = 12;
for (let i = 0; i < N_DOTS; i++) {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('r', 8);
  c.setAttribute('fill', i % 2 === 0 ? '#ffd36e' : '#ff87b5');
  c.setAttribute('cx', 0); c.setAttribute('cy', 0);
  c.setAttribute('opacity', 0);
  c.dataset.idx = i;
  burstDots.appendChild(c);
}

// Pre-create 3 rings
const N_RINGS = 4;
const rings = [];
for (let i = 0; i < N_RINGS; i++) {
  const r = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  r.setAttribute('cx', 0); r.setAttribute('cy', 0);
  r.setAttribute('fill', 'none');
  r.setAttribute('stroke', i < 2 ? '#ff87b5' : '#ffd36e');
  r.setAttribute('stroke-width', 3);
  r.setAttribute('opacity', 0);
  ringGroup.appendChild(r);
  rings.push(r);
}

// Pre-create 14 floating hearts (combo)
const N_FLOAT = 14;
const floats = [];
for (let i = 0; i < N_FLOAT; i++) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('d', 'M 0,20 C -10,10 -30,0 -30,-15 C -30,-28 -18,-36 -10,-36 C -3,-36 0,-32 0,-25 C 0,-32 3,-36 10,-36 C 18,-36 30,-28 30,-15 C 30,0 10,10 0,20 Z');
  const hue = 330 + hash11(i * 5.1) * 40 - 20;
  p.setAttribute('fill', `hsl(${hue}, 90%, 65%)`);
  p.setAttribute('opacity', 0.85);
  p.setAttribute('filter', 'url(#glow)');
  g.appendChild(p);
  floatHearts.appendChild(g);
  floats.push(g);
}

function drawSVG(t) {
  // ---- Heart idle heartbeat (t < 1.2) + spring burst (1.2..2.0) + settle + peak pulse (6..7) + fade (8..10)
  let heartScale = 1.0;
  let heartOpacity = 1.0;
  let heartRotate = 0;

  // idle breathing
  const idleBeat = 1 + 0.05 * Math.sin(t * 2.4);
  // spring burst
  const burstK = kern(t, 1.2, 0.8, springOut);
  const burstScale = lerp(1, 1.4, burstK);
  // peak pulse
  const peakPulse = 1 + 0.18 * Math.max(0, Math.sin((t - 6.0) * 4)) * (t > 6 && t < 7.8 ? 1 : 0);
  // fade out
  const fade = 1 - clamp01((t - 8.5) / 1.5) * 0.4;

  if (t < 1.2) {
    heartScale = idleBeat;
  } else if (t < 2.0) {
    heartScale = burstScale;
  } else {
    // settle to 1.0 with small damped oscillation
    const s = clamp01((t - 2.0) / 0.6);
    heartScale = lerp(1.4, 1.0, easeOutQuint(s)) + 0.03 * Math.sin(t * 5) * (1 - s);
    heartScale *= peakPulse;
    heartScale *= fade;
    heartOpacity = fade;
  }
  heartRotate = 3 * Math.sin(t * 1.6);
  heartGroup.setAttribute('transform',
    `translate(960 540) scale(${heartScale.toFixed(4)}) rotate(${heartRotate.toFixed(2)})`);
  heartShape.setAttribute('opacity', heartOpacity.toFixed(3));

  // heart color morph: gray → pink → red-hot
  const colorT = clamp01((t - 1.0) / 1.2);
  // use already-defined gradient; we morph bloom & stroke intensity instead
  const bloomK = kern(t, 1.2, 1.5) * (1 - clamp01((t - 8.5) / 1.5));
  heartBloom.setAttribute('opacity', (0.2 + 0.55 * bloomK).toFixed(3));
  const bloomR = 180 + 180 * Math.max(bloomK, 0.5 + 0.5 * Math.sin(t * 2.2 + 1));
  heartBloom.setAttribute('r', bloomR.toFixed(1));

  // ---- Rings: expanding concentric at each burst moment
  const ringBursts = [1.3, 2.6, 4.2, 6.0];
  rings.forEach((r, i) => {
    // pick which burst this ring belongs to: i % N_RINGS cycles, but use local time by closest burst
    let best = -1, bestLocal = 2;
    for (const b of ringBursts) {
      const delayed = b + i * 0.08;
      const local = (t - delayed) / 1.2;
      if (local >= 0 && local < 1 && local < bestLocal) {
        bestLocal = local; best = b;
      }
    }
    if (best < 0) { r.setAttribute('opacity', 0); return; }
    const rad = lerp(60, 460, easeOut(bestLocal));
    const op = (1 - bestLocal) * 0.7;
    r.setAttribute('r', rad.toFixed(1));
    r.setAttribute('opacity', op.toFixed(3));
    r.setAttribute('stroke-width', (4 - 3 * bestLocal).toFixed(2));
  });

  // ---- Twitter dots: 12 dots flying outward on burst (1.2..2.1)
  const tLocal = (t - 1.25) / 0.9;
  for (let i = 0; i < N_DOTS; i++) {
    const c = burstDots.children[i];
    if (tLocal < 0 || tLocal > 1) {
      c.setAttribute('opacity', 0);
      continue;
    }
    const ang = (i / N_DOTS) * Math.PI * 2 + 0.2;
    const dist = lerp(0, 260, easeOutQuint(tLocal));
    const x = Math.cos(ang) * dist;
    const y = Math.sin(ang) * dist;
    const sz = (1 - tLocal) * 10 + 2;
    c.setAttribute('cx', x.toFixed(1));
    c.setAttribute('cy', y.toFixed(1));
    c.setAttribute('r', sz.toFixed(2));
    c.setAttribute('opacity', (1 - tLocal).toFixed(3));
  }

  // ---- Floating hearts rising from bottom (combo phase 3.5..9)
  floats.forEach((g, i) => {
    const birth = 3.5 + hash11(i * 1.73) * 4.0;
    const life = t - birth;
    if (life < 0 || life > 3.0) { g.setAttribute('opacity', 0); return; }
    const lt = life / 3.0;
    const xSeed = hash11(i * 9.27);
    const startX = 500 + xSeed * 920;
    const drift = 120 * Math.sin(life * 1.2 + i);
    const x = startX + drift;
    const y = 950 - 820 * easeOut(lt);
    const sc = 0.5 + 0.8 * Math.sin(Math.min(lt * Math.PI, Math.PI));
    const op = Math.min(1, lt * 3) * (1 - Math.pow(lt, 3)) * 0.9;
    g.setAttribute('transform', `translate(${x.toFixed(1)} ${y.toFixed(1)}) scale(${sc.toFixed(3)})`);
    g.setAttribute('opacity', op.toFixed(3));
  });

  // ---- Tracer lines from heart center to 6 peak points (2..3s)
  const tracerT = (t - 2.0) / 0.7;
  tracers.innerHTML = '';
  if (tracerT >= 0 && tracerT < 1) {
    for (let i = 0; i < 6; i++) {
      const ang = (i / 6) * Math.PI * 2 + 0.5;
      const reach = lerp(0, 340, easeOut(tracerT));
      const x2 = 960 + Math.cos(ang) * reach;
      const y2 = 540 + Math.sin(ang) * reach;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', 960); line.setAttribute('y1', 540);
      line.setAttribute('x2', x2.toFixed(1)); line.setAttribute('y2', y2.toFixed(1));
      line.setAttribute('stroke', '#ffd36e');
      line.setAttribute('stroke-width', (2 * (1 - tracerT) + 0.5).toFixed(2));
      line.setAttribute('opacity', ((1 - tracerT) * 0.55).toFixed(3));
      line.setAttribute('stroke-linecap', 'round');
      tracers.appendChild(line);
    }
  }
}

// ---------- Layer 5: DOM text ----------
const hypeText = document.getElementById('hypeText');
const plusOne = document.getElementById('plusOne');
const comboRing = document.getElementById('comboRing');
const countNum = document.getElementById('countNum');

function drawDOM(t) {
  // +1 popup at 1.4s
  const pT = (t - 1.4) / 1.0;
  if (pT >= 0 && pT < 1) {
    const scale = springOut(pT);
    const rise = -80 * easeOut(pT);
    const op = 1 - Math.pow(pT, 2.2);
    plusOne.style.opacity = op.toFixed(3);
    plusOne.style.transform = `translate(-50%, calc(-50% + ${rise}px)) scale(${scale.toFixed(3)})`;
    plusOne.style.left = '50%';
    plusOne.style.top = '45%';
  } else {
    plusOne.style.opacity = 0;
  }

  // "NICE!" hype text at 2.6s .. 4.2s
  const hT = (t - 2.6) / 1.6;
  if (hT >= 0 && hT < 1) {
    const sc = lerp(0.7, 1.15, springOut(clamp01(hT * 1.4)));
    const op = hT < 0.8 ? 1 : 1 - (hT - 0.8) / 0.2;
    const rot = Math.sin(hT * 8) * 2 * (1 - hT);
    hypeText.style.opacity = op.toFixed(3);
    hypeText.style.transform = `translate(-50%, -50%) scale(${sc.toFixed(3)}) rotate(${rot.toFixed(2)}deg)`;
    if (hT > 0.6) hypeText.textContent = 'AMAZING!';
    else hypeText.textContent = 'NICE!';
  } else {
    hypeText.style.opacity = 0;
  }

  // Combo ring at 4.0 .. 8.5
  const cT = t - 4.0;
  if (cT >= 0 && cT < 4.5) {
    const fade = cT < 0.5 ? cT / 0.5 : (cT > 4.0 ? 1 - (cT - 4.0) / 0.5 : 1);
    const mult = Math.floor(cT * 18) + 2;
    comboRing.textContent = `× ${mult}  COMBO`;
    const pulse = 1 + 0.1 * Math.abs(Math.sin(cT * 5));
    comboRing.style.opacity = clamp01(fade).toFixed(3);
    comboRing.style.transform = `translate(-50%, -50%) scale(${pulse.toFixed(3)})`;
  } else {
    comboRing.style.opacity = 0;
  }

  // Count-up number: grows with time
  // base 12345 → ramp at burst + combo
  let count = 12345;
  if (t > 1.3) count += Math.floor(easeOutQuint(clamp01((t - 1.3) / 0.8)) * 1);
  if (t > 2.6) count += Math.floor(easeOutQuint(clamp01((t - 2.6) / 1.2)) * 24);
  if (t > 4.0) count += Math.floor(clamp01((t - 4.0) / 4.0) * 782);
  countNum.textContent = count.toLocaleString();
}

// ---------- render ----------
function render(t) {
  drawGL(t);
  drawBokeh(t);
  drawSVG(t);
  drawParticles(t);
  drawDOM(t);
}

// ---------- timeline controller ----------
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1000);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) {
    let next = currentT + dt;
    if (next >= DURATION) next = 0;
    setTime(next);
  }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => {
  playing = false; playBtn.textContent = '▶';
  setTime(scrubber.value / 1000 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸' : '▶';
  lastFrame = performance.now();
});
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl';
  lbl.textContent = cue.label;
  m.appendChild(lbl);
  cueRow.appendChild(m);
});

fitStage();
setTime(0);
requestAnimationFrame(loop);
</script>
