<!--
  A · Kinetic Typography — frame-pure, scrubbable
  Techniques: letter 3D perspective, weight-morph, skew/rotate, mask reveal,
              sheen, typewriter, full-word flip, color inversion flash,
              shader noise background, stagger choreography, cue beats.
  Duration: 14s. Time source: single setTime(t). No CSS animations.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>A · Kinetic Typography</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100vh;background:#0a0a0a;overflow:hidden;
    font-family:"Inter","SF Pro Display",-apple-system,system-ui,sans-serif;
    color:#fff;-webkit-font-smoothing:antialiased}
  canvas{position:fixed;inset:0;width:100%;height:100%}
  #shader{z-index:0}

  /* ---- HUD editorial corners ---- */
  .hud{position:fixed;z-index:6;font-size:10px;letter-spacing:.4em;
    text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:500;opacity:0}
  .hud.tl{top:36px;left:44px}
  .hud.tr{top:36px;right:44px;text-align:right;line-height:1.9}
  .hud.bl{bottom:64px;left:44px;line-height:1.9}
  .hud.br{bottom:64px;right:44px;text-align:right;line-height:1.9}

  /* ---- Vertical flanks ---- */
  .vert{position:fixed;top:50%;z-index:4;writing-mode:vertical-rl;
    text-orientation:mixed;font-size:9px;letter-spacing:.42em;text-transform:uppercase;
    color:rgba(255,255,255,.35);line-height:2;opacity:0}
  .vert.l{left:44px;transform:translateY(-50%) rotate(180deg)}
  .vert.r{right:44px;transform:translateY(-50%)}

  /* ---- Center stage ---- */
  .stage{position:fixed;inset:0;z-index:3;display:grid;place-items:center;
    perspective:1200px;pointer-events:none}
  .content{text-align:center;width:92%;max-width:1600px;transform-style:preserve-3d}

  /* overline */
  .overline{font-size:12px;letter-spacing:.55em;text-transform:uppercase;
    font-weight:500;color:#e6ff3a;margin-bottom:32px;opacity:0}
  .overline::before,.overline::after{content:'';display:inline-block;
    width:50px;height:1px;background:#e6ff3a;vertical-align:middle;
    margin:0 16px;opacity:.8}

  /* big title — the star */
  .word{font-size:clamp(100px,20vw,320px);font-weight:900;letter-spacing:-.05em;
    line-height:.82;font-style:italic;display:inline-block;position:relative;
    will-change:transform;transform-origin:50% 50%}
  .word .letter{display:inline-block;position:relative;
    will-change:transform,font-variation-settings;
    font-variation-settings:"wght" 900;
    transform-origin:50% 100%}

  /* sheen overlay */
  .sheen{position:absolute;inset:-6% -12%;pointer-events:none;
    background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.95) 50%,transparent 58%);
    mix-blend-mode:overlay;opacity:0;will-change:transform,opacity}

  /* tagline (typewriter) */
  .tag{margin-top:44px;font-size:clamp(14px,1.3vw,18px);font-weight:300;
    letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.78);
    font-variant-numeric:tabular-nums;font-family:"JetBrains Mono","SF Mono",Menlo,monospace;
    min-height:1.5em;display:inline-flex;align-items:center;gap:3px}
  .tag .cursor{display:inline-block;width:9px;height:1em;background:#e6ff3a;
    margin-left:4px;opacity:0}

  /* chip (editorial accent) */
  .chip{position:fixed;top:42%;right:10%;z-index:5;
    background:#e6ff3a;color:#0a0a0a;padding:8px 14px;border-radius:4px;
    font-size:10px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;
    transform:rotate(-8deg);opacity:0;box-shadow:0 10px 40px rgba(230,255,58,.3)}

  /* horizontal divider */
  .divider{position:fixed;left:50%;top:22%;height:1px;width:0;
    transform:translateX(-50%);z-index:3;
    background:linear-gradient(90deg,transparent,rgba(230,255,58,.65),transparent)}
  .divider.bottom{top:auto;bottom:22%}

  /* number stamp */
  .stamp{position:fixed;z-index:5;font-size:13px;letter-spacing:.3em;
    text-transform:uppercase;color:rgba(255,255,255,.55);
    font-family:"JetBrains Mono","SF Mono",Menlo,monospace;
    font-variant-numeric:tabular-nums;opacity:0}
  .stamp.c1{top:12%;left:10%}
  .stamp.c2{bottom:14%;right:10%}

  /* grain overlay */
  .grain{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:.08;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/></svg>")}

  /* inversion overlay */
  .invert{position:fixed;inset:0;z-index:7;pointer-events:none;opacity:0;
    background:#e6ff3a;mix-blend-mode:difference}

  /* ---- Timeline UI ---- */
  .tl-ui{position:fixed;left:0;right:0;bottom:0;z-index:100;
    padding:14px 24px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.85));
    display:flex;align-items:center;gap:16px;
    font-family:"SF Mono",Menlo,monospace;font-size:11px;color:rgba(255,255,255,.85)}
  .tl-ui button{background:transparent;border:1px solid rgba(255,255,255,.3);
    color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;
    font-size:14px;display:grid;place-items:center;transition:all .2s}
  .tl-ui button:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.6)}
  .tl-ui .time{font-variant-numeric:tabular-nums;min-width:150px;letter-spacing:.05em}
  .tl-ui input[type=range]{flex:1;accent-color:#e6ff3a;height:3px}
  .cue-row{position:absolute;left:24px;right:24px;bottom:40px;
    height:14px;pointer-events:none}
  .cue-mark{position:absolute;width:2px;height:10px;background:rgba(230,255,58,.55);
    border-radius:1px;transform:translateX(-1px)}
  .cue-mark .lbl{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:.2em;color:rgba(230,255,58,.7);
    text-transform:uppercase;white-space:nowrap;font-weight:700}
</style>
</head>
<body>

<canvas id="shader"></canvas>

<div class="hud tl">A · Kinetic Typography</div>
<div class="hud tr">Vol. 01<br>/ the shape of words</div>
<div class="hud bl">Nextframe Lab<br>2026 Spring</div>
<div class="hud br">Frame-pure<br>scrubbable · 14.0s</div>

<div class="vert l">Weight · Form · Flow · Break</div>
<div class="vert r">Experiment N° 001 — typography in motion</div>

<div class="stamp c1" id="stamp1">N° 00·001</div>
<div class="stamp c2" id="stamp2">42.195 / sec</div>

<div class="divider" id="div1"></div>
<div class="divider bottom" id="div2"></div>

<div class="chip" id="chip">Kinetic</div>

<div class="stage">
  <div class="content" id="content">
    <div class="overline" id="overline">The Shape of</div>
    <h1 class="word" id="word"><span class="sheen" id="sheen"></span></h1>
    <div class="tag" id="tag"><span id="typed"></span><span class="cursor" id="cursor"></span></div>
  </div>
</div>

<div class="invert" id="invert"></div>
<div class="grain"></div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 14.00s</span>
  <input type="range" id="scrubber" min="0" max="1400" value="0" step="1">
  <span class="time" id="frameLabel" style="min-width:100px;text-align:right">frame 0 / 420</span>
</div>

<script>
/* ================== Timeline core ================== */
const DURATION = 14.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut   = x => 1 - Math.pow(1 - x, 3);
const easeOut5  = x => 1 - Math.pow(1 - x, 5);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const springOut = x => { const c = clamp01(x); return c===0||c===1 ? c : 1 - Math.exp(-6*c)*Math.cos(9*c); };
const kern = (t, start, dur, ease = easeOut) => ease(clamp01((t - start) / dur));
const osc  = (t, period) => Math.sin(t / period * Math.PI * 2);
const pulse= (t, start, dur) => { // triangle pulse 0→1→0
  const p = clamp01((t - start) / dur); return p < 0.5 ? p * 2 : (1 - p) * 2;
};
const stepBetween = (t, ta, tb) => clamp01((t - ta) / Math.max(1e-6, tb - ta));

const CUES = [
  { t: 0.3,  label: 'Overline' },
  { t: 0.6,  label: 'Divider' },
  { t: 1.2,  label: 'Word A' },
  { t: 3.0,  label: 'Flip' },
  { t: 4.8,  label: 'Word B' },
  { t: 6.8,  label: 'Tag' },
  { t: 9.2,  label: 'Invert' },
  { t: 10.0, label: 'Word C' },
  { t: 12.5, label: 'Final' },
];

/* ================== DOM ================== */
const word = document.getElementById('word');
const sheen = document.getElementById('sheen');
const overline = document.getElementById('overline');
const tagEl = document.getElementById('typed');
const cursorEl = document.getElementById('cursor');
const content = document.getElementById('content');
const chip = document.getElementById('chip');
const invert = document.getElementById('invert');
const div1 = document.getElementById('div1');
const div2 = document.getElementById('div2');
const hudEls = [...document.querySelectorAll('.hud')];
const vertEls = [...document.querySelectorAll('.vert')];
const stamps = [document.getElementById('stamp1'), document.getElementById('stamp2')];

/* Three-phase word change: "FORM" → "FLOW" → "BREAK" */
const PHASE = [
  { text: 'FORM',  start: 1.2, end: 4.8  },
  { text: 'FLOW',  start: 4.8, end: 10.0 },
  { text: 'BREAK', start: 10.0, end: 14.0 },
];

let currentPhaseIdx = -1;
let letters = [];

function buildWord(text) {
  // preserve sheen
  const sh = sheen;
  word.textContent = '';
  letters = [];
  text.split('').forEach(ch => {
    const s = document.createElement('span');
    s.className = 'letter';
    s.textContent = ch;
    word.appendChild(s);
    letters.push(s);
  });
  word.appendChild(sh);
}

function ensurePhase(t) {
  const idx = PHASE.findIndex(p => t >= p.start && t < p.end);
  const clamped = idx === -1 ? (t >= PHASE[PHASE.length-1].end ? PHASE.length-1 : 0) : idx;
  if (clamped !== currentPhaseIdx) {
    currentPhaseIdx = clamped;
    buildWord(PHASE[clamped].text);
  }
  return PHASE[clamped];
}

/* ================== Render ================== */
function render(t) {
  /* ---- HUDs ---- */
  hudEls.forEach((el, i) => {
    el.style.opacity = kern(t, 0.15 + i * 0.08, 1.4);
  });
  vertEls.forEach((el, i) => {
    el.style.opacity = kern(t, 1.8 + i * 0.12, 1.2);
  });
  stamps.forEach((el, i) => {
    el.style.opacity = kern(t, 2.2 + i * 0.2, 1.2);
  });

  /* ---- Overline fade + width expand ---- */
  const olP = kern(t, 0.3, 1.2, easeOut);
  overline.style.opacity = olP;
  overline.style.transform = `translateY(${(1 - olP) * 12}px)`;

  /* ---- Dividers expand from center ---- */
  const dP = kern(t, 0.6, 2.0, easeOut5);
  const dwidth = dP * 76;
  div1.style.width = dwidth + '%';
  div2.style.width = dwidth + '%';

  /* ---- Chip tilt in ---- */
  const chipP = kern(t, 2.6, 1.3, springOut);
  chip.style.opacity = chipP;
  chip.style.transform = `rotate(${-8 + (1 - chipP) * 20}deg) scale(${lerp(0.7, 1, chipP)})`;
  // chip pulse later
  if (t > 6) {
    const pp = (osc(t - 6, 1.2) + 1) / 2;
    chip.style.boxShadow = `0 ${10 + pp * 6}px ${40 + pp * 30}px rgba(230,255,58,${0.3 + pp * 0.3})`;
  }

  /* ---- Word phase transitions ---- */
  const phase = ensurePhase(t);
  const phaseP = clamp01((t - phase.start) / Math.max(0.5, phase.end - phase.start));
  const localT = t - phase.start;
  const isA = phase === PHASE[0];
  const isB = phase === PHASE[1];
  const isC = phase === PHASE[2];

  /* letter-level choreography per phase */
  letters.forEach((el, i) => {
    let opacity = 1, transform = '', weight = 900, skew = 0, rot = 0;
    const n = letters.length;
    if (isA) {
      // Phase A: letterIn stagger 3D perspective
      const p = kern(localT, 0 + i * 0.07, 1.0, easeOut);
      opacity = p;
      const y = (1 - p) * 80;
      const rx = (1 - p) * 40;
      const sc = lerp(0.85, 1, p);
      transform = `translateY(${y}px) scale(${sc}) rotateX(${rx}deg)`;
      // weight pulse
      const wpulse = localT > 1.5 ? Math.sin((localT - 1.5 + i * 0.2) * 2) * 0.5 + 0.5 : 0;
      weight = Math.round(lerp(400, 900, wpulse));
      // exit flip before phase B
      if (localT > 3.0) {
        const ex = kern(localT, 3.0, 0.8, easeInOut);
        transform += ` rotateY(${ex * 90}deg)`;
        opacity *= 1 - ex;
      }
    } else if (isB) {
      // Phase B: letterIn from flip (Y-axis) then skew wave
      const p = kern(localT, 0 + i * 0.06, 0.9, easeOut);
      opacity = p;
      transform = `rotateY(${(1 - p) * -90}deg)`;
      // skew wave running through the word
      if (localT > 1.5) {
        const wavePos = (localT - 1.5) * 1.5; // wave speed
        const distance = Math.abs(i - wavePos);
        const skewAmt = Math.exp(-distance * distance * 0.8) * 18;
        skew = skewAmt;
      }
      // weight breathe
      const wb = (osc(localT + i * 0.3, 2.5) + 1) / 2;
      weight = Math.round(lerp(500, 900, wb));
      // exit: lift up + blur fade
      if (localT > 4.0) {
        const ex = kern(localT, 4.0, 1.0, easeInOut);
        transform += ` translateY(${-ex * 120}px)`;
        opacity *= 1 - ex;
      }
    } else if (isC) {
      // Phase C: drop in from above with rotation
      const p = kern(localT, 0 + (n - 1 - i) * 0.05, 1.0, easeOut);
      opacity = p;
      const y = (1 - p) * -100;
      rot = (1 - p) * -15;
      transform = `translateY(${y}px) rotate(${rot}deg)`;
      // after landed, weight throbs
      if (localT > 1.5) {
        const bp = (osc(localT + i * 0.4, 3) + 1) / 2;
        weight = Math.round(lerp(600, 900, bp));
      }
    }
    el.style.opacity = opacity;
    el.style.transform = transform + (skew ? ` skewX(${skew}deg)` : '');
    el.style.fontVariationSettings = `"wght" ${weight}`;
  });

  /* ---- Whole-word flip between phases ---- */
  // Between phase transitions, big container flip
  const flipWindows = [
    { at: 4.0, dur: 0.8 },
    { at: 9.0, dur: 1.0 },
  ];
  let containerTransform = '';
  flipWindows.forEach(fw => {
    if (t > fw.at - fw.dur/2 && t < fw.at + fw.dur/2) {
      const p = (t - (fw.at - fw.dur/2)) / fw.dur;
      const ang = Math.sin(p * Math.PI) * 15; // small tilt
      containerTransform += ` rotateZ(${ang}deg)`;
    }
  });
  content.style.transform = containerTransform;

  /* ---- Sheen sweep — twice per phase ---- */
  const sheenCycles = [2.0, 7.0, 11.8];
  let sheenOpacity = 0, sheenX = -120;
  sheenCycles.forEach(sc => {
    const p = (t - sc) / 1.2;
    if (p > 0 && p < 1) {
      sheenX = lerp(-120, 120, easeInOut(p));
      sheenOpacity = Math.max(sheenOpacity, Math.sin(p * Math.PI) * 0.95);
    }
  });
  sheen.style.transform = `translateX(${sheenX}%)`;
  sheen.style.opacity = sheenOpacity;

  /* ---- Tagline typewriter ---- */
  const tagFull = '// MOTION.SHAPES.MEANING — render(t) = calm(beautiful)';
  const typeStart = 6.8, typeDur = 3.5;
  const typeP = clamp01((t - typeStart) / typeDur);
  const n = Math.floor(typeP * tagFull.length);
  tagEl.textContent = tagFull.slice(0, n);
  cursorEl.style.opacity = t > typeStart - 0.1 && t < typeStart + typeDur + 1.5
    ? (Math.floor(t * 2) % 2 === 0 ? 1 : 0.2) : 0;

  /* ---- Invert flash at 9.2s ---- */
  const invP = pulse(t, 9.0, 0.5);
  invert.style.opacity = invP * 0.9;

  /* ---- Shader ---- */
  renderShader(t);
}

/* ================== Shader ================== */
let shaderCtx = null;
function initShader() {
  const c = document.getElementById('shader');
  const gl = c.getContext('webgl', { antialias: false });
  if (!gl) return null;
  const resize = () => {
    const d = Math.min(devicePixelRatio || 1, 2);
    c.width = innerWidth * d; c.height = innerHeight * d;
    gl.viewport(0, 0, c.width, c.height);
  };
  resize(); addEventListener('resize', resize);
  const V = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const F = `precision highp float;uniform vec2 u_res;uniform float u_t;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*vnoise(p);p*=2.02;a*=.5;}return v;}
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.-1.;
  uv.x*=u_res.x/u_res.y;
  float t=u_t*.12;
  float n=fbm(uv*1.8+vec2(t,-t*.7));
  float n2=fbm(uv*4.+vec2(-t,t*1.2));
  vec3 base=vec3(.04,.04,.05);
  vec3 warm=vec3(.10,.08,.05);
  vec3 col=mix(base,warm,smoothstep(.2,.8,n));
  // subtle yellow highlights
  float hl=smoothstep(.55,.85,n2)*.3;
  col+=vec3(.18,.18,.06)*hl;
  // vignette
  float d=length(uv*vec2(.7,1.));
  col*=1.-smoothstep(.3,1.3,d)*.7;
  // grain
  float g=fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233))+u_t)*43758.5453);
  col+=(g-.5)*.02;
  gl_FragColor=vec4(col,1.);
}`;
  const sh=(t,s)=>{const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x};
  const P=gl.createProgram();gl.attachShader(P,sh(gl.VERTEX_SHADER,V));gl.attachShader(P,sh(gl.FRAGMENT_SHADER,F));gl.linkProgram(P);gl.useProgram(P);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const L=gl.getAttribLocation(P,'p');gl.enableVertexAttribArray(L);gl.vertexAttribPointer(L,2,gl.FLOAT,false,0,0);
  const uR=gl.getUniformLocation(P,'u_res'),uT=gl.getUniformLocation(P,'u_t');
  return { gl, uR, uT, canvas: c };
}
function renderShader(t) {
  if (!shaderCtx) return;
  const { gl, uR, uT, canvas } = shaderCtx;
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uT, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
shaderCtx = initShader();

/* ================== Timeline controller ================== */
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');

let currentT = 0, playing = true, lastFrame = performance.now();

function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1400);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) {
    let next = currentT + dt;
    if (next >= DURATION) next = 0;
    setTime(next);
  } else {
    render(currentT); // shader keeps same uniform → effectively still
  }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => {
  playing = false; playBtn.textContent = '▶';
  setTime(scrubber.value / 1400 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing; playBtn.textContent = playing ? '⏸' : '▶';
  lastFrame = performance.now();
});
resetBtn.addEventListener('click', () => setTime(0));

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  m.title = cue.label + ' @ ' + cue.t + 's';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});

setTime(0); requestAnimationFrame(loop);
</script>
</body>
</html>
