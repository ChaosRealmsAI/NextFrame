<!--
  F · Kaleidoscope — WebGL symmetric pattern, frame-pure, scrubbable
  Techniques:
    - N-fold rotational symmetry (fragment-coord fold)
    - Animated noise + polar coords
    - Fractal recursion via trap functions
    - HSV color wheel cycling
    - Central black-hole (dark core) with radial gradient
    - Pulse beats on cues
  Duration: 14s.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>F · Kaleidoscope</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100vh;background:#000;overflow:hidden;
    font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;
    color:#fff;-webkit-font-smoothing:antialiased}
  canvas{position:fixed;inset:0;width:100%;height:100%}
  #shader{z-index:0}

  .hud{position:fixed;z-index:6;font-size:10px;letter-spacing:.4em;
    text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:500;opacity:0;
    font-family:"JetBrains Mono","SF Mono",Menlo,monospace}
  .hud.tl{top:36px;left:44px}
  .hud.tr{top:36px;right:44px;text-align:right;line-height:1.9}
  .hud.bl{bottom:64px;left:44px;line-height:1.9}
  .hud.br{bottom:64px;right:44px;text-align:right;line-height:1.9}

  .center{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;
    text-align:center;pointer-events:none;mix-blend-mode:screen}
  .center h1{font-size:clamp(48px,6vw,92px);font-weight:200;letter-spacing:-.025em;
    color:#fff;text-shadow:0 0 30px rgba(255,255,255,.7);opacity:0;line-height:1}
  .center .tag{margin-top:16px;font-size:12px;letter-spacing:.45em;
    text-transform:uppercase;color:rgba(255,255,255,.7);opacity:0}

  .vignette{position:fixed;inset:0;z-index:7;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,.5) 100%)}

  .tl-ui{position:fixed;left:0;right:0;bottom:0;z-index:100;
    padding:14px 24px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.88));
    display:flex;align-items:center;gap:16px;
    font-family:"SF Mono",Menlo,monospace;font-size:11px;color:rgba(255,255,255,.85)}
  .tl-ui button{background:transparent;border:1px solid rgba(255,255,255,.3);
    color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;
    font-size:14px;display:grid;place-items:center}
  .tl-ui button:hover{background:rgba(255,255,255,.1)}
  .tl-ui .time{font-variant-numeric:tabular-nums;min-width:150px}
  .tl-ui input[type=range]{flex:1;accent-color:#ff6aaa;height:3px}
  .cue-row{position:absolute;left:24px;right:24px;bottom:40px;height:14px;pointer-events:none}
  .cue-mark{position:absolute;width:2px;height:10px;background:rgba(255,106,170,.6);
    border-radius:1px;transform:translateX(-1px)}
  .cue-mark .lbl{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:.2em;color:rgba(255,106,170,.8);
    text-transform:uppercase;white-space:nowrap;font-weight:700}
</style>
</head>
<body>

<canvas id="shader"></canvas>

<div class="hud tl">F · Kaleidoscope</div>
<div class="hud tr">Vol. 06<br>/ symmetry · folding · bloom</div>
<div class="hud bl">Nextframe Labs<br>Experiment N° 006</div>
<div class="hud br">frame-pure · scrubbable<br>14.0s</div>

<div class="center">
  <h1 id="title">Symmetry.</h1>
  <div class="tag" id="tag">Six-fold · time-folded · living</div>
</div>

<div class="vignette"></div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 14.00s</span>
  <input type="range" id="scrubber" min="0" max="1400" value="0" step="1">
  <span class="time" id="frameLabel" style="min-width:100px;text-align:right">frame 0 / 420</span>
</div>

<script>
const DURATION = 14.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const easeOut = x => 1 - Math.pow(1 - x, 3);
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));
const CUES = [
  { t: 0.5, label: 'Bloom' },
  { t: 2.0, label: 'Fold-6' },
  { t: 4.5, label: 'Hue' },
  { t: 7.0, label: 'Fold-12' },
  { t: 9.5, label: 'Focus' },
  { t: 12.0, label: 'Settle' },
];

const title = document.getElementById('title');
const tag = document.getElementById('tag');

function render(t) {
  document.querySelectorAll('.hud').forEach((el, i) => {
    el.style.opacity = kern(t, 0.15 + i * 0.08, 1.4);
  });
  const titleP = kern(t, 9.5, 1.4);
  title.style.opacity = titleP * 0.95;
  title.style.transform = `translateY(${(1-titleP) * 16}px)`;
  tag.style.opacity = kern(t, 10.3, 1.2) * 0.8;
  renderShader(t);
}

let shaderCtx = null;
function initShader() {
  const c = document.getElementById('shader');
  const gl = c.getContext('webgl');
  if (!gl) return null;
  const r = () => {
    const d = Math.min(devicePixelRatio || 1, 1.8);
    c.width = innerWidth * d; c.height = innerHeight * d;
    gl.viewport(0, 0, c.width, c.height);
  };
  r(); addEventListener('resize', r);
  const V = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const F = `precision highp float;uniform vec2 u_res;uniform float u_t;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*vnoise(p);p*=2.02;a*=.5;}return v;}

vec3 hsv2rgb(vec3 c){
  vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);
  vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);
  return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y);
}

// fold 2D coordinate into single wedge of N-fold symmetry
vec2 foldN(vec2 p, float n){
  float a = atan(p.y, p.x);
  float r = length(p);
  float wedge = 3.14159265 * 2.0 / n;
  a = mod(a, wedge);
  a = abs(a - wedge * 0.5);
  return vec2(cos(a), sin(a)) * r;
}

void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / min(u_res.x, u_res.y);

  // pick fold factor by time (animated in/out between 6 and 12)
  float foldEnv = smoothstep(6.5, 8.0, u_t) * (1.0 - smoothstep(11.0, 12.5, u_t));
  float nFold = mix(6.0, 12.0, foldEnv);

  vec2 p = foldN(uv, nFold);

  // slow rotation + zoom breathing
  float ang = u_t * 0.08;
  float zoom = 1.0 + 0.25 * sin(u_t * 0.3);
  mat2 R = mat2(cos(ang), -sin(ang), sin(ang), cos(ang));
  p = R * p * zoom;

  // fractal-like noise pattern
  float t = u_t * 0.12;
  vec2 q = p * 2.2;
  q.x += fbm(q + vec2(t, 0.)) * 0.6;
  q.y += fbm(q + vec2(0., t)) * 0.6;

  float n = fbm(q * 1.5);
  // radial bands
  float r = length(p);
  float bands = sin(r * 12.0 - u_t * 0.8) * 0.5 + 0.5;

  // hue wheel rotating over time
  float hue = mod(u_t * 0.04 + n * 0.35 + r * 0.6, 1.0);
  float sat = 0.65 + 0.3 * sin(u_t * 0.25);
  float val = smoothstep(0.0, 0.7, n) * (0.8 + bands * 0.3);

  vec3 col = hsv2rgb(vec3(hue, sat, val));

  // center dark core (black hole)
  float core = smoothstep(0.0, 0.18, r);
  col *= core;

  // rim glow at core edge
  col += vec3(1.0, 0.6, 0.9) * smoothstep(0.14, 0.22, r) * (1.0 - smoothstep(0.22, 0.32, r)) * 0.6;

  // outer vignette
  col *= 1.0 - smoothstep(0.7, 1.1, r) * 0.6;

  // soft bloom via upper-brightness lift
  float bloomK = smoothstep(0.55, 0.9, val);
  col += col * bloomK * 0.6;

  // film grain
  float g = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + u_t) * 43758.5453);
  col += (g - 0.5) * 0.025;

  gl_FragColor = vec4(col, 1.0);
}`;
  const sh=(t,s)=>{const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x};
  const P=gl.createProgram();gl.attachShader(P,sh(gl.VERTEX_SHADER,V));gl.attachShader(P,sh(gl.FRAGMENT_SHADER,F));gl.linkProgram(P);gl.useProgram(P);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const L=gl.getAttribLocation(P,'p');gl.enableVertexAttribArray(L);gl.vertexAttribPointer(L,2,gl.FLOAT,false,0,0);
  return { gl, uR: gl.getUniformLocation(P,'u_res'), uT: gl.getUniformLocation(P,'u_t'), canvas: c };
}
function renderShader(t) {
  if (!shaderCtx) return;
  const { gl, uR, uT, canvas } = shaderCtx;
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uT, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
shaderCtx = initShader();

/* timeline */
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();
function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1400);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) { let next = currentT + dt; if (next >= DURATION) next = 0; setTime(next); }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => { playing = false; playBtn.textContent = '▶'; setTime(scrubber.value / 1400 * DURATION); });
playBtn.addEventListener('click', () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; lastFrame = performance.now(); });
resetBtn.addEventListener('click', () => setTime(0));
CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});
setTime(0); requestAnimationFrame(loop);
</script>
</body>
</html>
