<!--
  B · Particle Choreography — frame-pure, scrubbable (revision 2)
  Techniques:
    - Seeded deterministic particles (id + t → x,y), 2400 points
    - Target formation morph: wander → disc → golden-spiral → text "FUTURE" → burst → core
    - Per-phase easing + per-particle stagger + radius-based delays
    - Triple-layer canvas (shader nebula bg + trails + particle cores with bloom)
    - Neural-like connections in formation phase (close-neighbor thin lines)
    - Phase-aware brightness boost, color envelope, halo beats
    - Dense glyph sampling (step=2) for clear letter-form
  Duration: 16s. Time source: single setTime(t). No CSS animations.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>B · Particle Choreography</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100vh;background:#03030a;overflow:hidden;
    font-family:-apple-system,"SF Pro Display","Inter",system-ui,sans-serif;
    color:#fff;-webkit-font-smoothing:antialiased}
  canvas{position:fixed;inset:0;width:100%;height:100%}
  #bg     { z-index: 0; }    /* shader nebula */
  #trail  { z-index: 1; }    /* low-alpha fade trails */
  #parts  { z-index: 2; }    /* particle cores + bloom */
  #glyph  { display:none }

  /* HUD */
  .hud{position:fixed;z-index:6;font-size:10px;letter-spacing:.4em;
    text-transform:uppercase;color:rgba(200,220,255,.65);font-weight:500;opacity:0;
    font-family:"JetBrains Mono","SF Mono",Menlo,monospace}
  .hud.tl{top:36px;left:44px;display:flex;align-items:center;gap:10px}
  .hud.tl::before{content:'';width:8px;height:8px;border-radius:50%;
    background:#7dc4ff;box-shadow:0 0 12px #7dc4ff,0 0 28px rgba(125,196,255,.7)}
  .hud.tr{top:36px;right:44px;text-align:right;line-height:1.9}
  .hud.bl{bottom:64px;left:44px;line-height:1.9}
  .hud.br{bottom:64px;right:44px;text-align:right;line-height:1.9}

  /* phase label */
  .phase{position:fixed;left:50%;top:16%;transform:translateX(-50%);z-index:5;
    font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:rgba(200,220,255,.95);
    font-family:"JetBrains Mono",monospace;display:flex;align-items:center;gap:14px;
    opacity:0;text-shadow:0 0 12px rgba(125,196,255,.5)}
  .phase::before,.phase::after{content:'';display:block;width:40px;height:1px;
    background:rgba(125,196,255,.6)}
  .phase .n{color:#7dc4ff;font-weight:700}

  /* subtitle */
  .sub{position:fixed;left:50%;bottom:18%;transform:translateX(-50%);z-index:5;
    font-size:clamp(14px,1.3vw,19px);font-weight:300;letter-spacing:.1em;
    color:rgba(230,240,255,.82);text-align:center;max-width:640px;opacity:0;
    text-shadow:0 0 20px rgba(0,0,0,.8)}

  /* final title */
  .final{position:fixed;left:50%;top:48%;transform:translate(-50%,-50%);z-index:5;
    font-size:clamp(60px,10vw,160px);font-weight:200;letter-spacing:.14em;
    color:rgba(255,255,255,.95);
    text-shadow:0 0 40px rgba(150,180,255,.8),
                0 0 80px rgba(120,140,255,.4),
                0 0 140px rgba(100,120,255,.25);
    opacity:0;text-align:center}

  /* central halo */
  .halo{position:fixed;left:50%;top:50%;width:720px;height:720px;
    transform:translate(-50%,-50%);z-index:3;pointer-events:none;
    background:radial-gradient(circle,rgba(150,180,255,.35),transparent 60%);
    filter:blur(24px);opacity:0;mix-blend-mode:screen}

  /* TL UI */
  .tl-ui{position:fixed;left:0;right:0;bottom:0;z-index:100;
    padding:14px 24px;background:linear-gradient(180deg,transparent,rgba(3,3,10,.9));
    display:flex;align-items:center;gap:16px;
    font-family:"SF Mono",Menlo,monospace;font-size:11px;color:rgba(255,255,255,.85)}
  .tl-ui button{background:transparent;border:1px solid rgba(255,255,255,.3);
    color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;
    font-size:14px;display:grid;place-items:center;transition:all .2s}
  .tl-ui button:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.6)}
  .tl-ui .time{font-variant-numeric:tabular-nums;min-width:150px;letter-spacing:.05em}
  .tl-ui input[type=range]{flex:1;accent-color:#7dc4ff;height:3px}
  .cue-row{position:absolute;left:24px;right:24px;bottom:40px;
    height:14px;pointer-events:none}
  .cue-mark{position:absolute;width:2px;height:10px;background:rgba(125,196,255,.6);
    border-radius:1px;transform:translateX(-1px)}
  .cue-mark .lbl{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:.2em;color:rgba(125,196,255,.75);
    text-transform:uppercase;white-space:nowrap;font-weight:700}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="trail"></canvas>
<canvas id="parts"></canvas>
<canvas id="glyph" width="1600" height="400"></canvas>

<div class="halo" id="halo"></div>

<div class="hud tl">System · active</div>
<div class="hud tr">B · Particle Choreography<br>/ 2,400 points — deterministic</div>
<div class="hud bl">Nextframe Lab<br>Experiment N° 002</div>
<div class="hud br">frame-pure · scrubbable<br>16.0s · 30fps</div>

<div class="phase" id="phase"><span class="n" id="phaseN">01</span> <span id="phaseName">ambient drift</span></div>
<div class="final" id="final">FUTURE</div>
<div class="sub" id="sub">When order emerges from chance.</div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 16.00s</span>
  <input type="range" id="scrubber" min="0" max="1600" value="0" step="1">
  <span class="time" id="frameLabel" style="min-width:100px;text-align:right">frame 0 / 480</span>
</div>

<script>
/* ================== Timeline core ================== */
const DURATION = 16.0;
const FPS = 30;
const N = 2400;

const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut   = x => 1 - Math.pow(1 - x, 3);
const easeOut5  = x => 1 - Math.pow(1 - x, 5);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));
const smoothBump = (t, peak, width) => {
  const d = (t - peak) / width;
  return Math.exp(-d * d * 2.5);
};

const CUES = [
  { t: 0.0,  label: 'Drift' },
  { t: 2.0,  label: 'Disc' },
  { t: 4.5,  label: 'Spiral' },
  { t: 7.0,  label: 'Text' },
  { t: 10.5, label: 'Burst' },
  { t: 12.5, label: 'Core' },
  { t: 14.5, label: 'Reveal' },
];

const PHASES = [
  { at: 0.0,  name: 'ambient drift' },
  { at: 2.0,  name: 'coalescence / disc' },
  { at: 4.5,  name: 'golden spiral' },
  { at: 7.0,  name: 'formation · FUTURE' },
  { at: 10.5, name: 'radial burst' },
  { at: 12.5, name: 'singular core' },
  { at: 14.5, name: 'final reveal' },
];

/* ================== Deterministic hash ================== */
function sdHash(a, b) {
  let h = a * 374761393 + b * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  h = h ^ (h >> 16);
  return ((h >>> 0) % 1000000) / 1000000;
}

/* ================== Target generators ================== */
function targetDisc(i) {
  const a = sdHash(i, 1) * Math.PI * 2;
  const r = Math.sqrt(sdHash(i, 2)) * 0.46;
  return [Math.cos(a) * r, Math.sin(a) * r];
}
function targetSpiral(i) {
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const ang = i * goldenAngle;
  const r = Math.sqrt(i / N) * 0.58;
  return [Math.cos(ang) * r, Math.sin(ang) * r];
}
function targetWander(i, t) {
  const seed = sdHash(i, 7);
  const speed = 0.14 + seed * 0.18;
  const phaseA = sdHash(i, 11) * 10;
  const phaseB = sdHash(i, 13) * 10;
  return [
    Math.sin(t * speed * 0.7 + phaseA) * 0.85 + Math.sin(t * 0.6 + sdHash(i, 17) * 6) * 0.1,
    Math.cos(t * speed + phaseB) * 0.55 + Math.cos(t * 0.5 + sdHash(i, 19) * 6) * 0.08,
  ];
}
function targetBurst(i) {
  const a = sdHash(i, 41) * Math.PI * 2;
  const r = 0.6 + sdHash(i, 43) * 2.2;
  return [Math.cos(a) * r, Math.sin(a) * r];
}
function targetCore(i) {
  const a = sdHash(i, 51) * Math.PI * 2;
  const r = sdHash(i, 53) * 0.025;
  return [Math.cos(a) * r, Math.sin(a) * r];
}

/* ================== Text formation target ================== */
const glyph = document.getElementById('glyph');
const gctx = glyph.getContext('2d', { willReadFrequently: true });
let glyphPoints = [];

function sampleGlyph(text, w, h) {
  glyph.width = w; glyph.height = h;
  gctx.clearRect(0, 0, w, h);
  gctx.fillStyle = '#fff';
  gctx.font = '900 340px "SF Pro Display", -apple-system, "Inter", sans-serif';
  gctx.textAlign = 'center';
  gctx.textBaseline = 'middle';
  gctx.fillText(text, w/2, h/2);
  const data = gctx.getImageData(0, 0, w, h).data;
  const samples = [];
  const step = 2;   // denser sampling
  for (let y = 0; y < h; y += step) {
    for (let x = 0; x < w; x += step) {
      const i = (y * w + x) * 4;
      if (data[i + 3] > 128) {
        samples.push([(x - w/2) / (h/2), (y - h/2) / (h/2)]);
      }
    }
  }
  return samples;
}
glyphPoints = sampleGlyph('FUTURE', 1600, 400);

// Assign stable glyph index per particle (bias-free shuffle)
const glyphIdx = new Uint32Array(N);
for (let i = 0; i < N; i++) {
  glyphIdx[i] = Math.floor(sdHash(i, 31) * glyphPoints.length);
}
function targetText(i) {
  const p = glyphPoints[glyphIdx[i]] || [0, 0];
  return [p[0] * 0.78, p[1] * 0.30];
}

/* ================== Particle position at t ================== */
function particleAt(i, t) {
  const T_DISC = 2.0,  D_DISC = 2.0;
  const T_SP   = 4.5,  D_SP   = 2.0;
  const T_TX   = 7.0,  D_TX   = 2.2;
  const T_BU   = 10.5, D_BU   = 1.8;
  const T_CO   = 12.5, D_CO   = 1.8;
  const T_REV  = 14.5;

  const wander = targetWander(i, t);
  const disc   = targetDisc(i);
  const spiral = targetSpiral(i);
  const text   = targetText(i);
  const burst  = targetBurst(i);
  const core   = targetCore(i);

  if (t < T_DISC) {
    return wander;
  }
  if (t < T_SP) {
    const p = kern(t, T_DISC, D_DISC, easeInOut);
    return [lerp(wander[0], disc[0], p), lerp(wander[1], disc[1], p)];
  }
  if (t < T_TX) {
    const p = kern(t, T_SP, D_SP, easeInOut);
    return [lerp(disc[0], spiral[0], p), lerp(disc[1], spiral[1], p)];
  }
  if (t < T_BU) {
    // formation → text: per-particle stagger, then hold at text
    const stag = clamp01((t - T_TX - sdHash(i, 61) * 0.5) / (D_TX - 0.1));
    const pe = easeInOut(stag);
    return [lerp(spiral[0], text[0], pe), lerp(spiral[1], text[1], pe)];
  }
  if (t < T_CO) {
    // text → burst: outer particles fly first
    const radius0 = Math.hypot(text[0], text[1]);
    const delay = radius0 * 0.25;
    const ps = clamp01((t - T_BU - delay) / D_BU);
    const pe = easeOut(ps);
    return [lerp(text[0], burst[0], pe), lerp(text[1], burst[1], pe)];
  }
  if (t < T_REV) {
    const p = kern(t, T_CO, D_CO, easeInOut);
    return [lerp(burst[0], core[0], p), lerp(burst[1], core[1], p)];
  }
  const osc = (t - T_REV) * 2;
  return [
    core[0] + Math.sin(osc + sdHash(i, 71) * 6) * 0.005,
    core[1] + Math.cos(osc + sdHash(i, 73) * 6) * 0.005,
  ];
}

/* ================== Canvas setup ================== */
const trail = document.getElementById('trail');
const parts = document.getElementById('parts');
const tctx = trail.getContext('2d');
const pctx = parts.getContext('2d');
let W = 0, H = 0, dpr = 1;
const halo = document.getElementById('halo');

function resizeCanvases() {
  dpr = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  [trail, parts].forEach(c => {
    c.width = W * dpr; c.height = H * dpr;
    c.style.width = W + 'px'; c.style.height = H + 'px';
    const cx = c.getContext('2d');
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  tctx.clearRect(0, 0, W, H);
}
resizeCanvases(); addEventListener('resize', resizeCanvases);

/* ================== Color palette ================== */
const PALETTE = [
  [170, 210, 255],
  [135, 230, 255],
  [140, 255, 225],
  [255, 230, 160],
  [255, 180, 145],
];
function hueToRGB(k) {
  const f = clamp01(k) * (PALETTE.length - 1);
  const i0 = Math.floor(f);
  const i1 = Math.min(i0 + 1, PALETTE.length - 1);
  const fr = f - i0;
  const p0 = PALETTE[i0], p1 = PALETTE[i1];
  return {
    r: Math.round(lerp(p0[0], p1[0], fr)),
    g: Math.round(lerp(p0[1], p1[1], fr)),
    b: Math.round(lerp(p0[2], p1[2], fr)),
  };
}

/* cache current positions to allow optional neighbor-line drawing */
const PX = new Float32Array(N);
const PY = new Float32Array(N);

let lastT = 0;

/* ================== Render ================== */
function render(t) {
  /* trail fade — aggressive clear on scrub jumps */
  const jumped = Math.abs(t - lastT) > 0.12;
  if (jumped) {
    tctx.clearRect(0, 0, W, H);
  } else {
    tctx.fillStyle = 'rgba(3, 3, 10, 0.22)';
    tctx.fillRect(0, 0, W, H);
  }
  lastT = t;

  pctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const scale = Math.min(W, H) * 0.48;

  // color envelope
  const phaseColorK = (() => {
    if (t < 2)     return 0.12;
    if (t < 4.5)   return 0.22;
    if (t < 7)     return 0.38;
    if (t < 10.5)  return 0.60;
    if (t < 12.5)  return 0.82;
    if (t < 14.5)  return 0.52;
    return 0.32;
  })();

  // brightness envelope — boost during formation & reveal
  const formBoost = 1.0 + smoothBump(t, 8.5, 1.8) * 0.5
                       + smoothBump(t, 15.2, 1.5) * 0.3;

  // precompute positions
  for (let i = 0; i < N; i++) {
    const [nx, ny] = particleAt(i, t);
    PX[i] = cx + nx * scale;
    PY[i] = cy + ny * scale;
  }

  /* ---- Neural connections during formation (only in text/spiral windows) ---- */
  const conOpacity = (() => {
    if (t > 6.5 && t < 10.2) return smoothBump(t, 8.3, 1.8) * 0.35;
    if (t > 4.0 && t < 6.8)  return smoothBump(t, 5.8, 1.2) * 0.18;
    return 0;
  })();
  if (conOpacity > 0.02) {
    pctx.strokeStyle = `rgba(140, 200, 255, ${conOpacity})`;
    pctx.lineWidth = 0.4;
    pctx.beginPath();
    // sample sparse pairs (i with i+step) — cheap neural feel
    const step = 9;
    for (let i = 0; i < N; i += step) {
      const j = (i + 13) % N;
      const dx = PX[i] - PX[j], dy = PY[i] - PY[j];
      const d2 = dx*dx + dy*dy;
      if (d2 < 5000) { // only nearby
        pctx.moveTo(PX[i], PY[i]);
        pctx.lineTo(PX[j], PY[j]);
      }
    }
    pctx.stroke();
  }

  /* ---- Particles ---- */
  for (let i = 0; i < N; i++) {
    const x = PX[i], y = PY[i];
    const sizeK = 0.55 + sdHash(i, 101) * 0.9;
    const baseR = 1.35 * formBoost;
    const r = baseR * sizeK;

    const hueK = (phaseColorK + sdHash(i, 113) * 0.22) % 1;
    const c = hueToRGB(hueK);
    const aSeed = 0.55 + sdHash(i, 127) * 0.45;
    const alpha = aSeed * formBoost;

    // trail (persistent, dim)
    tctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${alpha * 0.50})`;
    tctx.beginPath();
    tctx.arc(x, y, r * 0.75, 0, 6.2832);
    tctx.fill();

    // bloom halo (radial gradient)
    const bloomR = r * 11;
    const grad = pctx.createRadialGradient(x, y, 0, x, y, bloomR);
    grad.addColorStop(0,    `rgba(${c.r},${c.g},${c.b},${Math.min(1, alpha * 0.55)})`);
    grad.addColorStop(0.35, `rgba(${c.r},${c.g},${c.b},${alpha * 0.18})`);
    grad.addColorStop(1,    `rgba(${c.r},${c.g},${c.b},0)`);
    pctx.fillStyle = grad;
    pctx.beginPath();
    pctx.arc(x, y, bloomR, 0, 6.2832);
    pctx.fill();

    // core bright
    pctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha * 1.1)})`;
    pctx.beginPath();
    pctx.arc(x, y, r, 0, 6.2832);
    pctx.fill();
  }

  /* ---- Halo beats ---- */
  const beats = [
    { at: 7.0,  w: 1.4, s: 1.0 },
    { at: 10.5, w: 1.3, s: 1.3 },
    { at: 14.5, w: 1.7, s: 1.0 },
  ];
  let haloS = 0;
  beats.forEach(b => { haloS = Math.max(haloS, smoothBump(t, b.at, b.w) * b.s); });
  halo.style.opacity = haloS * 0.85;
  halo.style.transform = `translate(-50%, -50%) scale(${lerp(0.75, 1.4, haloS)})`;

  /* ---- Phase label ---- */
  const ph = [...PHASES].reverse().find(p => t >= p.at) || PHASES[0];
  const idx = PHASES.indexOf(ph);
  document.getElementById('phaseN').textContent = String(idx + 1).padStart(2, '0');
  document.getElementById('phaseName').textContent = ph.name;
  document.getElementById('phase').style.opacity = kern(t, 0.3, 1.2);

  /* ---- Subtitle text by phase ---- */
  const sub = document.getElementById('sub');
  let subOp = 0, subText = '';
  if (t > 0.8 && t < 6.5) {
    subOp = Math.min(kern(t, 0.8, 1.2), 1 - kern(t, 5.5, 1.0));
    subText = 'When order emerges from chance.';
  } else if (t > 7.0 && t < 10.2) {
    subOp = Math.min(kern(t, 7.0, 1.2), 1 - kern(t, 9.3, 0.9));
    subText = '2,400 deterministic points — no randomness, only math.';
  } else if (t > 14.5) {
    subOp = kern(t, 14.9, 1.2);
    subText = 'Built from a single function f(id, t) → (x, y).';
  }
  sub.style.opacity = subOp;
  if (subText) sub.textContent = subText;

  /* ---- Final title ---- */
  const fOp = t > 14.5 ? kern(t, 14.7, 1.2, easeOut) : 0;
  document.getElementById('final').style.opacity = fOp * 0.9;

  /* ---- HUDs ---- */
  document.querySelectorAll('.hud').forEach((el, i) => {
    el.style.opacity = kern(t, 0.15 + i * 0.08, 1.4);
  });

  /* ---- Shader bg ---- */
  renderBg(t);
}

/* ================== Shader nebula (subtle) ================== */
let bgCtx = null;
function initBg() {
  const c = document.getElementById('bg');
  const gl = c.getContext('webgl', { antialias: false });
  if (!gl) return null;
  const r = () => {
    const d = Math.min(devicePixelRatio || 1, 2);
    c.width = innerWidth * d; c.height = innerHeight * d;
    gl.viewport(0, 0, c.width, c.height);
  };
  r(); addEventListener('resize', r);
  const V = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const F = `precision highp float;uniform vec2 u_res;uniform float u_t;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*vnoise(p);p*=2.02;a*=.5;}return v;}
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.-1.;
  uv.x*=u_res.x/u_res.y;
  float t=u_t*.06;
  float n=fbm(uv*1.3+vec2(t,-t*.7));
  vec3 deep=vec3(.01,.02,.05);
  vec3 mid=vec3(.04,.07,.15);
  vec3 hi =vec3(.12,.18,.35);
  vec3 col=mix(deep,mid,smoothstep(.1,.6,n));
  col=mix(col,hi,smoothstep(.55,.85,n)*.6);
  // radial fade
  float d=length(uv*vec2(.7,1.));
  col*=1.-smoothstep(.2,1.2,d)*.85;
  // grain
  float g=fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233))+u_t)*43758.5453);
  col+=(g-.5)*.015;
  gl_FragColor=vec4(col,1.);
}`;
  const sh=(t,s)=>{const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x};
  const P=gl.createProgram();gl.attachShader(P,sh(gl.VERTEX_SHADER,V));gl.attachShader(P,sh(gl.FRAGMENT_SHADER,F));gl.linkProgram(P);gl.useProgram(P);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const L=gl.getAttribLocation(P,'p');gl.enableVertexAttribArray(L);gl.vertexAttribPointer(L,2,gl.FLOAT,false,0,0);
  const uR=gl.getUniformLocation(P,'u_res'),uT=gl.getUniformLocation(P,'u_t');
  return { gl, uR, uT, canvas: c };
}
function renderBg(t) {
  if (!bgCtx) return;
  const { gl, uR, uT, canvas } = bgCtx;
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uT, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
bgCtx = initBg();

/* ================== Timeline controller ================== */
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');

let currentT = 0, playing = true, lastFrameTS = performance.now();
function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1600);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrameTS) / 1000;
  lastFrameTS = now;
  if (playing) {
    let next = currentT + dt;
    if (next >= DURATION) {
      next = 0;
      tctx.clearRect(0, 0, W, H);
    }
    setTime(next);
  }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => {
  playing = false; playBtn.textContent = '▶';
  tctx.clearRect(0, 0, W, H);
  setTime(scrubber.value / 1600 * DURATION);
});
playBtn.addEventListener('click', () => {
  playing = !playing; playBtn.textContent = playing ? '⏸' : '▶';
  lastFrameTS = performance.now();
});
resetBtn.addEventListener('click', () => {
  tctx.clearRect(0, 0, W, H); setTime(0);
});

CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  m.title = cue.label + ' @ ' + cue.t + 's';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});

setTime(0); requestAnimationFrame(loop);
</script>
</body>
