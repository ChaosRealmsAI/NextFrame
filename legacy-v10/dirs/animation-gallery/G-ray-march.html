<!--
  G · Ray-March 3D — WebGL SDF scene, frame-pure, scrubbable
  Techniques:
    - SDF primitives: sphere / torus / round-box with smooth-min fusion
    - Orbiting satellites
    - Ray-march with soft shadows + ambient occlusion
    - Camera orbit (frame-pure: angle as function of t)
    - Two-light shading (warm key + cool rim)
    - Fog + tone curve + grain
  Duration: 14s.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>G · Ray-March 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100vh;background:#07050a;overflow:hidden;
    font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;
    color:#fff;-webkit-font-smoothing:antialiased}
  canvas{position:fixed;inset:0;width:100%;height:100%}
  #shader{z-index:0}

  .hud{position:fixed;z-index:6;font-size:10px;letter-spacing:.4em;
    text-transform:uppercase;color:rgba(255,200,255,.65);font-weight:500;opacity:0;
    font-family:"JetBrains Mono","SF Mono",Menlo,monospace}
  .hud.tl{top:36px;left:44px;display:flex;align-items:center;gap:10px}
  .hud.tl::before{content:'';width:8px;height:8px;border-radius:50%;background:#c99fff;
    box-shadow:0 0 12px #c99fff}
  .hud.tr{top:36px;right:44px;text-align:right;line-height:1.9}
  .hud.bl{bottom:64px;left:44px;line-height:1.9}
  .hud.br{bottom:64px;right:44px;text-align:right;line-height:1.9}

  .side-title{position:fixed;top:50%;transform:translateY(-50%);z-index:4;
    writing-mode:vertical-rl;text-orientation:mixed;font-size:11px;letter-spacing:.45em;
    text-transform:uppercase;color:rgba(255,200,255,.45);line-height:2;opacity:0}
  .side-title.l{left:44px;transform:translateY(-50%) rotate(180deg)}
  .side-title.r{right:44px}

  .title-block{position:fixed;left:50%;bottom:17%;transform:translateX(-50%);z-index:5;
    text-align:center;pointer-events:none}
  .title-block h1{font-size:clamp(54px,7.5vw,118px);font-weight:200;letter-spacing:-.03em;
    background:linear-gradient(180deg,#fff 0%,#e6d4ff 50%,#c99fff 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 30px rgba(201,159,255,.4));line-height:1;opacity:0}
  .title-block .sub{margin-top:18px;font-size:12px;letter-spacing:.45em;text-transform:uppercase;
    color:rgba(230,212,255,.65);font-weight:500;opacity:0}

  .stamp{position:fixed;font-size:10px;font-family:"JetBrains Mono",monospace;
    letter-spacing:.3em;text-transform:uppercase;color:rgba(255,200,255,.45);opacity:0;z-index:6}
  .stamp.s1{top:42%;left:10%}
  .stamp.s2{top:58%;right:10%;text-align:right}

  .tl-ui{position:fixed;left:0;right:0;bottom:0;z-index:100;
    padding:14px 24px;background:linear-gradient(180deg,transparent,rgba(7,5,10,.92));
    display:flex;align-items:center;gap:16px;
    font-family:"SF Mono",Menlo,monospace;font-size:11px;color:rgba(255,255,255,.85)}
  .tl-ui button{background:transparent;border:1px solid rgba(255,255,255,.3);
    color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;
    font-size:14px;display:grid;place-items:center}
  .tl-ui button:hover{background:rgba(255,255,255,.1)}
  .tl-ui .time{font-variant-numeric:tabular-nums;min-width:150px}
  .tl-ui input[type=range]{flex:1;accent-color:#c99fff;height:3px}
  .cue-row{position:absolute;left:24px;right:24px;bottom:40px;height:14px;pointer-events:none}
  .cue-mark{position:absolute;width:2px;height:10px;background:rgba(201,159,255,.6);
    border-radius:1px;transform:translateX(-1px)}
  .cue-mark .lbl{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:.2em;color:rgba(201,159,255,.8);
    text-transform:uppercase;white-space:nowrap;font-weight:700}
</style>
</head>
<body>

<canvas id="shader"></canvas>

<div class="hud tl">Signed · distance</div>
<div class="hud tr">G · Ray-March 3D<br>/ 64 steps · soft shadows</div>
<div class="hud bl">Nextframe Labs<br>Experiment N° 007</div>
<div class="hud br">frame-pure · scrubbable<br>14.0s</div>

<div class="side-title l">Sphere · torus · fusion · orbit</div>
<div class="side-title r">Ray-marched volumetric form</div>

<div class="stamp s1">/ camera φ = t · 0.3</div>
<div class="stamp s2">/ N = 3 satellites · orbit</div>

<div class="title-block">
  <h1 id="title">Deep Form</h1>
  <div class="sub" id="sub">SDF · raymarch · 2026</div>
</div>

<div class="cue-row" id="cueRow"></div>
<div class="tl-ui">
  <button id="playBtn">⏸</button>
  <button id="resetBtn">↺</button>
  <span class="time" id="timeLabel">0.00 / 14.00s</span>
  <input type="range" id="scrubber" min="0" max="1400" value="0" step="1">
  <span class="time" id="frameLabel" style="min-width:100px;text-align:right">frame 0 / 420</span>
</div>

<script>
const DURATION = 14.0;
const FPS = 30;
const clamp01 = t => Math.max(0, Math.min(1, t));
const easeOut = x => 1 - Math.pow(1 - x, 3);
const kern = (t, s, d, ease = easeOut) => ease(clamp01((t - s) / d));
const CUES = [
  { t: 0.5, label: 'Form' },
  { t: 3.0, label: 'Orbit' },
  { t: 6.0, label: 'Fuse' },
  { t: 9.0, label: 'Zoom' },
  { t: 11.0, label: 'Title' },
];

const title = document.getElementById('title');
const sub = document.getElementById('sub');

function render(t) {
  document.querySelectorAll('.hud').forEach((el, i) => {
    el.style.opacity = kern(t, 0.15 + i * 0.08, 1.4);
  });
  document.querySelectorAll('.side-title').forEach((el, i) => {
    el.style.opacity = kern(t, 1.8 + i * 0.15, 1.4);
  });
  document.querySelectorAll('.stamp').forEach((el, i) => {
    el.style.opacity = kern(t, 2.2 + i * 0.2, 1.2);
  });
  const titleP = kern(t, 10.8, 1.4);
  title.style.opacity = titleP;
  title.style.transform = `translateY(${(1 - titleP) * 20}px)`;
  sub.style.opacity = kern(t, 11.5, 1.2);
  renderShader(t);
}

let shaderCtx = null;
function initShader() {
  const c = document.getElementById('shader');
  const gl = c.getContext('webgl');
  if (!gl) return null;
  const r = () => {
    const d = Math.min(devicePixelRatio || 1, 1.5);
    c.width = innerWidth * d; c.height = innerHeight * d;
    gl.viewport(0, 0, c.width, c.height);
  };
  r(); addEventListener('resize', r);
  const V = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const F = `precision highp float;uniform vec2 u_res;uniform float u_t;
#define MAX_STEPS 72
#define MAX_DIST  40.
#define SURF      .001

float sdSphere(vec3 p,float r){return length(p)-r;}
float sdTorus(vec3 p,vec2 t){vec2 q=vec2(length(p.xz)-t.x,p.y);return length(q)-t.y;}
float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
mat2 rot(float a){float s=sin(a),co=cos(a);return mat2(co,-s,s,co);}

float map(vec3 p){
  float t=u_t*.35;
  vec3 q=p;
  q.xz=rot(t*.4)*q.xz;
  q.xy=rot(t*.3)*q.xy;
  float d1=sdTorus(q,vec2(1.35,.32));
  // fuse factor expands then contracts
  float fuseK = 0.3 + 0.3 * sin(u_t * 0.4);
  vec3 s1p = p + vec3(sin(t*.8)*.4, cos(t*.7)*.35, 0.);
  float d2=sdSphere(s1p,.82);
  float d=smin(d1,d2,fuseK);
  // 3 orbiting satellites
  for(int i=0;i<3;i++){
    float a=float(i)*2.094+t*.7;
    vec3 o=vec3(cos(a)*1.85,sin(a*1.3)*.75,sin(a)*1.85);
    d=smin(d,sdSphere(p-o,.25),.35);
  }
  // ground plane
  d=min(d,p.y+1.9);
  return d;
}

vec3 normal(vec3 p){
  vec2 e=vec2(.001,0.);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float march(vec3 ro,vec3 rd){
  float t=0.;
  for(int i=0;i<MAX_STEPS;i++){
    vec3 p=ro+rd*t;
    float d=map(p);
    if(d<SURF) return t;
    if(t>MAX_DIST) break;
    t+=d*.9;
  }
  return -1.;
}

float softShadow(vec3 ro,vec3 rd){
  float res=1.,t=.02;
  for(int i=0;i<30;i++){
    float h=map(ro+rd*t);
    if(h<.001) return 0.;
    res=min(res,7.*h/t);
    t+=h;
    if(t>8.) break;
  }
  return clamp(res,0.,1.);
}

float ao(vec3 p,vec3 n){
  float occ=0.,w=1.;
  for(int i=0;i<5;i++){
    float d=.06*float(i+1);
    occ+=(d-map(p+n*d))*w;
    w*=.75;
  }
  return clamp(1.-2.*occ,0.,1.);
}

void main(){
  vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;

  // camera orbit — frame-pure function of t
  float phi = u_t * 0.18;
  float rDist = 4.8 - smoothstep(8.5, 11.0, u_t) * 1.5; // zoom-in after 8.5s
  vec3 ro = vec3(cos(phi) * rDist, 0.7, sin(phi) * rDist);
  // look at origin
  vec3 fwd = normalize(vec3(0., 0.3, 0.) - ro);
  vec3 right = normalize(cross(fwd, vec3(0., 1., 0.)));
  vec3 up = cross(right, fwd);
  vec3 rd = normalize(fwd * 1.6 + right * uv.x + up * uv.y);

  float tt = march(ro, rd);

  // background: deep purple gradient
  vec3 bg = mix(vec3(.03,.02,.08), vec3(.10,.05,.18), smoothstep(-1.,1.,uv.y));
  bg = mix(bg, vec3(.25,.12,.30), smoothstep(0.,.8,uv.y));

  vec3 col = bg;
  if (tt > 0.) {
    vec3 p = ro + rd * tt;
    vec3 n = normal(p);

    vec3 keyDir = normalize(vec3(.8,1.2,.5));
    vec3 rimDir = normalize(vec3(-1.,.3,-.4));

    float diff = max(dot(n, keyDir), 0.);
    float rim = pow(1. - max(dot(n, -rd), 0.), 2.);
    float sha = softShadow(p, keyDir);
    float occ = ao(p, n);

    vec3 baseCol;
    if (p.y < -1.85) baseCol = vec3(.06,.04,.08); // ground
    else baseCol = mix(vec3(.85,.55,.95), vec3(.60,.30,.80), diff);

    col = baseCol * (diff * sha + .15) * occ;
    col += vec3(.40,.60,1.0) * rim * .45;
    vec3 h = normalize(keyDir - rd);
    col += vec3(1.,.85,.95) * pow(max(dot(n, h), 0.), 28.) * sha * .7;
    col = mix(col, bg, smoothstep(3., 12., tt));
  }

  // warm glow pass
  col += vec3(.35,.15,.28) * exp(-length(uv - vec2(.1,.05)) * 1.8) * .4;

  // vignette
  float d = length(uv);
  col *= 1. - smoothstep(.6, 1.5, d) * .55;

  // grain
  float g = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + u_t) * 43758.5453);
  col += (g - .5) * .02;

  col = pow(col, vec3(.95));
  gl_FragColor = vec4(col, 1.);
}`;
  const sh=(t,s)=>{const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x};
  const P=gl.createProgram();gl.attachShader(P,sh(gl.VERTEX_SHADER,V));gl.attachShader(P,sh(gl.FRAGMENT_SHADER,F));gl.linkProgram(P);gl.useProgram(P);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const L=gl.getAttribLocation(P,'p');gl.enableVertexAttribArray(L);gl.vertexAttribPointer(L,2,gl.FLOAT,false,0,0);
  return { gl, uR: gl.getUniformLocation(P,'u_res'), uT: gl.getUniformLocation(P,'u_t'), canvas: c };
}
function renderShader(t) {
  if (!shaderCtx) return;
  const { gl, uR, uT, canvas } = shaderCtx;
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uT, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
shaderCtx = initShader();

const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const timeLabel = document.getElementById('timeLabel');
const frameLabel = document.getElementById('frameLabel');
const cueRow = document.getElementById('cueRow');
let currentT = 0, playing = true, lastFrame = performance.now();
function setTime(t) {
  currentT = Math.max(0, Math.min(DURATION, t));
  scrubber.value = Math.round(currentT / DURATION * 1400);
  timeLabel.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2) + 's';
  frameLabel.textContent = `frame ${Math.round(currentT * FPS)} / ${Math.round(DURATION * FPS)}`;
  render(currentT);
}
function loop() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (playing) { let next = currentT + dt; if (next >= DURATION) next = 0; setTime(next); }
  requestAnimationFrame(loop);
}
scrubber.addEventListener('input', () => { playing = false; playBtn.textContent = '▶'; setTime(scrubber.value / 1400 * DURATION); });
playBtn.addEventListener('click', () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; lastFrame = performance.now(); });
resetBtn.addEventListener('click', () => setTime(0));
CUES.forEach(cue => {
  const m = document.createElement('div');
  m.className = 'cue-mark';
  m.style.left = (cue.t / DURATION * 100) + '%';
  const lbl = document.createElement('div');
  lbl.className = 'lbl'; lbl.textContent = cue.label;
  m.appendChild(lbl); cueRow.appendChild(m);
});
setTime(0); requestAnimationFrame(loop);
</script>
</body>
</html>
