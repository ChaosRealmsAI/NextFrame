[workspace]
# v2.0 rebuild. Legacy crates archived in legacy-v08/ (not compiled, reference only).
# New crates are minimal skeletons — implementations will be filled in phase by phase.
members = [
    "src/nf-core-app",
    "src/nf-core-engine",
    "src/nf-shell-mac",
    "src/nf-recorder",
    "src/nf-cli",
    "src/nf-runtime",
    "src/nf-tracks",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.75"

[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"
todo = "deny"
wildcard_imports = "deny"

[profile.release]
lto = "thin"
