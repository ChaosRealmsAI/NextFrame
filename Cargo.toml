[workspace]
members = ["src/shell", "src/bridge", "src/recorder", "src/crates/videocut-core", "src/crates/videocut-download", "src/crates/videocut-transcribe", "src/crates/videocut-align", "src/crates/videocut-cut", "src/crates/nf-source"]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.75"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"
todo = "deny"
wildcard_imports = "deny"

[profile.release]
lto = "thin"
