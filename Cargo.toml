[workspace]
members = [
    "src/nf-shell-mac",
    "src/nf-bridge",
    "src/nf-recorder",
    # nf-tts has been extracted to tmp/extracted/nf-tts for review.
    # Keep src/nf-tts in-tree for now because some code still reads scripts from that path.
    # "src/nf-tts",
    "src/nf-publish",
    "src/nf-source/core",
    "src/nf-source/download",
    "src/nf-source/transcribe",
    "src/nf-source/align",
    "src/nf-source/cut",
    "src/nf-source/source",
    "src/nf-guide",
    "src/nf-wysiwyg",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.75"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"
todo = "deny"
wildcard_imports = "deny"

[profile.release]
lto = "thin"
