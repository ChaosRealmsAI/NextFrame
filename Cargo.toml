[workspace]
# v2.0 rebuild in progress — new crates will be added under src/ as skeleton is filled.
# Old crates are archived in legacy-v08/ (not compiled, kept for reference only).
members = []
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.75"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unreachable = "deny"
todo = "deny"
wildcard_imports = "deny"

[profile.release]
lto = "thin"
