<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame Scene Showcase</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #fff;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 480px);
    gap: 20px;
    justify-content: center;
  }
  .card {
    border-radius: 10px;
    overflow: hidden;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #444; }
  .card-viewport {
    width: 480px;
    height: 270px;
    position: relative;
    overflow: hidden;
    background: #05050c;
  }
  .card-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1.6;
  }
  .badge.canvas { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .badge.dom    { background: rgba(110,231,255,0.15); color: #6ee7ff; }
  .badge.svg    { background: rgba(244,114,182,0.15); color: #f472b6; }
  .name {
    font-size: 14px;
    font-weight: 500;
    color: #ddd;
  }
  .error-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f87171;
    font-size: 12px;
    padding: 16px;
    text-align: center;
    background: rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<h1>NextFrame Scene Showcase</h1>
<p class="subtitle">28 scenes — auto-animating 0-5s loop</p>
<div class="grid" id="grid"></div>

<script type="module">
import SCENE_REGISTRY from './scenes-v2/index.js';

const grid = document.getElementById('grid');
const scenes = Object.values(SCENE_REGISTRY);
const live = []; // { scene, els, viewport }

for (const scene of scenes) {
  // Card DOM
  const card = document.createElement('div');
  card.className = 'card';

  const viewport = document.createElement('div');
  viewport.className = 'card-viewport';

  const info = document.createElement('div');
  info.className = 'card-info';

  const badge = document.createElement('span');
  badge.className = `badge ${scene.type}`;
  badge.textContent = scene.type;

  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = scene.name;

  info.appendChild(badge);
  info.appendChild(name);
  card.appendChild(viewport);
  card.appendChild(info);
  grid.appendChild(card);

  // Create scene
  try {
    const els = scene.create(viewport, scene.defaultParams);
    live.push({ scene, els, viewport });
  } catch (err) {
    const overlay = document.createElement('div');
    overlay.className = 'error-overlay';
    overlay.textContent = `create() error: ${err.message}`;
    viewport.appendChild(overlay);
    console.error(`[${scene.id}] create error:`, err);
  }
}

// Animation loop
let start = null;
function tick(ts) {
  if (start === null) start = ts;
  const elapsed = ts - start;
  const localT = (elapsed / 1000) % 5;

  for (const { scene, els } of live) {
    try {
      scene.update(els, localT, scene.defaultParams);
    } catch (err) {
      // silent — don't spam console every frame
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
