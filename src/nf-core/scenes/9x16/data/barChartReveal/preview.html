<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports.
     When served via HTTP (dev server or build), preview can import from index.js directly. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Bar Chart Reveal (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage-container { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
#progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; transition: none; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 260px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
input[type=text] { width: 100%; height: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #fff; font-size: 12px; padding: 0 6px; outline: none; }
input[type=text]:focus { border-color: #6366f1; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage-container">
      <svg id="stage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920"></svg>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">5.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>柱状图揭示</h2>
    <div class="desc">9:16 竖屏 · 柱子从底部生长</div>
    <div id="params"></div>
    <div id="info">
      <p>比例: <code>9:16</code> (1080x1920)</p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>SVG</code></p>
      <p>时长: <code>5s</code></p>
    </div>
  </div>
</div>
<script>
// ─── Setup: SVG viewBox handles crisp scaling ───
const REAL_W = 1080, REAL_H = 1920;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const svg = document.getElementById('stage');
const stageContainer = document.getElementById('stage-container');
stageContainer.style.width = PW + 'px';
stageContainer.style.height = PH + 'px';
svg.style.width = PW + 'px';
svg.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('progress-bar').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;

const DURATION = 5;
document.getElementById('t-total').textContent = DURATION.toFixed(2);

const NS = 'http://www.w3.org/2000/svg';

// Bar data
const BAR_DATA = [
  { label: '1月', value: 72 },
  { label: '2月', value: 85 },
  { label: '3月', value: 63 },
  { label: '4月', value: 91 },
  { label: '5月', value: 78 },
  { label: '6月', value: 95 },
];
const count = BAR_DATA.length;

// Chart layout constants (in viewBox coords)
const chartTop = REAL_H * 0.18;
const chartBottom = REAL_H * 0.78;
const chartLeft = REAL_W * 0.12;
const chartRight = REAL_W * 0.88;
const chartH = chartBottom - chartTop;
const chartW = chartRight - chartLeft;
const gap = chartW * 0.08;
const barW = (chartW - gap * (count + 1)) / count;

// Build static SVG elements once
// Background
const bgRect = document.createElementNS(NS, 'rect');
bgRect.setAttribute('width', REAL_W);
bgRect.setAttribute('height', REAL_H);
bgRect.setAttribute('fill', '#0a0a12');
svg.appendChild(bgRect);

// Title text
const titleEl = document.createElementNS(NS, 'text');
titleEl.setAttribute('x', REAL_W / 2);
titleEl.setAttribute('y', REAL_H * 0.09);
titleEl.setAttribute('text-anchor', 'middle');
titleEl.setAttribute('dominant-baseline', 'middle');
titleEl.setAttribute('font-size', Math.round(REAL_H * 0.04));
titleEl.setAttribute('font-weight', 'bold');
titleEl.setAttribute('font-family', '-apple-system, sans-serif');
titleEl.setAttribute('fill', 'rgba(255,255,255,0.85)');
svg.appendChild(titleEl);

// Baseline
const baseline = document.createElementNS(NS, 'line');
baseline.setAttribute('x1', chartLeft);
baseline.setAttribute('y1', chartBottom);
baseline.setAttribute('x2', chartRight);
baseline.setAttribute('y2', chartBottom);
baseline.setAttribute('stroke', 'rgba(255,255,255,0.1)');
baseline.setAttribute('stroke-width', '2');
svg.appendChild(baseline);

// Bar rects, labels, value texts
const barRects = [];
const labelEls = [];
const valueEls = [];

for (let i = 0; i < count; i++) {
  const x = chartLeft + gap + i * (barW + gap);

  // Bar rect
  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('x', x);
  rect.setAttribute('width', barW);
  rect.setAttribute('rx', Math.min(barW * 0.2, 16));
  rect.setAttribute('ry', Math.min(barW * 0.2, 16));
  svg.appendChild(rect);
  barRects.push(rect);

  // Label below
  const label = document.createElementNS(NS, 'text');
  label.setAttribute('x', x + barW / 2);
  label.setAttribute('y', chartBottom + REAL_H * 0.035);
  label.setAttribute('text-anchor', 'middle');
  label.setAttribute('font-size', Math.round(REAL_H * 0.022));
  label.setAttribute('font-family', '-apple-system, sans-serif');
  label.setAttribute('fill', 'rgba(255,255,255,0.45)');
  label.textContent = BAR_DATA[i].label;
  svg.appendChild(label);
  labelEls.push(label);

  // Value on top
  const valText = document.createElementNS(NS, 'text');
  valText.setAttribute('x', x + barW / 2);
  valText.setAttribute('text-anchor', 'middle');
  valText.setAttribute('font-size', Math.round(REAL_H * 0.02));
  valText.setAttribute('font-weight', 'bold');
  valText.setAttribute('font-family', '-apple-system, sans-serif');
  svg.appendChild(valText);
  valueEls.push(valText);
}

// ─── Params ───
const params = { title: '月度增长', unit: '%', hueStart: 200, hueEnd: 320, stagger: 0.12, barDur: 0.85 };
const paramDefs = {
  title:    { type: 'text', label: '图表标题', group: 'content' },
  unit:     { type: 'text', label: '数值单位', group: 'content' },
  hueStart: { range: [0, 360], step: 1, label: '起始色相', group: 'color' },
  hueEnd:   { range: [0, 360], step: 1, label: '结束色相', group: 'color' },
  stagger:  { range: [0.05, 0.5], step: 0.01, label: '柱子延迟', group: 'animation' },
  barDur:   { range: [0.2, 2], step: 0.05, label: '生长时长', group: 'animation' },
};

function easeOut(t) { return t * (2 - t); }

function renderFrame(t) {
  titleEl.textContent = params.title;

  for (let i = 0; i < count; i++) {
    const barStart = i * params.stagger;
    const progress = Math.max(0, Math.min(1, (t - barStart) / params.barDur));
    const eased = easeOut(progress);

    const hue = params.hueStart + (params.hueEnd - params.hueStart) * (i / Math.max(1, count - 1));
    const maxBarH = chartH * (BAR_DATA[i].value / 100);
    const curBarH = maxBarH * eased;

    const y = chartBottom - curBarH;

    barRects[i].setAttribute('y', y);
    barRects[i].setAttribute('height', Math.max(0, curBarH));
    barRects[i].setAttribute('fill', 'hsl(' + hue + ', 75%, 58%)');

    // Value label appears when bar is nearly done
    if (progress >= 0.85) {
      const valAlpha = Math.min(1, (progress - 0.85) / 0.15);
      valueEls[i].setAttribute('y', y - REAL_H * 0.012);
      valueEls[i].setAttribute('fill', 'rgba(255,255,255,' + (valAlpha * 0.9) + ')');
      valueEls[i].textContent = BAR_DATA[i].value + params.unit;
    } else {
      valueEls[i].textContent = '';
    }
  }
}

// ─── Param UI ───
const paramsEl = document.getElementById('params');
const groups = {};
for (const [key, def] of Object.entries(paramDefs)) {
  const g = def.group;
  if (!groups[g]) {
    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = g;
    paramsEl.appendChild(title);
    groups[g] = true;
  }
  const div = document.createElement('div');
  div.className = 'param';
  const head = document.createElement('div');
  head.className = 'param-head';
  const labelSpan = document.createElement('span');
  labelSpan.textContent = def.label;
  head.appendChild(labelSpan);

  if (def.type === 'text') {
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'text';
    input.value = params[key];
    input.addEventListener('input', function() { params[key] = input.value; });
    div.appendChild(input);
  } else {
    const valSpan = document.createElement('span');
    valSpan.className = 'val';
    valSpan.id = 'v_' + key;
    valSpan.textContent = def.step < 1 ? params[key].toFixed(2) : params[key].toFixed(0);
    head.appendChild(valSpan);
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = def.range[0]; input.max = def.range[1]; input.step = def.step; input.value = params[key];
    input.addEventListener('input', function() {
      params[key] = +input.value;
      valSpan.textContent = def.step < 1 ? (+input.value).toFixed(2) : (+input.value).toFixed(0);
    });
    div.appendChild(input);
  }
  paramsEl.appendChild(div);
}

// ─── Playback ───
let playing = true;
let startTime = performance.now();
const progressFill = document.getElementById('progress-fill');
const tCurrent = document.getElementById('t-current');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', function() {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸ 暂停'; }
  else { playBtn.textContent = '▶ 播放'; }
});

const progressBar = document.getElementById('progress-bar');
progressBar.addEventListener('click', function(e) {
  const rect = progressBar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentT = ratio * DURATION;
  startTime = performance.now() - currentT * 1000;
});

let currentT = 0;

function loop() {
  if (playing) {
    currentT = ((performance.now() - startTime) / 1000) % DURATION;
  }
  tCurrent.textContent = currentT.toFixed(2);
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  renderFrame(currentT);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
