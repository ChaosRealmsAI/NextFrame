<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>codeTerminal Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
.info{font-size:13px;color:#888;margin-bottom:12px}.info span{color:#da7756;font-weight:700}
.canvas-wrap{position:relative;width:960px;height:540px;background:#1a1510;border:1px solid #333;border-radius:8px;overflow:hidden}
.canvas-inner{width:1920px;height:1080px;transform-origin:0 0;transform:scale(0.5);position:absolute;top:0;left:0}
.controls{margin-top:16px;display:flex;gap:16px;align-items:center}
.controls input[type=range]{width:400px}
.controls button{background:#da7756;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.time-display{font-family:monospace;font-size:14px;color:#da7756;min-width:80px}
</style>
</head>
<body>
<div class="info"><span>codeTerminal</span> · 16:9 · browser — Hook 配置代码块演示</div>
<div class="canvas-wrap"><div class="canvas-inner" id="canvas"></div></div>
<div class="controls">
  <button id="playBtn">▶ Play</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <div class="time-display" id="timeDisplay">0.00s</div>
</div>
<script>
(function(){
  function ease3(p) { return 1 - Math.pow(1-Math.max(0,Math.min(1,p)),3); }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function colorize(line, p) {
    if (!line) return "<br>";
    var trimmed = line.trimLeft ? line.trimLeft() : line.replace(/^\s+/, "");
    if (trimmed.startsWith("//") || trimmed.startsWith("#")) {
      return '<span style="color:'+p.commentColor+'">'+escHtml(line)+'</span>';
    }
    var KEYWORDS = ["const","let","var","function","return","if","else","for","while","import","export","from","true","false","null","undefined"];
    var i = 0, chars = line, segments = [], cur = "";
    while (i < chars.length) {
      var ch = chars[i];
      if (ch === '"' || ch === "'") {
        if (cur) { segments.push({type:"code",text:cur}); cur=""; }
        var str = ch; i++;
        while (i < chars.length && chars[i] !== ch) {
          if (chars[i] === "\\" && i+1 < chars.length) { str += chars[i]+chars[i+1]; i+=2; continue; }
          str += chars[i++];
        }
        str += (chars[i]||""); i++;
        segments.push({type:"string",text:str});
      } else { cur += ch; i++; }
    }
    if (cur) segments.push({type:"code",text:cur});
    var result = "";
    for (var s = 0; s < segments.length; s++) {
      var seg = segments[s];
      if (seg.type === "string") {
        result += '<span style="color:'+p.stringColor+'">'+escHtml(seg.text)+'</span>';
      } else {
        var codeHtml = escHtml(seg.text);
        codeHtml = codeHtml.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:'+p.numberColor+'">$1</span>');
        codeHtml = codeHtml.replace(new RegExp("\\b("+KEYWORDS.join("|")+")\\b","g"), '<span style="color:'+p.keywordColor+'">$1</span>');
        codeHtml = codeHtml.replace(/&quot;([^&]+)&quot;\s*:/g, '<span style="color:'+p.keywordColor+'">&quot;$1&quot;</span>:');
        result += codeHtml;
      }
    }
    return result;
  }

  function render(t, params, vp) {
    var p = {
      lines: params.lines || [],
      title: params.title || "",
      enterStagger: params.enterStagger !== undefined ? params.enterStagger : 0.15,
      enterDur: params.enterDur !== undefined ? params.enterDur : 0.3,
      bg: params.bg || "#1e1810",
      border: params.border || "rgba(218,119,86,0.25)",
      lineNumColor: params.lineNumColor || "#6b5d52",
      codeColor: params.codeColor || "#f5ece0",
      commentColor: params.commentColor || "#7ec699",
      keywordColor: params.keywordColor || "#da7756",
      stringColor: params.stringColor || "#d4b483",
      numberColor: params.numberColor || "#8ab4cc",
      fontSize: params.fontSize || 28,
      x: params.x || 0,
      y: params.y || 0,
      maxWidth: params.maxWidth || 1400,
    };

    var lines = p.lines;
    var fs = p.fontSize;
    var lineH = Math.round(fs * 1.7);
    var padV = 36, padH = 48, lineNumW = 52;
    var blockH = lines.length * lineH + padV * 2 + (p.title ? lineH + 16 : 0);
    var blockW = Math.min(p.maxWidth, vp.width - 120);
    var cx = p.x > 0 ? p.x : (vp.width - blockW) / 2;
    var cy = p.y > 0 ? p.y : (vp.height - blockH) / 2;

    var html = '<div style="position:absolute;left:'+cx+'px;top:'+cy+'px;width:'+blockW+'px;min-height:'+blockH+'px;background:'+p.bg+';border:1px solid '+p.border+';border-radius:10px;overflow:hidden">';

    if (p.title) {
      var titleOp = Math.max(0,Math.min(1, ease3(t / p.enterDur)));
      html += '<div style="padding:12px '+padH+'px 0;font:600 '+(fs-4)+'px system-ui,sans-serif;color:'+p.lineNumColor+';opacity:'+titleOp+'">'+escHtml(p.title)+'</div>';
    }

    html += '<div style="padding:'+padV+'px 0">';
    for (var idx = 0; idx < lines.length; idx++) {
      var appearAt = idx * p.enterStagger;
      var op = Math.max(0,Math.min(1, ease3((t - appearAt) / p.enterDur)));
      html += '<div style="display:flex;align-items:baseline;padding:0 '+padH+'px;height:'+lineH+'px;opacity:'+op+'">' +
        '<span style="min-width:'+lineNumW+'px;font:400 '+(fs-8)+'px \'SF Mono\',Menlo,monospace;color:'+p.lineNumColor+';user-select:none;margin-right:20px">'+(idx+1)+'</span>' +
        '<code style="font:400 '+fs+'px \'SF Mono\',Menlo,monospace;color:'+p.codeColor+';white-space:pre;tab-size:2">'+colorize(lines[idx],p)+'</code>' +
        '</div>';
    }
    html += '</div></div>';
    return html;
  }

  var DEMO_PARAMS = {
    lines: [
      "// ~/.claude/settings.json",
      "{",
      '  "hooks": {',
      '    "PreToolUse": [',
      "      {",
      '        "matcher": "Bash",',
      '        "hooks": [',
      '          { "type": "command", "command": "guard.sh" }',
      "        ]",
      "      }",
      "    ]",
      "  }",
      "}",
    ],
    title: "Hook 配置示例",
    enterStagger: 0.25,
    enterDur: 0.3,
    fontSize: 28,
  };

  var duration = 12;
  var canvas = document.getElementById('canvas');
  var scrubber = document.getElementById('scrubber');
  var timeDisplay = document.getElementById('timeDisplay');
  var playBtn = document.getElementById('playBtn');

  function renderFrame(t) {
    canvas.innerHTML =
      '<div style="position:absolute;inset:0;background:#1a1510"></div>' +
      render(t, DEMO_PARAMS, { width: 1920, height: 1080 });
  }

  scrubber.addEventListener('input', function(){
    var t = (scrubber.value / 1000) * duration;
    timeDisplay.textContent = t.toFixed(2) + 's';
    renderFrame(t);
  });

  var playing = false, startTime = 0, startOffset = 0;
  function tick() {
    if (!playing) return;
    var t = ((Date.now() - startTime) / 1000 + startOffset) % duration;
    scrubber.value = (t / duration) * 1000;
    timeDisplay.textContent = t.toFixed(2) + 's';
    renderFrame(t);
    requestAnimationFrame(tick);
  }
  playBtn.addEventListener('click', function(){
    playing = !playing;
    if (playing) { startTime = Date.now(); startOffset = (scrubber.value / 1000) * duration; playBtn.textContent = '⏸ Pause'; tick(); }
    else { playBtn.textContent = '▶ Play'; }
  });
  renderFrame(0);
})();
</script>
</body>
</html>
