<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>NextFrame · Preview</title>
<link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="top">
    <div class="brand">NextFrame</div>
    <div class="mode">preview · v0.1</div>
    <div class="spacer"></div>
    <button id="btn-load">Load</button>
    <input id="tl-path" value="examples/launch.timeline.json" />
    <button id="btn-save">Save</button>
    <button id="btn-render" class="primary">Export MP4</button>
  </header>

  <main class="grid">
    <section class="preview-area">
      <div class="preview-wrap">
        <img id="preview-img" alt="frame preview" />
        <div id="preview-placeholder">click Load to preview</div>
      </div>
      <div class="transport">
        <button id="btn-prev">◀︎</button>
        <input id="scrub" type="range" min="0" max="12" step="0.1" value="0" />
        <button id="btn-next">▶︎</button>
        <span id="time-label">0:00.0 / 0:00.0</span>
      </div>
      <video id="mp4-player" controls hidden></video>
    </section>

    <aside class="inspector">
      <div class="panel">
        <h3>Timeline</h3>
        <div id="timeline-meta" class="meta"></div>
        <pre id="gantt"></pre>
      </div>

      <div class="panel">
        <h3>Clips</h3>
        <div id="clip-list"></div>
      </div>

      <div class="panel">
        <h3>Selected</h3>
        <div id="clip-inspector">select a clip</div>
      </div>

      <div class="panel ai">
        <h3>AI Director (sonnet)</h3>
        <textarea id="ai-prompt" placeholder="描述你想要的视频，例如：换成蓝紫色调，文字改成 HELLO，加一个倒计时"></textarea>
        <button id="btn-ai">Ask sonnet to edit</button>
        <pre id="ai-log"></pre>
      </div>

      <div class="panel">
        <h3>Validation</h3>
        <div id="validation"></div>
      </div>
    </aside>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
