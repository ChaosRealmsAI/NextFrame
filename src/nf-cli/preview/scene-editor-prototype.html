<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame · ccFrame Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--panel:#1a1a1a;--border:#2a2a2a;--accent:#da7756;--ink:#f5ece0;--muted:#8a7a6a;--warmBg:#1a1510;--r:8px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}

/* Top bar */
.top{height:40px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.top b{font-size:13px;letter-spacing:.3px}
.top .dim{font-size:11px;color:var(--muted)}
.top .sep{width:1px;height:16px;background:var(--border)}
.tool-group{display:flex;gap:2px;margin-left:20px}
.tbtn{width:32px;height:28px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tbtn:hover{background:rgba(255,255,255,.05);border-color:var(--border)}
.tbtn.act{background:rgba(218,119,86,.15);border-color:var(--accent);color:var(--accent)}

.main{display:flex;flex:1;overflow:hidden}

/* LEFT — Element tree */
.left{width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.left h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:12px 14px 8px}
.etree{flex:1;overflow-y:auto;padding:0 6px 12px}
.eitem{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .1s}
.eitem:hover{background:rgba(255,255,255,.04);color:var(--ink)}
.eitem.sel{background:rgba(218,119,86,.12);color:var(--accent)}
.eitem .icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.eitem .ename{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eitem .evis{width:16px;height:16px;font-size:10px;opacity:.4;cursor:pointer;display:flex;align-items:center;justify-content:center}
.eitem .evis:hover{opacity:1}

.esep{height:1px;background:var(--border);margin:8px 8px}

/* CENTER — Canvas */
.center{flex:1;display:flex;flex-direction:column;min-width:0}
.carea{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:#080808;position:relative;overflow:hidden}

/* Canvas frame */
.canvas{position:relative;width:840px;height:472px;background:var(--warmBg);border-radius:4px;box-shadow:0 4px 32px rgba(0,0,0,.6);overflow:hidden}

/* Draggable elements on canvas */
.cel{position:absolute;cursor:move;transition:box-shadow .15s}
.cel:hover{box-shadow:0 0 0 1px rgba(218,119,86,.4)}
.cel.selected{box-shadow:0 0 0 2px var(--accent)}
.cel.selected::before{content:'';position:absolute;inset:-6px;pointer-events:none}

/* Resize handles */
.rhandle{position:absolute;width:8px;height:8px;background:var(--accent);border-radius:2px;display:none;z-index:10}
.cel.selected .rhandle{display:block}
.rh-tl{top:-4px;left:-4px;cursor:nw-resize}.rh-tr{top:-4px;right:-4px;cursor:ne-resize}
.rh-bl{bottom:-4px;left:-4px;cursor:sw-resize}.rh-br{bottom:-4px;right:-4px;cursor:se-resize}
.rh-t{top:-4px;left:50%;transform:translateX(-50%);cursor:n-resize}.rh-b{bottom:-4px;left:50%;transform:translateX(-50%);cursor:s-resize}
.rh-l{left:-4px;top:50%;transform:translateY(-50%);cursor:w-resize}.rh-r{right:-4px;top:50%;transform:translateY(-50%);cursor:e-resize}

/* Editable text */
.cel[contenteditable=true]{cursor:text;outline:none}

/* Guide lines */
.guide{position:absolute;background:var(--accent);opacity:.5;pointer-events:none;z-index:20}
.guide-h{height:1px;left:0;right:0}
.guide-v{width:1px;top:0;bottom:0}

/* Bottom bar */
.bbar{height:36px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:16px;font-size:11px;color:var(--muted);flex-shrink:0}
.bbar .sep{width:1px;height:14px;background:var(--border)}

/* RIGHT — Properties */
.right{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.right::-webkit-scrollbar{width:4px}
.right::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.rsec{padding:14px 16px;border-bottom:1px solid var(--border)}
.rsec h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.rrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rlbl{font-size:11px;color:var(--muted);width:50px;flex-shrink:0}
.rinp{flex:1;background:#141414;border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--ink);font-size:11px;outline:none;font-family:monospace}
.rinp:focus{border-color:var(--accent)}
.rinp-short{width:60px;flex:none;text-align:center}
.rcolor{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.rslider{flex:1;-webkit-appearance:none;height:4px;background:#333;border-radius:2px;outline:none}
.rslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.rsel{flex:1;background:#141414;border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--ink);font-size:11px;outline:none}

/* Quick actions */
.qact{display:flex;gap:6px;margin-top:4px}
.qbtn{flex:1;padding:6px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:10px;cursor:pointer;text-align:center}
.qbtn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="top">
  <b>NextFrame</b>
  <span class="sep"></span>
  <span class="dim">ccFrame Editor</span>
  <div class="tool-group">
    <button class="tbtn act" id="tool-move" title="Move (V)">V</button>
    <button class="tbtn" id="tool-text" title="Text (T)">T</button>
  </div>
  <span style="flex:1"></span>
  <span class="dim" id="zoom-label">100%</span>
  <span class="sep"></span>
  <span class="dim">1920 x 1080</span>
</div>

<div class="main">
  <!-- LEFT: Element Tree -->
  <div class="left">
    <h3>Elements</h3>
    <div class="etree" id="etree"></div>
    <div style="padding:8px 10px;border-top:1px solid var(--border)">
      <div class="qact">
        <button class="qbtn" id="btn-add-text">+ Text</button>
        <button class="qbtn" id="btn-add-pill">+ Pill</button>
        <button class="qbtn" id="btn-add-note">+ Note</button>
      </div>
    </div>
  </div>

  <!-- CENTER: Canvas -->
  <div class="center">
    <div class="carea" id="carea">
      <div class="canvas" id="canvas">
        <!-- Guide lines (shown on drag) -->
        <div class="guide guide-h" id="guide-cx" style="display:none"></div>
        <div class="guide guide-v" id="guide-cy" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Properties -->
  <div class="right" id="props">
    <div class="rsec">
      <h4>Scene</h4>
      <div class="rrow"><span class="rlbl">Name</span><input class="rinp" value="ccFrame" readonly></div>
      <div class="rrow"><span class="rlbl">Duration</span><input class="rinp rinp-short" value="72" id="p-dur">s</div>
    </div>
    <div class="rsec">
      <h4>Background</h4>
      <div class="rrow"><span class="rlbl">Color</span><div class="rcolor" id="p-bg-color" style="background:#1a1510"></div><input class="rinp" value="#1a1510" id="p-bg-hex"></div>
    </div>
    <div id="el-props"></div>
  </div>
</div>

<div class="bbar">
  <span id="pos-label">—</span>
  <span class="sep"></span>
  <span id="size-label">—</span>
  <span class="sep"></span>
  <span>ccFrame</span>
  <span style="flex:1"></span>
  <span>Elements: <b id="el-count">0</b></span>
</div>

<script>
// ── Element model ──
const CW = 840, CH = 472; // canvas display size
const SW = 1920, SH = 1080; // scene resolution
const scale = CW / SW;

let elements = [
  {id:'tag',type:'text',text:'OPC \u00b7 \u738b\u5b87\u8f69',x:.08,y:.08,fontSize:13,fontFamily:'monospace',color:'#8a7a6a',weight:'400',letterSpacing:1,align:'left'},
  {id:'ep',type:'text',text:'E01',x:.92,y:.08,fontSize:16,fontFamily:'system-ui',color:'#da7756',weight:'700',letterSpacing:0,align:'right'},
  {id:'series',type:'text',text:'\u300a\u6df1\u5165\u6d45\u51fa Claude Code \u6e90\u4ee3\u7801\u300b',x:.5,y:.55,fontSize:14,fontFamily:'system-ui',color:'#8a7a6a',weight:'400',letterSpacing:.5,align:'center'},
  {id:'title',type:'text',text:'\u4ee5\u7ec8\u4e3a\u59cb\uff1a\u4ece\u6700\u7ec8\u63d0\u793a\u8bcd\u5012\u63a8\u903b\u8f91',x:.5,y:.42,fontSize:32,fontFamily:'Georgia, serif',color:'#f5ece0',weight:'400',letterSpacing:0,align:'center'},
  {id:'pill',type:'pill',text:'ANTHROPIC CONFIDENTIAL \u00b7 LEAKED',x:.5,y:.28,fontSize:11,color:'#da7756',borderColor:'#da7756'},
  {id:'note',type:'note',text:'\u4ee5 Claude Code \u7b2c\u4e00\u4eba\u79f0\u8bb2\u8ff0',x:.5,y:.72,fontSize:13,color:'#d4b483',dotColor:'#da7756'},
  {id:'desc',type:'text',text:'\u6211\u6570\u8fc7\u4e86\u3002',x:.5,y:.64,fontSize:14,fontFamily:'monospace',color:'#f5ece0',weight:'400',letterSpacing:0,align:'center',fontStyle:'italic'},
  {id:'line-top',type:'line',x:.08,y:.16,w:.84,h:0,color:'rgba(218,119,86,0.2)'},
  {id:'line-bot',type:'line',x:.08,y:.84,w:.84,h:0,color:'rgba(218,119,86,0.2)'},
];

let selId = null;
let dragState = null; // {id, startX, startY, origX, origY}
let tool = 'move'; // 'move' | 'text'

// ── Render canvas elements ──
function renderCanvas() {
  const cv = document.getElementById('canvas');
  // Remove old elements (keep guides)
  cv.querySelectorAll('.cel').forEach(e => e.remove());

  for (const el of elements) {
    if (el.hidden) continue;
    const div = document.createElement('div');
    div.className = 'cel' + (selId === el.id ? ' selected' : '');
    div.dataset.id = el.id;

    const px = el.x * CW, py = el.y * CH;

    if (el.type === 'text') {
      div.style.cssText = `left:${px}px;top:${py}px;font-size:${el.fontSize * scale}px;font-family:${el.fontFamily || 'system-ui'};color:${el.color};font-weight:${el.weight || '400'};letter-spacing:${(el.letterSpacing||0)}px;text-align:${el.align||'center'};white-space:nowrap;padding:4px 8px;${el.fontStyle?'font-style:'+el.fontStyle+';':''}`;
      if (el.align === 'center') div.style.transform = 'translateX(-50%)';
      else if (el.align === 'right') div.style.transform = 'translateX(-100%)';
      div.textContent = el.text;
      div.contentEditable = false;
    } else if (el.type === 'pill') {
      div.style.cssText = `left:${px}px;top:${py}px;transform:translateX(-50%);padding:5px 16px;border:1px solid ${el.borderColor||'#da7756'};border-radius:20px;font-family:monospace;font-size:${(el.fontSize||11)*scale}px;color:${el.color};white-space:nowrap;letter-spacing:.5px`;
      div.textContent = el.text;
      div.contentEditable = false;
    } else if (el.type === 'note') {
      div.style.cssText = `left:${px}px;top:${py}px;transform:translateX(-50%);display:flex;align-items:center;gap:6px;font-size:${(el.fontSize||13)*scale}px;color:${el.color};white-space:nowrap`;
      div.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${el.dotColor||'#da7756'};flex-shrink:0"></span><span class="note-text">${el.text}</span>`;
      div.contentEditable = false;
    } else if (el.type === 'line') {
      const w = el.w * CW, h = Math.max(el.h * CH, 1);
      div.style.cssText = `left:${px}px;top:${py}px;width:${w}px;height:${h}px;background:${el.color};pointer-events:none`;
    }

    // Resize handles
    if (el.type !== 'line') {
      div.innerHTML += '<div class="rhandle rh-tl"></div><div class="rhandle rh-tr"></div><div class="rhandle rh-bl"></div><div class="rhandle rh-br"></div>';
    }

    cv.appendChild(div);
  }

  document.getElementById('el-count').textContent = elements.filter(e => !e.hidden).length;
}

// ── Element tree ──
function renderTree() {
  const el = document.getElementById('etree');
  el.innerHTML = '';
  const icons = {text:'Aa', pill:'\u25ef', note:'\u25cf', line:'\u2014'};
  const colors = {text:'#6366f1', pill:'#da7756', note:'#14b8a6', line:'#666'};

  for (const e of elements) {
    const d = document.createElement('div');
    d.className = 'eitem' + (selId === e.id ? ' sel' : '');
    d.innerHTML = `<span class="icon" style="background:${colors[e.type]||'#444'}22;color:${colors[e.type]||'#888'}">${icons[e.type]||'?'}</span><span class="ename">${e.id}</span><span class="evis" data-id="${e.id}">${e.hidden?'\u25cb':'\u25cf'}</span>`;
    d.onclick = (ev) => {
      if (ev.target.classList.contains('evis')) {
        e.hidden = !e.hidden;
        renderAll();
        return;
      }
      select(e.id);
    };
    el.appendChild(d);
  }
}

// ── Properties panel ──
function renderProps() {
  const box = document.getElementById('el-props');
  box.innerHTML = '';
  if (!selId) {
    box.innerHTML = '<div style="padding:24px 16px;color:var(--dim);font-size:12px;text-align:center">Select an element</div>';
    return;
  }
  const el = elements.find(e => e.id === selId);
  if (!el) return;

  let html = '<div class="rsec"><h4>Position</h4>';
  html += `<div class="rrow"><span class="rlbl">X</span><input class="rinp rinp-short" value="${(el.x*100).toFixed(1)}" data-p="x" data-scale="100">%</div>`;
  html += `<div class="rrow"><span class="rlbl">Y</span><input class="rinp rinp-short" value="${(el.y*100).toFixed(1)}" data-p="y" data-scale="100">%</div>`;
  html += `<div class="qact"><button class="qbtn" data-act="center-h">Center H</button><button class="qbtn" data-act="center-v">Center V</button></div>`;
  html += '</div>';

  if (el.type === 'text' || el.type === 'pill' || el.type === 'note') {
    html += '<div class="rsec"><h4>Content</h4>';
    html += `<div class="rrow"><span class="rlbl">Text</span><input class="rinp" value="${el.text.replace(/"/g,'&quot;')}" data-p="text"></div>`;
    html += '</div>';
  }

  if (el.type === 'text') {
    html += '<div class="rsec"><h4>Typography</h4>';
    html += `<div class="rrow"><span class="rlbl">Size</span><input type="range" class="rslider" min="8" max="72" value="${el.fontSize}" data-p="fontSize"><input class="rinp rinp-short" value="${el.fontSize}" data-p="fontSize">px</div>`;
    html += `<div class="rrow"><span class="rlbl">Weight</span><select class="rsel" data-p="weight"><option${el.weight==='300'?' selected':''}>300</option><option${el.weight==='400'?' selected':''}>400</option><option${el.weight==='500'?' selected':''}>500</option><option${el.weight==='600'?' selected':''}>600</option><option${el.weight==='700'?' selected':''}>700</option><option${el.weight==='900'?' selected':''}>900</option></select></div>`;
    html += `<div class="rrow"><span class="rlbl">Font</span><select class="rsel" data-p="fontFamily"><option${el.fontFamily?.includes('Georgia')?' selected':''}>Georgia, serif</option><option${el.fontFamily==='monospace'?' selected':''}>monospace</option><option${el.fontFamily==='system-ui'?' selected':''}>system-ui</option></select></div>`;
    html += `<div class="rrow"><span class="rlbl">Align</span><select class="rsel" data-p="align"><option${el.align==='left'?' selected':''}>left</option><option${el.align==='center'?' selected':''}>center</option><option${el.align==='right'?' selected':''}>right</option></select></div>`;
    html += `<div class="rrow"><span class="rlbl">Color</span><input type="color" value="${el.color}" data-p="color" style="width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none"><input class="rinp" value="${el.color}" data-p="color"></div>`;
    html += `<div class="rrow"><span class="rlbl">Spacing</span><input type="range" class="rslider" min="-2" max="8" step=".5" value="${el.letterSpacing||0}" data-p="letterSpacing"><input class="rinp rinp-short" value="${el.letterSpacing||0}" data-p="letterSpacing">px</div>`;
    html += '</div>';
  }

  if (el.type === 'pill') {
    html += '<div class="rsec"><h4>Style</h4>';
    html += `<div class="rrow"><span class="rlbl">Size</span><input type="range" class="rslider" min="8" max="24" value="${el.fontSize||11}" data-p="fontSize"><input class="rinp rinp-short" value="${el.fontSize||11}" data-p="fontSize">px</div>`;
    html += `<div class="rrow"><span class="rlbl">Color</span><input type="color" value="${el.color}" data-p="color" style="width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none"><input class="rinp" value="${el.color}" data-p="color"></div>`;
    html += `<div class="rrow"><span class="rlbl">Border</span><input type="color" value="${el.borderColor||'#da7756'}" data-p="borderColor" style="width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none"><input class="rinp" value="${el.borderColor||'#da7756'}" data-p="borderColor"></div>`;
    html += '</div>';
  }

  if (el.type === 'note') {
    html += '<div class="rsec"><h4>Style</h4>';
    html += `<div class="rrow"><span class="rlbl">Size</span><input type="range" class="rslider" min="8" max="24" value="${el.fontSize||13}" data-p="fontSize"><input class="rinp rinp-short" value="${el.fontSize||13}" data-p="fontSize">px</div>`;
    html += `<div class="rrow"><span class="rlbl">Color</span><input type="color" value="${el.color}" data-p="color" style="width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none"><input class="rinp" value="${el.color}" data-p="color"></div>`;
    html += `<div class="rrow"><span class="rlbl">Dot</span><input type="color" value="${el.dotColor||'#da7756'}" data-p="dotColor" style="width:28px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none"><input class="rinp" value="${el.dotColor||'#da7756'}" data-p="dotColor"></div>`;
    html += '</div>';
  }

  html += '<div class="rsec"><h4>Actions</h4><div class="qact"><button class="qbtn" data-act="dup">Duplicate</button><button class="qbtn" data-act="del" style="color:#e55">Delete</button></div></div>';

  // Export
  html += '<div class="rsec"><h4>Export</h4><div class="qact"><button class="qbtn" data-act="copy-json">Copy Params JSON</button></div></div>';

  box.innerHTML = html;

  // Bind events
  box.querySelectorAll('[data-p]').forEach(inp => {
    const handler = () => {
      const p = inp.dataset.p;
      const sc = inp.dataset.scale ? Number(inp.dataset.scale) : 1;
      let v = inp.value;
      if (['x','y','fontSize','letterSpacing'].includes(p)) v = Number(v) / sc;
      el[p] = v;
      // Sync paired inputs
      box.querySelectorAll(`[data-p="${p}"]`).forEach(other => {
        if (other !== inp) other.value = inp.value;
      });
      renderCanvas();
    };
    inp.addEventListener('input', handler);
    inp.addEventListener('change', handler);
  });

  box.querySelectorAll('[data-act]').forEach(btn => {
    btn.onclick = () => {
      const act = btn.dataset.act;
      if (act === 'center-h') { el.x = .5; renderAll(); }
      else if (act === 'center-v') { el.y = .5; renderAll(); }
      else if (act === 'dup') {
        const clone = JSON.parse(JSON.stringify(el));
        clone.id = el.id + '-' + (elements.length + 1);
        clone.x += .03; clone.y += .03;
        elements.push(clone);
        select(clone.id);
      }
      else if (act === 'del') {
        elements = elements.filter(e => e.id !== el.id);
        selId = null;
        renderAll();
      }
      else if (act === 'copy-json') {
        const obj = {};
        for (const [k,v] of Object.entries(el)) {
          if (k !== 'hidden') obj[k] = v;
        }
        navigator.clipboard.writeText(JSON.stringify(obj, null, 2));
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Params JSON', 1200);
      }
    };
  });
}

function select(id) {
  selId = id;
  renderAll();
}

function renderAll() {
  renderCanvas();
  renderTree();
  renderProps();
  updateStatus();
}

function updateStatus() {
  const el = selId ? elements.find(e => e.id === selId) : null;
  document.getElementById('pos-label').textContent = el ? `X: ${(el.x*100).toFixed(1)}%  Y: ${(el.y*100).toFixed(1)}%` : '\u2014';
  document.getElementById('size-label').textContent = el && el.fontSize ? `${el.fontSize}px` : '\u2014';
}

// ── Drag & Drop ──
const cv = document.getElementById('canvas');

cv.addEventListener('mousedown', (e) => {
  const cel = e.target.closest('.cel');
  if (!cel) { select(null); return; }
  const id = cel.dataset.id;
  select(id);

  // Double click to edit text
  // Start drag
  const el = elements.find(e => e.id === id);
  if (!el || el.type === 'line') return;
  dragState = {
    id,
    startX: e.clientX,
    startY: e.clientY,
    origX: el.x,
    origY: el.y
  };
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const el = elements.find(e => e.id === dragState.id);
  if (!el) return;

  const dx = (e.clientX - dragState.startX) / CW;
  const dy = (e.clientY - dragState.startY) / CH;
  el.x = Math.max(0, Math.min(1, dragState.origX + dx));
  el.y = Math.max(0, Math.min(1, dragState.origY + dy));

  // Show center guides
  const gcx = document.getElementById('guide-cx');
  const gcy = document.getElementById('guide-cy');
  if (Math.abs(el.y - .5) < .01) {
    gcx.style.display = 'block';
    gcx.style.top = '50%';
    el.y = .5; // snap
  } else { gcx.style.display = 'none'; }
  if (Math.abs(el.x - .5) < .01) {
    gcy.style.display = 'block';
    gcy.style.left = '50%';
    el.x = .5; // snap
  } else { gcy.style.display = 'none'; }

  renderCanvas();
  renderProps();
  updateStatus();
});

document.addEventListener('mouseup', () => {
  dragState = null;
  document.getElementById('guide-cx').style.display = 'none';
  document.getElementById('guide-cy').style.display = 'none';
});

// ── Double click to edit text inline ──
cv.addEventListener('dblclick', (e) => {
  const cel = e.target.closest('.cel');
  if (!cel) return;
  const id = cel.dataset.id;
  const el = elements.find(e => e.id === id);
  if (!el || el.type === 'line') return;

  // Find the text node to edit
  const textNode = el.type === 'note' ? cel.querySelector('.note-text') : cel;
  if (!textNode) return;

  textNode.contentEditable = true;
  textNode.focus();
  // Select all text
  const range = document.createRange();
  range.selectNodeContents(textNode);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  const finish = () => {
    textNode.contentEditable = false;
    el.text = textNode.textContent;
    renderAll();
  };
  textNode.addEventListener('blur', finish, {once: true});
  textNode.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); textNode.blur(); }
    if (ev.key === 'Escape') { textNode.textContent = el.text; textNode.blur(); }
  });
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.contentEditable === 'true') return;

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selId) {
      elements = elements.filter(el => el.id !== selId);
      selId = null;
      renderAll();
    }
  }
  if (e.key === 'v') { tool = 'move'; document.getElementById('tool-move').classList.add('act'); document.getElementById('tool-text').classList.remove('act'); }
  if (e.key === 't') { tool = 'text'; document.getElementById('tool-text').classList.add('act'); document.getElementById('tool-move').classList.remove('act'); }

  // Arrow keys nudge
  if (selId && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    const el = elements.find(e => e.id === selId);
    if (!el) return;
    const step = e.shiftKey ? .01 : .002;
    if (e.key === 'ArrowUp') el.y -= step;
    if (e.key === 'ArrowDown') el.y += step;
    if (e.key === 'ArrowLeft') el.x -= step;
    if (e.key === 'ArrowRight') el.x += step;
    el.x = Math.max(0, Math.min(1, el.x));
    el.y = Math.max(0, Math.min(1, el.y));
    e.preventDefault();
    renderCanvas();
    renderProps();
    updateStatus();
  }
});

// ── Tool buttons ──
document.getElementById('tool-move').onclick = () => { tool = 'move'; document.getElementById('tool-move').classList.add('act'); document.getElementById('tool-text').classList.remove('act'); };
document.getElementById('tool-text').onclick = () => { tool = 'text'; document.getElementById('tool-text').classList.add('act'); document.getElementById('tool-move').classList.remove('act'); };

// ── Add element buttons ──
document.getElementById('btn-add-text').onclick = () => {
  const id = 'text-' + (elements.length + 1);
  elements.push({id,type:'text',text:'New Text',x:.5,y:.5,fontSize:20,fontFamily:'system-ui',color:'#f5ece0',weight:'400',letterSpacing:0,align:'center'});
  select(id);
};
document.getElementById('btn-add-pill').onclick = () => {
  const id = 'pill-' + (elements.length + 1);
  elements.push({id,type:'pill',text:'NEW LABEL',x:.5,y:.5,fontSize:11,color:'#da7756',borderColor:'#da7756'});
  select(id);
};
document.getElementById('btn-add-note').onclick = () => {
  const id = 'note-' + (elements.length + 1);
  elements.push({id,type:'note',text:'New note text',x:.5,y:.5,fontSize:13,color:'#d4b483',dotColor:'#da7756'});
  select(id);
};

// ── Background color ──
document.getElementById('p-bg-hex').oninput = function() {
  document.getElementById('canvas').style.background = this.value;
  document.getElementById('p-bg-color').style.background = this.value;
};

// ── Init ──
renderAll();
</script>
</body>
</html>
