<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame · Scene Preview</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--panel:#1a1a1a;--border:#2a2a2a;--accent:#da7756;--ink:#e8e0d8;--muted:#8a8078;--dim:#555;--r:8px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.topbar{height:40px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.topbar b{font-size:13px;letter-spacing:.3px}
.topbar-dim{font-size:11px;color:var(--muted)}
.main{display:flex;flex:1;overflow:hidden}

/* LEFT — Scene list */
.left{width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.search{padding:8px;border-bottom:1px solid var(--border)}
.search input{width:100%;background:#141414;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--ink);font-size:12px;outline:none}
.search input:focus{border-color:var(--accent)}
.slist{flex:1;overflow-y:auto;padding:4px 0}
.slist::-webkit-scrollbar{width:4px}
.slist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.gh{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 12px 4px;display:flex;justify-content:space-between;cursor:pointer;user-select:none}
.gc{font-size:9px;color:var(--dim);background:#222;border-radius:8px;padding:1px 6px}
.si{font-size:12px;padding:5px 12px 5px 20px;cursor:pointer;color:var(--muted);transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.si:hover{background:rgba(218,119,86,.08);color:var(--ink)}
.si.act{background:rgba(218,119,86,.15);color:var(--accent);font-weight:500}
.si .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* CENTER — Canvas */
.center{flex:1;display:flex;flex-direction:column;min-width:0}
.carea{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.cwrap{position:relative;width:100%;max-width:840px;aspect-ratio:16/9;background:#000;border-radius:var(--r);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.ccontent{width:100%;height:100%;position:relative;transition:background .3s}
.cmeta{position:absolute;bottom:8px;right:12px;font-size:10px;color:rgba(255,255,255,.25);font-family:monospace}
/* 画布内的模拟元素 */
.sim-text{position:absolute;color:rgba(255,255,255,.9);font-weight:700;text-align:center;width:100%;pointer-events:none}
.sim-sub{position:absolute;color:rgba(255,255,255,.4);font-size:14px;text-align:center;width:100%;pointer-events:none}
.sim-bar{position:absolute;bottom:20%;border-radius:3px;transition:height .3s,background .3s}
.sim-dot{position:absolute;border-radius:50%;transition:all .3s}
.sim-line{position:absolute;border:1px solid rgba(255,255,255,.15);border-radius:4px}
.sim-badge{position:absolute;padding:6px 16px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:1px}

.ctrl{height:48px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.pbtn{width:32px;height:32px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pbtn:hover{opacity:.85}
.pbtn svg{fill:#fff;width:14px;height:14px}
.swrap{flex:1;display:flex;align-items:center;gap:10px}
.sbar{flex:1;height:4px;background:#333;border-radius:2px;position:relative;cursor:pointer}
.sfill{height:100%;background:var(--accent);border-radius:2px;width:20%}
.sthumb{width:12px;height:12px;border-radius:50%;background:var(--accent);position:absolute;top:50%;transform:translate(-50%,-50%);left:20%;cursor:grab;box-shadow:0 0 4px rgba(0,0,0,.4)}
.tdisp{font-size:11px;color:var(--muted);font-family:monospace;white-space:nowrap;min-width:110px;text-align:right}

/* RIGHT — Params */
.right{width:300px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ph{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.pt{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge{font-size:9px;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:10px;font-weight:500}
.pd{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.ph .hint{font-size:10px;color:var(--dim);margin-top:4px;font-style:italic}
.plist{flex:1;overflow-y:auto;padding:8px 0}
.plist::-webkit-scrollbar{width:4px}
.plist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pg{padding:0 16px;margin-bottom:14px}
.pl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
.pv{font-family:monospace;font-size:10px;color:var(--accent)}
.pr{display:flex;align-items:center;gap:8px}
.ps{flex:1;-webkit-appearance:none;height:4px;background:#333;border-radius:2px;outline:none}
.ps::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.pn{width:56px;background:#141414;border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--ink);font-size:11px;font-family:monospace;text-align:right;outline:none}
.pn:focus{border-color:var(--accent)}
.prh{font-size:9px;color:var(--dim);margin-top:2px;font-family:monospace}
.psem{font-size:9px;color:var(--dim);margin-top:1px}
.toggle{width:36px;height:20px;background:#333;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.psel{width:100%;background:#141414;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--ink);font-size:11px;outline:none}
.psel:focus{border-color:var(--accent)}
.ptxt{width:100%;background:#141414;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--ink);font-size:11px;outline:none;font-family:monospace}
.ptxt:focus{border-color:var(--accent)}
.pfoot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.breset{flex:1;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer}
.breset:hover{border-color:var(--accent);color:var(--accent)}
.bcopy{flex:1;padding:7px;background:rgba(218,119,86,.1);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:11px;cursor:pointer}
.bcopy:hover{background:rgba(218,119,86,.2)}
</style>
</head>
<body>
<div class="topbar">
  <b>NextFrame</b>
  <span style="width:1px;height:16px;background:var(--border)"></span>
  <span class="topbar-dim">Scene Preview</span>
  <span style="flex:1"></span>
  <span class="topbar-dim" id="cnt">33 scenes · 7 types</span>
</div>
<div class="main">
  <div class="left">
    <div class="search"><input type="text" placeholder="Search scenes..." id="q"></div>
    <div class="slist" id="sl"></div>
  </div>
  <div class="center">
    <div class="carea"><div class="cwrap"><div class="ccontent" id="cv"></div><div class="cmeta">960×540 · 30fps</div></div></div>
    <div class="ctrl">
      <button class="pbtn" id="bp"><svg id="ip" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg><svg id="iq" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg></button>
      <div class="swrap"><div class="sbar" id="sb"><div class="sfill" id="sf"></div><div class="sthumb" id="st"></div></div><span class="tdisp" id="td">0:02.4 / 0:12.0</span></div>
    </div>
  </div>
  <div class="right">
    <div class="ph">
      <div class="pt"><span id="pn">—</span><span class="badge" id="pb" style="background:rgba(218,119,86,.15);color:var(--accent)">—</span></div>
      <div class="pd" id="pdd">Select a scene to preview</div>
      <div class="hint" id="phi" style="display:none"></div>
    </div>
    <div class="plist" id="pl"></div>
    <div class="pfoot">
      <button class="breset" id="br">Reset Defaults</button>
      <button class="bcopy" id="bc">Copy JSON</button>
    </div>
  </div>
</div>

    {n:'fps',t:'number',d:30,r:[1,60],s:'frame rate'},
  ]},
  {id:'videoWindow',cat:'Browser',desc:'Video in macOS window chrome',dur:10,params:[
    {n:'src',t:'string',d:'video.mp4',s:'video file path'},
    {n:'title',t:'string',d:'video.mp4',s:'window title'},
    {n:'offset',t:'number',d:0,r:[0,300],s:'source time offset',step:.1},
    {n:'insetX',t:'number',d:.12,r:[0,.4],s:'horizontal inset',step:.01},
    {n:'insetY',t:'number',d:.10,r:[0,.4],s:'vertical inset',step:.01},
  ]},
  // ─── Media ───
  {id:'imageHero',cat:'Media',desc:'Hero image with ken-burns zoom and pan',dur:8,params:[
    {n:'src',t:'string',d:'hero.png',s:'image path'},
    {n:'fit',t:'enum',d:'cover',o:['cover','contain'],s:'fit mode'},
    {n:'zoomStart',t:'number',d:1,r:[.5,2.5],s:'start zoom',step:.05},
    {n:'zoomEnd',t:'number',d:1.15,r:[.5,3],s:'end zoom',step:.05},
    {n:'panX',t:'number',d:.05,r:[-.5,.5],s:'x pan',step:.01},
    {n:'panY',t:'number',d:-.03,r:[-.5,.5],s:'y pan',step:.01},
  ]},
];

// ── State ──
let cur=null, playing=false, scrub=.2, af=null;

// ── Helpers ──
const $=id=>document.getElementById(id);
const cats=[...new Set(S.map(s=>s.cat))];

function gv(k){if(!cur)return null;const p=cur.params.find(x=>x.n===k);return p?p._v??p.d:null}

// ── Scene list ──
function renderList(f=''){
  const el=$('sl');el.innerHTML='';const fl=f.toLowerCase();
  for(const cat of cats){
    const ss=S.filter(s=>s.cat===cat&&s.id.toLowerCase().includes(fl));
    if(!ss.length)continue;
    const h=document.createElement('div');h.className='gh';
    h.innerHTML=`<span>${cat}</span><span class="gc">${ss.length}</span>`;
    el.appendChild(h);
    for(const s of ss){
      const d=document.createElement('div');
      d.className='si'+(cur&&cur.id===s.id?' act':'');
      d.innerHTML=`<span class="dot" style="background:${CAT_COLORS[cat]||'#666'}"></span>${s.id}`;
      d.onclick=()=>sel(s);
      el.appendChild(d);
    }
  }
}

function sel(s){
  cur={...s,params:s.params.map(p=>({...p,_v:p.d}))};
  renderList($('q').value);
  renderParams();
  renderCanvas();
}

// ── Params panel ──
function renderParams(){
  if(!cur)return;
  $('pn').textContent=cur.id;
  $('pb').textContent=cur.cat;
  $('pb').style.background=`${CAT_COLORS[cur.cat]||'#666'}22`;
  $('pb').style.color=CAT_COLORS[cur.cat]||'#666';
  $('pdd').textContent=cur.desc;
  const hi=$('phi');
  if(cur.dur){hi.style.display='block';hi.textContent=`duration hint: ${cur.dur}s`}else{hi.style.display='none'}
  const el=$('pl');el.innerHTML='';
  if(!cur.params.length){el.innerHTML='<div style="padding:24px 16px;color:var(--dim);font-size:12px;text-align:center">No configurable parameters</div>';return}
  for(const p of cur.params){
    const g=document.createElement('div');g.className='pg';
    if(p.t==='number'){
      const mn=p.r?p.r[0]:0,mx=p.r?p.r[1]:100,st=p.step||1,v=p._v??p.d;
      g.innerHTML=`<div class="pl"><span>${p.n}</span><span class="pv" id="v_${p.n}">${v}</span></div>
        <div class="pr"><input type="range" class="ps" min="${mn}" max="${mx}" step="${st}" value="${v}" data-k="${p.n}">
        <input type="number" class="pn" min="${mn}" max="${mx}" step="${st}" value="${v}" data-k="${p.n}"></div>
        <div class="prh">${mn} — ${mx}</div>${p.s?`<div class="psem">${p.s}</div>`:''}`;
      el.appendChild(g);
      const sl=g.querySelector('.ps'),nm=g.querySelector('.pn');
      sl.oninput=()=>{nm.value=sl.value;p._v=+sl.value;$('v_'+p.n).textContent=sl.value;renderCanvas()};
      nm.oninput=()=>{sl.value=nm.value;p._v=+nm.value;$('v_'+p.n).textContent=nm.value;renderCanvas()};
    }else if(p.t==='enum'){
      const opts=p.o.map(o=>`<option value="${o}"${o===(p._v??p.d)?' selected':''}>${o}</option>`).join('');
      g.innerHTML=`<div class="pl"><span>${p.n}</span></div><select class="psel">${opts}</select>${p.s?`<div class="psem">${p.s}</div>`:''}`;
      el.appendChild(g);g.querySelector('select').onchange=function(){p._v=this.value;renderCanvas()};
    }else if(p.t==='boolean'){
      const v=p._v??p.d;
      g.innerHTML=`<div class="pl"><span>${p.n}</span></div><div class="toggle${v?' on':''}" data-k="${p.n}"></div>${p.s?`<div class="psem">${p.s}</div>`:''}`;
      el.appendChild(g);g.querySelector('.toggle').onclick=function(){p._v=!p._v;this.classList.toggle('on');renderCanvas()};
    }else if(p.t==='string'){
      g.innerHTML=`<div class="pl"><span>${p.n}</span></div><input type="text" class="ptxt" value="${(p._v??p.d).replace(/"/g,'&quot;')}" data-k="${p.n}">${p.s?`<div class="psem">${p.s}</div>`:''}`;
      el.appendChild(g);g.querySelector('.ptxt').oninput=function(){p._v=this.value;renderCanvas()};
    }
  }
}

// ── Canvas simulation ──
function renderCanvas(){
  const cv=$('cv');cv.innerHTML='';
  if(!cur){cv.style.background='#000';return}
  const id=cur.id;

  // Background gradient based on scene type
  if(id==='auroraGradient'){
    const a=gv('hueA'),b=gv('hueB'),c=gv('hueC'),i=gv('intensity');
    cv.style.background=`linear-gradient(135deg,hsl(${a},70%,${30*i}%) 0%,hsl(${b},60%,${25*i}%) 50%,hsl(${c},65%,${35*i}%) 100%)`;
  }else if(id==='fluidBackground'){
    const a=gv('hueA'),b=gv('hueB'),i=gv('intensity');
    cv.style.background=`radial-gradient(ellipse at 30% 40%,hsl(${a},50%,${20*i}%),hsl(${b},40%,${12*i}%),#0a0a14)`;
  }else if(id==='starfield'){
    cv.style.background=`radial-gradient(circle at 50% 50%,hsl(${gv('hueBase')},30%,8%),#020204)`;
    for(let i=0;i<30*gv('density');i++){const d=document.createElement('div');d.className='sim-dot';d.style.cssText=`width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:hsl(${gv('hueBase')+Math.random()*60},60%,${50+Math.random()*40}%);left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${.3+Math.random()*.7}`;cv.appendChild(d)}
  }else if(id==='neonGrid'){
    cv.style.background=`linear-gradient(180deg,#0a0015 0%,hsl(${gv('hueHorizon')},60%,8%) 60%,hsl(${gv('hueGrid')},50%,12%) 100%)`;
    for(let i=0;i<6;i++){const l=document.createElement('div');l.style.cssText=`position:absolute;left:0;right:0;height:1px;background:hsl(${gv('hueGrid')},80%,50%);opacity:.3;bottom:${10+i*8}%`;cv.appendChild(l)}
  }else if(id==='pixelRain'){
    cv.style.background=`linear-gradient(180deg,#000a00,#001a00)`;
    const cols=Math.min(gv('columns'),30);for(let i=0;i<cols;i++){const c=document.createElement('div');c.style.cssText=`position:absolute;left:${(i/cols)*100}%;top:${Math.random()*60}%;font-family:monospace;font-size:12px;color:hsl(${gv('hueStart')},80%,50%);opacity:${.3+Math.random()*.7};writing-mode:vertical-lr`;c.textContent=gv('glyphPalette').repeat(3);cv.appendChild(c)}
  }else if(id==='kineticHeadline'){
    cv.style.background='linear-gradient(135deg,#0a0a1a,#1a0a2a)';
    const txt=document.createElement('div');txt.className='sim-text';txt.style.cssText=`top:35%;font-size:48px;background:linear-gradient(90deg,hsl(${gv('hueStart')},80%,60%),hsl(${gv('hueEnd')},80%,60%));-webkit-background-clip:text;-webkit-text-fill-color:transparent`;txt.textContent=gv('text');cv.appendChild(txt);
    const sub=document.createElement('div');sub.className='sim-sub';sub.style.top='55%';sub.textContent=gv('subtitle');cv.appendChild(sub);
  }else if(id==='glitchText'){
    cv.style.background='#0a0a0a';
    const txt=document.createElement('div');txt.className='sim-text';txt.style.cssText=`top:38%;font-size:${Math.min(gv('fontSize'),80)}px;color:hsl(${gv('baseHue')},80%,60%);text-shadow:${3*gv('glitchAmount')}px 0 cyan,-${3*gv('glitchAmount')}px 0 red`;txt.textContent=gv('text');cv.appendChild(txt);
  }else if(id==='countdown'){
    cv.style.background=`radial-gradient(circle,hsl(${gv('hueStart')},40%,12%),#0a0a0a)`;
    const n=document.createElement('div');n.className='sim-text';n.style.cssText='top:25%;font-size:120px;font-weight:900;color:rgba(255,255,255,.9)';n.textContent='3';cv.appendChild(n);
    const s=document.createElement('div');s.className='sim-sub';s.style.top='65%';s.textContent=gv('subtitle');cv.appendChild(s);
  }else if(id==='barChartReveal'){
    cv.style.background='#0a0a14';
    const t=document.createElement('div');t.className='sim-text';t.style.cssText='top:8%;font-size:16px;letter-spacing:2px;color:rgba(255,255,255,.5)';t.textContent=gv('title');cv.appendChild(t);
    const vals=[65,82,45,90,72,58];
    for(let i=0;i<vals.length;i++){const b=document.createElement('div');b.className='sim-bar';b.style.cssText=`left:${12+i*14}%;width:10%;height:${vals[i]*.6}%;background:hsl(${gv('hueStart')+(gv('hueEnd')-gv('hueStart'))*i/6},70%,55%);bottom:12%`;cv.appendChild(b)}
  }else if(id==='dataPulse'){
    cv.style.background='#0a0a14';
    const bars=Math.min(gv('bars'),40);
    for(let i=0;i<bars;i++){const b=document.createElement('div');b.className='sim-bar';const h=10+Math.random()*gv('peak')*70;b.style.cssText=`left:${(i/bars)*96+2}%;width:${90/bars}%;height:${h}%;background:hsl(${gv('hueA')+(gv('hueB')-gv('hueA'))*i/bars},70%,50%);bottom:15%`;cv.appendChild(b)}
  }else if(id==='textOverlay'){
    cv.style.background='rgba(0,0,0,.3)';
    const t=document.createElement('div');t.className='sim-text';t.style.cssText=`top:40%;font-size:${Math.min(gv('fontSize'),72)}px;color:${gv('color')};font-weight:${gv('weight')};text-align:${gv('align')}`;t.textContent=gv('text');cv.appendChild(t);
  }else if(id==='lowerThirdVelvet'){
    cv.style.background='rgba(0,0,0,.2)';
    const bar=document.createElement('div');bar.style.cssText=`position:absolute;left:5%;bottom:15%;background:hsl(${gv('hueA')},60%,25%);padding:12px 24px;border-left:3px solid hsl(${gv('hueB')},80%,60%);border-radius:0 4px 4px 0`;
    bar.innerHTML=`<div style="font-size:18px;font-weight:700;color:#fff">${gv('title')}</div><div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">${gv('subtitle')}</div>`;cv.appendChild(bar);
  }else if(id==='cornerBadge'){
    cv.style.background='rgba(0,0,0,.2)';
    const b=document.createElement('div');b.className='sim-badge';b.style.cssText=`top:12%;right:5%;background:hsl(${gv('hue')},70%,45%);color:#fff`;b.textContent=gv('label');cv.appendChild(b);
    const s=document.createElement('div');s.style.cssText=`position:absolute;top:20%;right:5%;font-size:10px;color:rgba(255,255,255,.4)`;s.textContent=gv('subtitle');cv.appendChild(s);
  }else if(id==='vignette'){
    cv.style.background=`radial-gradient(ellipse at center,transparent ${gv('radius')*40}%,hsl(${gv('hue')},30%,5%) 100%)`;
  }else if(id==='ccFrame'){
    cv.style.background='#1a1510';
    const tag=document.createElement('div');tag.style.cssText='position:absolute;top:8%;left:8%;font-size:10px;color:#8a7a6a;letter-spacing:1px;font-family:monospace';tag.textContent=gv('tag');cv.appendChild(tag);
    const ep=document.createElement('div');ep.style.cssText='position:absolute;top:8%;right:8%;font-size:12px;color:#da7756;font-weight:700';ep.textContent=gv('ep');cv.appendChild(ep);
    const t=document.createElement('div');t.className='sim-text';t.style.cssText='top:40%;font-size:28px;color:#f5ece0;font-family:Georgia,serif';t.textContent=gv('subtitle');cv.appendChild(t);
    const s=document.createElement('div');s.className='sim-sub';s.style.cssText='top:55%;font-size:12px;color:#8a7a6a';s.textContent=gv('series');cv.appendChild(s);
  }else if(id==='ccBigNumber'){
    cv.style.background='#1a1510';
    const n=document.createElement('div');n.className='sim-text';n.style.cssText='top:30%;font-size:96px;color:#f5ece0;font-family:Georgia,serif';n.textContent=gv('number');cv.appendChild(n);
    const l=document.createElement('div');l.className='sim-sub';l.style.cssText='top:60%;font-size:16px;color:#da7756';l.textContent=gv('label');cv.appendChild(l);
  }else if(id==='ccPill'){
    cv.style.background='#1a1510';
    const p=document.createElement('div');p.style.cssText=`position:absolute;left:${gv('x')*100}%;top:${gv('y')*100}%;transform:translate(-50%,-50%);padding:6px 16px;border:1px solid #da7756;border-radius:20px;font-family:monospace;font-size:11px;color:#da7756;white-space:nowrap`;p.textContent=gv('text');cv.appendChild(p);
  }else if(id==='htmlSlide'){
    cv.style.background='#fff';cv.innerHTML=`<div style="padding:20px;font-size:14px;color:#333">${gv('html')}</div>`;
  }else if(id==='svgOverlay'){
    cv.style.background='#1a1a2e';cv.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%">${gv('svg')}</div>`;
  }else if(id==='markdownSlide'){
    const bg=gv('theme')==='light'?'#fff':gv('theme')==='sepia'?'#f4ecd8':'#1a1510';
    const fg=gv('theme')==='light'?'#333':gv('theme')==='sepia'?'#433422':'#f5ece0';
    cv.style.background=bg;cv.innerHTML=`<div style="padding:24px;color:${fg};font-family:Georgia,serif"><h1 style="font-size:24px;margin-bottom:12px;border-bottom:1px solid ${fg}33;padding-bottom:8px">Hello</h1><p>This is <strong>markdown</strong></p></div>`;
  }else if(id==='videoWindow'){
    cv.style.background='#1a1a2e';
    const ix=gv('insetX'),iy=gv('insetY');
    const w=document.createElement('div');w.style.cssText=`position:absolute;left:${ix*100}%;top:${iy*100}%;right:${ix*100}%;bottom:${iy*100}%;background:#1e2227;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);overflow:hidden`;
    w.innerHTML=`<div style="height:28px;background:#1e2227;display:flex;align-items:center;padding:0 12px;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:#ff5f57"></div><div style="width:10px;height:10px;border-radius:50%;background:#febc2e"></div><div style="width:10px;height:10px;border-radius:50%;background:#28c840"></div><span style="flex:1;text-align:center;font-size:11px;color:rgba(255,255,255,.35)">${gv('title')}</span></div><div style="background:#0d1117;flex:1;display:flex;align-items:center;justify-content:center;height:calc(100% - 28px)"><span style="color:#da7756;font-size:20px">▶ video</span></div>`;
    cv.appendChild(w);
  }else if(id==='imageHero'){
    cv.style.background=`linear-gradient(${gv('panX')*360}deg,#2a1a1a,#1a2a2a)`;
    const z=document.createElement('div');z.style.cssText=`position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,.1);transform:scale(${gv('zoomStart')})`;z.textContent='🖼';cv.appendChild(z);
    const info=document.createElement('div');info.style.cssText='position:absolute;bottom:12%;width:100%;text-align:center;font-size:11px;color:rgba(255,255,255,.3)';info.textContent=`zoom ${gv('zoomStart')}→${gv('zoomEnd')} · pan(${gv('panX')},${gv('panY')}) · ${gv('fit')}`;cv.appendChild(info);
  }else{
    let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);
    cv.style.background=`linear-gradient(${h%360}deg,hsl(${(h&0xFF)*1.4},40%,15%),hsl(${((h>>8)&0xFF)*1.4},35%,12%))`;
    const t=document.createElement('div');t.className='sim-text';t.style.cssText='top:45%;font-size:20px;color:rgba(255,255,255,.2)';t.textContent=id;cv.appendChild(t);
  }
}

// ── Playback ──
$('bp').onclick=()=>{playing=!playing;$('ip').style.display=playing?'none':'block';$('iq').style.display=playing?'block':'none';if(playing)tick();else cancelAnimationFrame(af)};
function tick(){if(!playing)return;scrub+=.001;if(scrub>1)scrub=0;setScrub(scrub);af=requestAnimationFrame(tick)}
function setScrub(p){scrub=Math.max(0,Math.min(1,p));const pct=scrub*100;$('sf').style.width=pct+'%';$('st').style.left=pct+'%';const dur=cur?cur.dur:12;const c=scrub*dur;$('td').textContent=`${Math.floor(c/60)}:${(c%60).toFixed(1).padStart(4,'0')} / ${Math.floor(dur/60)}:${(dur%60).toFixed(1).padStart(4,'0')}`}
const sbar=$('sb');let drag=false;
sbar.onmousedown=e=>{drag=true;scrubTo(e)};document.onmousemove=e=>{if(drag)scrubTo(e)};document.onmouseup=()=>{drag=false};
function scrubTo(e){const r=sbar.getBoundingClientRect();setScrub((e.clientX-r.left)/r.width)}

// ── Search, Reset, Copy ──
$('q').oninput=function(){renderList(this.value)};
$('br').onclick=()=>{if(cur){const orig=S.find(s=>s.id===cur.id);if(orig)sel(orig)}};
$('bc').onclick=()=>{
  if(!cur)return;
  const obj={};for(const p of cur.params)obj[p.n]=p._v??p.d;
  const json=JSON.stringify({scene:cur.id,params:obj},null,2);
  navigator.clipboard.writeText(json).then(()=>{$('bc').textContent='Copied!';setTimeout(()=>{$('bc').textContent='Copy JSON'},1500)});
};

// ── Init ──
sel(S[0]);
setScrub(.2);
</script>
</body>
