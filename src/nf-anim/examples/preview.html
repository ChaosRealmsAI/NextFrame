<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>nf-anim preview cell</title>
<style>
html,body{margin:0;height:100%;background:#fff7ed;font:11px/1.3 ui-sans-serif,system-ui;color:#475569;overflow:hidden}
.wrap{height:100%;display:flex;flex-direction:column}
.stage{flex:1;display:grid;place-items:center;padding:6px;background:linear-gradient(180deg,#fffbeb,#fff7ed);position:relative}
.stage svg{max-width:100%;max-height:100%;display:block}
.bar{flex:0 0 auto;background:rgba(255,255,255,.85);border-top:1px solid #fed7aa;padding:5px 10px;display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:10px;color:#7c2d12}
.bar b{color:#0f172a;font-weight:600}
.scrub{display:flex;align-items:center;gap:8px;min-width:180px}
.scrub input{width:140px;accent-color:#ea580c}
.play{cursor:pointer;background:#fed7aa;border:none;border-radius:50%;width:18px;height:18px;font-size:9px;color:#7c2d12;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1;font-weight:700}
.play:hover{background:#fdba74}
.err{color:#b91c1c;padding:8px;font-family:monospace;font-size:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage"></div>
  <div class="bar">
    <span><b id="title">…</b> · <span id="kind">—</span></span>
    <span class="scrub"><button id="play" class="play" title="play / pause">⏸</button><input id="scrub" type="range" min="0" max="1000" value="0"><span><span id="t">0.00</span>s / <span id="dur">—</span>s</span></span>
  </div>
</div>
<script type="module">
import { sampleFor } from "../catalog.js";
import { renderMotion } from "../engine/render.js";
const qs = new URLSearchParams(location.search);
const kind = qs.get("kind") || "scene";
const id = qs.get("id") || "heartLike";
const stage = document.querySelector("#stage");
const titleEl = document.querySelector("#title");
const kindEl = document.querySelector("#kind");
const scrubEl = document.querySelector("#scrub");
const tEl = document.querySelector("#t");
const durEl = document.querySelector("#dur");

try {
  const sample = sampleFor(kind, id);
  if (!sample) throw new Error(`no sample for ${kind}/${id}`);
  const motion = sample.motion || sample;
  const dur = motion.duration || 1;
  titleEl.textContent = sample.name || sample.id || id;
  kindEl.textContent = kind;
  durEl.textContent = dur.toFixed(2);
  function renderAt(value) {
    const t = (+value / 1000) * dur;
    tEl.textContent = t.toFixed(2);
    try {
      stage.innerHTML = renderMotion(null, t, motion);
    } catch (e) {
      stage.innerHTML = `<div class="err">${e.message}</div>`;
    }
  }
  // Auto-play loop using rAF (lives in examples/, not engine — engine stays frame-pure)
  const playEl = document.querySelector("#play");
  let playing = qs.get("t") === null;  // pause when ?t= query freezes a frame
  let lastWall = 0;
  let curT = 0;
  function loop(now) {
    if (playing) {
      if (lastWall) {
        const dt = (now - lastWall) / 1000;
        curT = (curT + dt) % dur;
        scrubEl.value = String(Math.round((curT / dur) * 1000));
        renderAt(scrubEl.value);
      }
      lastWall = now;
    } else {
      lastWall = 0;
    }
    requestAnimationFrame(loop);
  }
  function setPlaying(state) {
    playing = state;
    playEl.textContent = state ? "⏸" : "▶";
  }
  playEl.addEventListener("click", () => setPlaying(!playing));
  scrubEl.addEventListener("input", () => {
    setPlaying(false);
    curT = (Number(scrubEl.value) / 1000) * dur;
    renderAt(scrubEl.value);
  });
  // honor ?t= query for static screenshots
  const tParam = qs.get("t");
  if (tParam !== null) {
    const initial = Math.max(0, Math.min(dur, parseFloat(tParam)));
    curT = initial;
    scrubEl.value = String(Math.round((initial / dur) * 1000));
    renderAt(scrubEl.value);
    setPlaying(false);
  } else {
    renderAt(scrubEl.value);
    setPlaying(true);
  }
  requestAnimationFrame(loop);
} catch (e) {
  stage.innerHTML = `<div class="err">${e.message}</div>`;
}
</script>
</body>
</html>
