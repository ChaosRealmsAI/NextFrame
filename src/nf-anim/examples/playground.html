<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>nf-anim playground</title>
  <style>body{margin:0;font:14px/1.45 ui-sans-serif,system-ui;background:radial-gradient(circle at top,#fff7ed,#f8fafc 55%);color:#0f172a}.wrap{display:grid;grid-template-columns:minmax(260px,420px) 1fr;min-height:100vh}@media (max-width:900px){.wrap{grid-template-columns:1fr}}aside,main{padding:18px}aside{border-right:1px solid #fed7aa;background:rgba(255,255,255,.68);backdrop-filter:blur(12px)}textarea{width:100%;min-height:52vh;border:1px solid #fdba74;border-radius:18px;padding:14px;font:12px/1.5 ui-monospace,monospace;background:#fff}label,output{display:block;font-size:12px;color:#475569}input{width:100%}#stage{display:grid;place-items:center;min-height:62vh;background:#fff;border:1px solid #e2e8f0;border-radius:26px;box-shadow:0 24px 60px rgba(15,23,42,.08)}#stage svg{max-width:min(92vw,760px);height:auto}#error{color:#b91c1c;white-space:pre-wrap}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:10px 0 14px}</style>
</head>
<body>
  <div class="wrap">
    <aside><h1 id="title">nf-anim Playground</h1><p id="hint">Paste motion JSON or load a registry sample via query params.</p><textarea id="editor"></textarea><div class="row"><label for="time">Time</label><output id="readout">0.00s</output></div><input id="time" type="range" min="0" max="1.2" step="0.01" value="0" /><pre id="error"></pre></aside>
    <main><div id="stage"></div></main>
  </div>
  <script type="module">
    import { sampleFor } from "../catalog.js";
    import { renderMotion } from "../engine/render.js";
    const qs = new URLSearchParams(location.search), editor = document.querySelector("#editor"), time = document.querySelector("#time"), stage = document.querySelector("#stage"), error = document.querySelector("#error"), readout = document.querySelector("#readout"), title = document.querySelector("#title"), hint = document.querySelector("#hint");
    const seed = () => sampleFor(qs.get("kind") || "scene", qs.get("id") || "heartLike") || { motion: { duration: 1.2, size: [320, 220], layers: [{ shape: "circle", at: [160, 110], radius: 52, fill: "#da7756" }] } };
    function current() { const raw = JSON.parse(editor.value || "{}"); return raw.motion || raw; }
    function render() { try { const motion = current(), t = +time.value; error.textContent = ""; readout.textContent = `${t.toFixed(2)}s / ${(motion.duration || 1).toFixed(2)}s`; stage.innerHTML = renderMotion(null, t, motion); } catch (err) { stage.innerHTML = ""; error.textContent = err.message; } }
    const sample = seed(); title.textContent = `${sample.kind || "custom"} · ${sample.name || sample.id || "motion"}`; hint.textContent = qs.get("id") ? "Loaded from the registry sample generator." : hint.textContent;
    editor.value = JSON.stringify(sample, null, 2); time.max = `${(sample.motion?.duration || sample.duration || 1.2).toFixed(2)}`; editor.addEventListener("input", render); time.addEventListener("input", render); render();
  </script>
</body>
</html>
