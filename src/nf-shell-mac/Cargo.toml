[package]
name = "nf-shell-mac"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[[bin]]
name = "nf-shell-mac"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
block2 = "0.6"
clap = { version = "4", features = ["derive"] }
notify = "6"
objc2 = "0.6.4"
objc2-app-kit = { version = "0.3.2", features = [
    "NSApplication",
    "NSBezierPath",
    "NSBitmapImageRep",
    "NSButton",
    "NSColor",
    "NSControl",
    "NSEvent",
    "NSFont",
    "NSGraphics",
    "NSImageRep",
    "NSLayoutAnchor",
    "NSLayoutConstraint",
    "NSResponder",
    "NSTextField",
    "NSView",
    "NSWindow",
] }
objc2-foundation = { version = "0.3.2", features = [
    "NSArray",
    "NSData",
    "NSDate",
    "NSDictionary",
    "NSError",
    "NSGeometry",
    "NSNotification",
    "NSObject",
    "NSObjCRuntime",
    "NSRunLoop",
    "NSString",
    "NSTimer",
    "NSURL",
] }
objc2-web-kit = { version = "0.3.2", features = [
    "WKContentWorld",
    "WKScriptMessage",
    "WKScriptMessageHandlerWithReply",
    "WKUserContentController",
    "WKUserScript",
    "WKWebView",
    "WKWebViewConfiguration",
    "WKWebsiteDataStore",
] }
nf-recorder = { path = "../nf-recorder" }

[lints]
workspace = true
