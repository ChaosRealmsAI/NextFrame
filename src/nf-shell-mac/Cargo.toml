[package]
name = "nf-shell-mac"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "nextframe"
path = "src/main.rs"

[dependencies]
nf-bridge = { path = "../nf-bridge" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[target.'cfg(target_os = "macos")'.dependencies]
block2 = "0.6"
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSData", "NSString", "NSError", "NSURL", "NSURLRequest",
    "NSURLResponse", "NSHTTPURLResponse",
    "NSDictionary", "NSThread", "NSRunLoop",
] }
objc2-app-kit = { version = "0.3", features = [
    "NSApplication", "NSWindow", "NSView", "NSScreen",
    "NSRunningApplication", "NSMenu", "NSMenuItem",
    "NSToolbar", "NSToolbarItem",
    "NSVisualEffectView", "NSAppearance",
    "NSEvent", "NSResponder",
] }
objc2-web-kit = { version = "0.3", features = [
    "WKWebView", "WKWebViewConfiguration",
    "WKUserContentController", "WKScriptMessage",
    "WKScriptMessageHandler", "WKURLSchemeHandler",
    "WKURLSchemeTask", "WKNavigationDelegate",
    "WKNavigation", "WKPreferences",
    "WKWebsiteDataStore",
] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
wildcard_imports = "deny"
